    const cols = matrix.length ? matrix[0].length : 5;
    const headers = (q === 7)
      ? ['試験','(１)穴埋め','(２)オ','(３)カ','(４)キ','(５)ク','(６)〜(７)信頼性']
      : ['試験','(１)穴埋め','(２)エ','(３)オ','(４)カ'];
    const headRow = headers.slice(0, cols).map(h => `<th>${h}</th>`).join('');
    const dataRows = matrix.map(row => '<tr>' + row.map((c,i) => `<td>${c}</td>`).join('') + '</tr>').join('');
    const topics = (d.topics || []).map(renderTopic).join('');
    const pris = (d.priorities || []).map(([h,t]) =>
      `<div class="pri"><h4>${h}</h4><p>${t}</p></div>`).join('');
    return `
      <div class="panel">
        <h2>１．問${q} の全体傾向</h2>
        <div class="meta">
          <span><b>主題：</b>${esc(d.title)}</span>
          <span><b>配点：</b>小計${d.score}点</span>
        </div>
        <p class="overview">${d.overview}</p>
      </div>
      <div class="panel">
        <h2>２．過去１０試験 出題テーマ一覧</h2>
        <table class="matrix">
          <thead><tr>${headRow}</tr></thead>
          <tbody>${dataRows}</tbody>
        </table>
      </div>
      <div class="panel">
        <h2>３．テーマ別 学習ポイント（クリックで展開）</h2>
        ${topics}
      </div>
      <div class="panel">
        <h2>４．学習の優先順位と試験テクニック</h2>
        <p>問${q}は<b>${d.score}点</b>が割り当てられている。以下の優先順位で学習することを推奨する。</p>
        <div class="priorities">${pris}</div>
        <p class="sec-h" style="margin-top:14px">試験テクニック</p>
        <ul class="tech">
          <li>(１)穴埋め問題は前後文脈から類推できることが多い。知らない用語でも消去法で正解にたどり着ける。</li>
          <li>(２)以降の４択は「逆の説明」「数値が逆」「現象名が違う」「規格名が違う」など典型的なひっかけパターンが多い。各テーマの「ひっかけポイント」を集中的に潰す。</li>
          <li>用語の意味と<b>規格・標準化団体・略号の正式名称</b>をセットで覚えると正答率が上がる。</li>
          <li>選択肢の番号と用語を機械的に対応させず、用語の意味から考えて選ぶ訓練を。</li>
          <li>電気通信主任技術者試験は過去問の<b>言い回し・選択肢パターンが繰り返される</b>傾向が強い。過去１０試験を解いて慣れることが最大の対策。</li>
        </ul>
      </div>
    `;
  }

  function selectTab(q) {
    active = q;
    Array.from(tabs.children).forEach((t, i) => t.classList.toggle('active', (i+1) === q));
    content.innerHTML = renderProblem(q);
    document.getElementById('search').value = '';
    document.getElementById('count').textContent = '';
  }

  function highlight(root, q) {
    if (!q) return 0;
    const re = new RegExp(q.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\$&'), 'gi');
    let n = 0;
    function walk(node) {
      if (node.nodeType === 3) {
        const t = node.nodeValue;
        if (re.test(t)) {
          const span = document.createElement('span');
          span.innerHTML = t.replace(re, m => { n++; return `<mark>${m}</mark>`; });
          node.parentNode.replaceChild(span, node);
        }
      } else if (node.nodeType === 1 && node.tagName !== 'MARK' && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
        Array.from(node.childNodes).forEach(walk);
      }
    }
    walk(root);
    return n;
  }

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim();
    content.innerHTML = renderProblem(active);
    // Auto-expand all details so search can reach inside
    content.querySelectorAll('details.topic').forEach(d => { if (q) d.open = true; });
    if (q) {
      const n = highlight(content, q);
      document.getElementById('count').textContent = n ? `${n}件ヒット` : 'ヒットなし';
    } else {
      document.getElementById('count').textContent = '';
    }
  });

  document.getElementById('expandAll').onclick = () => {
    content.querySelectorAll('details.topic').forEach(d => d.open = true);
  };
  document.getElementById('collapseAll').onclick = () => {
    content.querySelectorAll('details.topic').forEach(d => d.open = false);
  };

  selectTab(1);
</script>
</body>
</html>
