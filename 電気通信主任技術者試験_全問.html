を示す。 (２点×３＝６点)\nＩＰネットワーク上で音声通話を行うＶｏＩＰシステムを実現するために用いられるＳＩＰ\nは、 (ア) プロトコルの一つであり、端末相互のメッセージの交換や通話の接続・切断な\nどの手順を定めている。また、ＨＴＴＰと同様にテキスト形式のメッセージを用いることで\nＷｅｂとの親和性が高いなどの特徴を有している。\nＳＩＰサーバの構成要素として、 (イ) サーバ、プロキシサーバなどがある。 (イ)\nサーバは、ユーザエージェントクライアント(ＵＡＣ)からリクエストされたアドレスを別のア\nドレスに書き換えて通知する機能を持つ。この機能により、接続先ユーザが一時的に別の場所\nに移動した場合でも転送サービスが可能となる。\nプロキシサーバでは、ＵＡＣからのリクエストに応じて、サービスを提供するサーバにＳＩＰ\nメッセージを中継する。\nＳＩＰでは、クライアントサーバモデルに基づいた、アプリケーション間のマルチメディア\nセッションを設定する手順を定めている。セッションの確立は、クライアントのサーバに対す\nる (ウ) による要求から開始される。\n<(ア)～(ウ)の解答群>\n① ロケーション ② ＤＨＣＰ ③ シグナリング ④ ＡＣＫ\n⑤ ルーティング ⑥ ２００ＯＫ ⑦ インターネット ⑧ 回線制御\n⑨ ＩＮＶＩＴＥ ⑩ ネーム ⑪ リダイレクト ⑫ アタッチ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰ技術を用いて音声や映像などのサービスを提供するためのＩＭＳの構成要素である\nＣＳＣＦ(Call Session Control Function)の種類と機能について述べた次の文章のうち、誤って\nいるものは、 (エ) である。\n<(エ)の解答群>\n① ＣＳＣＦはＳＩＰサーバに相当する機能を持ち、ＣＳＣＦにはホーム網における\nセッション制御などを行うＳ－ＣＳＣＦ、ユーザ端末との通信を行うＰ－ＣＳＣＦ\n及びホーム網と他網とのゲートウェイ機能を持つＩ－ＣＳＣＦがある。\n② Ｓ－ＣＳＣＦは、受信したＳＩＰメッセージを分析し、適切なアプリケーション\nサーバへＳＩＰメッセージを転送する機能を持つ。\n③ Ｐ－ＣＳＣＦは、ユーザ端末がＩＭＳに登録されるときに固定的に割り当てられ\nる。ユーザ端末とＰ－ＣＳＣＦの間にはＳ／ＭＩＭＥによるセキュアな通信が提供\nされる。\n④ Ｉ－ＣＳＣＦは、ユーザの登録時において、必要に応じてＳＬＦ(Subscription\nLocator Function)にアクセスして接続ユーザのＨＳＳを特定する。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電話番号を有するＩＰ電話における音声パケット制御、トラヒックなどについて述べた次の\n文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 音声信号を良好な品質で伝達するために、ルータでは、一般に、優先度を付けた\n複数のキューを用意しておき、音声パケットを優先度の高いキューに格納し、優先\n的に取り出す優先制御の機能が利用される。\n② ＩＰ電話において、デジタル信号に変換され、パケット化された音声信号を送出\nする場合、一般に、パケットの送信間隔を長くすれば伝送効率は高くなるが、遅延\nは増加する。\n③ 音声パケットのトラヒック状況確認には、ネットワーク機器などから取得される\nアクセスログ、パケットキャプチャデータなどが用いられ、帯域使用率の予測に使\n用される最繁時間帯におけるパケット到着間隔及びパケット長は、一般に、アクセ\nスログから算出できる。\n④ ＩＰ電話は、総合品質の規格値などで一定の待ち時間(遅延)が許容されており、\n待ち時間は、トラヒック設計においてネットワーク設備のバッファのサイズを決定\nするための基本的なパラメータの一つとなる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nふくそう\nトラヒックの輻輳などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 各種イベントやチケット販売の予約などにより、特定の回線に予約受付呼などが集中する\nために起こるトラヒックの輻輳は、一般に、企画型輻輳といわれる。\nＢ 地震、台風などにより、被災地への見舞い呼や安否確認の問い合わせ呼が集中してネット\nワーク全体に影響を及ぼすトラヒックの輻輳は、一般に、災害型輻輳といわれる。\nＣ 災害時などネットワークが輻輳するおそれがある場合には、一般に、優先度が高い重要通\n信の発信呼を優先させる方法及び中継されてきた重要通信の端末への着信呼を優先させる方\n法が採られる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問２ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＰ技術を用いて音声、映像などのサービスを提供するための技術であるＩＭＳ</p>\n(IP Multimedia Subsystem)の構成などについて述べたものである。 内の(ア)～(ウ)\nに最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記\n号は、同じ解答を示す。 (２点×３＝６点)\nＩＭＳは、セッション制御用のプロトコルとしてＩＰ電話などで用いられるＳＩＰを用いて\n通信路の設定・解放を制御し、マルチメディアサービスを提供している。また、ユーザ認証な\nどのアクセスセキュリティ管理、ローミング対応のための (ア) 管理、アプリケーション\nサーバ(ＡＳ)との連携、課金管理機能へのインタフェース提供などの機能を有している。\nＩＭＳのアーキテクチャの重要な構成要素であるＣＳＣＦは、ＳＩＰサーバに相当する機能\nを持ち、ＣＳＣＦにはＰ－ＣＳＣＦ、Ｓ－ＣＳＣＦ及びＩ－ＣＳＣＦがある。\nＰ－ＣＳＣＦは、ユーザ端末が接続する最初のコンタクトポイントであり、ユーザ端末が登\n録されるときに割り当てられる。\nＳ－ＣＳＣＦは、ユーザ間のセッション制御を行い、ＳＩＰにおけるＵＡＣからの登録・更\n新のリクエストを受け付ける (イ) としても振る舞う。また、アプリケーションサービス\n提供のため、ＡＳへのＳＩＰメッセージ転送も行う。\nＩ－ＣＳＣＦは、他網とのコンタクトポイントであり、接続ユーザの属するＳ－ＣＳＣＦを\n選択するために (ウ) へ問合せなどを行う。 (ウ) は、ユーザのＩＤやサービス加入\n情報などを保持しており、ユーザ端末のローミング時には、ローミング先の情報なども保持す\nる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 帯 域 ② ＭＧＷ ③ リダイレクト ④ トラヒック\n⑤ ＨＳＳ ⑥ ＳＬＦ ⑦ レジストラ ⑧ ロケーション\n⑨ 品 質 ⑩ ＭＲＦＣ ⑪ ＲＡＤＩＵＳ ⑫ ＩＭ－ＳＳＦ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nトラヒックの用語などについて述べた次の文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① １日のうちトラヒックの最大となる連続する１時間は最繁時といわれ、１日の全\nトラヒックに対する最繁時トラヒックの占める割合は、基礎トラヒックといわれる。\n② 即時式の系において、加えられた呼量と運ばれた呼量との差である損失呼量の運\nばれた呼量に対する比は、呼損率といわれる。\n③ ある測定時間Ｔ 時間 中における総呼数をＮ 呼 、平均保留時間をｔ 時間 とす\nると、呼量Ａ アーラン は次式で表される。\nＮｔ\nＡ ＝\nＴ\n④ 待時式完全群において、加わる呼量を一定とした場合、出回線数が多くなれば平\n均待合せ時間は長くなる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n電話番号マッピング技術の一つであるＥＮＵＭの概要について述べた次のＡ～Ｃの文章は、\n(オ) 。\nＡ ＥＮＵＭでは、電話番号をキーにしてメールアドレスやＩＰ電話用のアドレスなど、イン\nターネット上で扱う様々なアドレス情報との対応付けを行うことができる。\nＢ ＥＮＵＭにおいて、電話番号に対応付けられたＵＲＩには、ＵＲＬ、ＵＲＮなどが含まれ\nる。\nＣ ＥＮＵＭ対応のＤＮＳサーバには、電話番号にＵＲＩを対応付ける場合に使用される\nＮＡＰＴＲ(The Naming Authority Pointer)といわれるタイプのリソースレコードが蓄えら\nれている。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰ電話の音声品質劣化要因などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＩＰ電話の送信側ゲートウェイで発生する遅延の主なものには、音声信号のデジ\nタル化や圧縮に伴う遅延及びパケット化遅延がある。\n② ＩＰ網の経路上で発生したパケットロスは、受信側で再生される音声の途切れに\nつながる場合がある。この対策として、同じような波形が連続するという音声信号\nの特質を利用して欠落した音声を補完するＡＲＱといわれる機能が、一般に、利用\nされている。\n③ ＶｏＩＰ技術を用いることにより、音声信号はパケット化されて一定の間隔で送\n信されるが、ＩＰ網を経由すると、一般に、ジッタといわれるパケットの到着間隔\nの揺らぎが発生する。ジッタが大きくなると音声の途切れなどが発生することがあ\nる。\n④ ＩＰ電話において発生するエコーには、４線式と２線式との変換過程で発生する\nハイブリッドエコー、受信側端末のマイクロホンとスピーカとの間で発生するアコー\nスティックエコーなどがある。", "raw": "問２ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＰ技術を用いて音声、映像などのサービスを提供するための技術であるＩＭＳ\n(IP Multimedia Subsystem)の構成などについて述べたものである。 内の(ア)～(ウ)\nに最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記\n号は、同じ解答を示す。 (２点×３＝６点)\nＩＭＳは、セッション制御用のプロトコルとしてＩＰ電話などで用いられるＳＩＰを用いて\n通信路の設定・解放を制御し、マルチメディアサービスを提供している。また、ユーザ認証な\nどのアクセスセキュリティ管理、ローミング対応のための (ア) 管理、アプリケーション\nサーバ(ＡＳ)との連携、課金管理機能へのインタフェース提供などの機能を有している。\nＩＭＳのアーキテクチャの重要な構成要素であるＣＳＣＦは、ＳＩＰサーバに相当する機能\nを持ち、ＣＳＣＦにはＰ－ＣＳＣＦ、Ｓ－ＣＳＣＦ及びＩ－ＣＳＣＦがある。\nＰ－ＣＳＣＦは、ユーザ端末が接続する最初のコンタクトポイントであり、ユーザ端末が登\n録されるときに割り当てられる。\nＳ－ＣＳＣＦは、ユーザ間のセッション制御を行い、ＳＩＰにおけるＵＡＣからの登録・更\n新のリクエストを受け付ける (イ) としても振る舞う。また、アプリケーションサービス\n提供のため、ＡＳへのＳＩＰメッセージ転送も行う。\nＩ－ＣＳＣＦは、他網とのコンタクトポイントであり、接続ユーザの属するＳ－ＣＳＣＦを\n選択するために (ウ) へ問合せなどを行う。 (ウ) は、ユーザのＩＤやサービス加入\n情報などを保持しており、ユーザ端末のローミング時には、ローミング先の情報なども保持す\nる。\n<(ア)～(ウ)の解答群>\n① 帯 域 ② ＭＧＷ ③ リダイレクト ④ トラヒック\n⑤ ＨＳＳ ⑥ ＳＬＦ ⑦ レジストラ ⑧ ロケーション\n⑨ 品 質 ⑩ ＭＲＦＣ ⑪ ＲＡＤＩＵＳ ⑫ ＩＭ－ＳＳＦ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nトラヒックの用語などについて述べた次の文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① １日のうちトラヒックの最大となる連続する１時間は最繁時といわれ、１日の全\nトラヒックに対する最繁時トラヒックの占める割合は、基礎トラヒックといわれる。\n② 即時式の系において、加えられた呼量と運ばれた呼量との差である損失呼量の運\nばれた呼量に対する比は、呼損率といわれる。\n③ ある測定時間Ｔ 時間 中における総呼数をＮ 呼 、平均保留時間をｔ 時間 とす\nると、呼量Ａ アーラン は次式で表される。\nＮｔ\nＡ ＝\nＴ\n④ 待時式完全群において、加わる呼量を一定とした場合、出回線数が多くなれば平\n均待合せ時間は長くなる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電話番号マッピング技術の一つであるＥＮＵＭの概要について述べた次のＡ～Ｃの文章は、\n(オ) 。\nＡ ＥＮＵＭでは、電話番号をキーにしてメールアドレスやＩＰ電話用のアドレスなど、イン\nターネット上で扱う様々なアドレス情報との対応付けを行うことができる。\nＢ ＥＮＵＭにおいて、電話番号に対応付けられたＵＲＩには、ＵＲＬ、ＵＲＮなどが含まれ\nる。\nＣ ＥＮＵＭ対応のＤＮＳサーバには、電話番号にＵＲＩを対応付ける場合に使用される\nＮＡＰＴＲ(The Naming Authority Pointer)といわれるタイプのリソースレコードが蓄えら\nれている。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰ電話の音声品質劣化要因などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① ＩＰ電話の送信側ゲートウェイで発生する遅延の主なものには、音声信号のデジ\nタル化や圧縮に伴う遅延及びパケット化遅延がある。\n② ＩＰ網の経路上で発生したパケットロスは、受信側で再生される音声の途切れに\nつながる場合がある。この対策として、同じような波形が連続するという音声信号\nの特質を利用して欠落した音声を補完するＡＲＱといわれる機能が、一般に、利用\nされている。\n③ ＶｏＩＰ技術を用いることにより、音声信号はパケット化されて一定の間隔で送\n信されるが、ＩＰ網を経由すると、一般に、ジッタといわれるパケットの到着間隔\nの揺らぎが発生する。ジッタが大きくなると音声の途切れなどが発生することがあ\nる。\n④ ＩＰ電話において発生するエコーには、４線式と２線式との変換過程で発生する\nハイブリッドエコー、受信側端末のマイクロホンとスピーカとの間で発生するアコー\nスティックエコーなどがある。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問２ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、移動通信技術であるＬＴＥにおける機能の概要について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(２点×３＝６点)\nＬＴＥを進化させたＬＴＥ－Ａｄｖａｎｃｅｄは、３ＧＰＰ(3rd Generation Partnership\nProject)がスマートフォンに対するユーザニーズの拡大や多様化するサービスなどに対応する\nために策定した携帯電話用の高速無線通信の規格である。\nＬＴＥ－Ａｄｖａｎｃｅｄでは、ＬＴＥとの後方互換を維持しながら複数のＬＴＥキャリア\n(搬送波)を同時に用いて広帯域通信を行う (ア) 技術、複数の送受信アンテナを用いて信\n号の伝送を行い、通信品質及び周波数利用効率の向上を実現するＭＩＭＯ技術などを拡張し発\n展させている。また、周波数の利用効率を高め、高トラヒックに対応するため、従来のマクロ\nセル内にセル半径の小さいスモールセル基地局を配置する (イ) ネットワークを構成し、\nセル間の協調制御を高度化している。\nＬＴＥ－Ａｄｖａｎｃｅｄを拡張したＬＴＥ－Ａｄｖａｎｃｅｄ Ｐｒｏでは、ＩｏＴ機器\n向けデバイスへの通信を提供するための仕様、ユーザスループットや容量を増大させるため\nの仕様などが規定されている。ＩｏＴ機器向けの端末カテゴリである (ウ) は、ＬＴＥバ\nンド内でスマートフォンなどと共存した運用に加えて、ＬＴＥキャリアのガードバンドなどを\n利用した運用がサポートされている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 仮 想 ② ＺＥＴＡ ③ ＳＩＧＦＯＸ ④ ハンドオーバ\n⑤ リング型 ⑥ ＬｏＲａ ⑦ ＮＢ－ＩｏＴ ⑧ ヘテロジニアス\n⑨ スター型 ⑩ トラヒック制御 ⑪ ビームフォーミング\n⑫ キャリアアグリゲーション\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＶｏＩＰシステムに用いられるＳＩＰ技術について述べた次の文章のうち、正しいものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＳＩＰは、伝送制御プロトコルの一つであり、端末相互のメッセージの交換や通\n話の接続・切断などの手順を定めている。\n② ＳＩＰにおいて、プロトコル上で使用されるメッセージには、バイナリベースの\n表現形式が用いられている。\n③ ＳＩＰサーバの構成要素であるレジストラは、一般に、ユーザエージェントクラ\nイアント(ＵＡＣ)からの登録、更新などのリクエストを受け付ける機能を有してお\nり、受け付ける際にはＵＡＣを認証する。\n④ ＩＰネットワーク上のＵＡＣの位置情報は、一般に、レジストラで保持され、レ\nジストラは問合せに応じてロケーションサーバなどへ位置情報を提供する。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰ電話などで用いられる音声符号化方式について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＳ－ＡＣＥＬＰ方式では、コードブックに登録された標準的な音声の波形パターンを示\nす番号と音声信号の特徴的な音響特性データを送信し、受信側では、これらの情報から元の\n音声波形を予測して音声を生成している。\nＢ ＡＤＰＣＭ方式は、過去の入力信号から現在の入力信号を予測し、実際の入力信号との差\n分を符号化して伝送する方式であり、ビットレートはＰＣＭ方式の２倍以上となる。\nＣ ＩＴＵ－Ｔ勧告で規定されたデュアルレートの音声コーデックで用いるＡＣＥＬＰ方式及\nびＭＰ－ＭＬＱ方式のそれぞれのビットレートは、ＣＳ－ＡＣＥＬＰ方式のビットレートと\n比較して低い。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nランダム呼の生起条件などについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n＜(カ)の解答群＞\n① ランダム呼の条件を満たす呼が生起する確率は、二項分布に従う。\n② 加えられた呼がランダム呼であっても、そのあふれ呼は、ランダム呼とは違った\n性質を示す。\n③ 平滑呼の前提条件は、入線数を有限としているところがランダム呼と異なるだけ\nであり、平滑呼は準ランダム呼ともいわれる。\n④ 生起呼量は加えられた呼量ともいわれ、平均保留時間の間に全ての入線に生起す\nる平均呼数で表される。", "raw": "問２ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、移動通信技術であるＬＴＥにおける機能の概要について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(２点×３＝６点)\nＬＴＥを進化させたＬＴＥ－Ａｄｖａｎｃｅｄは、３ＧＰＰ(3rd Generation Partnership\nProject)がスマートフォンに対するユーザニーズの拡大や多様化するサービスなどに対応する\nために策定した携帯電話用の高速無線通信の規格である。\nＬＴＥ－Ａｄｖａｎｃｅｄでは、ＬＴＥとの後方互換を維持しながら複数のＬＴＥキャリア\n(搬送波)を同時に用いて広帯域通信を行う (ア) 技術、複数の送受信アンテナを用いて信\n号の伝送を行い、通信品質及び周波数利用効率の向上を実現するＭＩＭＯ技術などを拡張し発\n展させている。また、周波数の利用効率を高め、高トラヒックに対応するため、従来のマクロ\nセル内にセル半径の小さいスモールセル基地局を配置する (イ) ネットワークを構成し、\nセル間の協調制御を高度化している。\nＬＴＥ－Ａｄｖａｎｃｅｄを拡張したＬＴＥ－Ａｄｖａｎｃｅｄ Ｐｒｏでは、ＩｏＴ機器\n向けデバイスへの通信を提供するための仕様、ユーザスループットや容量を増大させるため\nの仕様などが規定されている。ＩｏＴ機器向けの端末カテゴリである (ウ) は、ＬＴＥバ\nンド内でスマートフォンなどと共存した運用に加えて、ＬＴＥキャリアのガードバンドなどを\n利用した運用がサポートされている。\n<(ア)～(ウ)の解答群>\n① 仮 想 ② ＺＥＴＡ ③ ＳＩＧＦＯＸ ④ ハンドオーバ\n⑤ リング型 ⑥ ＬｏＲａ ⑦ ＮＢ－ＩｏＴ ⑧ ヘテロジニアス\n⑨ スター型 ⑩ トラヒック制御 ⑪ ビームフォーミング\n⑫ キャリアアグリゲーション\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＶｏＩＰシステムに用いられるＳＩＰ技術について述べた次の文章のうち、正しいものは、\n(エ) である。\n<(エ)の解答群>\n① ＳＩＰは、伝送制御プロトコルの一つであり、端末相互のメッセージの交換や通\n話の接続・切断などの手順を定めている。\n② ＳＩＰにおいて、プロトコル上で使用されるメッセージには、バイナリベースの\n表現形式が用いられている。\n③ ＳＩＰサーバの構成要素であるレジストラは、一般に、ユーザエージェントクラ\nイアント(ＵＡＣ)からの登録、更新などのリクエストを受け付ける機能を有してお\nり、受け付ける際にはＵＡＣを認証する。\n④ ＩＰネットワーク上のＵＡＣの位置情報は、一般に、レジストラで保持され、レ\nジストラは問合せに応じてロケーションサーバなどへ位置情報を提供する。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰ電話などで用いられる音声符号化方式について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＳ－ＡＣＥＬＰ方式では、コードブックに登録された標準的な音声の波形パターンを示\nす番号と音声信号の特徴的な音響特性データを送信し、受信側では、これらの情報から元の\n音声波形を予測して音声を生成している。\nＢ ＡＤＰＣＭ方式は、過去の入力信号から現在の入力信号を予測し、実際の入力信号との差\n分を符号化して伝送する方式であり、ビットレートはＰＣＭ方式の２倍以上となる。\nＣ ＩＴＵ－Ｔ勧告で規定されたデュアルレートの音声コーデックで用いるＡＣＥＬＰ方式及\nびＭＰ－ＭＬＱ方式のそれぞれのビットレートは、ＣＳ－ＡＣＥＬＰ方式のビットレートと\n比較して低い。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nランダム呼の生起条件などについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n＜(カ)の解答群＞\n① ランダム呼の条件を満たす呼が生起する確率は、二項分布に従う。\n② 加えられた呼がランダム呼であっても、そのあふれ呼は、ランダム呼とは違った\n性質を示す。\n③ 平滑呼の前提条件は、入線数を有限としているところがランダム呼と異なるだけ\nであり、平滑呼は準ランダム呼ともいわれる。\n④ 生起呼量は加えられた呼量ともいわれ、平均保留時間の間に全ての入線に生起す\nる平均呼数で表される。"}], "3": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、電波伝搬について述べたものである。 内の(ア)～(ウ)に最も適したも</p>\nのを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答\nを示す。 (２点×３＝６点)\nあらゆる方向に一様に電波を放射するアンテナは (ア) アンテナといわれ、自由空間に\n置かれた (ア) アンテナから放射された電波は球面状に広がり、放射電力をＰ Ｗ 、球の\n半径をｄ ｍ 、球面上における (イ) をＳ Ｗ／ｍ２ とすると、Ｓは次式で表される。\nＰ\nＳ＝\n４πｄ２\n伝搬の状況を表す指標として伝搬損失があり、送信電力Ｐｔ Ｗ と受信電力Ｐｒ Ｗ の比から\n求められる。特に、大地反射などのない自由空間における伝搬損失は自由空間伝搬損失といわ\nれ、送受信アンテナ間の距離が２倍になると、自由空間伝搬損失は (ウ) 倍になる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 電界強度 ② パラボラ ③ 電束密度 ④ ダイポール\n⑤ √２ ⑥ ２ ⑦ ３ ⑧ ４\n⑨ ストリップ ⑩ 磁束密度 ⑪ 等方性 ⑫ 電力束密度\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル無線伝送に用いられるマルチプルアクセス方式の種類、特徴などについて述べた次\nの文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＴＤＭＡでは、使用可能な周波数帯域を分割し、分割した各周波数帯を各端末に\n割り当てて通信を行う。一つの端末は、割り当てられた一つの周波数を１チャネル\nとして使用する。\n② ＦＤＭＡでは、一つの周波数を時間で分割し、分割した各時間(タイムスロット)\nを各端末に割り当てて通信を行う。一つの端末は、割り当てられた一つのタイムス\nロットを１チャネルとして使用する。\n③ ＯＦＤＭＡでは、周波数の異なる複数のサブキャリアをまとめ、各サブキャリア\nのセットを各端末に割り当てて通信を行う。\n④ ＣＤＭＡでは、符号分割による多元接続を行っており、拡散符号で１次変調を施\nした広帯域の信号を、更にＰＳＫ方式などを用いて２次変調して狭帯域の信号とし\nている。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 各移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生する\nたびにその移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、\n一般に、プリアサイン方式といわれる。\n② 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線通信チャネルを設定する\n技術にランダムアクセス制御がある。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ 移動端末がどこに存在していても、ネットワーク側から着信のための呼出しを行\nえるようにするための位置登録では、現在位置は移動端末に登録される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n衛星通信回線の品質に影響する雑音について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 衛星通信システムで用いるアンテナが受信する雑音には、衛星のアンテナが受信\nする雑音、地上のアンテナが受信する雑音、受信システム外からの干渉雑音などが\nある。\n② 地上のアンテナが受信する雑音には、アンテナ主ビームが向いている宇宙空間で\n発生しているコロナ雑音、降雨時に電波が雨滴に吸収されるときに発生する空電雑\n音などがある。\n③ 衛星通信システムの干渉雑音には、同一周波数帯を使用する他の衛星通信システ\nムからの干渉、地上マイクロ波通信システムからの干渉などによる雑音がある。\n④ 衛星の受信システム内で発生する干渉雑音には、一つの衛星中継増幅器内で複数\nの搬送波が共通増幅され、増幅器の動作点が飽和点に近いときに発生する雑音、周\n波数の多重利用による他ビームキャリアからの雑音などがある。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、電波伝搬について述べたものである。 内の(ア)～(ウ)に最も適したも\nのを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答\nを示す。 (２点×３＝６点)\nあらゆる方向に一様に電波を放射するアンテナは (ア) アンテナといわれ、自由空間に\n置かれた (ア) アンテナから放射された電波は球面状に広がり、放射電力をＰ Ｗ 、球の\n半径をｄ ｍ 、球面上における (イ) をＳ Ｗ／ｍ２ とすると、Ｓは次式で表される。\nＰ\nＳ＝\n４πｄ２\n伝搬の状況を表す指標として伝搬損失があり、送信電力Ｐｔ Ｗ と受信電力Ｐｒ Ｗ の比から\n求められる。特に、大地反射などのない自由空間における伝搬損失は自由空間伝搬損失といわ\nれ、送受信アンテナ間の距離が２倍になると、自由空間伝搬損失は (ウ) 倍になる。\n<(ア)～(ウ)の解答群>\n① 電界強度 ② パラボラ ③ 電束密度 ④ ダイポール\n⑤ √２ ⑥ ２ ⑦ ３ ⑧ ４\n⑨ ストリップ ⑩ 磁束密度 ⑪ 等方性 ⑫ 電力束密度\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル無線伝送に用いられるマルチプルアクセス方式の種類、特徴などについて述べた次\nの文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＴＤＭＡでは、使用可能な周波数帯域を分割し、分割した各周波数帯を各端末に\n割り当てて通信を行う。一つの端末は、割り当てられた一つの周波数を１チャネル\nとして使用する。\n② ＦＤＭＡでは、一つの周波数を時間で分割し、分割した各時間(タイムスロット)\nを各端末に割り当てて通信を行う。一つの端末は、割り当てられた一つのタイムス\nロットを１チャネルとして使用する。\n③ ＯＦＤＭＡでは、周波数の異なる複数のサブキャリアをまとめ、各サブキャリア\nのセットを各端末に割り当てて通信を行う。\n④ ＣＤＭＡでは、符号分割による多元接続を行っており、拡散符号で１次変調を施\nした広帯域の信号を、更にＰＳＫ方式などを用いて２次変調して狭帯域の信号とし\nている。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(オ) である。\n<(オ)の解答群>\n① 各移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生する\nたびにその移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、\n一般に、プリアサイン方式といわれる。\n② 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線通信チャネルを設定する\n技術にランダムアクセス制御がある。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ 移動端末がどこに存在していても、ネットワーク側から着信のための呼出しを行\nえるようにするための位置登録では、現在位置は移動端末に登録される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n衛星通信回線の品質に影響する雑音について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① 衛星通信システムで用いるアンテナが受信する雑音には、衛星のアンテナが受信\nする雑音、地上のアンテナが受信する雑音、受信システム外からの干渉雑音などが\nある。\n② 地上のアンテナが受信する雑音には、アンテナ主ビームが向いている宇宙空間で\n発生しているコロナ雑音、降雨時に電波が雨滴に吸収されるときに発生する空電雑\n音などがある。\n③ 衛星通信システムの干渉雑音には、同一周波数帯を使用する他の衛星通信システ\nムからの干渉、地上マイクロ波通信システムからの干渉などによる雑音がある。\n④ 衛星の受信システム内で発生する干渉雑音には、一つの衛星中継増幅器内で複数\nの搬送波が共通増幅され、増幅器の動作点が飽和点に近いときに発生する雑音、周\n波数の多重利用による他ビームキャリアからの雑音などがある。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、アンテナの特性に関する指標について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nアンテナの利得は、アンテナから任意方向に単位立体角当たりに放射される電力と、そのア\nンテナと同一の電力が供給されている等方性アンテナから単位立体角当たりに放射される電力\nの比として定義される。あらゆる方向に均一の強さの電磁界を放射する仮想的な等方性アンテ\nナを基準としたアンテナの利得は (ア) といわれる。\nアンテナのビーム幅は、アンテナの放射指向性から求められ、一般に、最大指向性を持つメ\nインローブのピークである中心から (イ) dＢ 低下したところの角度幅が放射特性の指標\nとして用いられる。また、メインローブ方向以外に生ずるローブはサイドローブといわれる。\nサイドローブは、他の無線システムに対して干渉を与える要因となるため、極力、低減する\n必要がある。特に、メインローブの放射電界とメインローブの中心の逆方向から±６０度の範\n囲にある最大放射電界との比は (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① １ ② ３ ③ ６ ④ １０\n⑤ 放射効率 ⑥ 相対利得 ⑦ 絶対利得 ⑧ 利得係数\n⑨ Ｃ／Ｎ ⑩ Ｓ／Ｎ ⑪ ＦＳ比 ⑫ ＦＢ比\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＡＳＫでは、変調信号により搬送波の振幅を変化させており、オンオフキーイン\nグ(ＯＯＫ)は２値ＡＳＫの一例である。\n② ＰＳＫでは、変調信号により搬送波の位相を変化させており、信号点を９０度ご\nπ\nとに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n④ ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信方式におけるセルの構成方法などについて述べた次の文章のうち、誤っているもの\nは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 一つのサービスエリアを複数のセルで構成する方式はセルラ方式といわれ、ある\nセルで用いた周波数を、干渉が生じない程度離れたセルで再利用できる。\n② 周波数利用効率の向上などを目的として、水平面無指向性アンテナにより一つの\n基地局のエリアで複数の扇形セルを形成する構成は、一般に、セクタセル構成とい\nわれる。\n③ ストリートマイクロセルは、一般に、都市部においてセル半径が約１ kｍ 以下で\n基地局のアンテナ高が近隣の建物より低い場合に構成され、電波が建物に挟まれた\n道路沿いに伝搬する特徴がある。\n④ フェムトセルは、一般に、家庭内やオフィス内で用いられ、半径１０ ｍ 程度の\n範囲で電波状況が悪い箇所の改善などを目的として構成される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n衛星通信回線の品質に影響を与える要因などについて述べた次の文章のうち、正しいものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 衛星通信において伝搬損失を発生させる要因のうち、自由空間損失は、一般に、\n波長の２乗に反比例し、伝搬距離の４乗に比例する。\n② 衛星通信では、一般に、降雨による減衰を避けた周波数帯を使うため、降雨によ\nる減衰の影響は、大気ガスによる減衰の影響と比較して小さい。\n③ 雑音指数は、回路入力端の信号電力対雑音電力比を回路出力端の信号電力対雑音\n電力比で除したものであり、回路出力端の出力信号電力を一定とすると、回路出力\n端の雑音電力が小さいほど雑音指数の値は大きくなる。\n④ 衛星通信の地球局におけるアンテナ雑音は、アンテナの大地方向のサイドローブ\nからの雑音の影響を受けるため、アンテナ雑音を小さくするにはサイドローブレベ\nルを低くすることが有効である。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、アンテナの特性に関する指標について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nアンテナの利得は、アンテナから任意方向に単位立体角当たりに放射される電力と、そのア\nンテナと同一の電力が供給されている等方性アンテナから単位立体角当たりに放射される電力\nの比として定義される。あらゆる方向に均一の強さの電磁界を放射する仮想的な等方性アンテ\nナを基準としたアンテナの利得は (ア) といわれる。\nアンテナのビーム幅は、アンテナの放射指向性から求められ、一般に、最大指向性を持つメ\nインローブのピークである中心から (イ) dＢ 低下したところの角度幅が放射特性の指標\nとして用いられる。また、メインローブ方向以外に生ずるローブはサイドローブといわれる。\nサイドローブは、他の無線システムに対して干渉を与える要因となるため、極力、低減する\n必要がある。特に、メインローブの放射電界とメインローブの中心の逆方向から±６０度の範\n囲にある最大放射電界との比は (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① １ ② ３ ③ ６ ④ １０\n⑤ 放射効率 ⑥ 相対利得 ⑦ 絶対利得 ⑧ 利得係数\n⑨ Ｃ／Ｎ ⑩ Ｓ／Ｎ ⑪ ＦＳ比 ⑫ ＦＢ比\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n誤っているものは、 (エ) である。\n<(エ)の解答群>\n① ＡＳＫでは、変調信号により搬送波の振幅を変化させており、オンオフキーイン\nグ(ＯＯＫ)は２値ＡＳＫの一例である。\n② ＰＳＫでは、変調信号により搬送波の位相を変化させており、信号点を９０度ご\nπ\nとに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n④ ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信方式におけるセルの構成方法などについて述べた次の文章のうち、誤っているもの\nは、 (オ) である。\n<(オ)の解答群>\n① 一つのサービスエリアを複数のセルで構成する方式はセルラ方式といわれ、ある\nセルで用いた周波数を、干渉が生じない程度離れたセルで再利用できる。\n② 周波数利用効率の向上などを目的として、水平面無指向性アンテナにより一つの\n基地局のエリアで複数の扇形セルを形成する構成は、一般に、セクタセル構成とい\nわれる。\n③ ストリートマイクロセルは、一般に、都市部においてセル半径が約１ kｍ 以下で\n基地局のアンテナ高が近隣の建物より低い場合に構成され、電波が建物に挟まれた\n道路沿いに伝搬する特徴がある。\n④ フェムトセルは、一般に、家庭内やオフィス内で用いられ、半径１０ ｍ 程度の\n範囲で電波状況が悪い箇所の改善などを目的として構成される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n衛星通信回線の品質に影響を与える要因などについて述べた次の文章のうち、正しいものは、\n(カ) である。\n<(カ)の解答群>\n① 衛星通信において伝搬損失を発生させる要因のうち、自由空間損失は、一般に、\n波長の２乗に反比例し、伝搬距離の４乗に比例する。\n② 衛星通信では、一般に、降雨による減衰を避けた周波数帯を使うため、降雨によ\nる減衰の影響は、大気ガスによる減衰の影響と比較して小さい。\n③ 雑音指数は、回路入力端の信号電力対雑音電力比を回路出力端の信号電力対雑音\n電力比で除したものであり、回路出力端の出力信号電力を一定とすると、回路出力\n端の雑音電力が小さいほど雑音指数の値は大きくなる。\n④ 衛星通信の地球局におけるアンテナ雑音は、アンテナの大地方向のサイドローブ\nからの雑音の影響を受けるため、アンテナ雑音を小さくするにはサイドローブレベ\nルを低くすることが有効である。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、第５世代移動通信システム(５Ｇ)について述べたものである。 内の</p>\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\n５Ｇは高速・大容量、低遅延及び多数端末接続を基本コンセプトとしており、それを実現す\nるために以下のような技術が導入されている。\n高速・大容量を実現するために、４Ｇで使用している周波数帯より高い周波数帯が携帯事業\n者に割り当てられており、 (ア) といわれる３.７ ＧＨz 帯、４.５ ＧＨz 帯、ミリ波と\nいわれる２８ ＧＨz 帯を使用することができる。５Ｇでは、このような周波数帯への対応を\n可能とするため、ＮＲ(New Radio)といわれる技術が標準化されている。\n低遅延を実現するために、無線信号の送信単位を４Ｇと比較して短くするとともに、より端\n末に近いところにデータ処理を行うサーバを配置する (イ) といわれる技術を用いること\nによりエンド・ツー・エンドでの遅延の低減を図っている。\n多数端末接続を実現するために、４Ｇでも用いられているＣａｔ.１、 (ウ) などの技術\nを活用しており、少量のデータを低頻度で送るＩｏＴ端末の多数接続を可能としている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＳＩＧＦＯＸ ② ナローバンド ③ ＩａａＳ\n④ ＰａａＳ ⑤ プラチナバンド ⑥ ＬＴＥ－Ｍ\n⑦ ＭＩＭＯ ⑧ Ｓｕｂ６ ⑨ ＬｏＲａＷＡＮ\n⑩ ワイドバンド ⑪ マルチアクセス・エッジ・コンピューティング\n⑫ ネットワークスライシング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信におけるＯＦＤＭによる信号伝送について述べた次の文章のうち、誤っているもの\nは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＯＦＤＭ信号を生成するため送信側では離散フーリエ変換(ＤＦＴ)が行われ、受\n信側ではＯＦＤＭ信号に対して逆離散フーリエ変換(ＩＤＦＴ)が行われる。\n② 伝搬遅延によるシンボル間干渉を防ぐために、シンボル間にサイクリックプレ\nフィックスを挿入する。\n③ サブキャリアの変調方式として、ＱＰＳＫ、１６ＱＡＭなどが用いられる。\n④ ＯＦＤＭ信号は搬送波周波数が異なる複数のデジタル変調信号によって構成され、\n各デジタル変調信号の搬送波は直交関係にある。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n電波の種類、特徴及び周波数帯ごとの主な用途について述べた次の文章のうち、正しいもの\nは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 電波法では、３００万 ＭＨz 以下の周波数の電磁波を電波と定義しており、電\n波は、周波数の最も低いＶＬＦといわれる超長波から周波数の最も高いＳＨＦとい\nわれるサブミリ波までに分類される。\n② 極超短波は、短波と比較して、小型のアンテナで利用可能なことから、携帯電話、\n構内ＰＨＳ、ＤＥＣＴ方式のコードレス電話などに利用されている。\n③ マイクロ波は、極超短波と比較して、波長が長いことから特定の方向に向けて放\n射するのに適しており、衛星通信、衛星放送、気象レーダなどに利用されている。\n④ ミリ波は、強い直進性があることから、悪天候時でも雨や霧による影響を受けず\nに伝搬することができる。このため、長距離の無線アクセス通信などに利用されて\nいる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＬＴＥのネットワーク構成及び機能について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① コアネットワークは、サービング・ゲートウェイ(Ｓ－ＧＷ)とパケット・データ・\nネットワーク・ゲートウェイ(Ｐ－ＧＷ)の２階層のネットワーク構成を採っている。\n② パケット通信用のセッションの設定・開放やハンドオーバの制御は、移動通信交\n換局(ＭＳＣ)で行われる。\n③ コアネットワークの構成要素であるホームサブスクライバサーバ(ＨＳＳ)には、\n移動端末の加入者情報、認証情報、位置情報などが蓄積されている。\n④ 無線アクセスネットワークの構成要素である基地局は、一般に、ｅＮｏｄｅＢと\nいわれる。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、第５世代移動通信システム(５Ｇ)について述べたものである。 内の\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\n５Ｇは高速・大容量、低遅延及び多数端末接続を基本コンセプトとしており、それを実現す\nるために以下のような技術が導入されている。\n高速・大容量を実現するために、４Ｇで使用している周波数帯より高い周波数帯が携帯事業\n者に割り当てられており、 (ア) といわれる３.７ ＧＨz 帯、４.５ ＧＨz 帯、ミリ波と\nいわれる２８ ＧＨz 帯を使用することができる。５Ｇでは、このような周波数帯への対応を\n可能とするため、ＮＲ(New Radio)といわれる技術が標準化されている。\n低遅延を実現するために、無線信号の送信単位を４Ｇと比較して短くするとともに、より端\n末に近いところにデータ処理を行うサーバを配置する (イ) といわれる技術を用いること\nによりエンド・ツー・エンドでの遅延の低減を図っている。\n多数端末接続を実現するために、４Ｇでも用いられているＣａｔ.１、 (ウ) などの技術\nを活用しており、少量のデータを低頻度で送るＩｏＴ端末の多数接続を可能としている。\n<(ア)～(ウ)の解答群>\n① ＳＩＧＦＯＸ ② ナローバンド ③ ＩａａＳ\n④ ＰａａＳ ⑤ プラチナバンド ⑥ ＬＴＥ－Ｍ\n⑦ ＭＩＭＯ ⑧ Ｓｕｂ６ ⑨ ＬｏＲａＷＡＮ\n⑩ ワイドバンド ⑪ マルチアクセス・エッジ・コンピューティング\n⑫ ネットワークスライシング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信におけるＯＦＤＭによる信号伝送について述べた次の文章のうち、誤っているもの\nは、 (エ) である。\n<(エ)の解答群>\n① ＯＦＤＭ信号を生成するため送信側では離散フーリエ変換(ＤＦＴ)が行われ、受\n信側ではＯＦＤＭ信号に対して逆離散フーリエ変換(ＩＤＦＴ)が行われる。\n② 伝搬遅延によるシンボル間干渉を防ぐために、シンボル間にサイクリックプレ\nフィックスを挿入する。\n③ サブキャリアの変調方式として、ＱＰＳＫ、１６ＱＡＭなどが用いられる。\n④ ＯＦＤＭ信号は搬送波周波数が異なる複数のデジタル変調信号によって構成され、\n各デジタル変調信号の搬送波は直交関係にある。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電波の種類、特徴及び周波数帯ごとの主な用途について述べた次の文章のうち、正しいもの\nは、 (オ) である。\n<(オ)の解答群>\n① 電波法では、３００万 ＭＨz 以下の周波数の電磁波を電波と定義しており、電\n波は、周波数の最も低いＶＬＦといわれる超長波から周波数の最も高いＳＨＦとい\nわれるサブミリ波までに分類される。\n② 極超短波は、短波と比較して、小型のアンテナで利用可能なことから、携帯電話、\n構内ＰＨＳ、ＤＥＣＴ方式のコードレス電話などに利用されている。\n③ マイクロ波は、極超短波と比較して、波長が長いことから特定の方向に向けて放\n射するのに適しており、衛星通信、衛星放送、気象レーダなどに利用されている。\n④ ミリ波は、強い直進性があることから、悪天候時でも雨や霧による影響を受けず\nに伝搬することができる。このため、長距離の無線アクセス通信などに利用されて\nいる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＬＴＥのネットワーク構成及び機能について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① コアネットワークは、サービング・ゲートウェイ(Ｓ－ＧＷ)とパケット・データ・\nネットワーク・ゲートウェイ(Ｐ－ＧＷ)の２階層のネットワーク構成を採っている。\n② パケット通信用のセッションの設定・開放やハンドオーバの制御は、移動通信交\n換局(ＭＳＣ)で行われる。\n③ コアネットワークの構成要素であるホームサブスクライバサーバ(ＨＳＳ)には、\n移動端末の加入者情報、認証情報、位置情報などが蓄積されている。\n④ 無線アクセスネットワークの構成要素である基地局は、一般に、ｅＮｏｄｅＢと\nいわれる。"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、アレーアンテナの構成、特徴などについて述べたものである。 内の</p>\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nアンテナ素子を複数配列し、その全部又は一部を給電回路に接続して励振するアンテナは、\n一般に、アレーアンテナといわれ、配列素子の種類、配列、励振方法などを工夫することによ\nり、単一素子のアンテナでは実現が難しい (ア) 特性を実現することができる。また、ア\nレーアンテナの特徴としてビーム走査機能があり、各アンテナ素子に接続された移相器により\n各アンテナ素子での受信信号が同相になるように合成することで最大振幅となる受信信号を取\nり出すことができる。\n目的に応じて (ア) 特性の制御を適応的に行うアレーアンテナは、 (イ) アンテナ\nといわれ、相関の低い信号強度変動を有する複数の伝送路がある環境下において複数の信号を\n適切に切り替える又は合成することができる (ウ) や、移動通信の５Ｇでの大規模ＭＩＭＯ\n(Massive MIMO)によるビームフォーミング技術に利用されている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① マイクロストリップ ② 遅 延 ③ 等方性 ④ 雑 音\n⑤ アダプティブ ⑥ 指 向 ⑦ パラボラ ⑧ 偏 波\n⑨ チャネルボンディング技術 ⑩ ハイブリッド技術\n⑪ デジタルコヒーレント技術 ⑫ ダイバーシチ技術\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nアクセス系無線通信における高速化技術について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① デジタル変調方式において１シンボルの情報量は多値数によって変化し、ＱＰＳＫ\nでは、多値数が４であることから１シンボルで伝送できる情報量は４ビットである。\n② 複数の送信アンテナを用いて複数のストリームを同時に送信するＭＩＭＯの送信\n手法は、空間多重といわれる。\n③ 無線伝搬環境の変動に対応して変調方式や誤り訂正符号化方式を選択する技術は、\n適応変調符号化といわれる。\n④ 複数の周波数帯域を束ねることによって通信速度を高速化する技術は、キャリア\nアグリゲーションといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 各移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生する\nたびにその移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、\n一般に、プリアサイン方式といわれる。\n② 移動端末がどこに存在していても、ネットワーク側から着信のための呼出しを行\nえるようにするための位置登録では、現在位置は移動端末に登録される。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線通信チャネルを設定する\n技術にランダムアクセス制御がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信におけるＬＴＥについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＬＴＥの無線アクセス方式における下りリンクには、無線リソースを各ユーザ\nの回線状況やトラヒック状況に応じて柔軟に共有することができるＯＦＤＭＡが用\nいられている。\n② ＬＴＥの無線アクセス方式における上りリンクには、端末の電力効率に優れた\nＣＤＭＡが用いられている。\n③ 基地局は端末に対して無線リソースを周波数軸と時間軸で細分化したリソース\nブロック単位で割り当てており、端末の受信品質を確認し、受信品質の良い端末に\nリソースブロックを優先的に割り当てるスケジューリングを行っている。\n④ 基地局であるｅＮｏｄｅＢはＥＰＣといわれるコアネットワークと直接接続され\nており、制御系はＥＰＣのＭＭＥ(Mobility Management Entity)に、ユーザデータ\n伝送系はＥＰＣのＳ－ＧＷ(Serving Gateway)にそれぞれ接続される。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、アレーアンテナの構成、特徴などについて述べたものである。 内の\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nアンテナ素子を複数配列し、その全部又は一部を給電回路に接続して励振するアンテナは、\n一般に、アレーアンテナといわれ、配列素子の種類、配列、励振方法などを工夫することによ\nり、単一素子のアンテナでは実現が難しい (ア) 特性を実現することができる。また、ア\nレーアンテナの特徴としてビーム走査機能があり、各アンテナ素子に接続された移相器により\n各アンテナ素子での受信信号が同相になるように合成することで最大振幅となる受信信号を取\nり出すことができる。\n目的に応じて (ア) 特性の制御を適応的に行うアレーアンテナは、 (イ) アンテナ\nといわれ、相関の低い信号強度変動を有する複数の伝送路がある環境下において複数の信号を\n適切に切り替える又は合成することができる (ウ) や、移動通信の５Ｇでの大規模ＭＩＭＯ\n(Massive MIMO)によるビームフォーミング技術に利用されている。\n<(ア)～(ウ)の解答群>\n① マイクロストリップ ② 遅 延 ③ 等方性 ④ 雑 音\n⑤ アダプティブ ⑥ 指 向 ⑦ パラボラ ⑧ 偏 波\n⑨ チャネルボンディング技術 ⑩ ハイブリッド技術\n⑪ デジタルコヒーレント技術 ⑫ ダイバーシチ技術\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nアクセス系無線通信における高速化技術について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① デジタル変調方式において１シンボルの情報量は多値数によって変化し、ＱＰＳＫ\nでは、多値数が４であることから１シンボルで伝送できる情報量は４ビットである。\n② 複数の送信アンテナを用いて複数のストリームを同時に送信するＭＩＭＯの送信\n手法は、空間多重といわれる。\n③ 無線伝搬環境の変動に対応して変調方式や誤り訂正符号化方式を選択する技術は、\n適応変調符号化といわれる。\n④ 複数の周波数帯域を束ねることによって通信速度を高速化する技術は、キャリア\nアグリゲーションといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(オ) である。\n<(オ)の解答群>\n① 各移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生する\nたびにその移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、\n一般に、プリアサイン方式といわれる。\n② 移動端末がどこに存在していても、ネットワーク側から着信のための呼出しを行\nえるようにするための位置登録では、現在位置は移動端末に登録される。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線通信チャネルを設定する\n技術にランダムアクセス制御がある。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信におけるＬＴＥについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<(カ)の解答群>\n① ＬＴＥの無線アクセス方式における下りリンクには、無線リソースを各ユーザ\nの回線状況やトラヒック状況に応じて柔軟に共有することができるＯＦＤＭＡが用\nいられている。\n② ＬＴＥの無線アクセス方式における上りリンクには、端末の電力効率に優れた\nＣＤＭＡが用いられている。\n③ 基地局は端末に対して無線リソースを周波数軸と時間軸で細分化したリソース\nブロック単位で割り当てており、端末の受信品質を確認し、受信品質の良い端末に\nリソースブロックを優先的に割り当てるスケジューリングを行っている。\n④ 基地局であるｅＮｏｄｅＢはＥＰＣといわれるコアネットワークと直接接続され\nており、制御系はＥＰＣのＭＭＥ(Mobility Management Entity)に、ユーザデータ\n伝送系はＥＰＣのＳ－ＧＷ(Serving Gateway)にそれぞれ接続される。"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩｏＴで用いられるＬＰＷＡについて述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nさまざまな｢モノ｣がインターネットに接続されるＩｏＴでは、｢モノ｣の種類や用途などの要\n求条件によって異なる接続技術が用いられ、代表的な技術としてＬＰＷＡがある。\nＬＰＷＡは、 (ア) 、 (イ) 通信を特徴とする無線通信技術であり、電池を電源と\nしたセンサなどの端末を広域に多数配置し、個々の端末の送受信するデータ量が少ない場合に\n適している。端末を (ア) で動作させるために、少ないデータを単純なプロトコルで送受\n信する、無線通信のデューティ比を低くするなどの手法が用いられている。また、 (イ)\n通信を可能とするために、１ ＧＨz 以下の周波数帯が主に使用され、無線局免許を必要とし\nない周波数帯を使うことを前提とした代表的な技術・規格としては、ＳＩＧＦＯＸや (ウ)\nがある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＬＴＥ－Ｍ ② 移 動 ③ 低消費電力 ④ バースト\n⑤ ＬｏＲａＷＡＮ ⑥ 長距離 ⑦ 常時接続 ⑧ 無瞬断\n⑨ ＺｉｇＢｅｅ ⑩ 短距離 ⑪ 高データレート\n⑫ Ｂｌｕｅｔｏｏｔｈ Ｌｏｗ Ｅｎｅｒｇｙ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＭＩＭＯについて述べた次の文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＭＩＭＯでは、単一の送信アンテナと複数の受信アンテナが用いられる。\n② ＭＩＭＯでは、異なる周波数を利用して異なる複数の信号を同時に送信する。\n③ ＭＩＭＯは、マルチパスリッチな環境で高い空間多重効果が得られるが、到来波\nが一定方向から集中する環境では空間多重効果は低くなる。\n④ ＭＩＭＯの空間ストリーム数は、送信アンテナ数と受信アンテナ数の和となる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信方式におけるセルの構成方法などについて述べた次の文章のうち、誤っているもの\nは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① マクロセル内にセル半径の小さいスモールセル基地局を配置する無線アクセス\nネットワークは、ヘテロジニアスネットワークといわれる。\n② 水平面内指向性アンテナにより一つの基地局のエリアで複数の扇形セルを形成す\nる方式は、オムニセル方式といわれる。\n③ 基地局アンテナのビームを水平方向より下向きにして他セルへの干渉を低減する\n手法は、ビームチルティングといわれる。\n④ フェムトセルは、一般に、家庭内やオフィス内で用いられ、半径１０ ｍ 程度の\n範囲で電波状況が悪い箇所の改善などを目的として構成される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n衛星通信回線の品質に影響する雑音について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 衛星のアンテナが受信する雑音には、地上からの熱雑音がある。\n② 地上のアンテナが受信する雑音には、降雨時に電波が雨滴に吸収されるときに発\n生する空電雑音がある。\n③ 衛星通信システムの干渉雑音には、同一周波数帯を使用する他の衛星通信システ\nムからの干渉、地上マイクロ波通信システムからの干渉などによる雑音がある。\n④ 一つの衛星中継増幅器内で複数の搬送波を共通増幅する場合、増幅器を飽和点に\n近い非直線領域で動作させると相互変調積によるひずみ雑音が発生する。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩｏＴで用いられるＬＰＷＡについて述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nさまざまな｢モノ｣がインターネットに接続されるＩｏＴでは、｢モノ｣の種類や用途などの要\n求条件によって異なる接続技術が用いられ、代表的な技術としてＬＰＷＡがある。\nＬＰＷＡは、 (ア) 、 (イ) 通信を特徴とする無線通信技術であり、電池を電源と\nしたセンサなどの端末を広域に多数配置し、個々の端末の送受信するデータ量が少ない場合に\n適している。端末を (ア) で動作させるために、少ないデータを単純なプロトコルで送受\n信する、無線通信のデューティ比を低くするなどの手法が用いられている。また、 (イ)\n通信を可能とするために、１ ＧＨz 以下の周波数帯が主に使用され、無線局免許を必要とし\nない周波数帯を使うことを前提とした代表的な技術・規格としては、ＳＩＧＦＯＸや (ウ)\nがある。\n<(ア)～(ウ)の解答群>\n① ＬＴＥ－Ｍ ② 移 動 ③ 低消費電力 ④ バースト\n⑤ ＬｏＲａＷＡＮ ⑥ 長距離 ⑦ 常時接続 ⑧ 無瞬断\n⑨ ＺｉｇＢｅｅ ⑩ 短距離 ⑪ 高データレート\n⑫ Ｂｌｕｅｔｏｏｔｈ Ｌｏｗ Ｅｎｅｒｇｙ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＭＩＭＯについて述べた次の文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＭＩＭＯでは、単一の送信アンテナと複数の受信アンテナが用いられる。\n② ＭＩＭＯでは、異なる周波数を利用して異なる複数の信号を同時に送信する。\n③ ＭＩＭＯは、マルチパスリッチな環境で高い空間多重効果が得られるが、到来波\nが一定方向から集中する環境では空間多重効果は低くなる。\n④ ＭＩＭＯの空間ストリーム数は、送信アンテナ数と受信アンテナ数の和となる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信方式におけるセルの構成方法などについて述べた次の文章のうち、誤っているもの\nは、 (オ) である。\n<(オ)の解答群>\n① マクロセル内にセル半径の小さいスモールセル基地局を配置する無線アクセス\nネットワークは、ヘテロジニアスネットワークといわれる。\n② 水平面内指向性アンテナにより一つの基地局のエリアで複数の扇形セルを形成す\nる方式は、オムニセル方式といわれる。\n③ 基地局アンテナのビームを水平方向より下向きにして他セルへの干渉を低減する\n手法は、ビームチルティングといわれる。\n④ フェムトセルは、一般に、家庭内やオフィス内で用いられ、半径１０ ｍ 程度の\n範囲で電波状況が悪い箇所の改善などを目的として構成される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n衛星通信回線の品質に影響する雑音について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① 衛星のアンテナが受信する雑音には、地上からの熱雑音がある。\n② 地上のアンテナが受信する雑音には、降雨時に電波が雨滴に吸収されるときに発\n生する空電雑音がある。\n③ 衛星通信システムの干渉雑音には、同一周波数帯を使用する他の衛星通信システ\nムからの干渉、地上マイクロ波通信システムからの干渉などによる雑音がある。\n④ 一つの衛星中継増幅器内で複数の搬送波を共通増幅する場合、増幅器を飽和点に\n近い非直線領域で動作させると相互変調積によるひずみ雑音が発生する。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、電波伝搬について述べたものである。 内の(ア)～(ウ)に最も適したも</p>\nのを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答\nを示す。 (２点×３＝６点)\nあらゆる方向に一様に電波を放射するアンテナは (ア) アンテナといわれ、自由空間に\n置かれた (ア) アンテナから放射された電波は球面状に広がり、放射電力をＰ Ｗ 、球の\n半径をｄ ｍ 、球面上における (イ) をＳ Ｗ／ｍ２ とすると、Ｓは次式で表される。\nＰ\nＳ＝\n４πｄ２\n伝搬の状況を表す指標として伝搬損失があり、送信電力と受信電力の比から求められる。特\nに、大地反射などのない自由空間における伝搬損失は自由空間伝搬損失といわれ、送受信アン\nテナ間の距離が２倍になると、自由空間伝搬損失は (ウ) 倍になる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 電界強度 ② パラボラ ③ 電束密度 ④ ダイポール\n⑤ √２ ⑥ ２ ⑦ ３ ⑧ ４\n⑨ ストリップ ⑩ 磁束密度 ⑪ 等方性 ⑫ 電力束密度\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＡＳＫでは変調信号により搬送波の振幅を変化させており、オンオフキーイング\n(ＯＯＫ)は４値ＡＳＫの一例である。\n② ＰＳＫでは変調信号により搬送波の位相を変化させており、信号点を４５度ごと\nπ\nに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n④ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n衛星移動通信について述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 衛星と基地地球局の間の回線はフィーダリンクといわれ、十分な品質を確保する\nために電離層、降雨減衰などの影響を考慮した回線設計を行う必要がある。\n② 衛星と移動地球局の間の回線はサービスリンクといわれ、一般的な携帯電話シス\nテムと同様にビル陰などによる受信レベル変動の影響や、建物侵入損失も考慮した\n回線設計を行う必要がある。\n③ 低軌道の非静止衛星を用いることにより、静止衛星を用いた場合と比較して、ア\nンテナの小型化、通信速度の向上及び遅延時間の短縮が期待できる。\n④ 低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、３\n機の非静止衛星を用いる必要がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n第５世代移動通信システム(５Ｇ)のネットワーク構成及び機能について述べた次の文章のう\nち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ５Ｇのコアネットワーク(５Ｇコア)では、様々なネットワーク機能を共通のハー\nドウェア上で動作させることができるネットワーク機能の仮想化技術が用いられて\nいる。\n② ５Ｇにはネットワーク構成の違いによりＳＡ(Standalone)方式とＮＳＡ\n(Non-Standalone)方式があり、ＮＳＡ方式ではネットワークスライシング技術を用\nいたサービスを提供することができる。\n③ ＳＡ方式では、５Ｇの基地局(ｇＮｏｄｅＢ)は５Ｇコアに接続されており、ユーザ\nデータ、制御信号ともＮＲ(New Radio)回線を用いて送受信される。\n④ ＮＳＡ方式では、ｇＮｏｄｅＢはＬＴＥで利用されているＥＰＣに接続されてお\nり、ユーザデータはＮＲ回線を用いて送受信され、制御信号はＬＴＥ回線を用いて\n送受信される。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、電波伝搬について述べたものである。 内の(ア)～(ウ)に最も適したも\nのを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答\nを示す。 (２点×３＝６点)\nあらゆる方向に一様に電波を放射するアンテナは (ア) アンテナといわれ、自由空間に\n置かれた (ア) アンテナから放射された電波は球面状に広がり、放射電力をＰ Ｗ 、球の\n半径をｄ ｍ 、球面上における (イ) をＳ Ｗ／ｍ２ とすると、Ｓは次式で表される。\nＰ\nＳ＝\n４πｄ２\n伝搬の状況を表す指標として伝搬損失があり、送信電力と受信電力の比から求められる。特\nに、大地反射などのない自由空間における伝搬損失は自由空間伝搬損失といわれ、送受信アン\nテナ間の距離が２倍になると、自由空間伝搬損失は (ウ) 倍になる。\n<(ア)～(ウ)の解答群>\n① 電界強度 ② パラボラ ③ 電束密度 ④ ダイポール\n⑤ √２ ⑥ ２ ⑦ ３ ⑧ ４\n⑨ ストリップ ⑩ 磁束密度 ⑪ 等方性 ⑫ 電力束密度\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＡＳＫでは変調信号により搬送波の振幅を変化させており、オンオフキーイング\n(ＯＯＫ)は４値ＡＳＫの一例である。\n② ＰＳＫでは変調信号により搬送波の位相を変化させており、信号点を４５度ごと\nπ\nに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n④ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n衛星移動通信について述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 衛星と基地地球局の間の回線はフィーダリンクといわれ、十分な品質を確保する\nために電離層、降雨減衰などの影響を考慮した回線設計を行う必要がある。\n② 衛星と移動地球局の間の回線はサービスリンクといわれ、一般的な携帯電話シス\nテムと同様にビル陰などによる受信レベル変動の影響や、建物侵入損失も考慮した\n回線設計を行う必要がある。\n③ 低軌道の非静止衛星を用いることにより、静止衛星を用いた場合と比較して、ア\nンテナの小型化、通信速度の向上及び遅延時間の短縮が期待できる。\n④ 低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、３\n機の非静止衛星を用いる必要がある。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n第５世代移動通信システム(５Ｇ)のネットワーク構成及び機能について述べた次の文章のう\nち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① ５Ｇのコアネットワーク(５Ｇコア)では、様々なネットワーク機能を共通のハー\nドウェア上で動作させることができるネットワーク機能の仮想化技術が用いられて\nいる。\n② ５Ｇにはネットワーク構成の違いによりＳＡ(Standalone)方式とＮＳＡ\n(Non-Standalone)方式があり、ＮＳＡ方式ではネットワークスライシング技術を用\nいたサービスを提供することができる。\n③ ＳＡ方式では、５Ｇの基地局(ｇＮｏｄｅＢ)は５Ｇコアに接続されており、ユーザ\nデータ、制御信号ともＮＲ(New Radio)回線を用いて送受信される。\n④ ＮＳＡ方式では、ｇＮｏｄｅＢはＬＴＥで利用されているＥＰＣに接続されてお\nり、ユーザデータはＮＲ回線を用いて送受信され、制御信号はＬＴＥ回線を用いて\n送受信される。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、移動通信に用いられるダイバーシチ技術について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n移動通信では (ア) によって受信強度の低下が生じ、その低下量は移動端末の位置、周\n波数及び時間によって変化する。ダイバーシチ技術とは、複数の受信信号を得る手段を設け、\nそれらを合成することにより (ア) の影響を緩和する技術である。\n複数の受信信号を得る経路はダイバーシチブランチ又はブランチといわれる。ダイバーシチ\nの効果を得るにはブランチ間において信号の変動の (イ) ことが望ましい。このようなブ\nランチを得る方法には、空間ダイバーシチ、周波数ダイバーシチ、時間ダイバーシチなどがあ\nる。\nブランチの信号を合成する方法には、選択合成法、 (ウ) などがある。選択合成法は、\n受信レベルが最も高いブランチ又はＳ／Ｎが最も良いブランチを選択し、切り換えて使う方法\nである。また、 (ウ) は、信号の振幅と位相の両方を調整して、Ｓ／Ｎが最大となる出力\nを得る方法である。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 相関が高い ② レベルが等しい ③ 位相が等しい\n④ 熱雑音 ⑤ 相関が低い ⑥ 等利得合成法\n⑦ 最大比合成法 ⑧ 波面合成法 ⑨ マルチパスフェージング\n⑩ 人工雑音 ⑪ 最急降下法 ⑫ 隣接チャネル干渉\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生するた\nびに移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、一般に、\nデマンドアサイン方式といわれる。\n② アクセス制御方式には、ＣＳＭＡ、ＩＣＭＡなどがあり、ＣＳＭＡでは、基地局\nがアクセス用チャネルの使用状況を観測して、アクセスの可否を判断する。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、\n位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n静止衛星通信システムにおける地球局を構成する機器又はその特性について述べた次の文章\nのうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 送信系装置である大電力増幅器において、増幅特性の非線形性とは逆の特性を持\nつリニアライザを接続して用いることにより相互変調雑音を抑えることができる。\n② 出力が数十 Ｗ 以下の送信機においては、一般に、進行波管又はクライストロン\nを使用した増幅器が用いられる。\n③ 受信系全体の雑音特性を良くするためには、受信系装置の初段にある低雑音増幅\n器として、できるかぎり低雑音で、それ以降に接続されている装置の雑音温度の影\n響を低減するのに十分な利得を持つものを用いることが有効である。\n④ 受信系装置の性能を定量的に示す指標として、アンテナの受信利得と受信システ\nム雑音温度の比であるＧ／Ｔが用いられる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n開口面アンテナの特性について述べた次の文章のうち、誤っているものは、 (カ) であ\nる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 固定された２地点間の通信に用いられる開口面アンテナに求められる特性には、\n一般に、ルート間干渉を少なくするための鋭い指向性、高い利得、高い交差偏波識\n別度、広い無線周波数帯域にわたる良好なインピーダンス特性などがある。\n② アンテナの開口効率は、一般に、アンテナの幾何学的面積に対する実効面積の比\n率であり、利得係数に等しい。\n③ アンテナの利得は、アンテナの開口面積、開口効率の２乗及び無線周波数に比例\nする。\n④ 交差偏波識別度は、アンテナの特性として、直線偏波における垂直偏波と水平偏\n波、又は円偏波における右旋円偏波と左旋円偏波を識別できる能力を表す。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、移動通信に用いられるダイバーシチ技術について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n移動通信では (ア) によって受信強度の低下が生じ、その低下量は移動端末の位置、周\n波数及び時間によって変化する。ダイバーシチ技術とは、複数の受信信号を得る手段を設け、\nそれらを合成することにより (ア) の影響を緩和する技術である。\n複数の受信信号を得る経路はダイバーシチブランチ又はブランチといわれる。ダイバーシチ\nの効果を得るにはブランチ間において信号の変動の (イ) ことが望ましい。このようなブ\nランチを得る方法には、空間ダイバーシチ、周波数ダイバーシチ、時間ダイバーシチなどがあ\nる。\nブランチの信号を合成する方法には、選択合成法、 (ウ) などがある。選択合成法は、\n受信レベルが最も高いブランチ又はＳ／Ｎが最も良いブランチを選択し、切り換えて使う方法\nである。また、 (ウ) は、信号の振幅と位相の両方を調整して、Ｓ／Ｎが最大となる出力\nを得る方法である。\n<(ア)～(ウ)の解答群>\n① 相関が高い ② レベルが等しい ③ 位相が等しい\n④ 熱雑音 ⑤ 相関が低い ⑥ 等利得合成法\n⑦ 最大比合成法 ⑧ 波面合成法 ⑨ マルチパスフェージング\n⑩ 人工雑音 ⑪ 最急降下法 ⑫ 隣接チャネル干渉\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信で用いられる無線回線制御方式について述べた次の文章のうち、正しいものは、\n(エ) である。\n<(エ)の解答群>\n① 移動端末が共通に利用できる無線チャネルを複数用意しておき、呼が発生するた\nびに移動端末に特定の無線チャネルを割り当てるチャネルアサイン方式は、一般に、\nデマンドアサイン方式といわれる。\n② アクセス制御方式には、ＣＳＭＡ、ＩＣＭＡなどがあり、ＣＳＭＡでは、基地局\nがアクセス用チャネルの使用状況を観測して、アクセスの可否を判断する。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\n場合にセルを切替制御する技術は、一般に、ローミングといわれる。\n④ セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、\n位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n静止衛星通信システムにおける地球局を構成する機器又はその特性について述べた次の文章\nのうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 送信系装置である大電力増幅器において、増幅特性の非線形性とは逆の特性を持\nつリニアライザを接続して用いることにより相互変調雑音を抑えることができる。\n② 出力が数十 Ｗ 以下の送信機においては、一般に、進行波管又はクライストロン\nを使用した増幅器が用いられる。\n③ 受信系全体の雑音特性を良くするためには、受信系装置の初段にある低雑音増幅\n器として、できるかぎり低雑音で、それ以降に接続されている装置の雑音温度の影\n響を低減するのに十分な利得を持つものを用いることが有効である。\n④ 受信系装置の性能を定量的に示す指標として、アンテナの受信利得と受信システ\nム雑音温度の比であるＧ／Ｔが用いられる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n開口面アンテナの特性について述べた次の文章のうち、誤っているものは、 (カ) であ\nる。\n<(カ)の解答群>\n① 固定された２地点間の通信に用いられる開口面アンテナに求められる特性には、\n一般に、ルート間干渉を少なくするための鋭い指向性、高い利得、高い交差偏波識\n別度、広い無線周波数帯域にわたる良好なインピーダンス特性などがある。\n② アンテナの開口効率は、一般に、アンテナの幾何学的面積に対する実効面積の比\n率であり、利得係数に等しい。\n③ アンテナの利得は、アンテナの開口面積、開口効率の２乗及び無線周波数に比例\nする。\n④ 交差偏波識別度は、アンテナの特性として、直線偏波における垂直偏波と水平偏\n波、又は円偏波における右旋円偏波と左旋円偏波を識別できる能力を表す。"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、第５世代移動通信システム(５Ｇ)について述べたものである。 内の</p>\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n５Ｇは高速・大容量、低遅延及び多数端末接続を基本コンセプトとしており、それを実現す\nるために以下のような技術が導入されている。\n高速・大容量を実現するために、第４世代移動通信システム(４Ｇ)で使用している周波数帯\nより高い周波数帯が５Ｇに割り当てられており、 (ア) といわれる３.７ＧＨz帯及び\n４.５ＧＨz帯、ミリ波といわれる２８ＧＨz帯を使用することができる。５Ｇでは、このよう\nな周波数帯への対応を可能とするため、ＮＲ(New Radio)といわれる技術が標準化されている。\n低遅延を実現するために、無線信号の送信単位を４Ｇと比較して短くするとともに、より端\n末に近いところにデータ処理を行うサーバを配置する (イ) といわれる技術を用いること\nによりエンド・ツー・エンドでの遅延の低減を図っている。\n５Ｇにおける多数端末接続については、４Ｇでも用いられている (ウ) などの技術を活\n用することにより、ＩｏＴ端末の多数接続が可能となってる。ただし、 (ウ) は運用周波\n数が３.８ ＧＨz までに制限されており、今後は新たに策定されたＲｅｄＣａｐといわれる規\n格を用いることにより適用領域の拡大が期待されている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① Ｓｉｇｆｏｘ ② Ｓｕｂ６ ③ ナローバンド\n④ ＩａａＳ ⑤ プラチナバンド ⑥ ＬｏＲａＷＡＮ\n⑦ ＭＩＭＯ ⑧ ＰａａＳ ⑨ ＬＴＥ－Ｍ\n⑩ ワイドバンド ⑪ グリッドコンピューティング\n⑫ マルチアクセス・エッジ・コンピューティング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n５Ｇに用いられているミリ波(５Ｇミリ波)の特性などについて述べた次の文章のうち、正し\nいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ５Ｇミリ波は４Ｇで用いられている周波数帯の電波と比較して、雨や霧による影\n響を受けにくい。\n② ５Ｇミリ波は４Ｇで用いられている周波数帯の電波と比較して、伝搬損失が大き\nいが障害物の影響を受けにくい。\n③ ５Ｇ基地局の５Ｇミリ波用アレーアンテナでは、アンテナ利得の向上を図るため\n大規模ＭＩＭＯ(Massive MIMO)によるビームフォーミング技術が用いられている。\n④ ＮＲの規格において５Ｇミリ波のチャネル帯域幅は最大４ ＧＨz と定められて\nおり、４Ｇの約１００倍の周波数帯域を利用できる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル無線伝送に用いられるマルチプルアクセス方式の種類、特徴などについて述べた次\nの文章のうち、正しいものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＣＤＭＡでは、符号分割による多元接続を行っており、拡散符号で１次変調を施\nした広帯域の信号を、更にＰＳＫ方式などを用いて２次変調して狭帯域の信号とし\nている。\n② ＯＦＤＭＡでは、周波数の異なる複数のサブキャリアをまとめ、各サブキャリア\nのセットを個々の端末に割り当てている。\n③ ＴＤＭＡでは、使用可能な周波数帯域を分割し、分割した各周波数帯を個々の端\n末に割り当てている。各端末は、割り当てられた周波数帯を１チャネルとして使用\nする。\n④ ＦＤＭＡでは、一つの周波数を時間で分割し、分割した各時間(タイムスロット)\nを個々の端末に割り当てている。各端末は、割り当てられたタイムスロットを１\nチャネルとして使用する。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n衛星通信回線の品質に影響を与える要因などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 衛星通信において伝搬損失を発生させる要因のうち、自由空間伝搬損失は、一般\nに、波長の２乗に反比例し、伝搬距離の２乗に比例する。\n② 衛星通信では、一般に、大気ガスのうち酸素及び水蒸気による減衰を避けた周波\n数帯の電波を使うため、大気ガスによる減衰の影響は、降雨による減衰の影響と比\n較して小さい。\n③ 衛星通信の地球局におけるアンテナ雑音は、アンテナの大地方向のサイドローブ\nからの雑音の影響を受けるため、アンテナ雑音を小さくするにはサイドローブレベ\nルを低くすることが有効である。\n④ 増幅器の雑音指数は、回路入力端の信号電力対雑音電力比を回路出力端の信号電\n力対雑音電力比で除したものであり、回路出力端の出力信号電力を一定とすると、\n回路出力端の雑音電力が小さいほど雑音指数の値は大きくなる。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、第５世代移動通信システム(５Ｇ)について述べたものである。 内の\n(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n５Ｇは高速・大容量、低遅延及び多数端末接続を基本コンセプトとしており、それを実現す\nるために以下のような技術が導入されている。\n高速・大容量を実現するために、第４世代移動通信システム(４Ｇ)で使用している周波数帯\nより高い周波数帯が５Ｇに割り当てられており、 (ア) といわれる３.７ＧＨz帯及び\n４.５ＧＨz帯、ミリ波といわれる２８ＧＨz帯を使用することができる。５Ｇでは、このよう\nな周波数帯への対応を可能とするため、ＮＲ(New Radio)といわれる技術が標準化されている。\n低遅延を実現するために、無線信号の送信単位を４Ｇと比較して短くするとともに、より端\n末に近いところにデータ処理を行うサーバを配置する (イ) といわれる技術を用いること\nによりエンド・ツー・エンドでの遅延の低減を図っている。\n５Ｇにおける多数端末接続については、４Ｇでも用いられている (ウ) などの技術を活\n用することにより、ＩｏＴ端末の多数接続が可能となってる。ただし、 (ウ) は運用周波\n数が３.８ ＧＨz までに制限されており、今後は新たに策定されたＲｅｄＣａｐといわれる規\n格を用いることにより適用領域の拡大が期待されている。\n<(ア)～(ウ)の解答群>\n① Ｓｉｇｆｏｘ ② Ｓｕｂ６ ③ ナローバンド\n④ ＩａａＳ ⑤ プラチナバンド ⑥ ＬｏＲａＷＡＮ\n⑦ ＭＩＭＯ ⑧ ＰａａＳ ⑨ ＬＴＥ－Ｍ\n⑩ ワイドバンド ⑪ グリッドコンピューティング\n⑫ マルチアクセス・エッジ・コンピューティング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n５Ｇに用いられているミリ波(５Ｇミリ波)の特性などについて述べた次の文章のうち、正し\nいものは、 (エ) である。\n<(エ)の解答群>\n① ５Ｇミリ波は４Ｇで用いられている周波数帯の電波と比較して、雨や霧による影\n響を受けにくい。\n② ５Ｇミリ波は４Ｇで用いられている周波数帯の電波と比較して、伝搬損失が大き\nいが障害物の影響を受けにくい。\n③ ５Ｇ基地局の５Ｇミリ波用アレーアンテナでは、アンテナ利得の向上を図るため\n大規模ＭＩＭＯ(Massive MIMO)によるビームフォーミング技術が用いられている。\n④ ＮＲの規格において５Ｇミリ波のチャネル帯域幅は最大４ ＧＨz と定められて\nおり、４Ｇの約１００倍の周波数帯域を利用できる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル無線伝送に用いられるマルチプルアクセス方式の種類、特徴などについて述べた次\nの文章のうち、正しいものは、 (オ) である。\n<(オ)の解答群>\n① ＣＤＭＡでは、符号分割による多元接続を行っており、拡散符号で１次変調を施\nした広帯域の信号を、更にＰＳＫ方式などを用いて２次変調して狭帯域の信号とし\nている。\n② ＯＦＤＭＡでは、周波数の異なる複数のサブキャリアをまとめ、各サブキャリア\nのセットを個々の端末に割り当てている。\n③ ＴＤＭＡでは、使用可能な周波数帯域を分割し、分割した各周波数帯を個々の端\n末に割り当てている。各端末は、割り当てられた周波数帯を１チャネルとして使用\nする。\n④ ＦＤＭＡでは、一つの周波数を時間で分割し、分割した各時間(タイムスロット)\nを個々の端末に割り当てている。各端末は、割り当てられたタイムスロットを１\nチャネルとして使用する。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n衛星通信回線の品質に影響を与える要因などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<(カ)の解答群>\n① 衛星通信において伝搬損失を発生させる要因のうち、自由空間伝搬損失は、一般\nに、波長の２乗に反比例し、伝搬距離の２乗に比例する。\n② 衛星通信では、一般に、大気ガスのうち酸素及び水蒸気による減衰を避けた周波\n数帯の電波を使うため、大気ガスによる減衰の影響は、降雨による減衰の影響と比\n較して小さい。\n③ 衛星通信の地球局におけるアンテナ雑音は、アンテナの大地方向のサイドローブ\nからの雑音の影響を受けるため、アンテナ雑音を小さくするにはサイドローブレベ\nルを低くすることが有効である。\n④ 増幅器の雑音指数は、回路入力端の信号電力対雑音電力比を回路出力端の信号電\n力対雑音電力比で除したものであり、回路出力端の出力信号電力を一定とすると、\n回路出力端の雑音電力が小さいほど雑音指数の値は大きくなる。"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、アンテナなどへの給電線として用いられる伝送線路について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nアンテナなどへの給電線として用いられる伝送線路のうち、二つ以上の導体から形成され、\n導体間に電位差を与えて電磁エネルギーを伝送するものに、平行線路、同軸線路及び\n(ア) がある。\n平行線路は、複数の導体を平行に配置して構成される伝送線路であり、架空裸線路として\n(イ) 帯の線状アンテナへの給電線などに用いられる。\n同軸線路は、閉じた外導体の中に内導体を配置し、この間に電位差を与えて電磁エネルギー\nを伝送するため、外部空間への電磁波の放射や、外部電磁界からの干渉はほとんど生じない。\n同軸線路は、その特性インピーダンスを (ウ) と絶縁体の比誘電率から求めることができ\nるため、高性能な受動回路を構成するのに適している。また、内導体を流れる電流に局所的な\n集中が少ないため導体損が比較的小さく、内導体と外導体の間を損失の少ない誘電体とするこ\nとによって、低損失な伝送線路を実現することができる。\n(ア) は、平板状の誘導体基板に貼り付けた導体により構成されており、アレーアンテ\nナの給電線などに用いられる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ミリ波 ② センチ波 ③ 管内波長 ④ 導体の導電率\n⑤ 導波管 ⑥ 進行波管 ⑦ 線路の長さ ⑧ 線路の断面寸法\n⑨ 短 波 ⑩ サブミリ波 ⑪ 配電線路 ⑫ ストリップ線路\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信におけるＯＦＤＭによる信号伝送について述べた次の文章のうち、誤っているもの\nは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＯＦＤＭ信号は搬送波周波数が異なる複数のデジタル変調信号によって構成され、\n各デジタル変調信号の搬送波は直交関係にある。\n② ＯＦＤＭ信号を生成するため送信側では離散フーリエ変換(ＤＦＴ)が行われ、受\n信側ではＯＦＤＭ信号に対して逆離散フーリエ変換(ＩＤＦＴ)が行われる。\n③ 伝搬遅延によるシンボル間干渉を防ぐために、シンボル間にサイクリックプレ\nフィックスを挿入する。\n④ サブキャリアの変調方式として、ＱＰＳＫ、１６ＱＡＭなどが用いられる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nアクセス系無線通信における高速化技術について述べた次の文章のうち、正しいものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① デジタル変調方式において１シンボル当たりの情報量は多値数によって変化し、\nＱＰＳＫでは多値数が４であることから、１シンボルで伝送できる情報量は４ビット\nである。\n② 複数の送信アンテナを用いて複数のストリームを同時に送信するＭＩＭＯの送信\n手法は、空間多重といわれる。\n③ 無線伝搬環境の変動に対応して変調方式や誤り訂正符号化方式を選択する技術は、\nハフマン符号化といわれる。\n④ 複数の周波数帯域を束ねて使用することによって通信速度を高速化する技術は、\nキャリアセンスといわれる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n第５世代移動通信システム(５Ｇ)のネットワーク構成などについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ５Ｇにはネットワーク構成の違いによりＳＡ(Standalone)方式とＮＳＡ\n(Non-Standalone)方式があり、ＳＡ方式ではネットワークスライシング技術を用い\nたサービスを提供することができる。\n② ＳＡ方式では、制御に必要なパラメータの送受信にＮＲ回線を用いている。\n③ ＮＳＡ方式では、制御信号の送受信にＬＴＥ回線を用い、データの送受信に\nＬＴＥ回線とＮＲ回線の両方を用いている。\n④ ＮＳＡ方式において、ユーザ認証、位置登録、パケットの転送経路設定などの機\n能は、５ＧＣが提供する。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、アンテナなどへの給電線として用いられる伝送線路について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nアンテナなどへの給電線として用いられる伝送線路のうち、二つ以上の導体から形成され、\n導体間に電位差を与えて電磁エネルギーを伝送するものに、平行線路、同軸線路及び\n(ア) がある。\n平行線路は、複数の導体を平行に配置して構成される伝送線路であり、架空裸線路として\n(イ) 帯の線状アンテナへの給電線などに用いられる。\n同軸線路は、閉じた外導体の中に内導体を配置し、この間に電位差を与えて電磁エネルギー\nを伝送するため、外部空間への電磁波の放射や、外部電磁界からの干渉はほとんど生じない。\n同軸線路は、その特性インピーダンスを (ウ) と絶縁体の比誘電率から求めることができ\nるため、高性能な受動回路を構成するのに適している。また、内導体を流れる電流に局所的な\n集中が少ないため導体損が比較的小さく、内導体と外導体の間を損失の少ない誘電体とするこ\nとによって、低損失な伝送線路を実現することができる。\n(ア) は、平板状の誘導体基板に貼り付けた導体により構成されており、アレーアンテ\nナの給電線などに用いられる。\n<(ア)～(ウ)の解答群>\n① ミリ波 ② センチ波 ③ 管内波長 ④ 導体の導電率\n⑤ 導波管 ⑥ 進行波管 ⑦ 線路の長さ ⑧ 線路の断面寸法\n⑨ 短 波 ⑩ サブミリ波 ⑪ 配電線路 ⑫ ストリップ線路\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信におけるＯＦＤＭによる信号伝送について述べた次の文章のうち、誤っているもの\nは、 (エ) である。\n<(エ)の解答群>\n① ＯＦＤＭ信号は搬送波周波数が異なる複数のデジタル変調信号によって構成され、\n各デジタル変調信号の搬送波は直交関係にある。\n② ＯＦＤＭ信号を生成するため送信側では離散フーリエ変換(ＤＦＴ)が行われ、受\n信側ではＯＦＤＭ信号に対して逆離散フーリエ変換(ＩＤＦＴ)が行われる。\n③ 伝搬遅延によるシンボル間干渉を防ぐために、シンボル間にサイクリックプレ\nフィックスを挿入する。\n④ サブキャリアの変調方式として、ＱＰＳＫ、１６ＱＡＭなどが用いられる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nアクセス系無線通信における高速化技術について述べた次の文章のうち、正しいものは、\n(オ) である。\n<(オ)の解答群>\n① デジタル変調方式において１シンボル当たりの情報量は多値数によって変化し、\nＱＰＳＫでは多値数が４であることから、１シンボルで伝送できる情報量は４ビット\nである。\n② 複数の送信アンテナを用いて複数のストリームを同時に送信するＭＩＭＯの送信\n手法は、空間多重といわれる。\n③ 無線伝搬環境の変動に対応して変調方式や誤り訂正符号化方式を選択する技術は、\nハフマン符号化といわれる。\n④ 複数の周波数帯域を束ねて使用することによって通信速度を高速化する技術は、\nキャリアセンスといわれる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n第５世代移動通信システム(５Ｇ)のネットワーク構成などについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<(カ)の解答群>\n① ５Ｇにはネットワーク構成の違いによりＳＡ(Standalone)方式とＮＳＡ\n(Non-Standalone)方式があり、ＳＡ方式ではネットワークスライシング技術を用い\nたサービスを提供することができる。\n② ＳＡ方式では、制御に必要なパラメータの送受信にＮＲ回線を用いている。\n③ ＮＳＡ方式では、制御信号の送受信にＬＴＥ回線を用い、データの送受信に\nＬＴＥ回線とＮＲ回線の両方を用いている。\n④ ＮＳＡ方式において、ユーザ認証、位置登録、パケットの転送経路設定などの機\n能は、５ＧＣが提供する。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問３ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、アンテナの特性に関する指標について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nアンテナの利得は、アンテナから任意の方向に放射される電波の電力密度と、そのアンテナ\nと同一の電力が供給されている等方性アンテナから放射される電波の電力密度の比として定義\nされる。あらゆる方向に均一の強さの電磁界を放射する仮想的な等方性アンテナを基準とした\nアンテナの利得は (ア) といわれる。\nアンテナのビーム幅は、アンテナの放射指向性から求められ、一般に、最大指向性を持つメ\nインローブのピークである中心から (イ) dＢ 低下したところの角度幅が放射特性の指標\nとして用いられる。また、メインローブ方向以外に生ずるローブはサイドローブといわれる。\nサイドローブは、他の無線システムに対して干渉を与える要因となるため、極力、低減する\n必要がある。特に、メインローブの放射電界とメインローブの中心の逆方向から±６０度の範\n囲にある最大放射電界との比は (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① １ ② ３ ③ ６ ④ １０\n⑤ Ｃ／Ｎ ⑥ Ｓ／Ｎ ⑦ ＦＢ比 ⑧ ＦＳ比\n⑨ 放射効率 ⑩ 絶対利得 ⑪ 相対利得 ⑫ 利得係数\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n② ＰＳＫでは変調信号により搬送波の位相を変化させており、信号点を４５度ごと\nπ\nに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ ＡＳＫでは変調信号により搬送波の振幅を変化させており、オンオフキーイング\n(ＯＯＫ)は４値ＡＳＫの一例である。\n④ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n低軌道の非静止衛星による衛星通信について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 低軌道の非静止衛星を用いることにより、静止衛星を用いた場合と比較して、アンテナの\n小型化、通信速度の向上及び遅延時間の短縮が期待できる。\nＢ 低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、３機の非静\n止衛星を用いる必要がある。\nＣ 赤道上高度約３６,０００ kｍ に位置する静止衛星は、一般に、極地域を除く通信が可能\nであるが、低軌道の非静止衛星は極地域の通信も可能である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n移動通信で用いられる無線回線制御方式などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 複数の移動端末が共通に利用できる無線チャネルを幾つも用意しておき、呼が発\n生するたびに各移動端末に特定の無線チャネルを割り当てる方式は、一般に、デマ\nンドアサイン方式といわれる。\n② セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、\n位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\nときにセルを切替制御する技術は、一般に、ハンドオーバといわれる。\n④ 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線チャネルを設定する技術\nとしてランダムアクセス制御がある。", "raw": "問３ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、アンテナの特性に関する指標について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nアンテナの利得は、アンテナから任意の方向に放射される電波の電力密度と、そのアンテナ\nと同一の電力が供給されている等方性アンテナから放射される電波の電力密度の比として定義\nされる。あらゆる方向に均一の強さの電磁界を放射する仮想的な等方性アンテナを基準とした\nアンテナの利得は (ア) といわれる。\nアンテナのビーム幅は、アンテナの放射指向性から求められ、一般に、最大指向性を持つメ\nインローブのピークである中心から (イ) dＢ 低下したところの角度幅が放射特性の指標\nとして用いられる。また、メインローブ方向以外に生ずるローブはサイドローブといわれる。\nサイドローブは、他の無線システムに対して干渉を与える要因となるため、極力、低減する\n必要がある。特に、メインローブの放射電界とメインローブの中心の逆方向から±６０度の範\n囲にある最大放射電界との比は (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① １ ② ３ ③ ６ ④ １０\n⑤ Ｃ／Ｎ ⑥ Ｓ／Ｎ ⑦ ＦＢ比 ⑧ ＦＳ比\n⑨ 放射効率 ⑩ 絶対利得 ⑪ 相対利得 ⑫ 利得係数\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル無線伝送に用いられる変調方式の種類、特徴などについて述べた次の文章のうち、\n正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＦＳＫでは、変調信号により搬送波の周波数を変化させており、一般に、搬送波\nの振幅は一定である。\n② ＰＳＫでは変調信号により搬送波の位相を変化させており、信号点を４５度ごと\nπ\nに配置するものとしてＱＰＳＫや シフトＱＰＳＫがある。\n４\n③ ＡＳＫでは変調信号により搬送波の振幅を変化させており、オンオフキーイング\n(ＯＯＫ)は４値ＡＳＫの一例である。\n④ スペクトル拡散による変調方式において、スペクトルを拡散したい信号に広帯域\nの信号を直接乗積する手法は、一般に、周波数ホッピング(ＦＨ)といわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n低軌道の非静止衛星による衛星通信について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 低軌道の非静止衛星を用いることにより、静止衛星を用いた場合と比較して、アンテナの\n小型化、通信速度の向上及び遅延時間の短縮が期待できる。\nＢ 低軌道の非静止衛星を用いて連続通信サービスを提供するためには、一般に、３機の非静\n止衛星を用いる必要がある。\nＣ 赤道上高度約３６,０００ kｍ に位置する静止衛星は、一般に、極地域を除く通信が可能\nであるが、低軌道の非静止衛星は極地域の通信も可能である。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n移動通信で用いられる無線回線制御方式などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<(カ)の解答群>\n① 複数の移動端末が共通に利用できる無線チャネルを幾つも用意しておき、呼が発\n生するたびに各移動端末に特定の無線チャネルを割り当てる方式は、一般に、デマ\nンドアサイン方式といわれる。\n② セル構造を有する移動通信方式において、移動端末の在圏位置を登録する単位は、\n位置登録エリアといわれ、一つのセルは複数の位置登録エリアで構成される。\n③ セル構造を有する移動通信方式において、移動端末が通信中にセル間を移動する\nときにセルを切替制御する技術は、一般に、ハンドオーバといわれる。\n④ 複数の移動端末から同時に発信が行われた場合、無線区間で信号の衝突が発生す\nる場合がある。この信号の衝突をできるだけ回避して無線チャネルを設定する技術\nとしてランダムアクセス制御がある。"}], "4": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、通信装置への給電方式について述べたものである。 内の(ア)～(ウ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n通信装置への給電方式には、直流給電方式と交流給電方式の二つがある。\n直流給電方式では、商用の交流電力を整流器で直流電力に変換し、商用停電時の予備エネ\nルギー源として利用する蓄電池を常時 (ア) しながら、その端子電圧を許容範囲内に\n(イ) する電圧 (イ) 器を介して、所要の直流電力を通信装置に供給する。\n交流給電方式では、商用の交流電力を整流器で直流電力に変換した後、インバータに半導体\nスイッチング素子を用いた (ウ) 形交流電源装置により所要の交流電力に変換して、通信\n装置に供給する。 (ウ) 形交流電源装置は、回転部分がないため機械的摩耗劣化の心配が\nない。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 昇 圧 ② 補 償 ③ 均等充電 ④ 補充電\n⑤ 非共振 ⑥ 降 圧 ⑦ 共 振 ⑧ 変 成\n⑨ 静 止 ⑩ 部分浮動充電 ⑪ 並列冗長 ⑫ 全浮動充電\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n整流回路の種類と特徴について述べた次の文章のうち、誤っているものは、 (エ) であ\nる。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 整流回路とは、交流を直流に変換する回路のことであり、直流を交流に変換する\n順変換回路と対比させて、逆変換回路ともいわれる。\n② 整流回路では、一般に、交流入力の１サイクルの間における整流後の出力電圧波\nたん\n形の繰り返し数が多いほど、直流出力電圧波形は平坦な波形に近くなる。\n③ 整流回路には、単相半波整流回路、単相全波整流回路、三相半波整流回路、三相\n全波整流回路などがある。\n④ 整流回路の出力電圧の脈動はリプルといわれ、三相全波整流回路は、三相半波整\n流回路と比較して、一般に、リプルが小さい。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルで用いられる無停電交流電源装置(ＵＰＳ)について述べた次の文章のうち、誤って\nいるものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＵＰＳは、商用電源の交流電力を直流電力に変換する整流装置、その直流電力を\n商用電源の停電に備えて貯蔵しておく蓄電池、直流電力を負荷装置が必要とする特\n性の交流電力に変換するインバータなどで構成される。\n② ＵＰＳは、ＩＧＢＴなどの高速スイッチング素子を用い、ＰＷＭ制御におけるス\nイッチング周波数を最高１ kＨz 程度まで引き上げることによって、騒音を大幅に\n低減している。\n③ 中容量以上の一般的なＵＰＳは、ＵＰＳの保守点検時に商用電力を直接負荷装置\nに供給するためのバイパス回路を装備している。\n④ 定格容量が数 kＶＡ の小容量ＵＰＳは、一般に、商用電源の停電時には定格電\n流を数分以上供給し続けられる容量の蓄電池を装備している。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n自家用発電設備について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 自家用発電設備は、設置目的別に分類すると、常用と非常用に分けられ、非常用\nは保安用と防災用に分けられる。\n② 電気通信事業法に基づく技術基準において、事業用電気通信設備に対する停電対\n策として自家用発電機の設置などが求められている。\n③ 電力会社などからの電力供給が困難な場所での電力確保用の電源や契約電力の削\n減を目的としたピークカット運転用の電源として、一般に、常用の自家用発電設備\nが用いられる。\n④ 商用電源からの給電が停止したときのために、建築基準法に定める排煙設備など\nに対する予備電源及び消防法に定める屋内消火栓などに対する非常電源として、一\n般に、保安用の自家用発電設備が用いられる。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、通信装置への給電方式について述べたものである。 内の(ア)～(ウ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n通信装置への給電方式には、直流給電方式と交流給電方式の二つがある。\n直流給電方式では、商用の交流電力を整流器で直流電力に変換し、商用停電時の予備エネ\nルギー源として利用する蓄電池を常時 (ア) しながら、その端子電圧を許容範囲内に\n(イ) する電圧 (イ) 器を介して、所要の直流電力を通信装置に供給する。\n交流給電方式では、商用の交流電力を整流器で直流電力に変換した後、インバータに半導体\nスイッチング素子を用いた (ウ) 形交流電源装置により所要の交流電力に変換して、通信\n装置に供給する。 (ウ) 形交流電源装置は、回転部分がないため機械的摩耗劣化の心配が\nない。\n<(ア)～(ウ)の解答群>\n① 昇 圧 ② 補 償 ③ 均等充電 ④ 補充電\n⑤ 非共振 ⑥ 降 圧 ⑦ 共 振 ⑧ 変 成\n⑨ 静 止 ⑩ 部分浮動充電 ⑪ 並列冗長 ⑫ 全浮動充電\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n整流回路の種類と特徴について述べた次の文章のうち、誤っているものは、 (エ) であ\nる。\n<(エ)の解答群>\n① 整流回路とは、交流を直流に変換する回路のことであり、直流を交流に変換する\n順変換回路と対比させて、逆変換回路ともいわれる。\n② 整流回路では、一般に、交流入力の１サイクルの間における整流後の出力電圧波\nたん\n形の繰り返し数が多いほど、直流出力電圧波形は平坦な波形に近くなる。\n③ 整流回路には、単相半波整流回路、単相全波整流回路、三相半波整流回路、三相\n全波整流回路などがある。\n④ 整流回路の出力電圧の脈動はリプルといわれ、三相全波整流回路は、三相半波整\n流回路と比較して、一般に、リプルが小さい。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルで用いられる無停電交流電源装置(ＵＰＳ)について述べた次の文章のうち、誤って\nいるものは、 (オ) である。\n<(オ)の解答群>\n① ＵＰＳは、商用電源の交流電力を直流電力に変換する整流装置、その直流電力を\n商用電源の停電に備えて貯蔵しておく蓄電池、直流電力を負荷装置が必要とする特\n性の交流電力に変換するインバータなどで構成される。\n② ＵＰＳは、ＩＧＢＴなどの高速スイッチング素子を用い、ＰＷＭ制御におけるス\nイッチング周波数を最高１ kＨz 程度まで引き上げることによって、騒音を大幅に\n低減している。\n③ 中容量以上の一般的なＵＰＳは、ＵＰＳの保守点検時に商用電力を直接負荷装置\nに供給するためのバイパス回路を装備している。\n④ 定格容量が数 kＶＡ の小容量ＵＰＳは、一般に、商用電源の停電時には定格電\n流を数分以上供給し続けられる容量の蓄電池を装備している。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n自家用発電設備について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 自家用発電設備は、設置目的別に分類すると、常用と非常用に分けられ、非常用\nは保安用と防災用に分けられる。\n② 電気通信事業法に基づく技術基準において、事業用電気通信設備に対する停電対\n策として自家用発電機の設置などが求められている。\n③ 電力会社などからの電力供給が困難な場所での電力確保用の電源や契約電力の削\n減を目的としたピークカット運転用の電源として、一般に、常用の自家用発電設備\nが用いられる。\n④ 商用電源からの給電が停止したときのために、建築基準法に定める排煙設備など\nに対する予備電源及び消防法に定める屋内消火栓などに対する非常電源として、一\n般に、保安用の自家用発電設備が用いられる。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、通信用電源設備、交流供給方式の特徴、装置構成などについて述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n通信用の交流電源装置は、入力の商用電源の異常に対して出力の電圧変動、周波数変動など\nを抑制し、通信システムに安定した交流電力を供給することが求められる。\n商用電源の異常を引き起こす事故・故障のうちで頻度が最も高いものは、電力会社などの送\n配電線への落雷による地絡や相間の (ア) によって生ずる瞬断や瞬時電圧低下である。そ\nの継続時間は、電力会社などの送配電線における高速遮断・再閉路の切替時間に関係しており、\n(イ) である。この値は、受電点における電源品質に直接影響するものであり、需要家の\n受電設備や負荷設備の設計・保守・運用に当たって十分に考慮する必要がある。\n通信ビルでは、商用電源の停電、瞬停、電圧異常などに対しても通信システムを無瞬断で運\n転を継続できるように、ＵＰＳを常に運転している。また、通信システムからの発熱による\n通信機械室内の温度上昇を抑えるために、 (ウ) を常に運転している。商用電源の停電な\nどが長時間に及ぶ場合には、非常用発電装置を運転して、ＵＰＳ、 (ウ) などに電力を供\n給することが必要となる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\nせん\n① 閃 絡 ② 空気調和機 ③ 短 絡 ④ 熱吸収式冷凍機\n⑤ 逆閃絡 ⑥ 誘導障害 ⑦ 冷却塔 ⑧ 外気ファン\n⑨ ０.０１秒未満 ⑩ ０.０１秒～０.０３秒程度\n⑪ ０.０５秒～２秒程度 ⑫ ５秒～１０秒程度\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n複数のインバータユニットで構成されるインバータシステムによる給電方式の種類と特徴に\nついて述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 常時商用給電方式のうち、平常時は各インバータユニットを商用電源と同期を\nとって無負荷で運転しながら、商用バイパス回路から負荷に給電し、商用停電時は\n各インバータの一括出力系統からの給電に切り換えて、無瞬断で負荷への給電を継\n続する方式は、インバータ運転待機方式といわれる。\n② 常時商用給電方式のうち、平常時は全インバータユニットを停止しておき、商用\nバイパス回路から負荷に給電し、商用停電時は各インバータユニットを起動し、１\nユニットずつ同期をとりながら順次負荷への給電に切り換えていく方式は、イン\nバータ停止待機方式といわれる。\n③ 常時インバータ給電方式のうち、平常時は各インバータユニットを商用電源と同\n期をとって運転しながら負荷へ給電し、インバータユニットの故障時は商用バイパ\nス回路からの給電に切り換えて、無瞬断で負荷への給電を継続する方式は、商用同\n期方式といわれる。\n④ 常時インバータ給電方式のうち、平常時は商用バイパス回路を持たない各イン\nバータユニットを同期をとって運転しながら負荷へ給電し、インバータユニットの\n故障時は商用電源系統からの給電に切り換えて、負荷への給電を継続する方式は、\n独立運転方式といわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n落雷によって生ずる過電圧・過電流とその対策について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 電力会社などの配電線に落雷があった場合、電磁的結合により、その配電線の近\n傍にある通信線において過電圧が生ずる現象は、誘導雷といわれる。\n② 建築物の避雷針に落雷があった場合、建築物の接地と商用電源の接地との間に電\n位差を生じて雷電流が商用電源の供給側へ流れ込む現象は、逆流雷といわれる。\n③ 電気設備の低圧機器への雷サージの侵入経路としては、避雷針、アンテナ線、電\n源線、通信線、接地線などが想定され、雷サージにより低圧機器内部の絶縁破壊を\n発生させないようにするには、一般に、接地の等電位化とサージ防護デバイスの適\n切な設置が有効である。\n④ 建築物の避雷針に落雷があった場合、接地極の電位上昇によって高圧受電用の変\n圧器やその二次側に接続された機器が破壊されるおそれがあるため、一般に、変圧\n器の二次側に高圧避雷器を設置して防護する。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける予備エネルギー源について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 鉛蓄電池やリチウムイオン二次電池は、商用電源の停電時などに瞬時にエネル\nギーの供給を開始できることから、一般に、通信ビルにおける短時間予備エネル\nギー源として利用される。\n② ディーゼル機関やガスタービン機関を原動機とする非常用発電設備は、商用電源\nの停電時などにおける長時間予備エネルギー源として利用される。\n③ 中規模以上の通信ビルでは、一般に、短時間予備エネルギー源と長時間予備エネ\nルギー源が組み合わせて設置される。\n④ 商用電源の供給を受けられる離島の小規模な通信ビルでは、経済性を考慮して、\n蓄電池保持時間が数時間程度の蓄電池による短時間予備エネルギー源のみ設置され、\n長時間予備エネルギー源は設置されない。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、通信用電源設備、交流供給方式の特徴、装置構成などについて述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n通信用の交流電源装置は、入力の商用電源の異常に対して出力の電圧変動、周波数変動など\nを抑制し、通信システムに安定した交流電力を供給することが求められる。\n商用電源の異常を引き起こす事故・故障のうちで頻度が最も高いものは、電力会社などの送\n配電線への落雷による地絡や相間の (ア) によって生ずる瞬断や瞬時電圧低下である。そ\nの継続時間は、電力会社などの送配電線における高速遮断・再閉路の切替時間に関係しており、\n(イ) である。この値は、受電点における電源品質に直接影響するものであり、需要家の\n受電設備や負荷設備の設計・保守・運用に当たって十分に考慮する必要がある。\n通信ビルでは、商用電源の停電、瞬停、電圧異常などに対しても通信システムを無瞬断で運\n転を継続できるように、ＵＰＳを常に運転している。また、通信システムからの発熱による\n通信機械室内の温度上昇を抑えるために、 (ウ) を常に運転している。商用電源の停電な\nどが長時間に及ぶ場合には、非常用発電装置を運転して、ＵＰＳ、 (ウ) などに電力を供\n給することが必要となる。\n<(ア)～(ウ)の解答群>\nせん\n① 閃 絡 ② 空気調和機 ③ 短 絡 ④ 熱吸収式冷凍機\n⑤ 逆閃絡 ⑥ 誘導障害 ⑦ 冷却塔 ⑧ 外気ファン\n⑨ ０.０１秒未満 ⑩ ０.０１秒～０.０３秒程度\n⑪ ０.０５秒～２秒程度 ⑫ ５秒～１０秒程度\n\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n複数のインバータユニットで構成されるインバータシステムによる給電方式の種類と特徴に\nついて述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① 常時商用給電方式のうち、平常時は各インバータユニットを商用電源と同期を\nとって無負荷で運転しながら、商用バイパス回路から負荷に給電し、商用停電時は\n各インバータの一括出力系統からの給電に切り換えて、無瞬断で負荷への給電を継\n続する方式は、インバータ運転待機方式といわれる。\n② 常時商用給電方式のうち、平常時は全インバータユニットを停止しておき、商用\nバイパス回路から負荷に給電し、商用停電時は各インバータユニットを起動し、１\nユニットずつ同期をとりながら順次負荷への給電に切り換えていく方式は、イン\nバータ停止待機方式といわれる。\n③ 常時インバータ給電方式のうち、平常時は各インバータユニットを商用電源と同\n期をとって運転しながら負荷へ給電し、インバータユニットの故障時は商用バイパ\nス回路からの給電に切り換えて、無瞬断で負荷への給電を継続する方式は、商用同\n期方式といわれる。\n④ 常時インバータ給電方式のうち、平常時は商用バイパス回路を持たない各イン\nバータユニットを同期をとって運転しながら負荷へ給電し、インバータユニットの\n故障時は商用電源系統からの給電に切り換えて、負荷への給電を継続する方式は、\n独立運転方式といわれる。\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n落雷によって生ずる過電圧・過電流とその対策について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<(オ)の解答群>\n① 電力会社などの配電線に落雷があった場合、電磁的結合により、その配電線の近\n傍にある通信線において過電圧が生ずる現象は、誘導雷といわれる。\n② 建築物の避雷針に落雷があった場合、建築物の接地と商用電源の接地との間に電\n位差を生じて雷電流が商用電源の供給側へ流れ込む現象は、逆流雷といわれる。\n③ 電気設備の低圧機器への雷サージの侵入経路としては、避雷針、アンテナ線、電\n源線、通信線、接地線などが想定され、雷サージにより低圧機器内部の絶縁破壊を\n発生させないようにするには、一般に、接地の等電位化とサージ防護デバイスの適\n切な設置が有効である。\n④ 建築物の避雷針に落雷があった場合、接地極の電位上昇によって高圧受電用の変\n圧器やその二次側に接続された機器が破壊されるおそれがあるため、一般に、変圧\n器の二次側に高圧避雷器を設置して防護する。\n\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける予備エネルギー源について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① 鉛蓄電池やリチウムイオン二次電池は、商用電源の停電時などに瞬時にエネル\nギーの供給を開始できることから、一般に、通信ビルにおける短時間予備エネル\nギー源として利用される。\n② ディーゼル機関やガスタービン機関を原動機とする非常用発電設備は、商用電源\nの停電時などにおける長時間予備エネルギー源として利用される。\n③ 中規模以上の通信ビルでは、一般に、短時間予備エネルギー源と長時間予備エネ\nルギー源が組み合わせて設置される。\n④ 商用電源の供給を受けられる離島の小規模な通信ビルでは、経済性を考慮して、\n蓄電池保持時間が数時間程度の蓄電池による短時間予備エネルギー源のみ設置され、\n長時間予備エネルギー源は設置されない。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、大規模な通信ビルで用いられるＵＰＳの基本構成について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＵＰＳは、一般に、整流装置、インバータ及び蓄電池で構成される。\nインバータでは、パワートランジスタの一つである (ア) が広く用いられており、主回\n路の直流電圧を可聴周波数より高い周波数でスイッチングし、フィルタ回路を通して正弦波に\n近い交流電圧を発生させている。 (ア) を用いたインバータは、自励式インバータであり、\n主回路の電流を自己遮断するための (イ) 回路を必要としない。\nＵＰＳシステムは、複数のＵＰＳユニットの故障時に負荷装置への電力供給を継続するため\nに、一般に、 (ウ) を直接供給するためのバイパス回路を装備している。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＩＧＢＴ ② 商用電力 ③ ＴＲＩＡＣ ④ 逆流防止\n⑤ 補 正 ⑥ サイリスタ ⑦ 遅 延 ⑧ 蓄電池エネルギー\n⑨ 直流電力 ⑩ 転 流 ⑪ 整流器出力 ⑫ フォトトランジスタ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n受電設備における進相コンデンサと直列リアクトルについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 負荷設備は一般に誘導性であるため、配電系統の電力は進み無効電力を多く含ん\nでおり進み力率となる。進相コンデンサは、この進み無効電力を吸収し、力率を改\n善するために用いられる。\n② 進相コンデンサに対して直列に接続される直列リアクトルには、進相コンデンサ\n投入時の過大な突入電流を抑制する効果や高調波電流の流出を抑制する効果がある。\n③ 進相コンデンサと直列リアクトルの設置位置としては、受電用変圧器の高圧側又\nは低圧側、あるいは各負荷設備の入力側がある。実際の設置位置は、経済性や省エ\nネルギー性を考慮して、各負荷設備の入力側とするのが一般的である。\n④ 進相コンデンサは、回路から切り離された直後は残留電荷が残っており、取扱者\nが感電する危険性がある。このため、進相コンデンサには、残留電荷を吸収するた\nめに別のコンデンサ素子を付加している。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n太陽光発電システムの特性、機能などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 太陽電池素子は、周囲環境温度が－２０ ℃ ～４０ ℃ の範囲内では、一般に、\n温度が上昇すると出力が低下する特性を持っている。\n② 太陽光発電システムは、日照が強いときに蓄電池を過充電するのを防止するため\nの過充電防止機能や、日照が弱いときに蓄電池から太陽電池素子に電流が逆流する\nのを防止するための電流逆流防止機能を持っている。\n③ 太陽光発電システムにおいて、パワーコンディショナの運用形態は、商用電源と\n接続する系統連系形及び商用電源と接続しない独立形の二つに大別される。\n④ 通信用電源などに用いられる直流供給システムと連系する太陽光発電システムで\nは、一般に、昼間に商用電源が停電した場合、太陽光エネルギーを利用してデマン\nド制御装置を運転することによって通信用電源をバックアップし、通信システム用\n蓄電池の放電量を抑制することができる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n変圧器及び変流器について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 高圧受電用に使用される変圧器は、一般に、構造上の違いによって外鉄型と内鉄\n型、絶縁・冷却方式の違いによって油入式と乾式、相数の違いによって単相と三相\nなどに分類することができる。\n② モールド変圧器は、巻線の絶縁材料として冷却用を兼ねた絶縁油を使用した変圧\n器であり、変圧器を長期間使用しても、乾式変圧器と比較して、絶縁性能が低下し\nにくい利点がある。\n③ 高電圧で大電流の回路における電圧と電流を計測するには、一般に、計器用変圧\n器及び変流器を使用する。これら計器用変圧器及び変流器は、総称して計器用変成\n器といわれる。\n④ 零相変流器は、三相交流の電気系統に地絡事故が発生したときに流れる地絡電流\nを検出する機能を有しており、高圧受電用地絡継電装置などに使用されている。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、大規模な通信ビルで用いられるＵＰＳの基本構成について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＵＰＳは、一般に、整流装置、インバータ及び蓄電池で構成される。\nインバータでは、パワートランジスタの一つである (ア) が広く用いられており、主回\n路の直流電圧を可聴周波数より高い周波数でスイッチングし、フィルタ回路を通して正弦波に\n近い交流電圧を発生させている。 (ア) を用いたインバータは、自励式インバータであり、\n主回路の電流を自己遮断するための (イ) 回路を必要としない。\nＵＰＳシステムは、複数のＵＰＳユニットの故障時に負荷装置への電力供給を継続するため\nに、一般に、 (ウ) を直接供給するためのバイパス回路を装備している。\n<(ア)～(ウ)の解答群>\n① ＩＧＢＴ ② 商用電力 ③ ＴＲＩＡＣ ④ 逆流防止\n⑤ 補 正 ⑥ サイリスタ ⑦ 遅 延 ⑧ 蓄電池エネルギー\n⑨ 直流電力 ⑩ 転 流 ⑪ 整流器出力 ⑫ フォトトランジスタ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n受電設備における進相コンデンサと直列リアクトルについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<(エ)の解答群>\n① 負荷設備は一般に誘導性であるため、配電系統の電力は進み無効電力を多く含ん\nでおり進み力率となる。進相コンデンサは、この進み無効電力を吸収し、力率を改\n善するために用いられる。\n② 進相コンデンサに対して直列に接続される直列リアクトルには、進相コンデンサ\n投入時の過大な突入電流を抑制する効果や高調波電流の流出を抑制する効果がある。\n③ 進相コンデンサと直列リアクトルの設置位置としては、受電用変圧器の高圧側又\nは低圧側、あるいは各負荷設備の入力側がある。実際の設置位置は、経済性や省エ\nネルギー性を考慮して、各負荷設備の入力側とするのが一般的である。\n④ 進相コンデンサは、回路から切り離された直後は残留電荷が残っており、取扱者\nが感電する危険性がある。このため、進相コンデンサには、残留電荷を吸収するた\nめに別のコンデンサ素子を付加している。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n太陽光発電システムの特性、機能などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 太陽電池素子は、周囲環境温度が－２０ ℃ ～４０ ℃ の範囲内では、一般に、\n温度が上昇すると出力が低下する特性を持っている。\n② 太陽光発電システムは、日照が強いときに蓄電池を過充電するのを防止するため\nの過充電防止機能や、日照が弱いときに蓄電池から太陽電池素子に電流が逆流する\nのを防止するための電流逆流防止機能を持っている。\n③ 太陽光発電システムにおいて、パワーコンディショナの運用形態は、商用電源と\n接続する系統連系形及び商用電源と接続しない独立形の二つに大別される。\n④ 通信用電源などに用いられる直流供給システムと連系する太陽光発電システムで\nは、一般に、昼間に商用電源が停電した場合、太陽光エネルギーを利用してデマン\nド制御装置を運転することによって通信用電源をバックアップし、通信システム用\n蓄電池の放電量を抑制することができる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n変圧器及び変流器について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 高圧受電用に使用される変圧器は、一般に、構造上の違いによって外鉄型と内鉄\n型、絶縁・冷却方式の違いによって油入式と乾式、相数の違いによって単相と三相\nなどに分類することができる。\n② モールド変圧器は、巻線の絶縁材料として冷却用を兼ねた絶縁油を使用した変圧\n器であり、変圧器を長期間使用しても、乾式変圧器と比較して、絶縁性能が低下し\nにくい利点がある。\n③ 高電圧で大電流の回路における電圧と電流を計測するには、一般に、計器用変圧\n器及び変流器を使用する。これら計器用変圧器及び変流器は、総称して計器用変成\n器といわれる。\n④ 零相変流器は、三相交流の電気系統に地絡事故が発生したときに流れる地絡電流\nを検出する機能を有しており、高圧受電用地絡継電装置などに使用されている。"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、通信用電源における整流装置について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\n整流装置には、高速スイッチング動作が可能なＭＯＳＦＥＴと、オン動作時の順方向電圧降\n下が小さく大電流動作が可能な高耐圧型のバイポーラトランジスタのそれぞれの特性を併せ持\nつスイッチング素子である (ア) を用いたものがある。\nこの整流装置では、ダイオードブリッジなどで整流した直流電圧に対して (ア) を高周\n波数で (イ) 制御することにより、電圧変換及び定電圧制御を行っている。\nこの整流装置は、サイリスタ整流装置と比較して、装置の小型軽量化や大容量化が図られ\nている、電力変換時の電力損失が少なく高効率である、平常時の出力電圧が脈動成分である\n(ウ) をほとんど含まず安定しているなどの特徴を有している。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＰＡＭ ② 電圧サグ ③ ＳＩＴ ④ ＴＲＩＡＣ\n⑤ ＧＴＯ ⑥ ＰＩＤ ⑦ リプル電圧 ⑧ 電圧ディップ\n⑨ ＰＦＭ ⑩ ＩＧＢＴ ⑪ ＰＷＭ ⑫ サージ電圧\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける給電方式である集中給電方式と分散給電方式の機器配置、特徴などについ\nて述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 直流供給方式の集中給電方式では、受電装置や非常用発電装置に加えて大容量の\n整流装置や蓄電池を電力室に配置して、電力室から各通信機械室へ所要の直流電力\nを供給する。\n② 交流供給方式の分散給電方式では、受電装置や非常用発電装置を電力室に配置し、\nＵＰＳを各通信機械室に配置して、電力室から各通信機械室へ適切な電圧の交流電\n力を供給し、各通信機械室でＵＰＳを用いて所要の交流電力に変換して各負荷装置\nに供給する。\n③ ＵＰＳをユニットの積上げで構成した交流供給方式の分散給電方式において、所\n要電力の増大に対して、装置架で供給可能な電力に余裕があり、かつ、ユニット搭\n載用の空きスペースがある場合には、一般に、装置架へのユニット増設により対応\nできる。\n④ 直流供給方式の分散給電方式において整流装置の故障が発生した場合、直流供給\n方式の集中給電方式において整流装置の故障が発生した場合と比較して、一般に、\n故障による影響は広い範囲に及ぶ。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける受電設備などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 受電電圧には、交流６００ Ｖ 以下の低圧、交流６００ Ｖ を超え７,０００ Ｖ\n以下の高圧及び７,０００ Ｖ を超える特別高圧の区分がある。\n② 高圧で受電する通信ビルでは、自ビル内の事故が他需要家に影響を与えること及\nび他需要家の事故の影響を受けることを防止するために、自ビル内に施設される保\n護装置と電気事業者の配電用変電所内に施設される保護装置との間で保護協調を保\nつ必要がある。\n③ 高圧受電装置の保護継電器には、短絡事故発生時に生ずる過大電流や過大電圧を\n検出するための過電流継電器や過電圧継電器、地絡事故発生時に生ずる零相地絡電\n流を検出するための地絡継電器などがある。\n④ 遮断器は、消弧媒質の違いにより、空気遮断器、油遮断器、ガス遮断器などに分\n類され、ガス遮断器では、消弧媒質としてアルゴンガスやフレオンガスが用いられ\nる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nシール鉛蓄電池などの二次電池の特性、特徴などについて述べた次の文章のうち、正しいも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① シール鉛蓄電池から放電によって取り出せる容量は、放電電流 Ａ と放電時間 ｈ\nの積で表され、この値は、放電電流の大きさによって変化することはなく、一定で\nある。\n② 完全放電したシール鉛蓄電池を定電流定電圧充電方式で充電する場合、最初はあ\nらかじめ決められた蓄電池電圧になるまで一定電流で充電し、その後は充電電流が\n徐々に減少していくのを確認しながら一定電圧で充電する。\n③ シール鉛蓄電池は、充電方式にかかわらず、満充電後に継続して充電しても、過\n充電による蓄電池の性能の劣化は生じない。\n④ ニッケル系二次電池では、浅い充放電を繰り返しても、蓄電池電圧が低下したり\n蓄電池容量が減少したりするメモリ効果はほとんど現れない。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、通信用電源における整流装置について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\n整流装置には、高速スイッチング動作が可能なＭＯＳＦＥＴと、オン動作時の順方向電圧降\n下が小さく大電流動作が可能な高耐圧型のバイポーラトランジスタのそれぞれの特性を併せ持\nつスイッチング素子である (ア) を用いたものがある。\nこの整流装置では、ダイオードブリッジなどで整流した直流電圧に対して (ア) を高周\n波数で (イ) 制御することにより、電圧変換及び定電圧制御を行っている。\nこの整流装置は、サイリスタ整流装置と比較して、装置の小型軽量化や大容量化が図られ\nている、電力変換時の電力損失が少なく高効率である、平常時の出力電圧が脈動成分である\n(ウ) をほとんど含まず安定しているなどの特徴を有している。\n<(ア)～(ウ)の解答群>\n① ＰＡＭ ② 電圧サグ ③ ＳＩＴ ④ ＴＲＩＡＣ\n⑤ ＧＴＯ ⑥ ＰＩＤ ⑦ リプル電圧 ⑧ 電圧ディップ\n⑨ ＰＦＭ ⑩ ＩＧＢＴ ⑪ ＰＷＭ ⑫ サージ電圧\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける給電方式である集中給電方式と分散給電方式の機器配置、特徴などについ\nて述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① 直流供給方式の集中給電方式では、受電装置や非常用発電装置に加えて大容量の\n整流装置や蓄電池を電力室に配置して、電力室から各通信機械室へ所要の直流電力\nを供給する。\n② 交流供給方式の分散給電方式では、受電装置や非常用発電装置を電力室に配置し、\nＵＰＳを各通信機械室に配置して、電力室から各通信機械室へ適切な電圧の交流電\n力を供給し、各通信機械室でＵＰＳを用いて所要の交流電力に変換して各負荷装置\nに供給する。\n③ ＵＰＳをユニットの積上げで構成した交流供給方式の分散給電方式において、所\n要電力の増大に対して、装置架で供給可能な電力に余裕があり、かつ、ユニット搭\n載用の空きスペースがある場合には、一般に、装置架へのユニット増設により対応\nできる。\n④ 直流供給方式の分散給電方式において整流装置の故障が発生した場合、直流供給\n方式の集中給電方式において整流装置の故障が発生した場合と比較して、一般に、\n故障による影響は広い範囲に及ぶ。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける受電設備などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 受電電圧には、交流６００ Ｖ 以下の低圧、交流６００ Ｖ を超え７,０００ Ｖ\n以下の高圧及び７,０００ Ｖ を超える特別高圧の区分がある。\n② 高圧で受電する通信ビルでは、自ビル内の事故が他需要家に影響を与えること及\nび他需要家の事故の影響を受けることを防止するために、自ビル内に施設される保\n護装置と電気事業者の配電用変電所内に施設される保護装置との間で保護協調を保\nつ必要がある。\n③ 高圧受電装置の保護継電器には、短絡事故発生時に生ずる過大電流や過大電圧を\n検出するための過電流継電器や過電圧継電器、地絡事故発生時に生ずる零相地絡電\n流を検出するための地絡継電器などがある。\n④ 遮断器は、消弧媒質の違いにより、空気遮断器、油遮断器、ガス遮断器などに分\n類され、ガス遮断器では、消弧媒質としてアルゴンガスやフレオンガスが用いられ\nる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nシール鉛蓄電池などの二次電池の特性、特徴などについて述べた次の文章のうち、正しいも\nのは、 (カ) である。\n<(カ)の解答群>\n① シール鉛蓄電池から放電によって取り出せる容量は、放電電流 Ａ と放電時間 ｈ\nの積で表され、この値は、放電電流の大きさによって変化することはなく、一定で\nある。\n② 完全放電したシール鉛蓄電池を定電流定電圧充電方式で充電する場合、最初はあ\nらかじめ決められた蓄電池電圧になるまで一定電流で充電し、その後は充電電流が\n徐々に減少していくのを確認しながら一定電圧で充電する。\n③ シール鉛蓄電池は、充電方式にかかわらず、満充電後に継続して充電しても、過\n充電による蓄電池の性能の劣化は生じない。\n④ ニッケル系二次電池では、浅い充放電を繰り返しても、蓄電池電圧が低下したり\n蓄電池容量が減少したりするメモリ効果はほとんど現れない。"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、受電設備の概要について述べたものである。 内の(ア)～(ウ)に最も適</p>\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\n通信用電源として商用電源を利用する受電設備には、電圧の変換、電力の負荷系統への分配、\n運転管理に必要な電圧、電流、電力の計測などの機能が必要である。\n電圧は、法令上、交流の場合６００ Ｖ 以下の低圧、６００ Ｖ を超え (ア) Ｖ 以下\nの高圧及び (ア) Ｖ を超える特別高圧に区分され、受電方式は、低圧受電、高圧受電及\nび特別高圧受電に分類される。\n高圧受電設備は、一般に、断路器、 (イ) などの電力開閉装置、三相変圧器などの変成\n器、力率改善のための進相コンデンサ、各受電装置を保護するための保護継電器などで構成さ\nれる。\n特別高圧受電方式には、信頼性の高い２回線受電方式やループ受電方式があり、大都市圏な\nどでは更に信頼性の高い (ウ) 受電方式が推奨されている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ７５０ ② ３,３００ ③ ７,０００ ④ ７,５００\n⑤ 避雷器 ⑥ コンバータ ⑦ 屋内開放型 ⑧ 屋外開放型\n⑨ 遮断器 ⑩ １回線 ⑪ 電力用ヒューズ ⑫ スポットネットワーク\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n同一定格容量のＵＰＳユニットの並列運転技術について述べた次の文章のうち、誤っている\nものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 並列冗長構成をとるＵＰＳシステムにおいて、有効電力は各ＵＰＳユニットで均\n等に分担され、無効電力は各ＵＰＳユニットともゼロになる。\n② 並列冗長構成をとるＵＰＳシステムにおいて、一台のＵＰＳユニットが故障した\n場合、一般に、その故障したＵＰＳユニットを選択遮断し、他の健全なＵＰＳ\nユニットを継続運転して、負荷への電力供給を無瞬断で継続する。\n③ ＵＰＳユニットを並列冗長構成とし、バイパス電源として商用電源を使用する\nＵＰＳシステムにおいて、二台以上のＵＰＳユニットが同時に故障した場合、一般\nに、商用電源に切り換えて、負荷への電力供給を無瞬断で継続する。\n④ 大容量の交流電源システムを構築するために複数のＵＰＳユニットを並列運転す\nる場合、信頼度の面から一台のＵＰＳユニットをホットスタンバイとした並列冗長\n構成とし、各ＵＰＳユニットを同期運転する方法がある。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n整流回路の種類と特徴について述べた次の文章のうち、誤っているものは、 (オ) であ\nる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 整流回路は、交流を直流に変換する回路であり、順変換回路ともいわれる。\n② 整流回路では、一般に、交流入力の１サイクルの間における整流後の出力電圧波\nたん\n形の繰り返し数が少ないほど、直流出力電圧波形は平坦な波形に近くなる。\n③ 整流回路には、単相半波整流回路、単相全波整流回路、三相半波整流回路、三相\n全波整流回路などがある。\n④ 整流回路の出力電圧の脈動はリプルといわれ、三相全波整流回路は、三相半波整\n流回路と比較して、一般に、リプルが小さい。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルに設置される発電装置に用いられるディーゼル機関とガスタービン機関の特徴など\nについて述べた次の文章のうち、正しいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ディーゼル機関はガスタービン機関と比較して、運転時の振動や騒音が小さい。\n② ディーゼル機関はガスタービン機関と比較して、熱効率が低い。\n③ ディーゼル機関には水冷式と空冷式があるが、ガスタービン機関は、専ら空冷式\nであり、運転に冷却水を必要としない。\n④ 電気始動方式のディーゼル機関では、４８ Ｖ の通信システム用蓄電池をディー\nゼル機関始動用蓄電池として共用している。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、受電設備の概要について述べたものである。 内の(ア)～(ウ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\n通信用電源として商用電源を利用する受電設備には、電圧の変換、電力の負荷系統への分配、\n運転管理に必要な電圧、電流、電力の計測などの機能が必要である。\n電圧は、法令上、交流の場合６００ Ｖ 以下の低圧、６００ Ｖ を超え (ア) Ｖ 以下\nの高圧及び (ア) Ｖ を超える特別高圧に区分され、受電方式は、低圧受電、高圧受電及\nび特別高圧受電に分類される。\n高圧受電設備は、一般に、断路器、 (イ) などの電力開閉装置、三相変圧器などの変成\n器、力率改善のための進相コンデンサ、各受電装置を保護するための保護継電器などで構成さ\nれる。\n特別高圧受電方式には、信頼性の高い２回線受電方式やループ受電方式があり、大都市圏な\nどでは更に信頼性の高い (ウ) 受電方式が推奨されている。\n<(ア)～(ウ)の解答群>\n① ７５０ ② ３,３００ ③ ７,０００ ④ ７,５００\n⑤ 避雷器 ⑥ コンバータ ⑦ 屋内開放型 ⑧ 屋外開放型\n⑨ 遮断器 ⑩ １回線 ⑪ 電力用ヒューズ ⑫ スポットネットワーク\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n同一定格容量のＵＰＳユニットの並列運転技術について述べた次の文章のうち、誤っている\nものは、 (エ) である。\n<(エ)の解答群>\n① 並列冗長構成をとるＵＰＳシステムにおいて、有効電力は各ＵＰＳユニットで均\n等に分担され、無効電力は各ＵＰＳユニットともゼロになる。\n② 並列冗長構成をとるＵＰＳシステムにおいて、一台のＵＰＳユニットが故障した\n場合、一般に、その故障したＵＰＳユニットを選択遮断し、他の健全なＵＰＳ\nユニットを継続運転して、負荷への電力供給を無瞬断で継続する。\n③ ＵＰＳユニットを並列冗長構成とし、バイパス電源として商用電源を使用する\nＵＰＳシステムにおいて、二台以上のＵＰＳユニットが同時に故障した場合、一般\nに、商用電源に切り換えて、負荷への電力供給を無瞬断で継続する。\n④ 大容量の交流電源システムを構築するために複数のＵＰＳユニットを並列運転す\nる場合、信頼度の面から一台のＵＰＳユニットをホットスタンバイとした並列冗長\n構成とし、各ＵＰＳユニットを同期運転する方法がある。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n整流回路の種類と特徴について述べた次の文章のうち、誤っているものは、 (オ) であ\nる。\n<(オ)の解答群>\n① 整流回路は、交流を直流に変換する回路であり、順変換回路ともいわれる。\n② 整流回路では、一般に、交流入力の１サイクルの間における整流後の出力電圧波\nたん\n形の繰り返し数が少ないほど、直流出力電圧波形は平坦な波形に近くなる。\n③ 整流回路には、単相半波整流回路、単相全波整流回路、三相半波整流回路、三相\n全波整流回路などがある。\n④ 整流回路の出力電圧の脈動はリプルといわれ、三相全波整流回路は、三相半波整\n流回路と比較して、一般に、リプルが小さい。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルに設置される発電装置に用いられるディーゼル機関とガスタービン機関の特徴など\nについて述べた次の文章のうち、正しいものは、 (カ) である。\n<(カ)の解答群>\n① ディーゼル機関はガスタービン機関と比較して、運転時の振動や騒音が小さい。\n② ディーゼル機関はガスタービン機関と比較して、熱効率が低い。\n③ ディーゼル機関には水冷式と空冷式があるが、ガスタービン機関は、専ら空冷式\nであり、運転に冷却水を必要としない。\n④ 電気始動方式のディーゼル機関では、４８ Ｖ の通信システム用蓄電池をディー\nゼル機関始動用蓄電池として共用している。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、通信装置への給電方式について述べたものである。 内の(ア)～(ウ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n通信装置への給電方式には、直流給電方式と交流給電方式の二つがある。\n直流給電方式では、商用の交流電力を整流器で直流電力に変換し、商用停電時の予備エネ\nルギー源として利用する蓄電池を常時 (ア) しながら、その端子電圧を許容範囲内に\n(イ) する電圧 (イ) 器を介して、所要の直流電力を通信装置に供給する。\n交流給電方式では、商用の交流電力を整流器で直流電力に変換した後、インバータに半導体\nスイッチング素子を用いた (ウ) 形交流電源装置により所要の交流電力に変換して、通信\n装置に供給する。 (ウ) 形交流電源装置は、回転部分がないため機械的摩耗劣化がない。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 昇 圧 ② 全浮動充電 ③ 均等充電 ④ 補充電\n⑤ 非共振 ⑥ 降 圧 ⑦ 共 振 ⑧ 変 成\n⑨ 静 止 ⑩ 部分浮動充電 ⑪ 並列冗長 ⑫ 補 償\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n受電設備における進相コンデンサと直列リアクトルについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 負荷設備は、一般に、誘導性であるため、配電系統の電力は進み無効電力を多く\n含んでおり進み力率となる。進相コンデンサは、この進み無効電力を吸収し、力率\nを改善するために用いられる。\n② 進相コンデンサは、回路から切り離された直後は残留電荷が残っており、取扱者\nが感電する危険性がある。このため、進相コンデンサには、残留電荷を吸収するた\nめに別のコンデンサ素子を付加している。\n③ 進相コンデンサに対して直列に接続される直列リアクトルには、進相コンデンサ\n投入時の過大な突入電流を抑制する効果や高調波電流の流出を抑制する効果がある。\n④ 進相コンデンサと直列リアクトルの設置位置としては、受電用変圧器の高圧側又\nは低圧側、あるいは各負荷設備の入力側があるが、実際の設置位置は、経済性や省\nエネルギー性を考慮して、各負荷設備の入力側とするのが一般的である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n自励式インバータの種類、特徴などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 電圧形インバータでは、一般に、出力電圧の波形は方形波となり、出力電流は正\n弦波交流に近い波形となる。\n② 電圧形インバータでは、一般に、直流側にコンデンサが接続されている。\n③ 電流形インバータは、電圧形インバータと比較して、一般に、電源インピーダン\nスが小さく、過電圧保護は容易であるが、過電流保護は難しい。\n④ 電流形インバータでは、一般に、直流側にリアクトルが接続されている。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n二次電池の種類、特徴などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① シール鉛蓄電池は、液式鉛蓄電池と異なり、補水、比重測定及び均等充電の定期\n作業が不要である。\n② シール鉛蓄電池には、電池内部で発生する酸素ガスを負極に集め、負極で発生す\nる水素ガスと電気化学的に反応させて元の水に戻す機能がある。\n③ ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較\nして、エネルギー密度が高く、放電時の電圧変動が小さい。\n④ リチウムイオン二次電池は、負極にリチウムイオンを吸蔵した炭素材料を用いて\nおり、ニッケル水素電池と比較して、エネルギー密度は高いが、作動電圧は低い。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、通信装置への給電方式について述べたものである。 内の(ア)～(ウ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n通信装置への給電方式には、直流給電方式と交流給電方式の二つがある。\n直流給電方式では、商用の交流電力を整流器で直流電力に変換し、商用停電時の予備エネ\nルギー源として利用する蓄電池を常時 (ア) しながら、その端子電圧を許容範囲内に\n(イ) する電圧 (イ) 器を介して、所要の直流電力を通信装置に供給する。\n交流給電方式では、商用の交流電力を整流器で直流電力に変換した後、インバータに半導体\nスイッチング素子を用いた (ウ) 形交流電源装置により所要の交流電力に変換して、通信\n装置に供給する。 (ウ) 形交流電源装置は、回転部分がないため機械的摩耗劣化がない。\n<(ア)～(ウ)の解答群>\n① 昇 圧 ② 全浮動充電 ③ 均等充電 ④ 補充電\n⑤ 非共振 ⑥ 降 圧 ⑦ 共 振 ⑧ 変 成\n⑨ 静 止 ⑩ 部分浮動充電 ⑪ 並列冗長 ⑫ 補 償\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n受電設備における進相コンデンサと直列リアクトルについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<(エ)の解答群>\n① 負荷設備は、一般に、誘導性であるため、配電系統の電力は進み無効電力を多く\n含んでおり進み力率となる。進相コンデンサは、この進み無効電力を吸収し、力率\nを改善するために用いられる。\n② 進相コンデンサは、回路から切り離された直後は残留電荷が残っており、取扱者\nが感電する危険性がある。このため、進相コンデンサには、残留電荷を吸収するた\nめに別のコンデンサ素子を付加している。\n③ 進相コンデンサに対して直列に接続される直列リアクトルには、進相コンデンサ\n投入時の過大な突入電流を抑制する効果や高調波電流の流出を抑制する効果がある。\n④ 進相コンデンサと直列リアクトルの設置位置としては、受電用変圧器の高圧側又\nは低圧側、あるいは各負荷設備の入力側があるが、実際の設置位置は、経済性や省\nエネルギー性を考慮して、各負荷設備の入力側とするのが一般的である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n自励式インバータの種類、特徴などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 電圧形インバータでは、一般に、出力電圧の波形は方形波となり、出力電流は正\n弦波交流に近い波形となる。\n② 電圧形インバータでは、一般に、直流側にコンデンサが接続されている。\n③ 電流形インバータは、電圧形インバータと比較して、一般に、電源インピーダン\nスが小さく、過電圧保護は容易であるが、過電流保護は難しい。\n④ 電流形インバータでは、一般に、直流側にリアクトルが接続されている。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n二次電池の種類、特徴などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<(カ)の解答群>\n① シール鉛蓄電池は、液式鉛蓄電池と異なり、補水、比重測定及び均等充電の定期\n作業が不要である。\n② シール鉛蓄電池には、電池内部で発生する酸素ガスを負極に集め、負極で発生す\nる水素ガスと電気化学的に反応させて元の水に戻す機能がある。\n③ ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較\nして、エネルギー密度が高く、放電時の電圧変動が小さい。\n④ リチウムイオン二次電池は、負極にリチウムイオンを吸蔵した炭素材料を用いて\nおり、ニッケル水素電池と比較して、エネルギー密度は高いが、作動電圧は低い。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＵＰＳの高効率化などについて述べたものである。 内の(ア)～(ウ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n大規模データセンタの整備及び普及に伴い、ＵＰＳの高効率化、小型化などのニーズが高\nまっている。これらのニーズに対応するために、ＵＰＳ内部の主要な電力変換部であるインバー\nタ回路においては、ＩＧＢＴを用いた (ア) 制御方式が主流となっている。また、\n(ア) 制御において、出力電圧を多段階で制御するマルチレベルインバータを採用するこ\nとにより、出力電圧を２段階で制御する２レベルインバータと比較して、スイッチング損失を\n低減でき、より高効率化が可能となる。さらに、出力波形が正弦波に近いことから (イ)\nを小さくすることができ、小型化も可能となる。\nまた、ＳｉＣ(シリコンカーバイド)を用いたパワーモジュールを用いることにより、従来か\nらのＳｉを用いたパワーモジュールと比較して、半導体デバイスの (ウ) が小さく、スイッ\nチング損失が低減できることからより高効率化が可能となる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 導通損失 ② ＲＣフィルタ ③ ＰＷＭ ④ ヒステリシス損\n⑤ 変圧器 ⑥ ＬＣフィルタ ⑦ シース損 ⑧ ゲートブロック\n⑨ 変流器 ⑩ ＰＩＤ ⑪ 誘電体損 ⑫ フィードバック\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n受電システムに用いられる変圧器の種類と特徴について述べた次の文章のうち、正しいもの\nは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 外鉄形変圧器は巻線の内部に単一の磁気回路を有し、内鉄形変圧器は巻線の周囲\nに複数の磁気回路を有している。外鉄形変圧器は内鉄形変圧器と比較して、一般に、\n銅損が小さいことから低圧用の変圧器に適している。\n② 油入変圧器は、巻線の絶縁と冷却に絶縁油を使用していることから、乾式変圧器\nと異なり、一般に、変圧器を長期間使用した場合でも、絶縁性能がほとんど低下し\nない。\n③ 乾式変圧器の一種であるモールド変圧器は、巻線の絶縁材料としてエポキシ樹脂\nなどが用いられているため、難燃性に優れている。\n④ 三相変圧器は、１台の変圧器で三相変圧を行う変圧器である。三相変圧器は、単\n相変圧器３台を１組として使用した場合と比較して、単位容量当たりの床面積は大\nきいが、一般に、高圧側の接続工事が容易である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n高圧受電設備に設置される継電器及び計器用変流器の特徴などについて述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 過電流継電器は、一般に、電源から負荷に至るまでの間に複数台設置されており、\n過電流継電器の動作時間を負荷側に近いものほど長く設定することにより、事故回\n路だけを選択して遮断できる。\n② 地絡方向継電器は、零相電流と零相電圧の大きさ及びその間の位相を判別して動\n作している。\n③ 高圧受電盤に使用する電流を検出するための計器用変流器においては、一次側の\n電流が流れているときに二次側の回路を開くと過大な電圧が生じ、二次側回路の絶\n縁破壊が起きるおそれがある。このため、計器用変流器の二次側回路は開放しない。\n④ 過電流継電器を整定する際には、変圧器、コンデンサなどからの突入電流により\n誤動作しないように考慮する必要がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n太陽光発電システムの特性、機能などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 蓄電池とセットで設置される太陽光発電システムは、日照が強いときに蓄電池を\n過充電するのを防止するための過充電防止機能や、日照が弱いときに蓄電池から太\n陽電池素子に電流が逆流するのを防止するための電流逆流防止機能を有している。\n② 通信用電源などに用いられる直流供給システムと連系する太陽光発電システムで\nは、一般に、昼間に商用電源が停電した場合、太陽光エネルギーを利用してデマン\nド制御装置を運転することによって通信用電源をバックアップし、通信システム用\n蓄電池の放電量を抑制することができる。\n③ 太陽電池アレイは、複数の太陽電池モジュールを直並列に組み合わせて太陽光発\n電システムとして必要な電圧及び電力を得られるように構成される。\n④ 太陽電池素子は、周囲環境温度が－２０ ℃ ～４０ ℃ の範囲内では、一般に、\n温度が上昇すると出力が低下する特性を有している。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＵＰＳの高効率化などについて述べたものである。 内の(ア)～(ウ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号\nは、同じ解答を示す。 (２点×３＝６点)\n大規模データセンタの整備及び普及に伴い、ＵＰＳの高効率化、小型化などのニーズが高\nまっている。これらのニーズに対応するために、ＵＰＳ内部の主要な電力変換部であるインバー\nタ回路においては、ＩＧＢＴを用いた (ア) 制御方式が主流となっている。また、\n(ア) 制御において、出力電圧を多段階で制御するマルチレベルインバータを採用するこ\nとにより、出力電圧を２段階で制御する２レベルインバータと比較して、スイッチング損失を\n低減でき、より高効率化が可能となる。さらに、出力波形が正弦波に近いことから (イ)\nを小さくすることができ、小型化も可能となる。\nまた、ＳｉＣ(シリコンカーバイド)を用いたパワーモジュールを用いることにより、従来か\nらのＳｉを用いたパワーモジュールと比較して、半導体デバイスの (ウ) が小さく、スイッ\nチング損失が低減できることからより高効率化が可能となる。\n<(ア)～(ウ)の解答群>\n① 導通損失 ② ＲＣフィルタ ③ ＰＷＭ ④ ヒステリシス損\n⑤ 変圧器 ⑥ ＬＣフィルタ ⑦ シース損 ⑧ ゲートブロック\n⑨ 変流器 ⑩ ＰＩＤ ⑪ 誘電体損 ⑫ フィードバック\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n受電システムに用いられる変圧器の種類と特徴について述べた次の文章のうち、正しいもの\nは、 (エ) である。\n<(エ)の解答群>\n① 外鉄形変圧器は巻線の内部に単一の磁気回路を有し、内鉄形変圧器は巻線の周囲\nに複数の磁気回路を有
