している。外鉄形変圧器は内鉄形変圧器と比較して、一般に、\n銅損が小さいことから低圧用の変圧器に適している。\n② 油入変圧器は、巻線の絶縁と冷却に絶縁油を使用していることから、乾式変圧器\nと異なり、一般に、変圧器を長期間使用した場合でも、絶縁性能がほとんど低下し\nない。\n③ 乾式変圧器の一種であるモールド変圧器は、巻線の絶縁材料としてエポキシ樹脂\nなどが用いられているため、難燃性に優れている。\n④ 三相変圧器は、１台の変圧器で三相変圧を行う変圧器である。三相変圧器は、単\n相変圧器３台を１組として使用した場合と比較して、単位容量当たりの床面積は大\nきいが、一般に、高圧側の接続工事が容易である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n高圧受電設備に設置される継電器及び計器用変流器の特徴などについて述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 過電流継電器は、一般に、電源から負荷に至るまでの間に複数台設置されており、\n過電流継電器の動作時間を負荷側に近いものほど長く設定することにより、事故回\n路だけを選択して遮断できる。\n② 地絡方向継電器は、零相電流と零相電圧の大きさ及びその間の位相を判別して動\n作している。\n③ 高圧受電盤に使用する電流を検出するための計器用変流器においては、一次側の\n電流が流れているときに二次側の回路を開くと過大な電圧が生じ、二次側回路の絶\n縁破壊が起きるおそれがある。このため、計器用変流器の二次側回路は開放しない。\n④ 過電流継電器を整定する際には、変圧器、コンデンサなどからの突入電流により\n誤動作しないように考慮する必要がある。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n太陽光発電システムの特性、機能などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① 蓄電池とセットで設置される太陽光発電システムは、日照が強いときに蓄電池を\n過充電するのを防止するための過充電防止機能や、日照が弱いときに蓄電池から太\n陽電池素子に電流が逆流するのを防止するための電流逆流防止機能を有している。\n② 通信用電源などに用いられる直流供給システムと連系する太陽光発電システムで\nは、一般に、昼間に商用電源が停電した場合、太陽光エネルギーを利用してデマン\nド制御装置を運転することによって通信用電源をバックアップし、通信システム用\n蓄電池の放電量を抑制することができる。\n③ 太陽電池アレイは、複数の太陽電池モジュールを直並列に組み合わせて太陽光発\n電システムとして必要な電圧及び電力を得られるように構成される。\n④ 太陽電池素子は、周囲環境温度が－２０ ℃ ～４０ ℃ の範囲内では、一般に、\n温度が上昇すると出力が低下する特性を有している。"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、受配電設備における受電設備及び配電方式の概要について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n６００ Ｖ を超え (ア) Ｖ 以下の交流電圧は高圧といわれ、高圧受電設備において高\n圧から低圧に変成する場合には、変圧器の高圧側と低圧側の混触による低圧側の (イ) を\n防止するために、一般に、低圧側の電圧線１線又は中性点が接地される。\n低圧配電線に用いられる配電方式には、単相２線式、単相３線式、三相３線式、三相４線式\nなどがある。電圧線１線を接地した場合の三相３線式２００Ｖ方式では、各電圧線の線間電圧\n及び (ウ) がともに２００ Ｖ であり、中性線を接地した三相４線式２４０／４１５Ｖ方\n式では、各電圧線の線間電圧が４１５ Ｖ 、 (ウ) が２４０ Ｖ であり、いずれも動力用\n幹線などで用いられる。電灯やコンセント用に１００ Ｖ が必要な場合には、別途低圧単相変\n圧器が用いられる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ６,０００ ② ６,６００ ③ ７,０００ ④ １０,０００\n⑤ 地 絡 ⑥ 対地電圧 ⑦ 電流増加 ⑧ 逆相電圧\n⑨ 相電圧 ⑩ 電圧上昇 ⑪ 正相電圧 ⑫ フラッシオーバ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n交流電源装置の給電方式の種類と特徴について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 常時インバータ給電方式のうち、商用同期方式では、インバータを商用電源と同\n期をとって運転しながら負荷へ給電し、インバータの故障時は商用バイパス回路か\nらの給電に切り換えて負荷への給電を継続する。\n② 常時商用給電方式のうち、インバータ運転待機方式では、インバータを商用電源\nと同期をとって無負荷で運転しながら商用バイパス回路から負荷へ給電し、商用電\n源停電時はインバータに切り換えて負荷への給電を継続する。\n③ 常時商用給電方式のうち、インバータ停止待機方式では、インバータを停止して\nおき商用バイパス回路から負荷へ給電し、商用電源停電時はインバータを起動して\n負荷へ給電する。\n④ 常時商用給電方式のうち、並列給電方式では、インバータと商用電源が非同期で\n独立に負荷へ給電し、片方が給電できなくなった場合は残る片方が全負荷へ給電す\nる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける雷害対策について述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 外部雷保護システムは、一般に、雷撃を受けるための受雷部システム、雷電流を\n大地へ流し拡散させるための接地システム、及び雷電流を受雷部システムから接地\nシステムへ流すための引下げ導線システムで構成され、雷サージが建築物の内部へ\n侵入するのを防止する。\n② サージ防護デバイス(ＳＰＤ)は、雷サージが印加されると非線形素子の効果によ\nりインピーダンスが上昇し、雷サージ電流を遮断する。\n③ 電源線、通信線、接地線などから侵入する雷サージにより電気設備の絶縁破壊を\n発生させないようにするには、一般に、等電位ボンディングが有効である。\n④ 耐雷トランスは、入力側巻線と出力側巻線との間のシールド板を接地して、入出\n力間の雷サージの侵入を抑制する。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける自家用発電設備について述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 契約電力の削減を目的としたピークカット運転用の電源として、一般に、非常用の自家用\n発電設備が用いられる。\nＢ 大規模な通信ビルにおける事業用電気通信設備に対する停電対策として、一般に、短時間\nのエネルギー源として蓄電池が用いられ、長時間のエネルギー源として常用の自家用発電設\n備が用いられる。\nＣ 常用の自家用発電設備の一つにコージェネレーションシステム(ＣＧＳ)があり、ＣＧＳで\nはガスタービン機関、ディーゼル機関などにより発電するとともに、その際に発生する廃熱\nを冷暖房、給湯などに活用することができる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、受配電設備における受電設備及び配電方式の概要について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\n６００ Ｖ を超え (ア) Ｖ 以下の交流電圧は高圧といわれ、高圧受電設備において高\n圧から低圧に変成する場合には、変圧器の高圧側と低圧側の混触による低圧側の (イ) を\n防止するために、一般に、低圧側の電圧線１線又は中性点が接地される。\n低圧配電線に用いられる配電方式には、単相２線式、単相３線式、三相３線式、三相４線式\nなどがある。電圧線１線を接地した場合の三相３線式２００Ｖ方式では、各電圧線の線間電圧\n及び (ウ) がともに２００ Ｖ であり、中性線を接地した三相４線式２４０／４１５Ｖ方\n式では、各電圧線の線間電圧が４１５ Ｖ 、 (ウ) が２４０ Ｖ であり、いずれも動力用\n幹線などで用いられる。電灯やコンセント用に１００ Ｖ が必要な場合には、別途低圧単相変\n圧器が用いられる。\n<(ア)～(ウ)の解答群>\n① ６,０００ ② ６,６００ ③ ７,０００ ④ １０,０００\n⑤ 地 絡 ⑥ 対地電圧 ⑦ 電流増加 ⑧ 逆相電圧\n⑨ 相電圧 ⑩ 電圧上昇 ⑪ 正相電圧 ⑫ フラッシオーバ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n交流電源装置の給電方式の種類と特徴について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① 常時インバータ給電方式のうち、商用同期方式では、インバータを商用電源と同\n期をとって運転しながら負荷へ給電し、インバータの故障時は商用バイパス回路か\nらの給電に切り換えて負荷への給電を継続する。\n② 常時商用給電方式のうち、インバータ運転待機方式では、インバータを商用電源\nと同期をとって無負荷で運転しながら商用バイパス回路から負荷へ給電し、商用電\n源停電時はインバータに切り換えて負荷への給電を継続する。\n③ 常時商用給電方式のうち、インバータ停止待機方式では、インバータを停止して\nおき商用バイパス回路から負荷へ給電し、商用電源停電時はインバータを起動して\n負荷へ給電する。\n④ 常時商用給電方式のうち、並列給電方式では、インバータと商用電源が非同期で\n独立に負荷へ給電し、片方が給電できなくなった場合は残る片方が全負荷へ給電す\nる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける雷害対策について述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<(オ)の解答群>\n① 外部雷保護システムは、一般に、雷撃を受けるための受雷部システム、雷電流を\n大地へ流し拡散させるための接地システム、及び雷電流を受雷部システムから接地\nシステムへ流すための引下げ導線システムで構成され、雷サージが建築物の内部へ\n侵入するのを防止する。\n② サージ防護デバイス(ＳＰＤ)は、雷サージが印加されると非線形素子の効果によ\nりインピーダンスが上昇し、雷サージ電流を遮断する。\n③ 電源線、通信線、接地線などから侵入する雷サージにより電気設備の絶縁破壊を\n発生させないようにするには、一般に、等電位ボンディングが有効である。\n④ 耐雷トランスは、入力側巻線と出力側巻線との間のシールド板を接地して、入出\n力間の雷サージの侵入を抑制する。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける自家用発電設備について述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 契約電力の削減を目的としたピークカット運転用の電源として、一般に、非常用の自家用\n発電設備が用いられる。\nＢ 大規模な通信ビルにおける事業用電気通信設備に対する停電対策として、一般に、短時間\nのエネルギー源として蓄電池が用いられ、長時間のエネルギー源として常用の自家用発電設\n備が用いられる。\nＣ 常用の自家用発電設備の一つにコージェネレーションシステム(ＣＧＳ)があり、ＣＧＳで\nはガスタービン機関、ディーゼル機関などにより発電するとともに、その際に発生する廃熱\nを冷暖房、給湯などに活用することができる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、通信用電源設備における交流電源装置による給電などについて述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(２点×３＝６点)\n通信用の交流電源装置は、入力の商用電源の異常に対して出力の電圧変動、周波数変動など\nを抑制し、通信システムに安定した交流電力を供給することが求められる。\n商用電源の異常を引き起こす事故・故障のうちで頻度が最も高いものは、電力会社などの送\n配電線への落雷による地絡や相間の (ア) によって生ずる瞬時電圧低下である。その継続\n時間は、電力会社などの送配電線における高速遮断・再閉路の切替時間に影響され、その長さ\nは、一般に、 (イ) とされている。この値は、受電点における電源品質に直接影響するも\nのであり、需要家の受電設備や負荷設備の設計・保守・運用に当たって十分に考慮する必要が\nある。そのため、通信ビルにおける交流電源装置では、商用電源の停電、瞬時停電、電圧異常\nなどに対しても通信システムの運転を無瞬断で継続できるようにＵＰＳを常に運転している。\nＵＰＳを用いた給電方式は、常時インバータ給電方式、常時商用給電方式などに分類される。\n常時インバータ給電方式には、平常時はインバータを運転しながら負荷設備へ給電し、イン\nバータ故障時は商用バイパス回路からの給電に切り換えて負荷設備への給電を継続する\n(ウ) 方式がある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\nせん\n① 閃 絡 ② 逆閃絡 ③ 直流スイッチ ④ 独立運転\n⑤ 商用同期 ⑥ 誘導障害 ⑦ 並列供給 ⑧ 短 絡\n⑨ ０.０１秒未満 ⑩ ０.０１秒～０.０３秒程度\n⑪ ０.０５秒～２秒程度 ⑫ ５秒～１０秒程度\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルに設置される発電装置に用いられるディーゼル機関とガスタービン機関の特徴など\nについて述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ ディーゼル機関には水冷式と空冷式があるが、ガスタービン機関は、専ら空冷式であり、\n運転に冷却水を必要としない。\nＢ 電気始動方式のディーゼル機関では、４８ Ｖ の通信システム用蓄電池をディーゼル機関\n始動用蓄電池として共用している。\nＣ ガスタービン機関は、ディーゼル機関と比較して、一般に、運転時の振動が小さく、建物\nの屋上や高層階にも設置が可能である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける直流給電方式について述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 直流給電方式は、商用電源の交流電力を直流電力に変換する整流装置、蓄電池、\n直流給電電圧を負荷の要求する規格に補償する負荷電圧補償装置などを用いて直流\n電力を供給する。\n② 直流給電方式は、直流電力の電圧値のみの調整により整流装置の並列運転が可能\nであることなどから、電力変換段数が多く複雑な制御を要する交流給電方式と比較\nして、一般に、電力供給に対する信頼性が高い。\n③ 高電圧直流(ＨＶＤＣ)給電方式は、従来の－４８ Ｖ 直流給電方式と比較して\n給電電圧が高くなるため、電流増大効果により電流ケーブル本数の増加やケーブル\nの太径化が必要となる。\n④ 直流給電方式で用いられる整流装置は、大きな直流出力を得るために複数の整流器\nユニットで構成して並列運転を行う。整流器ユニット台数は、本来必要な負荷電流\nに加え蓄電池の充電に必要な電流を合わせた所要電流を満たせる容量の台数を有し\nなければならない。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける受電設備などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 高圧で受電する通信ビルでは、自ビル内の事故が他需要家に影響を与えること及\nび他需要家の事故の影響を受けることを防止するために、自ビル内に施設される保\n護装置と電気事業者の配電用変電所内に施設される保護装置との間で保護協調を保\nつ必要がある。\n② 高圧受電装置の保護継電器には、短絡事故発生時に生ずる過大電流や過大電圧を\n検出するための過電流継電器や過電圧継電器、地絡事故発生時に生ずる零相地絡電\n流を検出するための地絡継電器などがある。\n③ 遮断器は、消弧媒質の違いにより、ガス遮断器、空気遮断器、油遮断器などに分\n類され、ガス遮断器では、消弧媒質として、一般に、アルゴンガスやフレオンガス\nが用いられる。\n④ 受電電圧には、交流６００ Ｖ 以下の低圧、交流６００ Ｖ を超え７,０００ Ｖ\n以下の高圧及び７,０００ Ｖ を超える特別高圧の区分がある。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、通信用電源設備における交流電源装置による給電などについて述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(２点×３＝６点)\n通信用の交流電源装置は、入力の商用電源の異常に対して出力の電圧変動、周波数変動など\nを抑制し、通信システムに安定した交流電力を供給することが求められる。\n商用電源の異常を引き起こす事故・故障のうちで頻度が最も高いものは、電力会社などの送\n配電線への落雷による地絡や相間の (ア) によって生ずる瞬時電圧低下である。その継続\n時間は、電力会社などの送配電線における高速遮断・再閉路の切替時間に影響され、その長さ\nは、一般に、 (イ) とされている。この値は、受電点における電源品質に直接影響するも\nのであり、需要家の受電設備や負荷設備の設計・保守・運用に当たって十分に考慮する必要が\nある。そのため、通信ビルにおける交流電源装置では、商用電源の停電、瞬時停電、電圧異常\nなどに対しても通信システムの運転を無瞬断で継続できるようにＵＰＳを常に運転している。\nＵＰＳを用いた給電方式は、常時インバータ給電方式、常時商用給電方式などに分類される。\n常時インバータ給電方式には、平常時はインバータを運転しながら負荷設備へ給電し、イン\nバータ故障時は商用バイパス回路からの給電に切り換えて負荷設備への給電を継続する\n(ウ) 方式がある。\n<(ア)～(ウ)の解答群>\nせん\n① 閃 絡 ② 逆閃絡 ③ 直流スイッチ ④ 独立運転\n⑤ 商用同期 ⑥ 誘導障害 ⑦ 並列供給 ⑧ 短 絡\n⑨ ０.０１秒未満 ⑩ ０.０１秒～０.０３秒程度\n⑪ ０.０５秒～２秒程度 ⑫ ５秒～１０秒程度\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルに設置される発電装置に用いられるディーゼル機関とガスタービン機関の特徴など\nについて述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ ディーゼル機関には水冷式と空冷式があるが、ガスタービン機関は、専ら空冷式であり、\n運転に冷却水を必要としない。\nＢ 電気始動方式のディーゼル機関では、４８ Ｖ の通信システム用蓄電池をディーゼル機関\n始動用蓄電池として共用している。\nＣ ガスタービン機関は、ディーゼル機関と比較して、一般に、運転時の振動が小さく、建物\nの屋上や高層階にも設置が可能である。\n<(エ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける直流給電方式について述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 直流給電方式は、商用電源の交流電力を直流電力に変換する整流装置、蓄電池、\n直流給電電圧を負荷の要求する規格に補償する負荷電圧補償装置などを用いて直流\n電力を供給する。\n② 直流給電方式は、直流電力の電圧値のみの調整により整流装置の並列運転が可能\nであることなどから、電力変換段数が多く複雑な制御を要する交流給電方式と比較\nして、一般に、電力供給に対する信頼性が高い。\n③ 高電圧直流(ＨＶＤＣ)給電方式は、従来の－４８ Ｖ 直流給電方式と比較して\n給電電圧が高くなるため、電流増大効果により電流ケーブル本数の増加やケーブル\nの太径化が必要となる。\n④ 直流給電方式で用いられる整流装置は、大きな直流出力を得るために複数の整流器\nユニットで構成して並列運転を行う。整流器ユニット台数は、本来必要な負荷電流\nに加え蓄電池の充電に必要な電流を合わせた所要電流を満たせる容量の台数を有し\nなければならない。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける受電設備などについて述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① 高圧で受電する通信ビルでは、自ビル内の事故が他需要家に影響を与えること及\nび他需要家の事故の影響を受けることを防止するために、自ビル内に施設される保\n護装置と電気事業者の配電用変電所内に施設される保護装置との間で保護協調を保\nつ必要がある。\n② 高圧受電装置の保護継電器には、短絡事故発生時に生ずる過大電流や過大電圧を\n検出するための過電流継電器や過電圧継電器、地絡事故発生時に生ずる零相地絡電\n流を検出するための地絡継電器などがある。\n③ 遮断器は、消弧媒質の違いにより、ガス遮断器、空気遮断器、油遮断器などに分\n類され、ガス遮断器では、消弧媒質として、一般に、アルゴンガスやフレオンガス\nが用いられる。\n④ 受電電圧には、交流６００ Ｖ 以下の低圧、交流６００ Ｖ を超え７,０００ Ｖ\n以下の高圧及び７,０００ Ｖ を超える特別高圧の区分がある。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問４ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、受電設備の概要について述べたものである。 内の(ア)～(ウ)に最も適</p>\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\n通信用電源として商用電源を利用する場合の受電設備には、電圧の変換、電力の負荷系統へ\nの分配、需要家構内や他需要家との間の事故波及防止などの機能が必要である。\n電圧は、法令上、交流の場合６００ Ｖ 以下の低圧、６００ Ｖ を超え (ア) Ｖ 以下\nの高圧及び (ア) Ｖ を超える特別高圧に区分されている。また、電気事業者との契約電\n力により定まる受電電圧は、低圧受電、高圧受電及び特別高圧受電に分類されており、契約電\n力が１,０００ ｋＷ 程度の場合には、一般に、高圧受電となる。\n高圧受電設備は、一般に、断路器や遮断器などの電力開閉装置、三相変圧器などの変成器、\n力率改善のための (イ) 、各受電装置を保護するための保護継電器などで構成される。\nまた、受電線の引込経路として地下引込方式を採用した場合は、他需要家への波及事故の防止\nなどを目的に、地中線用高圧負荷開閉器である (ウ) を設置することになるため、その設\n置場所、設置方法、機器容量などについて電気事業者との協議により決定する必要がある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ６,０００ ② ６,６００ ③ ７,０００ ④ ７,５００\n⑤ ＵＧＳ ⑥ ＬＢＳ ⑦ ＰＡＳ ⑧ ＶＣＢ\n⑨ 進相コンデンサ ⑩ デマンド制御装置\n⑪ パワーコンディショナ ⑫ スイッチングレギュレータ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n二次電池の種類、特徴などについて述べた次の文章のうち、誤っているものは、 (エ)\nである。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① シール鉛蓄電池は、蓄電池内部で発生する酸素ガスを負極で電気化学的に反応さ\nせて元の水に戻す機能により完全密閉化が可能であるため、液式鉛蓄電池と異なり、\n補水及び比重測定の定期作業が不要である。\n② ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較\nして、エネルギー密度が高く、放電時の電圧変動が小さい。\n③ リチウムイオン電池は、負極にリチウムイオンを吸蔵した炭素材料を用いており、\nニッケル水素電池と比較して、エネルギー密度は高いが、作動電圧は低い。\n④ ナトリウム硫黄電池は、固体電解質であるベータアルミナを用いて３００ ℃\n程度の高温で動作しており、電力負荷の平準化や再生可能エネルギーの安定化に利\n用されている。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコージェネレーションシステム(ＣＧＳ)について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＧＳは、発電を行うための原動機と発電機、原動機からの排熱を回収するための排熱回\n収装置、回収した排熱を冷暖房などに利用するための排熱利用機器などで構成され、一つの\nエネルギー資源から電力及び有効な熱を同時に発生させ利用することにより、エネルギーの\n利用効率を高めている。\nＢ ＣＧＳの運転形態には、建物の電力需要に応じて原動機と発電機を運転して必要な電力を\n確保し、回収した排熱の不足分を補助熱源で補う熱主電従運転方式と、建物の熱需要に応じ\nて原動機と発電機を運転して必要な排熱を確保し、発生する電力の不足分を商用電力などで\n補う電主熱従運転方式がある。\nＣ ＣＧＳの配電システムには系統連系方式と系統分離方式があり、発電機と系統電力を同期\nさせ並列運転を行う系統連系方式では、発電設備の検査・補修又は事故の際に生ずる不足電\n力を補塡するため、電気事業者と電力需給契約に加えて自家発補給電力契約の締結が必要と\nなる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信ビルにおける災害対策用に配備される移動電源車などについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 自然災害などによる商用電源の長時間又は広域での停電に対しては、移動電源車\nや可搬型ディーゼルエンジン発電装置を地域ごとに配備する対策が採られている。\n② 予備エネルギー源が蓄電池のみである小規模通信設備に対しては、蓄電池の保持\n時間を超える長時間停電に対処するため、可搬型蓄電池を地域ごとに配備する対策\nが採られている。\n③ 地震や浸水による通信ビルの受配電装置の被災に対しては、整流装置などの電力\n変換装置や蓄電池を実装して、電力を通信設備に直接供給することが可能な可搬型\n電源装置を配備する対策が採られている。\n④ 移動電源車や可搬型ディーゼルエンジン発電装置は、通信ビルに設置されている\nエンジン発電装置や受配電装置のメンテナンス時にもバックアップ電源として利用\nされている。", "raw": "問４ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、受電設備の概要について述べたものである。 内の(ア)～(ウ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\n通信用電源として商用電源を利用する場合の受電設備には、電圧の変換、電力の負荷系統へ\nの分配、需要家構内や他需要家との間の事故波及防止などの機能が必要である。\n電圧は、法令上、交流の場合６００ Ｖ 以下の低圧、６００ Ｖ を超え (ア) Ｖ 以下\nの高圧及び (ア) Ｖ を超える特別高圧に区分されている。また、電気事業者との契約電\n力により定まる受電電圧は、低圧受電、高圧受電及び特別高圧受電に分類されており、契約電\n力が１,０００ ｋＷ 程度の場合には、一般に、高圧受電となる。\n高圧受電設備は、一般に、断路器や遮断器などの電力開閉装置、三相変圧器などの変成器、\n力率改善のための (イ) 、各受電装置を保護するための保護継電器などで構成される。\nまた、受電線の引込経路として地下引込方式を採用した場合は、他需要家への波及事故の防止\nなどを目的に、地中線用高圧負荷開閉器である (ウ) を設置することになるため、その設\n置場所、設置方法、機器容量などについて電気事業者との協議により決定する必要がある。\n<(ア)～(ウ)の解答群>\n① ６,０００ ② ６,６００ ③ ７,０００ ④ ７,５００\n⑤ ＵＧＳ ⑥ ＬＢＳ ⑦ ＰＡＳ ⑧ ＶＣＢ\n⑨ 進相コンデンサ ⑩ デマンド制御装置\n⑪ パワーコンディショナ ⑫ スイッチングレギュレータ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n二次電池の種類、特徴などについて述べた次の文章のうち、誤っているものは、 (エ)\nである。\n<(エ)の解答群>\n① シール鉛蓄電池は、蓄電池内部で発生する酸素ガスを負極で電気化学的に反応さ\nせて元の水に戻す機能により完全密閉化が可能であるため、液式鉛蓄電池と異なり、\n補水及び比重測定の定期作業が不要である。\n② ニッケル水素電池は、負極に水素吸蔵合金を用いており、シール鉛蓄電池と比較\nして、エネルギー密度が高く、放電時の電圧変動が小さい。\n③ リチウムイオン電池は、負極にリチウムイオンを吸蔵した炭素材料を用いており、\nニッケル水素電池と比較して、エネルギー密度は高いが、作動電圧は低い。\n④ ナトリウム硫黄電池は、固体電解質であるベータアルミナを用いて３００ ℃\n程度の高温で動作しており、電力負荷の平準化や再生可能エネルギーの安定化に利\n用されている。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコージェネレーションシステム(ＣＧＳ)について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＧＳは、発電を行うための原動機と発電機、原動機からの排熱を回収するための排熱回\n収装置、回収した排熱を冷暖房などに利用するための排熱利用機器などで構成され、一つの\nエネルギー資源から電力及び有効な熱を同時に発生させ利用することにより、エネルギーの\n利用効率を高めている。\nＢ ＣＧＳの運転形態には、建物の電力需要に応じて原動機と発電機を運転して必要な電力を\n確保し、回収した排熱の不足分を補助熱源で補う熱主電従運転方式と、建物の熱需要に応じ\nて原動機と発電機を運転して必要な排熱を確保し、発生する電力の不足分を商用電力などで\n補う電主熱従運転方式がある。\nＣ ＣＧＳの配電システムには系統連系方式と系統分離方式があり、発電機と系統電力を同期\nさせ並列運転を行う系統連系方式では、発電設備の検査・補修又は事故の際に生ずる不足電\n力を補塡するため、電気事業者と電力需給契約に加えて自家発補給電力契約の締結が必要と\nなる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信ビルにおける災害対策用に配備される移動電源車などについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 自然災害などによる商用電源の長時間又は広域での停電に対しては、移動電源車\nや可搬型ディーゼルエンジン発電装置を地域ごとに配備する対策が採られている。\n② 予備エネルギー源が蓄電池のみである小規模通信設備に対しては、蓄電池の保持\n時間を超える長時間停電に対処するため、可搬型蓄電池を地域ごとに配備する対策\nが採られている。\n③ 地震や浸水による通信ビルの受配電装置の被災に対しては、整流装置などの電力\n変換装置や蓄電池を実装して、電力を通信設備に直接供給することが可能な可搬型\n電源装置を配備する対策が採られている。\n④ 移動電源車や可搬型ディーゼルエンジン発電装置は、通信ビルに設置されている\nエンジン発電装置や受配電装置のメンテナンス時にもバックアップ電源として利用\nされている。"}], "5": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、オペレーティングシステム(ＯＳ)の概要について述べたものである。 内</p>\nの(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nソフトウェアには、コンピュータを効率的かつ容易に使えることを目的とするシステムソフ\nトウェアと、利用目的ごとに内容の異なるアプリケーションソフトウェアがある。このうちシ\nステムソフトウェアは、一般に、広義の意味でのＯＳである基本ソフトウェアとミドルウェア\nに分けられ、さらに、基本ソフトウェアは、狭義の意味でのＯＳである (ア) 、言語処理\nプログラム及びユーティリティに分けることができる。\n(ア) は、コンピュータ上で動作するソフトウェアが効率よく稼働できる環境を作り出\nす役割を担うプログラム群であり、 (イ) 管理、データ管理、記憶管理などのプログラム\nによって構成されている。\n(イ) 管理では、プログラムを実行するＣＰＵ側からみた処理単位である (イ) が\n複数存在するときに、ＣＰＵ時間を割り当てる順番を管理することができる。\nデータ管理では、磁気ディスクなどのボリュームやファイルの識別と保護のために、ボリュー\nムの先頭やデータセットの前後に (ウ) といわれる情報が付与される。\n記憶管理では、記憶領域を有効活用するとともに、主記憶装置の限られた容量の制約を補う\n機能などを管理することができる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ジョブ ② コンパイラ ③ サービスプログラム ④ ラベル\n⑤ ファイル ⑥ セグメント ⑦ ソースプログラム ⑧ キュー\n⑨ チャネル ⑩ プリアンブル ⑪ 制御プログラム ⑫ タスク\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバのストレージなどについて述べた次の文章のうち、誤っているものは、 (エ) で\nある。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＤＡＳ(Direct Attached Storage)では、一つのストレージ装置は一つのサーバ\nに直接接続されて占有される。\n② ＮＡＳ(Network Attached Storage)は、ＮＦＳ(Network File System)などのプ\nロトコルを用いており、サーバ間でのファイルの共有が可能である。\n③ ＳＡＮ(Storage Area Network)は、ストレージアクセスのために用いられる専用\nのネットワークである。\n④ ＳＡＮのうち、サーバとストレージ装置の接続がイーサネットスイッチを介して\n行われるものは、ＦＣ－ＳＡＮといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバの仮想化について述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① サーバの仮想化は、１台の物理サーバで複数のＯＳの動作環境を実現する技術\nであり、サーバ統合による物理サーバの集約、ＯＳの動作環境構築のリードタイ\nムの短縮などが可能とされている。\n② 仮想マシンモニタといわれるソフトウェアを物理サーバのＯＳ上で動作させて、\nその仮想マシンモニタ上でゲストＯＳを動作させる方式は、一般に、ホストＯＳ\n型といわれる。\n③ ハイパーバイザといわれるソフトウェアを物理サーバ上で直接動作させて、そ\nのハイパーバイザ上でゲストＯＳを動作させる方式は、一般に、ハイパーバイザ\n型といわれる。\n④ ホストＯＳ型では、ゲストＯＳがハードウェアにアクセスする際、直接ハード\nウェアを制御するため、処理に要するオーバヘッドはハイパーバイザ型と比較し\nて小さくなる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＳＤＮ(Software Defined Networking)について述べた次の文章のうち、正しいものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)\nにおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能が統合され、プロ\nグラムによりネットワークの制御が実現できるネットワークとされている。\n② ＯＮＦにおいて、ＯｐｅｎＦｌｏｗはＳＤＮにおける基盤要素の一つとされて\nおり、ＯｐｅｎＦｌｏｗプロトコルは、一般に、ＯｐｅｎＦｌｏｗコントローラと\nアプリケーションサーバ間の通信に用いられるプロトコルとされている。\n③ ＯｐｅｎＦｌｏｗスイッチは、一般に、ＯｐｅｎＦｌｏｗコントローラから受\nけ取った経路情報に基づいて、自身のフローテーブル内にデータ転送処理ルール\nを追加、修正及び削除することが可能である。\n④ ＳＤＮのアーキテクチャにおいて、アプリケーションレイヤと制御レイヤとの\n間のＡＰＩは、一般に、サウスバウンドＡＰＩといわれる。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、オペレーティングシステム(ＯＳ)の概要について述べたものである。 内\nの(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nソフトウェアには、コンピュータを効率的かつ容易に使えることを目的とするシステムソフ\nトウェアと、利用目的ごとに内容の異なるアプリケーションソフトウェアがある。このうちシ\nステムソフトウェアは、一般に、広義の意味でのＯＳである基本ソフトウェアとミドルウェア\nに分けられ、さらに、基本ソフトウェアは、狭義の意味でのＯＳである (ア) 、言語処理\nプログラム及びユーティリティに分けることができる。\n(ア) は、コンピュータ上で動作するソフトウェアが効率よく稼働できる環境を作り出\nす役割を担うプログラム群であり、 (イ) 管理、データ管理、記憶管理などのプログラム\nによって構成されている。\n(イ) 管理では、プログラムを実行するＣＰＵ側からみた処理単位である (イ) が\n複数存在するときに、ＣＰＵ時間を割り当てる順番を管理することができる。\nデータ管理では、磁気ディスクなどのボリュームやファイルの識別と保護のために、ボリュー\nムの先頭やデータセットの前後に (ウ) といわれる情報が付与される。\n記憶管理では、記憶領域を有効活用するとともに、主記憶装置の限られた容量の制約を補う\n機能などを管理することができる。\n<(ア)～(ウ)の解答群>\n① ジョブ ② コンパイラ ③ サービスプログラム ④ ラベル\n⑤ ファイル ⑥ セグメント ⑦ ソースプログラム ⑧ キュー\n⑨ チャネル ⑩ プリアンブル ⑪ 制御プログラム ⑫ タスク\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバのストレージなどについて述べた次の文章のうち、誤っているものは、 (エ) で\nある。\n<(エ)の解答群>\n① ＤＡＳ(Direct Attached Storage)では、一つのストレージ装置は一つのサーバ\nに直接接続されて占有される。\n② ＮＡＳ(Network Attached Storage)は、ＮＦＳ(Network File System)などのプ\nロトコルを用いており、サーバ間でのファイルの共有が可能である。\n③ ＳＡＮ(Storage Area Network)は、ストレージアクセスのために用いられる専用\nのネットワークである。\n④ ＳＡＮのうち、サーバとストレージ装置の接続がイーサネットスイッチを介して\n行われるものは、ＦＣ－ＳＡＮといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバの仮想化について述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① サーバの仮想化は、１台の物理サーバで複数のＯＳの動作環境を実現する技術\nであり、サーバ統合による物理サーバの集約、ＯＳの動作環境構築のリードタイ\nムの短縮などが可能とされている。\n② 仮想マシンモニタといわれるソフトウェアを物理サーバのＯＳ上で動作させて、\nその仮想マシンモニタ上でゲストＯＳを動作させる方式は、一般に、ホストＯＳ\n型といわれる。\n③ ハイパーバイザといわれるソフトウェアを物理サーバ上で直接動作させて、そ\nのハイパーバイザ上でゲストＯＳを動作させる方式は、一般に、ハイパーバイザ\n型といわれる。\n④ ホストＯＳ型では、ゲストＯＳがハードウェアにアクセスする際、直接ハード\nウェアを制御するため、処理に要するオーバヘッドはハイパーバイザ型と比較し\nて小さくなる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＳＤＮ(Software Defined Networking)について述べた次の文章のうち、正しいものは、\n(カ) である。\n<(カ)の解答群>\n① ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)\nにおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能が統合され、プロ\nグラムによりネットワークの制御が実現できるネットワークとされている。\n② ＯＮＦにおいて、ＯｐｅｎＦｌｏｗはＳＤＮにおける基盤要素の一つとされて\nおり、ＯｐｅｎＦｌｏｗプロトコルは、一般に、ＯｐｅｎＦｌｏｗコントローラと\nアプリケーションサーバ間の通信に用いられるプロトコルとされている。\n③ ＯｐｅｎＦｌｏｗスイッチは、一般に、ＯｐｅｎＦｌｏｗコントローラから受\nけ取った経路情報に基づいて、自身のフローテーブル内にデータ転送処理ルール\nを追加、修正及び削除することが可能である。\n④ ＳＤＮのアーキテクチャにおいて、アプリケーションレイヤと制御レイヤとの\n間のＡＰＩは、一般に、サウスバウンドＡＰＩといわれる。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、プログラミング言語の概要について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nプログラムを記述するためのプログラミング言語のうち、自然言語に類似していて、人間の\n考えを表現しやすい言語は、一般に、高水準言語といわれる。\n高水準言語で記述されたプログラムは、そのままではＣＰＵが実行できないため、 (ア)\nにより高水準言語を機械語に変換してから実行する方法や、インタプリタにより高水準言語を\n逐次解釈しながら実行する方法が用いられる。\n高水準言語は、何に注目してプログラムを記述するかによって、手続き型言語、論理型言語、\n．．\n(イ) 言語などに分類できる。 (イ) 言語は、一般に、操作の対象となるものに注目\nしてプログラムを記述するプログラミング言語であり、 (イ) 言語にはＳｍａｌｌｔａｌｋ、\nＪａｖａなどがある。\nまた、プログラミング言語をその使われ方で分類することもでき、簡単なプログラムを手軽\nに記述して実行できるようなプログラミング言語は、一般に、スクリプト言語といわれ、代表\n的な言語にＪａｖａＳｃｒｉｐｔ、 (ウ) などがある。スクリプト言語の多くは高水準言\n語である。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① Ｃ ② アセンブラ ③ ＣＯＢＯＬ ④ 宣言型\n⑤ ＰＨＰ ⑥ オブジェクト指向 ⑦ 命令型 ⑧ コンパイラ\n⑨ 関数型 ⑩ ＦＯＲＴＲＡＮ ⑪ レジスタ ⑫ プロファイラ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n複数のディスク装置をまとめて一つのドライブとして管理する技術であるＲＡＩＤの特徴な\nどについて述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＲＡＩＤ０では、ホストコンピュータからのデータアクセスを並列に処理でき\nるよう、データを複数のディスク装置に分散して配置する。\n② ＲＡＩＤ１では、ミラーリングといわれる手法を用いて、一般に、２台のディ\nスク装置でペアを組み、データを２重化しており、１台のディスク装置が故障し\nた場合、ペアを組むもう１台のディスク装置でデータのリード／ライト処理を継\n続することができる。\n③ ＲＡＩＤ５では、ＲＡＩＤを構成する全ディスク装置にパリティを配置してお\nり、２台のディスク装置が故障した場合であっても、データを失わずリード／ラ\nイト処理を継続できる。\n④ ソフトウェアＲＡＩＤでは、ＲＡＩＤの実装に専用のハードウェアを用いてお\nらず、ＯＳなどのソフトウェアでＲＡＩＤ制御を行っている。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nクラウドサービスの提供形態などについて述べた次の文章のうち、正しいものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① クラウドサービスは、一般に、共有化されたコンピュータリソースについて、利\n用者の要求に応じて適宜・適切に配分し、ネットワークを通じて利用する情報処理\n形態であるリモートバッチ処理によって提供するサービスとされている。\n② クラウドサービスの提供形態のうち、インターネットを介して不特定多数の利用\n者を対象とするものは、コミュニティクラウドといわれる。\n③ クラウド事業者が提供するクラウドサービスのうち、ＰａａＳでは、一般に、ア\nプリケーションの実行環境を構成するサーバのハードウェア、ＯＳ、ミドルウェア\nなどのプラットフォームをクラウドサービスとして利用者に提供している。\n④ ＩａａＳでは、一般に、クラウド事業者がアプリケーションをクラウドサービス\nとして利用者に提供している。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＯｐｅｎＦｌｏｗの特徴などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 宛先ＩＰアドレスや宛先ＭＡＣアドレスに基づいた経路制御が可能であり、送信\n元ＩＰアドレスや送信元ＭＡＣアドレスなどを参照した経路制御も可能である。\n② Ｌ２ＳＷなどの機能がコントロールプレーンとデータプレーンに分離されており、\nコントロールプレーンの機能を持つＯｐｅｎＦｌｏｗコントローラとデータプレーン\nの機能を持つＯｐｅｎＦｌｏｗスイッチからなるアーキテクチャを採用している。\n③ ノースバウンドＡＰＩを実装することにより、外部のアプリケーションソフトウェア\nからＯｐｅｎＦｌｏｗコントローラの監視・制御を行うことができる。\n④ ＯｐｅｎＦｌｏｗによるネットワーク仮想化の実現方式のうち、ＯｐｅｎＦｌｏｗ\nコントローラがネットワーク内の全てのＯｐｅｎＦｌｏｗスイッチを制御するもの\nは、オーバレイ方式といわれる。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、プログラミング言語の概要について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nプログラムを記述するためのプログラミング言語のうち、自然言語に類似していて、人間の\n考えを表現しやすい言語は、一般に、高水準言語といわれる。\n高水準言語で記述されたプログラムは、そのままではＣＰＵが実行できないため、 (ア)\nにより高水準言語を機械語に変換してから実行する方法や、インタプリタにより高水準言語を\n逐次解釈しながら実行する方法が用いられる。\n高水準言語は、何に注目してプログラムを記述するかによって、手続き型言語、論理型言語、\n．．\n(イ) 言語などに分類できる。 (イ) 言語は、一般に、操作の対象となるものに注目\nしてプログラムを記述するプログラミング言語であり、 (イ) 言語にはＳｍａｌｌｔａｌｋ、\nＪａｖａなどがある。\nまた、プログラミング言語をその使われ方で分類することもでき、簡単なプログラムを手軽\nに記述して実行できるようなプログラミング言語は、一般に、スクリプト言語といわれ、代表\n的な言語にＪａｖａＳｃｒｉｐｔ、 (ウ) などがある。スクリプト言語の多くは高水準言\n語である。\n<(ア)～(ウ)の解答群>\n① Ｃ ② アセンブラ ③ ＣＯＢＯＬ ④ 宣言型\n⑤ ＰＨＰ ⑥ オブジェクト指向 ⑦ 命令型 ⑧ コンパイラ\n⑨ 関数型 ⑩ ＦＯＲＴＲＡＮ ⑪ レジスタ ⑫ プロファイラ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n複数のディスク装置をまとめて一つのドライブとして管理する技術であるＲＡＩＤの特徴な\nどについて述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① ＲＡＩＤ０では、ホストコンピュータからのデータアクセスを並列に処理でき\nるよう、データを複数のディスク装置に分散して配置する。\n② ＲＡＩＤ１では、ミラーリングといわれる手法を用いて、一般に、２台のディ\nスク装置でペアを組み、データを２重化しており、１台のディスク装置が故障し\nた場合、ペアを組むもう１台のディスク装置でデータのリード／ライト処理を継\n続することができる。\n③ ＲＡＩＤ５では、ＲＡＩＤを構成する全ディスク装置にパリティを配置してお\nり、２台のディスク装置が故障した場合であっても、データを失わずリード／ラ\nイト処理を継続できる。\n④ ソフトウェアＲＡＩＤでは、ＲＡＩＤの実装に専用のハードウェアを用いてお\nらず、ＯＳなどのソフトウェアでＲＡＩＤ制御を行っている。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nクラウドサービスの提供形態などについて述べた次の文章のうち、正しいものは、 (オ)\nである。\n<(オ)の解答群>\n① クラウドサービスは、一般に、共有化されたコンピュータリソースについて、利\n用者の要求に応じて適宜・適切に配分し、ネットワークを通じて利用する情報処理\n形態であるリモートバッチ処理によって提供するサービスとされている。\n② クラウドサービスの提供形態のうち、インターネットを介して不特定多数の利用\n者を対象とするものは、コミュニティクラウドといわれる。\n③ クラウド事業者が提供するクラウドサービスのうち、ＰａａＳでは、一般に、ア\nプリケーションの実行環境を構成するサーバのハードウェア、ＯＳ、ミドルウェア\nなどのプラットフォームをクラウドサービスとして利用者に提供している。\n④ ＩａａＳでは、一般に、クラウド事業者がアプリケーションをクラウドサービス\nとして利用者に提供している。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＯｐｅｎＦｌｏｗの特徴などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<(カ)の解答群>\n① 宛先ＩＰアドレスや宛先ＭＡＣアドレスに基づいた経路制御が可能であり、送信\n元ＩＰアドレスや送信元ＭＡＣアドレスなどを参照した経路制御も可能である。\n② Ｌ２ＳＷなどの機能がコントロールプレーンとデータプレーンに分離されており、\nコントロールプレーンの機能を持つＯｐｅｎＦｌｏｗコントローラとデータプレーン\nの機能を持つＯｐｅｎＦｌｏｗスイッチからなるアーキテクチャを採用している。\n③ ノースバウンドＡＰＩを実装することにより、外部のアプリケーションソフトウェア\nからＯｐｅｎＦｌｏｗコントローラの監視・制御を行うことができる。\n④ ＯｐｅｎＦｌｏｗによるネットワーク仮想化の実現方式のうち、ＯｐｅｎＦｌｏｗ\nコントローラがネットワーク内の全てのＯｐｅｎＦｌｏｗスイッチを制御するもの\nは、オーバレイ方式といわれる。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、サーバの負荷分散について述べたものである。 内の(ア)～(ウ)に最も</p>\n適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×３＝６点)\n単一のサーバにおける処理能力の限界への対応として、複数のサーバによる負荷分散がある。\n負荷分散を実現する方法としては、一つのホスト名に対し、複数のＩＰアドレスを結びつけ\nることにより、トラヒックの振り分けを行う (ア) がある。 (ア) は、専用装置が不\n要で比較的低コストで負荷分散を実現できる方法であるが、サーバが何らかの原因でダウンし\nていても、それを検知できずに当該サーバにトラヒックが振り分けられてしまうなどのデメ\nリットがある。\n一方、ネットワーク上の負荷分散装置を用いて行う負荷分散では、一般に、負荷分散装置が\nサーバのヘルスチェックを行い、その結果が正常なサーバにだけトラヒックを振り分けるため、\n複数台のサーバのうち１台がダウンしていてもサービスを継続することができる。負荷分散装\n置におけるＨＴＴＰ接続では、 (イ) 情報をもとに特定のクライアントとサーバ間のユー\nザセッションを維持するなど、柔軟なトラヒック分散を可能としている。また、負荷分散装置\nは、ＴＣＰ／ＵＤＰポート番号やＵＲＬによるトラヒック分散を可能とすることから (ウ)\nスイッチやＬ７スイッチともいわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① Ｌ２ ② スレッド ③ ＤＮＳラウンドロビン ④ ＶＩＰ\n⑤ プログラム ⑥ クッキー ⑦ イーサネットフレーム ⑧ Ｌ３\n⑨ ＤＮＳレコード ⑩ Ｌ４ ⑪ ＤＮＳチェンジャー ⑫ ラベル\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデータベースのトランザクション処理について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 複数のユーザが同時にデータベースのデータを変更する場合、あるユーザによる\n変更が他のユーザによる変更に悪影響を与えないようにするための制御機構は、一\n般に、同時実行制御といわれる。\n② トランザクション処理において必要とされるＡＣＩＤ特性のうち、Ａはアクセス\n可能性、Ｃは一貫性を表している。\n③ 複数のトランザクションが複数のデータ資源を交互に処理する場合に、互いに相\n手のデータ資源の解放を永久に待ち続ける状態は、一般に、デッドロックといわれ\nる。\n④ トランザクション障害発生時には、一般に、データベースの更新が一部行われた\n場合でも、更新前ログを用いてロールバックが行われる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① １台のルータで複数のルーティングテーブルを保持することによりＶＰＮを提供\nする場合、一般に、ルータは、自ルータ内に複数の仮想的なルータを設定できる\nＩＰｓｅｃの技術を用いてＶＰＮを実現する。\n② ネットワーク上の全てのスイッチが管理テーブルを保持し、管理テーブルの設定\nに従ってデータを転送することによりＳＤＮ(Software Defined Networking)を構築\nする方式は、オーバレイ方式といわれる。\n③ ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＮＦＶ(Network Functions Virtualization)といわ\nれる。\n④ ＶＸＬＡＮは、ホップバイホップ方式のＳＤＮに用いられる技術の一つである。\nＶＸＬＡＮを用いた仮想ネットワークは、ＶＸＬＡＮに対応したコントローラのみ\nで実現することができ、エッジスイッチは対応しなくてもよい。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバの入出力インタフェースについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ ハードディスク、キーボード、マウス、プリンタなど様々な機器をサーバなどに接続する\nためのインタフェース規格であるＵＳＢ(Universal Serial Bus)は、ＵＳＢハブを用いるこ\nとでサーバ本体の一つのポートに各種機器を複数台接続することができる。\nＢ ストレージ接続用インタフェース規格の一つであるＳＡＴＡ(Serial ATA)は、デイジー\nチェーン接続により一つのポートに複数台のハードディスクを接続することができる。\nＣ サーバとストレージ装置を光ファイバなどを介して接続するためのインタフェース規格\nであるＦＣ(Fibre Channel)を用いて構成するＳＡＮ(Storage Area Network)は、一般に、\nＩＰ－ＳＡＮといわれる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、サーバの負荷分散について述べたものである。 内の(ア)～(ウ)に最も\n適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×３＝６点)\n単一のサーバにおける処理能力の限界への対応として、複数のサーバによる負荷分散がある。\n負荷分散を実現する方法としては、一つのホスト名に対し、複数のＩＰアドレスを結びつけ\nることにより、トラヒックの振り分けを行う (ア) がある。 (ア) は、専用装置が不\n要で比較的低コストで負荷分散を実現できる方法であるが、サーバが何らかの原因でダウンし\nていても、それを検知できずに当該サーバにトラヒックが振り分けられてしまうなどのデメ\nリットがある。\n一方、ネットワーク上の負荷分散装置を用いて行う負荷分散では、一般に、負荷分散装置が\nサーバのヘルスチェックを行い、その結果が正常なサーバにだけトラヒックを振り分けるため、\n複数台のサーバのうち１台がダウンしていてもサービスを継続することができる。負荷分散装\n置におけるＨＴＴＰ接続では、 (イ) 情報をもとに特定のクライアントとサーバ間のユー\nザセッションを維持するなど、柔軟なトラヒック分散を可能としている。また、負荷分散装置\nは、ＴＣＰ／ＵＤＰポート番号やＵＲＬによるトラヒック分散を可能とすることから (ウ)\nスイッチやＬ７スイッチともいわれる。\n<(ア)～(ウ)の解答群>\n① Ｌ２ ② スレッド ③ ＤＮＳラウンドロビン ④ ＶＩＰ\n⑤ プログラム ⑥ クッキー ⑦ イーサネットフレーム ⑧ Ｌ３\n⑨ ＤＮＳレコード ⑩ Ｌ４ ⑪ ＤＮＳチェンジャー ⑫ ラベル\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデータベースのトランザクション処理について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① 複数のユーザが同時にデータベースのデータを変更する場合、あるユーザによる\n変更が他のユーザによる変更に悪影響を与えないようにするための制御機構は、一\n般に、同時実行制御といわれる。\n② トランザクション処理において必要とされるＡＣＩＤ特性のうち、Ａはアクセス\n可能性、Ｃは一貫性を表している。\n③ 複数のトランザクションが複数のデータ資源を交互に処理する場合に、互いに相\n手のデータ資源の解放を永久に待ち続ける状態は、一般に、デッドロックといわれ\nる。\n④ トランザクション障害発生時には、一般に、データベースの更新が一部行われた\n場合でも、更新前ログを用いてロールバックが行われる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (オ)\nである。\n<(オ)の解答群>\n① １台のルータで複数のルーティングテーブルを保持することによりＶＰＮを提供\nする場合、一般に、ルータは、自ルータ内に複数の仮想的なルータを設定できる\nＩＰｓｅｃの技術を用いてＶＰＮを実現する。\n② ネットワーク上の全てのスイッチが管理テーブルを保持し、管理テーブルの設定\nに従ってデータを転送することによりＳＤＮ(Software Defined Networking)を構築\nする方式は、オーバレイ方式といわれる。\n③ ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＮＦＶ(Network Functions Virtualization)といわ\nれる。\n④ ＶＸＬＡＮは、ホップバイホップ方式のＳＤＮに用いられる技術の一つである。\nＶＸＬＡＮを用いた仮想ネットワークは、ＶＸＬＡＮに対応したコントローラのみ\nで実現することができ、エッジスイッチは対応しなくてもよい。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバの入出力インタフェースについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ ハードディスク、キーボード、マウス、プリンタなど様々な機器をサーバなどに接続する\nためのインタフェース規格であるＵＳＢ(Universal Serial Bus)は、ＵＳＢハブを用いるこ\nとでサーバ本体の一つのポートに各種機器を複数台接続することができる。\nＢ ストレージ接続用インタフェース規格の一つであるＳＡＴＡ(Serial ATA)は、デイジー\nチェーン接続により一つのポートに複数台のハードディスクを接続することができる。\nＣ サーバとストレージ装置を光ファイバなどを介して接続するためのインタフェース規格\nであるＦＣ(Fibre Channel)を用いて構成するＳＡＮ(Storage Area Network)は、一般に、\nＩＰ－ＳＡＮといわれる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、コンピュータのＣＰＵの処理効率を高めるための仕組みについて述べたものであ</p>\nる。 内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\nただし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＣＰＵ側からのデータの読み書き速度を速くする目的で、ＣＰＵ内に置く高速の記憶装置は\nキャッシュメモリといわれる。使用頻度の高いデータをキャッシュメモリに蓄積しておくこ\nとにより、メインメモリへのアクセスを減らし処理を高速化することができる。キャッシュ\nメモリとメインメモリにデータを書き込む方式のうち、先にキャッシュメモリだけに書き込\nんでおいて、後でまとめてキャッシュメモリからメインメモリにデータをコピーする方式は、\n(ア) といわれる。\nメインメモリへのアクセスを高速化する手法に (イ) がある。 (イ) では、メイン\nメモリを独立にアクセス可能な単位であるバンクに分割して、必要なバンクのアクセスを開始\nしたら、それに続くバンクも並行してアクセスすることによって処理を高速化する。\nまた、一つの命令を、命令の取り出し、命令の解読、有効アドレスの計算、データの読み出\nし、命令の実行などの幾つかの細かい基本動作に分割して、それぞれを別の回路で実行するこ\nとにより複数の命令を並行して進め、処理時間全体を短縮する方式は、 (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① メモリインタリーブ ② メモリスワップ ③ ＬＲＵ\n④ ビットインタリーブ ⑤ ＤＭＡ制御方式 ⑥ ＦＩＦＯ\n⑦ パイプライン処理 ⑧ ライトスルー ⑨ ＭＩＭＤ\n⑩ ＨＰＣクラスタ ⑪ ライトバック ⑫ ページング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n複数のディスク装置をまとめて一つのドライブとして管理する技術であるＲＡＩＤの特徴な\nどについて述べた次の文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＲＡＩＤ０では、ミラーリングといわれる手法を用いて、２台のディスク装置で\nペアを組んでデータを２重化しており、１台のディスク装置が故障した場合、残り\nの１台のディスク装置でデータのリード／ライト処理を継続することができる。\n② ＲＡＩＤ１では、ストライピングといわれる手法を用いて、ホストコンピュータ\nからのデータアクセスを並列に処理できるよう、データを複数のディスク装置に分\n散して配置する。\n③ ＲＡＩＤ５では、誤り制御用のパリティを複数のディスク装置に分散して配置し\nており、１台のディスク装置が故障した場合であっても、データを失わずリード／\nライト処理を継続できる。\n④ ＲＡＩＤ６では、誤り制御用のパリティを２重に生成して複数のディスク装置に\n分散して配置する。ＲＡＩＤ６を構成するには最低３台のディスク装置が必要にな\nる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n大量のデータを蓄積しその関連性を分析する多次元データウェアハウスについて述べた次の\nＡ～Ｃの文章は、 (オ) 。\nＡ 多次元データモデルとして、事実テーブル(Fact Table)を中心に、その周辺に次元テーブ\nル(Dimension Table)を配置したモデルは、スタースキーマといわれる。\nＢ 集計データの分析レベルを詳細化することは、ドリルダウンといわれる。例えば、月単位\nの集計の分析を週単位にする場合などが挙げられる。\nＣ 分析の手法として、集計の項目に縦軸と横軸を指定して必要な２次元の面で切り出す操作\nはダイシングといわれ、必要な分析の軸の組合せを変えて分析の面を変える操作はスライシ\nングといわれる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＳＤＮ(Software Defined Networking)について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)に\nおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能が分離し、プログラム\nによりネットワークの制御が実現できるネットワークとされている。\n② ＳＤＮのアーキテクチャにおいて、アプリケーションレイヤと制御レイヤとの間\nのＡＰＩは、一般に、ノースバウンドＡＰＩといわれる。\n③ ＯＮＦにおいて、ＯｐｅｎＦｌｏｗはＳＤＮにおける基盤要素の一つとされてお\nり、ＯｐｅｎＦｌｏｗプロトコルは、一般に、ＯｐｅｎＦｌｏｗコントローラとア\nプリケーションサーバ間の通信機能を提供する標準プロトコルとされている。\n④ ＯｐｅｎＦｌｏｗスイッチは、一般に、ＯｐｅｎＦｌｏｗコントローラから受け\n取った経路情報に基づいて、自身のフローテーブル内にデータ転送処理ルールを追\n加、修正及び削除することが可能である。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、コンピュータのＣＰＵの処理効率を高めるための仕組みについて述べたものであ\nる。 内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\nただし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＣＰＵ側からのデータの読み書き速度を速くする目的で、ＣＰＵ内に置く高速の記憶装置は\nキャッシュメモリといわれる。使用頻度の高いデータをキャッシュメモリに蓄積しておくこ\nとにより、メインメモリへのアクセスを減らし処理を高速化することができる。キャッシュ\nメモリとメインメモリにデータを書き込む方式のうち、先にキャッシュメモリだけに書き込\nんでおいて、後でまとめてキャッシュメモリからメインメモリにデータをコピーする方式は、\n(ア) といわれる。\nメインメモリへのアクセスを高速化する手法に (イ) がある。 (イ) では、メイン\nメモリを独立にアクセス可能な単位であるバンクに分割して、必要なバンクのアクセスを開始\nしたら、それに続くバンクも並行してアクセスすることによって処理を高速化する。\nまた、一つの命令を、命令の取り出し、命令の解読、有効アドレスの計算、データの読み出\nし、命令の実行などの幾つかの細かい基本動作に分割して、それぞれを別の回路で実行するこ\nとにより複数の命令を並行して進め、処理時間全体を短縮する方式は、 (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① メモリインタリーブ ② メモリスワップ ③ ＬＲＵ\n④ ビットインタリーブ ⑤ ＤＭＡ制御方式 ⑥ ＦＩＦＯ\n⑦ パイプライン処理 ⑧ ライトスルー ⑨ ＭＩＭＤ\n⑩ ＨＰＣクラスタ ⑪ ライトバック ⑫ ページング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n複数のディスク装置をまとめて一つのドライブとして管理する技術であるＲＡＩＤの特徴な\nどについて述べた次の文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＲＡＩＤ０では、ミラーリングといわれる手法を用いて、２台のディスク装置で\nペアを組んでデータを２重化しており、１台のディスク装置が故障した場合、残り\nの１台のディスク装置でデータのリード／ライト処理を継続することができる。\n② ＲＡＩＤ１では、ストライピングといわれる手法を用いて、ホストコンピュータ\nからのデータアクセスを並列に処理できるよう、データを複数のディスク装置に分\n散して配置する。\n③ ＲＡＩＤ５では、誤り制御用のパリティを複数のディスク装置に分散して配置し\nており、１台のディスク装置が故障した場合であっても、データを失わずリード／\nライト処理を継続できる。\n④ ＲＡＩＤ６では、誤り制御用のパリティを２重に生成して複数のディスク装置に\n分散して配置する。ＲＡＩＤ６を構成するには最低３台のディスク装置が必要にな\nる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n大量のデータを蓄積しその関連性を分析する多次元データウェアハウスについて述べた次の\nＡ～Ｃの文章は、 (オ) 。\nＡ 多次元データモデルとして、事実テーブル(Fact Table)を中心に、その周辺に次元テーブ\nル(Dimension Table)を配置したモデルは、スタースキーマといわれる。\nＢ 集計データの分析レベルを詳細化することは、ドリルダウンといわれる。例えば、月単位\nの集計の分析を週単位にする場合などが挙げられる。\nＣ 分析の手法として、集計の項目に縦軸と横軸を指定して必要な２次元の面で切り出す操作\nはダイシングといわれ、必要な分析の軸の組合せを変えて分析の面を変える操作はスライシ\nングといわれる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＳＤＮ(Software Defined Networking)について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)に\nおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能が分離し、プログラム\nによりネットワークの制御が実現できるネットワークとされている。\n② ＳＤＮのアーキテクチャにおいて、アプリケーションレイヤと制御レイヤとの間\nのＡＰＩは、一般に、ノースバウンドＡＰＩといわれる。\n③ ＯＮＦにおいて、ＯｐｅｎＦｌｏｗはＳＤＮにおける基盤要素の一つとされてお\nり、ＯｐｅｎＦｌｏｗプロトコルは、一般に、ＯｐｅｎＦｌｏｗコントローラとア\nプリケーションサーバ間の通信機能を提供する標準プロトコルとされている。\n④ ＯｐｅｎＦｌｏｗスイッチは、一般に、ＯｐｅｎＦｌｏｗコントローラから受け\n取った経路情報に基づいて、自身のフローテーブル内にデータ転送処理ルールを追\n加、修正及び削除することが可能である。"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＤＢＭＳにおけるトランザクション処理の概要について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＤＢＭＳの基本的な機能の一つにトランザクション管理機能がある。\nトランザクションは、データベースの参照・更新処理を含むひとまとまりの処理単位であり、\n(ア) 特性といわれる性質を備えている。 (ア) 特性のうち、 (イ) は、トラン\nザクションの処理が、完全に実行されて完了するか又は全く実行されなかったかのようにトラ\nンザクション実行前の状態に戻るかのいずれかが保証される性質をいう。また、耐久性は、ト\nランザクションが実行を終了すれば、更新などの処理結果がシステム障害により損なわれない\nことを保証する性質をいう。\n(イ) と耐久性を実現するための処理にトランザクションの障害回復処理がある。トラ\nンザクションの障害回復処理において、障害発生直前のチェックポイントから障害発生時まで\nの間にコミット済みのトランザクションに対して、ログファイルを参照しデータベースへの反\n映を行う処理は、 (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① 品 質 ② 完全性 ③ ＡＣＩＤ ④ ロールバック\n⑤ 可用性 ⑥ トラヒック ⑦ ＳＱＬ処理 ⑧ レプリケーション\n⑨ 原子性 ⑩ リストア ⑪ 一貫性 ⑫ ロールフォワード\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバの入出力インタフェースなどについて述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ サーバとストレージ装置を光ファイバなどを介して接続するためのインタフェース規格\nであるＦＣ(Fibre Channel)を用いて構成するＳＡＮ(Storage Area Network)は、一般に、\nＩＰ－ＳＡＮといわれる。\nＢ ＮＡＳ(Network Attached Storage)は、ＮＦＳ(Network File System)などのプロトコルを\n用いており、サーバ間でのファイルの共有が可能である。\nＣ ＤＡＳ(Direct Attached Storage)では、一つのストレージ装置は一つのサーバに直接接続\nされて占有される。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nプログラミング言語の種類、特徴などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① アセンブリ言語は、機械語の命令を人間に分かりやすいような表現で記述するプ\nログラミング言語であり、自然言語に類似して人間の考えを表現しやすいことから\n高水準言語に分類される。\n② Ｊａｖａでは、中間コードに変換されたプログラムをＪａｖａＶＭといわれる仮\n想マシン上で動作させる方式を採っている。そのため、プラットフォームごとの\nＪａｖａＶＭがあれば、プログラムはプラットフォームに依存せず、再利用できる\nという特徴を持つ。\n③ ＸＭＬは、文書やデータの意味や構造を記述するためのマークアップ言語の一つ\nであり、文章構造や文字の修飾を&lt; &gt;で囲んだタグで表記する。\n④ インタプリタは、高水準言語で記述されたプログラムを逐次解釈して実行するた\nめのプログラムであり、インタプリタが解釈、実行することを前提にしたプログラ\nミング言語には、Ｐｙｔｈｏｎ、Ｒｕｂｙなどがある。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nクラウドサービスの提供形態などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① クラウドサービスは、一般に、共有化されたコンピュータリソースについて、利\n用者の要求に応じて適宜・適切に配分し、ネットワークを通じて利用する情報処理\n形態であるリモートバッチ処理によって提供するサービスとされている。\n② ＰａａＳでは、一般に、アプリケーションの実行環境を構成するサーバのハード\nウェア、ＯＳ、ミドルウェアなどのプラットフォームをクラウドサービスとして利\n用者に提供している。\n③ ＩａａＳでは、一般に、クラウド事業者がアプリケーションをクラウドサービス\nとして利用者に提供している。\n④ クラウドサービスの提供形態のうち、インターネットを介して不特定多数の利用\n者を対象とするものは、コミュニティクラウドといわれる。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＤＢＭＳにおけるトランザクション処理の概要について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＤＢＭＳの基本的な機能の一つにトランザクション管理機能がある。\nトランザクションは、データベースの参照・更新処理を含むひとまとまりの処理単位であり、\n(ア) 特性といわれる性質を備えている。 (ア) 特性のうち、 (イ) は、トラン\nザクションの処理が、完全に実行されて完了するか又は全く実行されなかったかのようにトラ\nンザクション実行前の状態に戻るかのいずれかが保証される性質をいう。また、耐久性は、ト\nランザクションが実行を終了すれば、更新などの処理結果がシステム障害により損なわれない\nことを保証する性質をいう。\n(イ) と耐久性を実現するための処理にトランザクションの障害回復処理がある。トラ\nンザクションの障害回復処理において、障害発生直前のチェックポイントから障害発生時まで\nの間にコミット済みのトランザクションに対して、ログファイルを参照しデータベースへの反\n映を行う処理は、 (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① 品 質 ② 完全性 ③ ＡＣＩＤ ④ ロールバック\n⑤ 可用性 ⑥ トラヒック ⑦ ＳＱＬ処理 ⑧ レプリケーション\n⑨ 原子性 ⑩ リストア ⑪ 一貫性 ⑫ ロールフォワード\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバの入出力インタフェースなどについて述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ サーバとストレージ装置を光ファイバなどを介して接続するためのインタフェース規格\nであるＦＣ(Fibre Channel)を用いて構成するＳＡＮ(Storage Area Network)は、一般に、\nＩＰ－ＳＡＮといわれる。\nＢ ＮＡＳ(Network Attached Storage)は、ＮＦＳ(Network File System)などのプロトコルを\n用いており、サーバ間でのファイルの共有が可能である。\nＣ ＤＡＳ(Direct Attached Storage)では、一つのストレージ装置は一つのサーバに直接接続\nされて占有される。\n<(エ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nプログラミング言語の種類、特徴などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① アセンブリ言語は、機械語の命令を人間に分かりやすいような表現で記述するプ\nログラミング言語であり、自然言語に類似して人間の考えを表現しやすいことから\n高水準言語に分類される。\n② Ｊａｖａでは、中間コードに変換されたプログラムをＪａｖａＶＭといわれる仮\n想マシン上で動作させる方式を採っている。そのため、プラットフォームごとの\nＪａｖａＶＭがあれば、プログラムはプラットフォームに依存せず、再利用できる\nという特徴を持つ。\n③ ＸＭＬは、文書やデータの意味や構造を記述するためのマークアップ言語の一つ\nであり、文章構造や文字の修飾を< >で囲んだタグで表記する。\n④ インタプリタは、高水準言語で記述されたプログラムを逐次解釈して実行するた\nめのプログラムであり、インタプリタが解釈、実行することを前提にしたプログラ\nミング言語には、Ｐｙｔｈｏｎ、Ｒｕｂｙなどがある。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nクラウドサービスの提供形態などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<(カ)の解答群>\n① クラウドサービスは、一般に、共有化されたコンピュータリソースについて、利\n用者の要求に応じて適宜・適切に配分し、ネットワークを通じて利用する情報処理\n形態であるリモートバッチ処理によって提供するサービスとされている。\n② ＰａａＳでは、一般に、アプリケーションの実行環境を構成するサーバのハード\nウェア、ＯＳ、ミドルウェアなどのプラットフォームをクラウドサービスとして利\n用者に提供している。\n③ ＩａａＳでは、一般に、クラウド事業者がアプリケーションをクラウドサービス\nとして利用者に提供している。\n④ クラウドサービスの提供形態のうち、インターネットを介して不特定多数の利用\n者を対象とするものは、コミュニティクラウドといわれる。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、仮想記憶方式について述べたものである。 内の(ア)～(ウ)に最も適し</p>\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×３＝６点)\n仮想記憶方式は、コンピュータのアーキテクチャが提供する論理的なアドレスに存在する命\n令を実行する際、命令が存在する論理的なアドレスを主記憶上の物理的なアドレスに変換する\n方式であり、論理アドレス空間の大きさは、一般に、主記憶装置のアドレス空間よりもはるか\nに大きい。仮想記憶を実現する方式には、大別してページング方式と (ア) 方式がある。\nページング方式では、論理アドレス空間及び主記憶は、ページといわれる固定長の領域に分\n割される。主記憶に存在しないページがアクセスされると、主記憶に空き領域があるときは、\nその空き領域にページを読み込むが、空き領域がないときは、主記憶内の使用頻度の少ないペー\nジを２次記憶に退避させた後に、必要なページを主記憶に読み込んで置き換える。ページ置き\n換えのアルゴリズムには、 (イ) 方式、ＦＩＦＯ方式などがある。 (イ) 方式は、最\n後に参照してから経過している時間が最も長いページを置き換える方式であり、ＦＩＦＯ方式\nは、最も古くから存在するページを置き換える方式である。もし、何らかの原因でページイン\nやページアウトが頻発するとＯＳが仮想記憶への入出力にＣＰＵの処理能力のほとんどを割い\nてしまい、プログラムが進まなくなってしまう (ウ) が起こる。\n(ア) 方式では、プログラムを、メインルーチン、サブルーチンなど意味のある固まり\nに分割して作成し、必要な領域を主記憶に読み込む。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＬＦＵ ② ＬＩＦＯ ③ オーバレイ ④ ネゴシエーション\n⑤ ＴＬＢ ⑥ スレッド ⑦ セグメント ⑧ フラグメンテーション\n⑨ ＬＲＵ ⑩ セマフォ ⑪ スワッピング ⑫ スラッシング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＳＱＬについて述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＳＱＬを用いて実現できる機能には、リレーショナルデータベース(ＲＤＢ)の\n表などを定義するための機能、トランザクション管理の機能などがある。\n② ＲＤＢのデータを操作するには、端末から直接ＳＱＬ操作用のコマンドを起動\nする方法、親言語で書かれたソースプログラムの中にＳＱＬ文を直接埋め込んで\n起動する方法などがある。\n③ ＳＱＬの予約語は、一般に、変数名、プログラム名、表の名前などに使用する\nことが禁止されている半角及び全角の文字列である。\n④ ＲＤＢの表は順序付けられていない行の集合体であり、ＳＱＬにより行を表に\n追加・削除することができる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバの負荷分散などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＤＳＲ(Direct Server Return)を用いると、クライアントからのリクエストについては負\n荷分散装置が受け取り複数のサーバに振り分けるが、サーバからのレスポンスについては負\n荷分散装置を経由せずに直接クライアントに返すことができる。\nＢ １台のサーバがリクエストを処理し、残りのサーバが障害に備える形態は、一般に、アク\nティブ・アクティブ冗長構成といわれる。\nＣ ＤＮＳラウンドロビンでは、ＤＮＳキャッシュの影響を一切受けずに負荷分散させたい\nサーバのＩＰアドレスを順番に返すため、複数のサーバにリクエストを常に均等に振り分け\nることができる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＶＲＦ(Virtual Routing and Forwarding)といわれる。\n② タグＶＬＡＮでは、ＶＬＡＮタグをＩＰヘッダに付加することにより所属する\nＶＬＡＮを識別する。\n③ ＶＸＬＡＮ(Virtual eXtensible Local Area Network)は、イーサネットフレーム\n全体をカプセル化することにより、レイヤ３ネットワーク上に論理的なレイヤ２ネッ\nトワークを構築する。\n④ ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)に\nおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能を統合したものであり、\nプログラムによりネットワークの制御が実現できるものとされている。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、仮想記憶方式について述べたものである。 内の(ア)～(ウ)に最も適し\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×３＝６点)\n仮想記憶方式は、コンピュータのアーキテクチャが提供する論理的なアドレスに存在する命\n令を実行する際、命令が存在する論理的なアドレスを主記憶上の物理的なアドレスに変換する\n方式であり、論理アドレス空間の大きさは、一般に、主記憶装置のアドレス空間よりもはるか\nに大きい。仮想記憶を実現する方式には、大別してページング方式と (ア) 方式がある。\nページング方式では、論理アドレス空間及び主記憶は、ページといわれる固定長の領域に分\n割される。主記憶に存在しないページがアクセスされると、主記憶に空き領域があるときは、\nその空き領域にページを読み込むが、空き領域がないときは、主記憶内の使用頻度の少ないペー\nジを２次記憶に退避させた後に、必要なページを主記憶に読み込んで置き換える。ページ置き\n換えのアルゴリズムには、 (イ) 方式、ＦＩＦＯ方式などがある。 (イ) 方式は、最\n後に参照してから経過している時間が最も長いページを置き換える方式であり、ＦＩＦＯ方式\nは、最も古くから存在するページを置き換える方式である。もし、何らかの原因でページイン\nやページアウトが頻発するとＯＳが仮想記憶への入出力にＣＰＵの処理能力のほとんどを割い\nてしまい、プログラムが進まなくなってしまう (ウ) が起こる。\n(ア) 方式では、プログラムを、メインルーチン、サブルーチンなど意味のある固まり\nに分割して作成し、必要な領域を主記憶に読み込む。\n<(ア)～(ウ)の解答群>\n① ＬＦＵ ② ＬＩＦＯ ③ オーバレイ ④ ネゴシエーション\n⑤ ＴＬＢ ⑥ スレッド ⑦ セグメント ⑧ フラグメンテーション\n⑨ ＬＲＵ ⑩ セマフォ ⑪ スワッピング ⑫ スラッシング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＳＱＬについて述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① ＳＱＬを用いて実現できる機能には、リレーショナルデータベース(ＲＤＢ)の\n表などを定義するための機能、トランザクション管理の機能などがある。\n② ＲＤＢのデータを操作するには、端末から直接ＳＱＬ操作用のコマンドを起動\nする方法、親言語で書かれたソースプログラムの中にＳＱＬ文を直接埋め込んで\n起動する方法などがある。\n③ ＳＱＬの予約語は、一般に、変数名、プログラム名、表の名前などに使用する\nことが禁止されている半角及び全角の文字列である。\n④ ＲＤＢの表は順序付けられていない行の集合体であり、ＳＱＬにより行を表に\n追加・削除することができる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバの負荷分散などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＤＳＲ(Direct Server Return)を用いると、クライアントからのリクエストについては負\n荷分散装置が受け取り複数のサーバに振り分けるが、サーバからのレスポンスについては負\n荷分散装置を経由せずに直接クライアントに返すことができる。\nＢ １台のサーバがリクエストを処理し、残りのサーバが障害に備える形態は、一般に、アク\nティブ・アクティブ冗長構成といわれる。\nＣ ＤＮＳラウンドロビンでは、ＤＮＳキャッシュの影響を一切受けずに負荷分散させたい\nサーバのＩＰアドレスを順番に返すため、複数のサーバにリクエストを常に均等に振り分け\nることができる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<(カ)の解答群>\n① ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＶＲＦ(Virtual Routing and Forwarding)といわれる。\n② タグＶＬＡＮでは、ＶＬＡＮタグをＩＰヘッダに付加することにより所属する\nＶＬＡＮを識別する。\n③ ＶＸＬＡＮ(Virtual eXtensible Local Area Network)は、イーサネットフレーム\n全体をカプセル化することにより、レイヤ３ネットワーク上に論理的なレイヤ２ネッ\nトワークを構築する。\n④ ＳＤＮに関する標準化活動を行っているＯＮＦ(Open Networking Foundation)に\nおいて、ＳＤＮは、ネットワーク制御機能とデータ転送機能を統合したものであり、\nプログラムによりネットワークの制御が実現できるものとされている。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、サーバのストレージについて述べたものである。 内の(ア)～(ウ)に最</p>\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×３＝６点)\nストレージには、記憶媒体として磁気ディスクを用いたＨＤＤ、 (ア) を用いたＳＳＤ\nなどがあり、サーバとストレージの接続形態は、サーバに内蔵又は外付けしたストレージを直\n接サーバと結線して接続する形態と、複数のサーバがネットワーク経由でストレージを共有す\nる形態に大別できる。\nネットワーク経由でストレージを共有するネットワークストレージには、ストレージアクセ\nス専用のネットワークであるＳＡＮを経由してサーバとストレージを接続するものや、ＬＡＮ\nにファイルサーバ専用機を直接接続して他のサーバからＬＡＮ経由でアクセスさせる (イ)\nがある。\nＳＡＮでは、ネットワークを構成する機器間をファイバチャネルやイーサネットで接続し、\nＳＣＳＩプロトコルを用いて (ウ) でデータの読み込みや書き込みを行う。\n一方、 (イ) では、ＮＦＳ、ＣＩＦＳなどのファイル共有プロトコルを用いて、ＵＮＩＸ、\nＷｉｎｄｏｗｓなどＯＳの種類が異なるサーバ間でのファイル共有が可能である。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ファイル単位 ② ＰＡＮ ③ ＳＲＡＭ ④ ボリューム単位\n⑤ ＤＲＡＭ ⑥ ＮＡＳ ⑦ ＳＡＳ ⑧ フィールド単位\n⑨ ブロック単位 ⑩ ＤＡＳ ⑪ ＥＰＲＯＭ ⑫ フラッシュメモリ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＵＮＩＸの概要について述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＵＮＩＸは複数のプログラムを並行して動作させるマルチタスク及び複数の利用\n者が一つのシステムを同時に利用するマルチユーザに対応しており、コマンドによ\nる対話方式のユーザインタフェースを有する。\n② ＵＮＩＸは階層化ディレクトリ構造を採用しており、ディレクトリの中にディレ\nクトリを格納できる。また、ルートディレクトリは一つである。\n③ あるプログラムの標準出力を別のプログラムの標準入力として受け渡す仕組みは、\nスワップといわれる。\n④ ファイルアクセスに関する許可条件は、ファイルに付属しているアクセス権によっ\nて設定される。ファイル所有者、ファイル所有者の属するグループ及びその他の利\n用者の３種類のユーザクラスに対し、読み出し、書き込み及び実行の許可をそれぞ\nれ個別に設定することができる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＣＰＵに搭載されるキャッシュメモリの仕組みなどについて述べた次のＡ～Ｃの文章は、\n(オ) 。\nＡ ＣＰＵのキャッシュメモリへのアクセスは、メインメモリへのアクセスと比較して高速で\nあるため、ＣＰＵは頻繁に使用する命令やデータをキャッシュメモリに格納することにより\n処理を高速に実行することが可能となる。\nＢ キャッシュメモリは、一般に、複数の階層を持っており、１次キャッシュは、２次キャッ\nシュと比較して、低速で大容量である。\nＣ ＣＰＵがキャッシュメモリにデータを書き込む際には、同じ内容をメインメモリにも書き\n込んで整合を保つ必要があり、書込み方式にはライトスルー方式とライトバック方式がある。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバの仮想化方式について述べた次の文章のうち、正しいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 仮想化ソフトウェアを物理サーバのＯＳ上で動作させて、その仮想化ソフトウェ\nア上でゲストＯＳを複数動作させ、アプリケーションソフトウェアを各ゲストＯＳ\n上で動作させるものは、一般に、ハイパーバイザ型仮想化といわれる。\n② 仮想化ソフトウェアを物理サーバ上で直接動作させて、その仮想化ソフトウェア\n上でゲストＯＳを複数動作させ、アプリケーションソフトウェアを各ゲストＯＳ上\nで動作させるものは、一般に、ホストＯＳ型仮想化といわれる。\n③ 仮想化ソフトウェアを物理サーバのＯＳ上で動作させて、その仮想化ソフトウェ\nア上でアプリケーションソフトウェアとその実行環境を一つにまとめて隔離する領\n域を複数作成して、動作させるものは、一般に、コンテナ型仮想化といわれる。\n④ ハイパーバイザ型仮想化において、仮想化ソフトウェア自身が物理デバイスにア\nクセスするためのデバイスドライバを持つものは、一般に、マイクロカーネル型と\nいわれ、ゲストＯＳが新しいハードウェアを利用できるようにするには、このデバ\nイスドライバを更新する必要がある。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、サーバのストレージについて述べたものである。 内の(ア)～(ウ)に最\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×３＝６点)\nストレージには、記憶媒体として磁気ディスクを用いたＨＤＤ、 (ア) を用いたＳＳＤ\nなどがあり、サーバとストレージの接続形態は、サーバに内蔵又は外付けしたストレージを直\n接サーバと結線して接続する形態と、複数のサーバがネットワーク経由でストレージを共有す\nる形態に大別できる。\nネットワーク経由でストレージを共有するネットワークストレージには、ストレージアクセ\nス専用のネットワークであるＳＡＮを経由してサーバとストレージを接続するものや、ＬＡＮ\nにファイルサーバ専用機を直接接続して他のサーバからＬＡＮ経由でアクセスさせる (イ)\nがある。\nＳＡＮでは、ネットワークを構成する機器間をファイバチャネルやイーサネットで接続し、\nＳＣＳＩプロトコルを用いて (ウ) でデータの読み込みや書き込みを行う。\n一方、 (イ) では、ＮＦＳ、ＣＩＦＳなどのファイル共有プロトコルを用いて、ＵＮＩＸ、\nＷｉｎｄｏｗｓなどＯＳの種類が異なるサーバ間でのファイル共有が可能である。\n<(ア)～(ウ)の解答群>\n① ファイル単位 ② ＰＡＮ ③ ＳＲＡＭ ④ ボリューム単位\n⑤ ＤＲＡＭ ⑥ ＮＡＳ ⑦ ＳＡＳ ⑧ フィールド単位\n⑨ ブロック単位 ⑩ ＤＡＳ ⑪ ＥＰＲＯＭ ⑫ フラッシュメモリ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＵＮＩＸの概要について述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① ＵＮＩＸは複数のプログラムを並行して動作させるマルチタスク及び複数の利用\n者が一つのシステムを同時に利用するマルチユーザに対応しており、コマンドによ\nる対話方式のユーザインタフェースを有する。\n② ＵＮＩＸは階層化ディレクトリ構造を採用しており、ディレクトリの中にディレ\nクトリを格納できる。また、ルートディレクトリは一つである。\n③ あるプログラムの標準出力を別のプログラムの標準入力として受け渡す仕組みは、\nスワップといわれる。\n④ ファイルアクセスに関する許可条件は、ファイルに付属しているアクセス権によっ\nて設定される。ファイル所有者、ファイル所有者の属するグループ及びその他の利\n用者の３種類のユーザクラスに対し、読み出し、書き込み及び実行の許可をそれぞ\nれ個別に設定することができる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＣＰＵに搭載されるキャッシュメモリの仕組みなどについて述べた次のＡ～Ｃの文章は、\n(オ) 。\nＡ ＣＰＵのキャッシュメモリへのアクセスは、メインメモリへのアクセスと比較して高速で\nあるため、ＣＰＵは頻繁に使用する命令やデータをキャッシュメモリに格納することにより\n処理を高速に実行することが可能となる。\nＢ キャッシュメモリは、一般に、複数の階層を持っており、１次キャッシュは、２次キャッ\nシュと比較して、低速で大容量である。\nＣ ＣＰＵがキャッシュメモリにデータを書き込む際には、同じ内容をメインメモリにも書き\n込んで整合を保つ必要があり、書込み方式にはライトスルー方式とライトバック方式がある。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバの仮想化方式について述べた次の文章のうち、正しいものは、 (カ) である。\n<(カ)の解答群>\n① 仮想化ソフトウェアを物理サーバのＯＳ上で動作させて、その仮想化ソフトウェ\nア上でゲストＯＳを複数動作させ、アプリケーションソフトウェアを各ゲストＯＳ\n上で動作させるものは、一般に、ハイパーバイザ型仮想化といわれる。\n② 仮想化ソフトウェアを物理サーバ上で直接動作させて、その仮想化ソフトウェア\n上でゲストＯＳを複数動作させ、アプリケーションソフトウェアを各ゲストＯＳ上\nで動作させるものは、一般に、ホストＯＳ型仮想化といわれる。\n③ 仮想化ソフトウェアを物理サーバのＯＳ上で動作させて、その仮想化ソフトウェ\nア上でアプリケーションソフトウェアとその実行環境を一つにまとめて隔離する領\n域を複数作成して、動作させるものは、一般に、コンテナ型仮想化といわれる。\n④ ハイパーバイザ型仮想化において、仮想化ソフトウェア自身が物理デバイスにア\nクセスするためのデバイスドライバを持つものは、一般に、マイクロカーネル型と\nいわれ、ゲストＯＳが新しいハードウェアを利用できるようにするには、このデバ\nイスドライバを更新する必要がある。"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、プログラミング言語の概要について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nプログラムを記述するためのプログラミング言語のうち、自然言語に類似していて、人間の\n考えを表現しやすい言語は、一般に、 (ア) といわれる。\n(ア) で記述されたプログラムは、そのままではＣＰＵが実行できないため、コンパイ\nラを用いて機械語に変換してから実行する方法や、 (イ) を用いて逐次解釈しながら実行\nする方法がとられる。\n(ア) は、何に注目してプログラムを記述するかによって、オブジェクト指向言語、手\n続き型言語、論理型言語などに分類できる。\nまた、プログラミング言語をその使われ方で分類することもでき、簡単なプログラムを手軽\nに記述して実行できるようなプログラミング言語は、一般に、スクリプト言語といわれ、その\n代表的な言語にＰＨＰ、 (ウ) などがある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① Ｃ ② ジャーナル ③ アセンブリ言語 ④ インタプリタ\n⑤ ローダ ⑥ アセンブラ ⑦ Ｐｙｔｈｏｎ ⑧ 低水準言語\n⑨ Ｃ＋＋ ⑩ 高水準言語 ⑪ マークアップ言語 ⑫ ＣＯＢＯＬ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nページング方式による仮想記憶について述べた次の文章のうち、正しいものは、 (エ)\nである。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ページング方式では、プログラムがアクセス可能な物理アドレス空間を可変長の\nページに分割し、必要なページを主記憶に読み込んで実行する。\n② アクセスしようとしたページが主記憶上に存在しなかった場合に発生する割り込\nみ処理は、一般に、メモリリークといわれ、この処理が発生すると主記憶と補助記\n憶の間でページの置き換えが行われる。\n③ ページ置き換えのアルゴリズムの一つであるＬＲＵ方式では、最後に参照してか\nら経過している時間が最も短いページを主記憶から補助記憶にページアウトする。\n④ 主記憶と補助記憶の間でページの置き換えが頻繁に発生して、これにＣＰＵの処\n理能力のほとんどが割かれてしまい、他の処理を実行できなくなる現象は、一般に、\nスラッシングといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n大量のデータを蓄積しその関連性を分析するために用いられる多次元データウェアハウスに\nついて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 多次元データモデルとして、事実テーブル(Fact Table)を中心に、その周辺に次元テーブ\nル(Dimension Table)を配置したモデルは、スタースキーマといわれる。\nＢ 分析の手法として、集計の項目に縦軸と横軸を指定して必要な２次元の面で切り出す操作\nは、ダイシングといわれる。\nＣ 参照する集計データの分析レベルを詳細化する操作は、ロールアップといわれる。例えば、\n月単位の集計の分析を週単位にする場合などが挙げられる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① １台のルータ内に独立した複数のルーティングテーブルを保持することにより、\n１台のルータを複数の仮想的なルータとして使用できるようにする技術は、ＶＲＦ\n(Virtual Routing and Forwarding)といわれる。\n② ネットワーク上の全てのスイッチが、仮想ネットワークの経路情報を管理する\nテーブルを保持し、この管理テーブルの設定に従ってデータを転送することによっ\nてＳＤＮ(Software Defined Networking)を構築する方法は、オーバレイ方式といわ\nれる。\n③ ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＯｐｅｎＦｌｏｗといわれる。\n④ ＶＸＬＡＮは、ホップバイホップ方式のＳＤＮに用いられる技術の一つである。\nＶＸＬＡＮを用いた仮想ネットワークを構築するためには、ネットワーク上の全て\nのスイッチがＶＸＬＡＮ対応のものでなければならない。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、プログラミング言語の概要について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nプログラムを記述するためのプログラミング言語のうち、自然言語に類似していて、人間の\n考えを表現しやすい言語は、一般に、 (ア) といわれる。\n(ア) で記述されたプログラムは、そのままではＣＰＵが実行できないため、コンパイ\nラを用いて機械語に変換してから実行する方法や、 (イ) を用いて逐次解釈しながら実行\nする方法がとられる。\n(ア) は、何に注目してプログラムを記述するかによって、オブジェクト指向言語、手\n続き型言語、論理型言語などに分類できる。\nまた、プログラミング言語をその使われ方で分類することもでき、簡単なプログラムを手軽\nに記述して実行できるようなプログラミング言語は、一般に、スクリプト言語といわれ、その\n代表的な言語にＰＨＰ、 (ウ) などがある。\n<(ア)～(ウ)の解答群>\n① Ｃ ② ジャーナル ③ アセンブリ言語 ④ インタプリタ\n⑤ ローダ ⑥ アセンブラ ⑦ Ｐｙｔｈｏｎ ⑧ 低水準言語\n⑨ Ｃ＋＋ ⑩ 高水準言語 ⑪ マークアップ言語 ⑫ ＣＯＢＯＬ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nページング方式による仮想記憶について述べた次の文章のうち、正しいものは、 (エ)\nである。\n<(エ)の解答群>\n① ページング方式では、プログラムがアクセス可能な物理アドレス空間を可変長の\nページに分割し、必要なページを主記憶に読み込んで実行する。\n② アクセスしようとしたページが主記憶上に存在しなかった場合に発生する割り込\nみ処理は、一般に、メモリリークといわれ、この処理が発生すると主記憶と補助記\n憶の間でページの置き換えが行われる。\n③ ページ置き換えのアルゴリズムの一つであるＬＲＵ方式では、最後に参照してか\nら経過している時間が最も短いページを主記憶から補助記憶にページアウトする。\n④ 主記憶と補助記憶の間でページの置き換えが頻繁に発生して、これにＣＰＵの処\n理能力のほとんどが割かれてしまい、他の処理を実行できなくなる現象は、一般に、\nスラッシングといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n大量のデータを蓄積しその関連性を分析するために用いられる多次元データウェアハウスに\nついて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 多次元データモデルとして、事実テーブル(Fact Table)を中心に、その周辺に次元テーブ\nル(Dimension Table)を配置したモデルは、スタースキーマといわれる。\nＢ 分析の手法として、集計の項目に縦軸と横軸を指定して必要な２次元の面で切り出す操作\nは、ダイシングといわれる。\nＣ 参照する集計データの分析レベルを詳細化する操作は、ロールアップといわれる。例えば、\n月単位の集計の分析を週単位にする場合などが挙げられる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nネットワークの仮想化技術などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<(カ)の解答群>\n① １台のルータ内に独立した複数のルーティングテーブルを保持することにより、\n１台のルータを複数の仮想的なルータとして使用できるようにする技術は、ＶＲＦ\n(Virtual Routing and Forwarding)といわれる。\n② ネットワーク上の全てのスイッチが、仮想ネットワークの経路情報を管理する\nテーブルを保持し、この管理テーブルの設定に従ってデータを転送することによっ\nてＳＤＮ(Software Defined Networking)を構築する方法は、オーバレイ方式といわ\nれる。\n③ ルータ、ゲートウェイ、ファイアウォールなど専用のハードウェアを用いて実現\nされているネットワーク機能をソフトウェア化し、汎用サーバ上でこれらのネット\nワーク機能を実現する技術は、ＯｐｅｎＦｌｏｗといわれる。\n④ ＶＸＬＡＮは、ホップバイホップ方式のＳＤＮに用いられる技術の一つである。\nＶＸＬＡＮを用いた仮想ネットワークを構築するためには、ネットワーク上の全て\nのスイッチがＶＸＬＡＮ対応のものでなければならない。"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、コンピュータのＣＰＵの処理効率を高めるための仕組みについて述べたものであ</p>\nる。 内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\nただし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＣＰＵ側からのデータの読み書き速度を速くする目的で、ＣＰＵ内に置く高速の記憶装置は\nキャッシュメモリといわれる。使用頻度の高いデータをキャッシュメモリに蓄積しておくこ\nとにより、メインメモリへのアクセスを減らし処理を高速化することができる。キャッシュ\nメモリとメインメモリにデータを書き込む方式のうち、先にキャッシュメモリだけに書き込\nんでおいて、後でまとめてキャッシュメモリからメインメモリにデータをコピーする方式は、\n(ア) といわれる。\nメインメモリへのアクセスを高速化する手法に (イ) がある。 (イ) では、メイン\nメモリを独立にアクセス可能な単位であるバンクに分割して、必要なバンクのアクセスを開始\nしたら、それに続くバンクも並行してアクセスすることによって処理を高速化する。\nまた、一つの命令を、命令の取り出し、命令の解読、有効アドレスの計算、データの読み出\nし、命令の実行などの幾つかの細かい基本動作に分割して、それぞれを別の回路で実行するこ\nとにより複数の命令を並行して進め、処理時間全体を短縮する方式は、 (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＦＩＦＯ ② ライトバック ③ ＨＰＣクラスタ\n④ ＬＲＵ ⑤ ライトスルー ⑥ パイプライン処理\n⑦ ＭＩＭＤ ⑧ ＤＭＡ制御方式 ⑨ メモリインタリーブ\n⑩ ページング ⑪ メモリスワップ ⑫ ビットインタリーブ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデータベースのトランザクション処理について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 複数のユーザが同時にデータベースのデータを変更する場合、あるユーザによる\n変更が他のユーザによる変更に悪影響を与えないようにするための制御機構は、一\n般に、同時実行制御といわれる。\n② トランザクション処理において必要とされるＡＣＩＤ特性のうち、Ｃは一貫性、\nＤは耐久性を表している。\n③ トランザクション障害発生時には、一般に、データベースの更新が一部行われた\n場合でも、更新前ログを用いてロールバックが行われる。\n④ 複数のトランザクションが複数のデータ資源を交互に処理する場合、互いに相手\nのデータ資源の解放を永久に待ち続ける状態は、一般に、サスペンドといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n情報システムにおける事業継続の指標について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 情報システムが障害などで停止したときに、あらかじめ決められた一定のレベルに復旧す\nるまでの目標時間は、ＲＴＯ(Recovery Time Objective)といわれ、一般に、ＲＴＯが短い\nほどシステムを復旧させるための対策にかかるコストは高くなる。\nＢ 情報システムが障害などで停止したときに、あらかじめ決められた一定の時間内にどのレ\nベルまで復旧を目指すかの目標水準は、ＲＬＯ(Recovery Level Objective)といわれ、一般\nに、ＲＬＯが高いほどシステムを復旧させるための対策にかかるコストは高くなる。\nＣ 情報システムにおいて障害などで失われたデータをバックアップから復元するときに、過\n去のどの時点まで遡ることを許容するかの目標値は、ＲＰＯ(Recovery Point Objective)と\nいわれ、一般に、ＲＰＯが大きいほど頻繁にバックアップする必要があるためバックアップ\n処理にかかるシステム負荷やコストは高くなる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通信サービスにおけるネットワーク仮想化(ＮＦＶ：Network Functions Virtualization)の\n実現を目的に欧州電気通信標準化機構(ＥＴＳＩ)において設立されたＮＦＶ ＩＳＧ(Industry\nSpecification Group)が提唱するＮＦＶ参照アーキテクチャについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＮＦＶの構成要素のうち、仮想化されたネットワーク機能はＶＮＦ(Virtualized\nNetwork Function)といわれる。\n② ＮＦＶの構成要素のうち、ＶＮＦの実行環境となる仮想化リソースはＮＦＶＩ\n(NFV Infrastructure)といわれ、コンピューティング、ストレージ及びネットワー\nクの物理的なハードウェアと、これらを仮想化するためのソフトウェアなどから構\n成される。\n③ ＮＦＶの構成要素のうち、ＶＮＦの起動、停止などのライフサイクル管理やリソー\nス管理を行う機能部はＳＤＮコントローラといわれ、ＮＦＶＯ(NFV Orchestrator)、\nＶＮＦＭ(VNF Manager)、ＶＩＭ(Virtualized Infrastructure Manager)などの機能\nブロックから構成される。\n④ ＶＩＭは、ＮＦＶＯ又はＶＮＦＭからのリクエストを受けて、指定されたＶＮＦ\nへの仮想化リソース割当てを制御・管理する。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、コンピュータのＣＰＵの処理効率を高めるための仕組みについて述べたものであ\nる。 内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\nただし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＣＰＵ側からのデータの読み書き速度を速くする目的で、ＣＰＵ内に置く高速の記憶装置は\nキャッシュメモリといわれる。使用頻度の高いデータをキャッシュメモリに蓄積しておくこ\nとにより、メインメモリへのアクセスを減らし処理を高速化することができる。キャッシュ\nメモリとメインメモリにデータを書き込む方式のうち、先にキャッシュメモリだけに書き込\nんでおいて、後でまとめてキャッシュメモリからメインメモリにデータをコピーする方式は、\n(ア) といわれる。\nメインメモリへのアクセスを高速化する手法に (イ) がある。 (イ) では、メイン\nメモリを独立にアクセス可能な単位であるバンクに分割して、必要なバンクのアクセスを開始\nしたら、それに続くバンクも並行してアクセスすることによって処理を高速化する。\nまた、一つの命令を、命令の取り出し、命令の解読、有効アドレスの計算、データの読み出\nし、命令の実行などの幾つかの細かい基本動作に分割して、それぞれを別の回路で実行するこ\nとにより複数の命令を並行して進め、処理時間全体を短縮する方式は、 (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① ＦＩＦＯ ② ライトバック ③ ＨＰＣクラスタ\n④ ＬＲＵ ⑤ ライトスルー ⑥ パイプライン処理\n⑦ ＭＩＭＤ ⑧ ＤＭＡ制御方式 ⑨ メモリインタリーブ\n⑩ ページング ⑪ メモリスワップ ⑫ ビットインタリーブ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデータベースのトランザクション処理について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① 複数のユーザが同時にデータベースのデータを変更する場合、あるユーザによる\n変更が他のユーザによる変更に悪影響を与えないようにするための制御機構は、一\n般に、同時実行制御といわれる。\n② トランザクション処理において必要とされるＡＣＩＤ特性のうち、Ｃは一貫性、\nＤは耐久性を表している。\n③ トランザクション障害発生時には、一般に、データベースの更新が一部行われた\n場合でも、更新前ログを用いてロールバックが行われる。\n④ 複数のトランザクションが複数のデータ資源を交互に処理する場合、互いに相手\nのデータ資源の解放を永久に待ち続ける状態は、一般に、サスペンドといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n情報システムにおける事業継続の指標について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 情報システムが障害などで停止したときに、あらかじめ決められた一定のレベルに復旧す\nるまでの目標時間は、ＲＴＯ(Recovery Time Objective)といわれ、一般に、ＲＴＯが短い\nほどシステムを復旧させるための対策にかかるコストは高くなる。\nＢ 情報システムが障害などで停止したときに、あらかじめ決められた一定の時間内にどのレ\nベルまで復旧を目指すかの目標水準は、ＲＬＯ(Recovery Level Objective)といわれ、一般\nに、ＲＬＯが高いほどシステムを復旧させるための対策にかかるコストは高くなる。\nＣ 情報システムにおいて障害などで失われたデータをバックアップから復元するときに、過\n去のどの時点まで遡ることを許容するかの目標値は、ＲＰＯ(Recovery Point Objective)と\nいわれ、一般に、ＲＰＯが大きいほど頻繁にバックアップする必要があるためバックアップ\n処理にかかるシステム負荷やコストは高くなる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通信サービスにおけるネットワーク仮想化(ＮＦＶ：Network Functions Virtualization)の\n実現を目的に欧州電気通信標準化機構(ＥＴＳＩ)において設立されたＮＦＶ ＩＳＧ(Industry\nSpecification Group)が提唱するＮＦＶ参照アーキテクチャについて述べた次の文章のうち、\n誤っているものは、 (カ) である。\n<(カ)の解答群>\n① ＮＦＶの構成要素のうち、仮想化されたネットワーク機能はＶＮＦ(Virtualized\nNetwork Function)といわれる。\n② ＮＦＶの構成要素のうち、ＶＮＦの実行環境となる仮想化リソースはＮＦＶＩ\n(NFV Infrastructure)といわれ、コンピューティング、ストレージ及びネットワー\nクの物理的なハードウェアと、これらを仮想化するためのソフトウェアなどから構\n成される。\n③ ＮＦＶの構成要素のうち、ＶＮＦの起動、停止などのライフサイクル管理やリソー\nス管理を行う機能部はＳＤＮコントローラといわれ、ＮＦＶＯ(NFV Orchestrator)、\nＶＮＦＭ(VNF Manager)、ＶＩＭ(Virtualized Infrastructure Manager)などの機能\nブロックから構成される。\n④ ＶＩＭは、ＮＦＶＯ又はＶＮＦＭからのリクエストを受けて、指定されたＶＮＦ\nへの仮想化リソース割当てを制御・管理する。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問５ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報システムの高信頼化技術について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\n情報システムの信頼性を高める方法には、システムの冗長化、ディスクの冗長化などがある。\nシステムを冗長化するためのシステム構成方式のうち、本番系と待機系の２系統で構成され、\n平常時には本番系が処理を行い、本番系が故障などで停止したときに待機系に切り替えて処理\nを続ける方式は、一般に、 (ア) システムといわれる。本番系から待機系への切替方式は、\n待機系の動作の違いにより区分され、平常時の待機系は停止した状態にしておくか別の処理を\n行わせておき、本番系に障害が発生したときには待機系のＯＳ、アプリケーションなどを起動\nして本番系から切替えを行う方式は、一般に、 (イ) スタンバイ方式といわれる。\n複数のディスク装置をまとめて一つのドライブとして管理する技術にＲＡＩＤがあり、ディ\nスクの冗長化に用いられている。ＲＡＩＤで定義されているレベルのうち、ミラーリングとい\nわれる手法により２台のディスク装置でペアを組んでデータを２重化し、１台のディスク装置\nが故障したときには残りの１台のディスク装置でデータのリード／ライト処理を継続すること\nができるレベルは、ＲＡＩＤ１といわれる。また、データ及び誤り制御用のパリティを３台以\n上のディスク装置に分散して配置し、ディスク装置の故障が１台までであれば、データを失わ\nずリード／ライト処理を継続することができるレベルは、 (ウ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＲＡＩＤ３ ② ＲＡＩＤ４ ③ ホット ④ デュプレックス\n⑤ ＲＡＩＤ５ ⑥ ＲＡＩＤ６ ⑦ ウォーム ⑧ シンプレックス\n⑨ デュアル ⑩ ディープ ⑪ コールド ⑫ タイムシェアリング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＣＰＵにおけるプロセス制御などについて述べた次の文章のうち、正しいものは、 (エ)\nである。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 並行して動作しているプロセス間で排他制御や同期処理を行うための仕組みの一\nつに、セマフォがある。\n② 活動中のプロセスが、新しいプロセスを作る場合、新しいプロセスは親プロセス\nといわれる。\n③ プログラムがあるタスクから呼び出されて実行中であっても、別のタスクから呼\nび出して実行させ、どちらの処理も正常に終了させることができるプログラムの持\nつ性質は、一般に、リカーシブといわれる。\n④ システムの過負荷状態などにより休止としたプロセスに割り当てていた主記憶領\n域の内容を２次記憶へ退避させて主記憶領域を解放する動作は、一般に、スワップ\nインといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＳＱＬについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＳＱＬは、Ｃ言語などのプログラミング言語が手続き型言語といわれるのに対し\nて、基本的に一つの命令で操作が完結することから非手続き型言語といわれる。\n② ＳＱＬを用いて実現できる機能には、リレーショナルデータベース(ＲＤＢ)の表\nなどを定義する機能、機密保護の機能などがある。\n③ ＲＤＢの表は順序付けられていない行の集合体であり、ＳＱＬにより行を表に追\n加・削除することができる。\n④ ＳＱＬの予約語は、一般に、変数名、プログラム名、表の名前などに使用するこ\nとが禁止されている半角及び全角の文字列である。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nクラウドサービスの提供形態、利用形態などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＩａａＳでは、一般に、クラウド事業者がアプリケーションの実行環境を構成す\nるサーバのハードウェア、ＯＳ、ミドルウェアなどのプラットフォームをクラウド\nサービスとして利用者に提供している。\n② ＳａａＳでは、一般に、クラウド事業者がアプリケーションやデータベースをク\nラウドサービスとして利用者に提供している。\n③ 企業の情報システムなどにおいて、複数のクラウド事業者が提供するパブリック\nクラウドを組み合わせて利用する形態は、一般に、マルチクラウドといわれる。\n④ クラウドサービスにおいて、システム、ソフトウェアなどを複数の利用者で共有\nできるような設計や構造は、一般に、マルチテナントといわれる。", "raw": "問５ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、情報システムの高信頼化技術について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\n情報システムの信頼性を高める方法には、システムの冗長化、ディスクの冗長化などがある。\nシステムを冗長化するためのシステム構成方式のうち、本番系と待機系の２系統で構成され、\n平常時には本番系が処理を行い、本番系が故障などで停止したときに待機系に切り替えて処理\nを続ける方式は、一般に、 (ア) システムといわれる。本番系から待機系への切替方式は、\n待機系の動作の違いにより区分され、平常時の待機系は停止した状態にしておくか別の処理を\n行わせておき、本番系に障害が発生したときには待機系のＯＳ、アプリケーションなどを起動\nして本番系から切替えを行う方式は、一般に、 (イ) スタンバイ方式といわれる。\n複数のディスク装置をまとめて一つのドライブとして管理する技術にＲＡＩＤがあり、ディ\nスクの冗長化に用いられている。ＲＡＩＤで定義されているレベルのうち、ミラーリングとい\nわれる手法により２台のディスク装置でペアを組んでデータを２重化し、１台のディスク装置\nが故障したときには残りの１台のディスク装置でデータのリード／ライト処理を継続すること\nができるレベルは、ＲＡＩＤ１といわれる。また、データ及び誤り制御用のパリティを３台以\n上のディスク装置に分散して配置し、ディスク装置の故障が１台までであれば、データを失わ\nずリード／ライト処理を継続することができるレベルは、 (ウ) といわれる。\n<(ア)～(ウ)の解答群>\n① ＲＡＩＤ３ ② ＲＡＩＤ４ ③ ホット ④ デュプレックス\n⑤ ＲＡＩＤ５ ⑥ ＲＡＩＤ６ ⑦ ウォーム ⑧ シンプレックス\n⑨ デュアル ⑩ ディープ ⑪ コールド ⑫ タイムシェアリング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＣＰＵにおけるプロセス制御などについて述べた次の文章のうち、正しいものは、 (エ)\nである。\n<(エ)の解答群>\n① 並行して動作しているプロセス間で排他制御や同期処理を行うための仕組みの一\nつに、セマフォがある。\n② 活動中のプロセスが、新しいプロセスを作る場合、新しいプロセスは親プロセス\nといわれる。\n③ プログラムがあるタスクから呼び出されて実行中であっても、別のタスクから呼\nび出して実行させ、どちらの処理も正常に終了させることができるプログラムの持\nつ性質は、一般に、リカーシブといわれる。\n④ システムの過負荷状態などにより休止としたプロセスに割り当てていた主記憶領\n域の内容を２次記憶へ退避させて主記憶領域を解放する動作は、一般に、スワップ\nインといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＳＱＬについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① ＳＱＬは、Ｃ言語などのプログラミング言語が手続き型言語といわれるのに対し\nて、基本的に一つの命令で操作が完結することから非手続き型言語といわれる。\n② ＳＱＬを用いて実現できる機能には、リレーショナルデータベース(ＲＤＢ)の表\nなどを定義する機能、機密保護の機能などがある。\n③ ＲＤＢの表は順序付けられていない行の集合体であり、ＳＱＬにより行を表に追\n加・削除することができる。\n④ ＳＱＬの予約語は、一般に、変数名、プログラム名、表の名前などに使用するこ\nとが禁止されている半角及び全角の文字列である。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nクラウドサービスの提供形態、利用形態などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<(カ)の解答群>\n① ＩａａＳでは、一般に、クラウド事業者がアプリケーションの実行環境を構成す\nるサーバのハードウェア、ＯＳ、ミドルウェアなどのプラットフォームをクラウド\nサービスとして利用者に提供している。\n② ＳａａＳでは、一般に、クラウド事業者がアプリケーションやデータベースをク\nラウドサービスとして利用者に提供している。\n③ 企業の情報システムなどにおいて、複数のクラウド事業者が提供するパブリック\nクラウドを組み合わせて利用する形態は、一般に、マルチクラウドといわれる。\n④ クラウドサービスにおいて、システム、ソフトウェアなどを複数の利用者で共有\nできるような設計や構造は、一般に、マルチテナントといわれる。"}], "6": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、イーサネットの概要について述べたものである。 内の(ア)～(ウ)に最</p>\nも適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nイーサネットのフレームフォーマットは、一般に、有効フレームの先頭の宛先ＭＡＣアドレス\nに続く送信元ＭＡＣアドレス、タイプ／フレーム長フィールド、データフィールド、及び有効\nフレームのデータに誤りがないかどうかを検査するための (ア) で構成される。宛先と送\n信元のアドレスとして使われるＭＡＣアドレスは６ Ｂyte の長さを持ち、上位の３ Ｂyte は、\n(イ) といわれ、これによりネットワークインタフェースカードの製造メーカなどを識別\nすることができる。\nイーサネットには、使用される伝送媒体や伝送速度が異なる仕様がある。例えば、１０Ｇ\nＢＡＳＥ－ＬＲでは伝送媒体として (ウ) が使用され、伝送速度は最大１０ Ｇbit／s 、\n伝送距離は最大１０ kｍ となっている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＮＲＺ ② ツイストペア ③ ＦＣＳ ④ ＥＳＰ\n⑤ ＯＵＩ ⑥ プリアンブル ⑦ ＳＹＮ ⑧ ＰＡＤ\n⑨ マルチモード光ファイバ ⑩ パディング\n⑪ シングルモード光ファイバ ⑫ プラスチック光ファイバ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６の特徴について述べた次の文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＩＰｖ６アドレスのビット長は、ＩＰｖ４の３２ bit に対して２倍の６４ bit\nとなっており、ＩＰアドレスを必要とする接続機器の増大に対し、十分に耐えられ\nるように考慮されている。\n② ＩＰｖ６のリンクローカルユニキャストアドレス空間は、インターネットレジス\nトリといわれるアドレス管理組織により、上位ビットから階層的に分配、管理され\nている。\n③ ＩＰｖ６では、拡張ヘッダにパケットデータの暗号化に関する情報のための暗号\n化ペイロードヘッダやパケットデータの完全性を保証するための認証ヘッダを組み\n込むことができる。\n④ ＩＰｖ６ヘッダは可変長となっており、動画伝送などのリアルタイム性が要求さ\nれるトラヒック、ＲＳＶＰ(Resource Reservation Protocol)などによるＱｏＳに\n対応することができる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークにおけるコネクション型及びコネクションレス型通信の特徴などについて\n述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ コネクション型通信で用いられるＴＣＰは、ＯＳＩ参照モデルにおけるネットワーク層で\nサポートされている。\nＢ コネクションレス型通信で用いられるＵＤＰでは、送信したパケットに対する送達確認を\n受信し、ネットワーク層以下の伝達機能の正常性を確認している。\nＣ コネクション型通信では、通信相手とのコネクションを確立してデータを送信するため、\nコネクションレス型通信と異なり、通信相手との間でコネクションを確立するための制御手\n順が必要となるが、パケット損失が発生したときの再送制御などが可能である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nルーティングプロトコルについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 自律システム(ＡＳ)の内部で利用されるインテリアゲートウェイプロトコル(ＩＧＰ)\nの代表的なルーティングプロトコルには、ＯＳＰＦがある。\n② ルーティングプロトコルには、ルーティングアルゴリズムの違いによりディスタ\nンスベクタ型、リンクステート型などがあり、ディスタンスベクタ型の代表的なプ\nロトコルには、ＲＩＰがある。\n③ ディスタンスベクタ型のルーティングプロトコルは、一般に、ルータが保有して\nいるルーティングテーブルの情報を定期的に交換する手順を有している。\n④ リンクステート型のルーティングプロトコルでは、平常時においては他のルータ\nの動作の正常確認にＳＮＭＰパケットを用いている。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、イーサネットの概要について述べたものである。 内の(ア)～(ウ)に最\nも適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nイーサネットのフレームフォーマットは、一般に、有効フレームの先頭の宛先ＭＡＣアドレス\nに続く送信元ＭＡＣアドレス、タイプ／フレーム長フィールド、データフィールド、及び有効\nフレームのデータに誤りがないかどうかを検査するための (ア) で構成される。宛先と送\n信元のアドレスとして使われるＭＡＣアドレスは６ Ｂyte の長さを持ち、上位の３ Ｂyte は、\n(イ) といわれ、これによりネットワークインタフェースカードの製造メーカなどを識別\nすることができる。\nイーサネットには、使用される伝送媒体や伝送速度が異なる仕様がある。例えば、１０Ｇ\nＢＡＳＥ－ＬＲでは伝送媒体として (ウ) が使用され、伝送速度は最大１０ Ｇbit／s 、\n伝送距離は最大１０ kｍ となっている。\n<(ア)～(ウ)の解答群>\n① ＮＲＺ ② ツイストペア ③ ＦＣＳ ④ ＥＳＰ\n⑤ ＯＵＩ ⑥ プリアンブル ⑦ ＳＹＮ ⑧ ＰＡＤ\n⑨ マルチモード光ファイバ ⑩ パディング\n⑪ シングルモード光ファイバ ⑫ プラスチック光ファイバ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６の特徴について述べた次の文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① ＩＰｖ６アドレスのビット長は、ＩＰｖ４の３２ bit に対して２倍の６４ bit\nとなっており、ＩＰアドレスを必要とする接続機器の増大に対し、十分に耐えられ\nるように考慮されている。\n② ＩＰｖ６のリンクローカルユニキャストアドレス空間は、インターネットレジス\nトリといわれるアドレス管理組織により、上位ビットから階層的に分配、管理され\nている。\n③ ＩＰｖ６では、拡張ヘッダにパケットデータの暗号化に関する情報のための暗号\n化ペイロードヘッダやパケットデータの完全性を保証するための認証ヘッダを組み\n込むことができる。\n④ ＩＰｖ６ヘッダは可変長となっており、動画伝送などのリアルタイム性が要求さ\nれるトラヒック、ＲＳＶＰ(Resource Reservation Protocol)などによるＱｏＳに\n対応することができる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰネットワークにおけるコネクション型及びコネクションレス型通信の特徴などについて\n述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ コネクション型通信で用いられるＴＣＰは、ＯＳＩ参照モデルにおけるネットワーク層で\nサポートされている。\nＢ コネクションレス型通信で用いられるＵＤＰでは、送信したパケットに対する送達確認を\n受信し、ネットワーク層以下の伝達機能の正常性を確認している。\nＣ コネクション型通信では、通信相手とのコネクションを確立してデータを送信するため、\nコネクションレス型通信と異なり、通信相手との間でコネクションを確立するための制御手\n順が必要となるが、パケット損失が発生したときの再送制御などが可能である。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nルーティングプロトコルについて述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<(カ)の解答群>\n① 自律システム(ＡＳ)の内部で利用されるインテリアゲートウェイプロトコル(ＩＧＰ)\nの代表的なルーティングプロトコルには、ＯＳＰＦがある。\n② ルーティングプロトコルには、ルーティングアルゴリズムの違いによりディスタ\nンスベクタ型、リンクステート型などがあり、ディスタンスベクタ型の代表的なプ\nロトコルには、ＲＩＰがある。\n③ ディスタンスベクタ型のルーティングプロトコルは、一般に、ルータが保有して\nいるルーティングテーブルの情報を定期的に交換する手順を有している。\n④ リンクステート型のルーティングプロトコルでは、平常時においては他のルータ\nの動作の正常確認にＳＮＭＰパケットを用いている。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＰｖ６について述べたものである。 内の(ア)～(ウ)に最も適したも</p>\nのを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nＩＰｖ６のアドレスは１２８ bit で表現され、１２８ bit を (ア) 個のブロックに分\nけ、各ブロックをコロンで区切り、それぞれを１６進数で表示する方法が採られている。また、\nＩＰｖ４とＩＰｖ６のヘッダを比較すると、ＩＰｖ４ヘッダの長さは可変だが、ＩＰｖ６の基\n本ヘッダの長さは (イ) Ｂyte で固定であり、必要に応じて機能ごとに拡張ヘッダを付\n加する構成が採られている。\nインターネットにおいて、ＩＰｖ６とＩＰｖ４の共存を可能とするための方法の一つとして、\nＩＰｖ６パケットをＩＰｖ４パケットのペイロードとしてカプセル化して転送する (ウ)\n技術がある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ４ ② ８ ③ １６ ④ ２０\n⑤ ２４ ⑥ ３２ ⑦ ４０ ⑧ ６４\n⑨ アドレッシング ⑩ ルーティング\n⑪ トンネリング ⑫ フィルタリング\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６におけるプロトコル技術などについて述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＤＮＳサーバにおいて、ＩＰｖ６アドレス情報を登録・検索するためのリソース\nレコードのタイプには、一般に、ＡＡＡＡが用いられる。\n② ＤＨＣＰｖ６は、ＩＰｖ６ホストにＩＰアドレスなどの情報を自動設定するため\nのプロトコルであり、サーバの探索や設定情報の要求に対して、リンクローカルア\nドレスを用いた通信が行われる。\n③ ＩＣＭＰｖ６メッセージは、ＩＣＭＰｖ６パケットを用いてやり取りされ、パス\nＭＴＵ探索、近隣探索、マルチキャストリスナー探索などで利用される。\n④ ＩＣＭＰｖ６における近隣探索の機能には、ＩＰｖ６ホスト自身がＩＰｖ６アド\nレスを自動的に設定するステートフルアドレス自動生成機能、ＩＰｖ６アドレスが\n同一リンク上の他のノードで利用されていないことを確認する重複アドレス検出機\n能などがある。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルにおけるアプリケーション層のプロトコルについて述\nべた次の文章のうち、正しいものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＦＴＰは、異なるコンピュータ間でファイルを送受信する際などに用いられるプ\nロトコルであり、一般に、相手先コンピュータにログインすることなく、ファイル\nのアップロードに関する各種操作を行うことができる。\n② ＳＮＭＰは、ネットワーク管理を行う際に用いられるプロトコルであり、ＳＮＭＰ\nを用いることにより、ネットワークに接続されたサーバやルータの管理情報の取得\nや変更ができ、サーバやルータからは管理情報の通知ができる。\n③ ＳＭＴＰは、電子メールを配送する際に用いられるプロトコルであり、メールサーバ\n間の転送時及びクライアントでの受信時に用いられ、電子メールの送信時には、一\n般に、ＰＯＰ又はＩＭＡＰが用いられる。\n④ ＨＴＴＰは、一般に、ＷｅｂブラウザとＷｅｂサーバとの間でＷｅｂページのデータ\nの送受信を行う際に用いられるプロトコルであり、ＷｅｂブラウザからのＨＴＴＰ\nリクエストのメソッドは数字の列で、ＨＴＴＰレスポンスのステータスコードはア\nルファベットの文字列で表される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nルータにおける帯域制御及びパケットのキューイングについて述べた次の文章のうち、誤っ\nているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① プロトコルなどによって区分された複数のグループに対して、それぞれ必要な使\n用帯域を設定し、ラウンドロビンなどの技術を使用して帯域を制御することができ\nるキューイングは、一般に、カスタムキューイングといわれる。\n② ルータ内に優先度の異なる複数のキューを用意しておき、パケットをフローごと\nにそれぞれのキューに割り振り、優先度の高いキューからパケットを送出し、その\nキューのパケットが無くなるまで、優先度の低いキューのパケットを送出させない\nキューイングは、一般に、プライオリティキューイングといわれる。\n③ ルータ内にある複数のキューに対して優先度に対応した重みを設定し、キューの\n重みに従ってパケットの送出量を調整し、優先度が低いキューであってもある程度\n公平にパケット送出を行う機会が得られるキューイングは、一般に、ＷＦＱ(Weighted\nFair Queuing)といわれる。\nた\n④ ルータのキューに溜まったデータ量の平均値を監視し、平均値が指定された最小\nしきい ふくそう\n閾値を超えた場合に、ランダムに選択したパケットを廃棄することで輻輳を回避す\nる技術は、一般に、シェーピングといわれる。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＰｖ６について述べたものである。 内の(ア)～(ウ)に最も適したも\nのを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nＩＰｖ６のアドレスは１２８ bit で表現され、１２８ bit を (ア) 個のブロックに分\nけ、各ブロックをコロンで区切り、それぞれを１６進数で表示する方法が採られている。また、\nＩＰｖ４とＩＰｖ６のヘッダを比較すると、ＩＰｖ４ヘッダの長さは可変だが、ＩＰｖ６の基\n本ヘッダの長さは (イ) Ｂyte で固定であり、必要に応じて機能ごとに拡張ヘッダを付\n加する構成が採られている。\nインターネットにおいて、ＩＰｖ６とＩＰｖ４の共存を可能とするための方法の一つとして、\nＩＰｖ６パケットをＩＰｖ４パケットのペイロードとしてカプセル化して転送する (ウ)\n技術がある。\n<(ア)～(ウ)の解答群>\n① ４ ② ８ ③ １６ ④ ２０\n⑤ ２４ ⑥ ３２ ⑦ ４０ ⑧ ６４\n⑨ アドレッシング ⑩ ルーティング\n⑪ トンネリング ⑫ フィルタリング\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６におけるプロトコル技術などについて述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① ＤＮＳサーバにおいて、ＩＰｖ６アドレス情報を登録・検索するためのリソース\nレコードのタイプには、一般に、ＡＡＡＡが用いられる。\n② ＤＨＣＰｖ６は、ＩＰｖ６ホストにＩＰアドレスなどの情報を自動設定するため\nのプロトコルであり、サーバの探索や設定情報の要求に対して、リンクローカルア\nドレスを用いた通信が行われる。\n③ ＩＣＭＰｖ６メッセージは、ＩＣＭＰｖ６パケットを用いてやり取りされ、パス\nＭＴＵ探索、近隣探索、マルチキャストリスナー探索などで利用される。\n④ ＩＣＭＰｖ６における近隣探索の機能には、ＩＰｖ６ホスト自身がＩＰｖ６アド\nレスを自動的に設定するステートフルアドレス自動生成機能、ＩＰｖ６アドレスが\n同一リンク上の他のノードで利用されていないことを確認する重複アドレス検出機\n能などがある。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルにおけるアプリケーション層のプロトコルについて述\nべた次の文章のうち、正しいものは、 (オ) である。\n<(オ)の解答群>\n① ＦＴＰは、異なるコンピュータ間でファイルを送受信する際などに用いられるプ\nロトコルであり、一般に、相手先コンピュータにログインすることなく、ファイル\nのアップロードに関する各種操作を行うことができる。\n② ＳＮＭＰは、ネットワーク管理を行う際に用いられるプロトコルであり、ＳＮＭＰ\nを用いることにより、ネットワークに接続されたサーバやルータの管理情報の取得\nや変更ができ、サーバやルータからは管理情報の通知ができる。\n③ ＳＭＴＰは、電子メールを配送する際に用いられるプロトコルであり、メールサーバ\n間の転送時及びクライアントでの受信時に用いられ、電子メールの送信時には、一\n般に、ＰＯＰ又はＩＭＡＰが用いられる。\n④ ＨＴＴＰは、一般に、ＷｅｂブラウザとＷｅｂサーバとの間でＷｅｂページのデータ\nの送受信を行う際に用いられるプロトコルであり、ＷｅｂブラウザからのＨＴＴＰ\nリクエストのメソッドは数字の列で、ＨＴＴＰレスポンスのステータスコードはア\nルファベットの文字列で表される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nルータにおける帯域制御及びパケットのキューイングについて述べた次の文章のうち、誤っ\nているものは、 (カ) である。\n<(カ)の解答群>\n① プロトコルなどによって区分された複数のグループに対して、それぞれ必要な使\n用帯域を設定し、ラウンドロビンなどの技術を使用して帯域を制御することができ\nるキューイングは、一般に、カスタムキューイングといわれる。\n② ルータ内に優先度の異なる複数のキューを用意しておき、パケットをフローごと\nにそれぞれのキューに割り振り、優先度の高いキューからパケットを送出し、その\nキューのパケットが無くなるまで、優先度の低いキューのパケットを送出させない\nキューイングは、一般に、プライオリティキューイングといわれる。\n③ ルータ内にある複数のキューに対して優先度に対応した重みを設定し、キューの\n重みに従ってパケットの送出量を調整し、優先度が低いキューであってもある程度\n公平にパケット送出を行う機会が得られるキューイングは、一般に、ＷＦＱ(Weighted\nFair Queuing)といわれる。\nた\n④ ルータのキューに溜まったデータ量の平均値を監視し、平均値が指定された最小\nしきい ふくそう\n閾値を超えた場合に、ランダムに選択したパケットを廃棄することで輻輳を回避す\nる技術は、一般に、シェーピングといわれる。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＴＣＰの制御機能などについて述べたものである。 内の(ア)～(ウ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nＴＣＰでは、ネットワークの帯域を効率的に使用するためフロー制御を行う。フロー制御は\n大きく分けて、受信側のホストのバッファあふれに対するものとネットワークのあふれに対す\nるものがある。\n送信側が受信側の都合に関係なくデータパケットを送ると、受信側ではホストのバッファあ\nふれにより受信しきれなくなるおそれがある。これを回避するため、受信側から (ア) サ\nイズといわれる受信可能なデータサイズを送信側に通知すると、送信側ではこのデータサイズ\nを超えないようにデータを送信する。\nネットワークのあふれが発生すると、パケットロスなどにより送信側ではタイムアウトを検\n出する、受信側では期待しているものと異なるシーケンス番号を持つセグメントを受信すると\nいった事象が生ずる。\n送信側において、受信側からの確認応答を受け取れずタイムアウトになった場合は、\nふくそう\n(イ) 及び輻輳回避といわれる二つのアルゴリズムを組み合わせて、ネットワークに大き\nな負荷を与えることなしに復旧させる。\n即時再転送といわれるアルゴリズムでは、受信側で受信したセグメントのシーケンス番号が\n期待しているものと異なっていた場合には、受信できなかったセグメントのシーケンス番号を\n設定した確認応答を送信側へ直ちに返送する。送信側では、その確認応答と同じ確認応答を\n(ウ) 回連続して受信したときには、要求されているセグメントを直ちに再送する。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ２ ② ５ ③ リクエスト ④ スロースタート\n⑤ ３ ⑥ メモリ ⑦ ウインドウ ⑧ ホットスタート\n⑨ ４ ⑩ フレーム ⑪ 高速スタート ⑫ コールドスタート\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＶＬＡＮの技術について述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＩＥＥＥ８０２.１Ｑで規定されているＶＬＡＮタグを用いると、物理的に単一\nのＬＡＮを論理的に区別された最大４,０９４個のＶＬＡＮに分けることができる。\n② 広域イーサネットサービスを提供する方法として、ＩＥＥＥ８０２.１ａｄで規定\nされている拡張ＶＬＡＮがある。ＶＬＡＮタグとは別のタグをイーサネットフレーム\nに付加することで通信事業者のスイッチでは、個々のユーザのＭＡＣアドレスの管\n理が不要となる。\n③ ＩＥＥＥ８０２.１ａｄで規定されているＶＬＡＮタグには、通信事業者がユーザを\n識別するためのＳ－ＴＡＧと、ユーザがＶＬＡＮを区別するためのＣ－ＴＡＧがある。\n④ ＭＡＣ－ｉｎ－ＭＡＣは、ユーザのＭＡＣアドレスとは別に通信事業者の網内転\n送を行う専用のＭＡＣアドレスを用意してカプセル化する方法である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nルータで使われているルーティングテーブルについて述べた次の文章のうち、正しいものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① スタティックルーティングでは、ネットワークトポロジに変化があった場合には、\nルータ相互間で交換したルーティング情報をもとにして自動的にルーティングテー\nブルが更新される。\n② ルータでは、一般に、スタティックルーティングとダイナミックルーティングを\n組み合わせて利用することが可能であり、経路選択には、ルーティングプロトコル\nの優先度が考慮されたルーティングテーブルを用いる方法がある。\n③ ルータは、受信したパケットの宛先ＩＰアドレスとルーティングテーブルを照合\nして一致するエントリがない場合、ルータにループバックアドレスの設定がされて\nいるときは、パケットを破棄せずに他のネットワークへ転送する。\n④ ルーティングテーブルは、一般に、宛先ネットワークアドレス、宛先ＭＡＣアド\nレス、メトリックなどで構成される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＲＴＰ／ＲＴＣＰについて述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＲＴＰはリアルタイムデータを送信するためのトランスポート層プロトコルであ\nり、ユニキャストセッションで用いられるが、マルチキャストセッションでは用い\nられない。\n② ＲＴＰでは、セッション内で送信元が独自に設定する同期送信元識別子(ＳＳＲＣ)\nを用いてリアルタイム通信の送信元を識別する。\n③ ＲＴＰでは、送信側でタイムスタンプ、シーケンス番号、ペイロードタイプなど\nをＲＴＰヘッダ情報として送出し、受信側でそれらを参照することにより、タイミ\nング情報の抽出、パケット損失の検出などを行う。\n④ ＲＴＣＰのセッション制御機能によって、データ転送におけるパケット損失など\nの品質低下を検知した場合には、アプリケーションへ情報提供を行う。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＴＣＰの制御機能などについて述べたものである。 内の(ア)～(ウ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nＴＣＰでは、ネットワークの帯域を効率的に使用するためフロー制御を行う。フロー制御は\n大きく分けて、受信側のホストのバッファあふれに対するものとネットワークのあふれに対す\nるものがある。\n送信側が受信側の都合に関係なくデータパケットを送ると、受信側ではホストのバッファあ\nふれにより受信しきれなくなるおそれがある。これを回避するため、受信側から (ア) サ\nイズといわれる受信可能なデータサイズを送信側に通知すると、送信側ではこのデータサイズ\nを超えないようにデータを送信する。\nネットワークのあふれが発生すると、パケットロスなどにより送信側ではタイムアウトを検\n出する、受信側では期待しているものと異なるシーケンス番号を持つセグメントを受信すると\nいった事象が生ずる。\n送信側において、受信側からの確認応答を受け取れずタイムアウトになった場合は、\nふくそう\n(イ) 及び輻輳回避といわれる二つのアルゴリズムを組み合わせて、ネットワークに大き\nな負荷を与えることなしに復旧させる。\n即時再転送といわれるアルゴリズムでは、受信側で受信したセグメントのシーケンス番号が\n期待しているものと異なっていた場合には、受信できなかったセグメントのシーケンス番号を\n設定した確認応答を送信側へ直ちに返送する。送信側では、その確認応答と同じ確認応答を\n(ウ) 回連続して受信したときには、要求されているセグメントを直ちに再送する。\n<(ア)～(ウ)の解答群>\n① ２ ② ５ ③ リクエスト ④ スロースタート\n⑤ ３ ⑥ メモリ ⑦ ウインドウ ⑧ ホットスタート\n⑨ ４ ⑩ フレーム ⑪ 高速スタート ⑫ コールドスタート\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＶＬＡＮの技術について述べた次の文章のうち、誤っているものは、 (エ) である。\n<(エ)の解答群>\n① ＩＥＥＥ８０２.１Ｑで規定されているＶＬＡＮタグを用いると、物理的に単一\nのＬＡＮを論理的に区別された最大４,０９４個のＶＬＡＮに分けることができる。\n② 広域イーサネットサービスを提供する方法として、ＩＥＥＥ８０２.１ａｄで規定\nされている拡張ＶＬＡＮがある。ＶＬＡＮタグとは別のタグをイーサネットフレーム\nに付加することで通信事業者のスイッチでは、個々のユーザのＭＡＣアドレスの管\n理が不要となる。\n③ ＩＥＥＥ８０２.１ａｄで規定されているＶＬＡＮタグには、通信事業者がユーザを\n識別するためのＳ－ＴＡＧと、ユーザがＶＬＡＮを区別するためのＣ－ＴＡＧがある。\n④ ＭＡＣ－ｉｎ－ＭＡＣは、ユーザのＭＡＣアドレスとは別に通信事業者の網内転\n送を行う専用のＭＡＣアドレスを用意してカプセル化する方法である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nルータで使われているルーティングテーブルについて述べた次の文章のうち、正しいものは、\n(オ) である。\n<(オ)の解答群>\n① スタティックルーティングでは、ネットワークトポロジに変化があった場合には、\nルータ相互間で交換したルーティング情報をもとにして自動的にルーティングテー\nブルが更新される。\n② ルータでは、一般に、スタティックルーティングとダイナミックルーティングを\n組み合わせて利用することが可能であり、経路選択には、ルーティングプロトコル\nの優先度が考慮されたルーティングテーブルを用いる方法がある。\n③ ルータは、受信したパケットの宛先ＩＰアドレスとルーティングテーブルを照合\nして一致するエントリがない場合、ルータにループバックアドレスの設定がされて\nいるときは、パケットを破棄せずに他のネットワークへ転送する。\n④ ルーティングテーブルは、一般に、宛先ネットワークアドレス、宛先ＭＡＣアド\nレス、メトリックなどで構成される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＲＴＰ／ＲＴＣＰについて述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① ＲＴＰはリアルタイムデータを送信するためのトランスポート層プロトコルであ\nり、ユニキャストセッションで用いられるが、マルチキャストセッションでは用い\nられない。\n② ＲＴＰでは、セッション内で送信元が独自に設定する同期送信元識別子(ＳＳＲＣ)\nを用いてリアルタイム通信の送信元を識別する。\n③ ＲＴＰでは、送信側でタイムスタンプ、シーケンス番号、ペイロードタイプなど\nをＲＴＰヘッダ情報として送出し、受信側でそれらを参照することにより、タイミ\nング情報の抽出、パケット損失の検出などを行う。\n④ ＲＴＣＰのセッション制御機能によって、データ転送におけるパケット損失など\nの品質低下を検知した場合には、アプリケーションへ情報提供を行う。"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＰ網におけるルーティングプロトコルの概要について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nルーティングプロトコルは、自律システム(ＡＳ)内部の経路制御を行う際に利用されるＩＧＰ\nと、ＡＳ間の経路制御を行う際に利用される (ア) に分けることができる。\nＩＧＰに分類されるＯＳＰＦでは、ルータは、ＯＳＰＦパケットを利用してルータ自身が\n保持しているリンク情報を交換することにより、データベース(ＬＳＤＢ)を作成する。ＡＳ内\nのルータは同じＬＳＤＢを基に最適な経路を選択する。経路選択に用いる指標であるメトリッ\nクとしては、 (イ) を用いている。\n(ア) に分類されるＢＧＰを実行するルータ(ＢＧＰスピーカ)は、経路情報として、通過\nしてきたＡＳの番号などの (ウ) といわれる情報と、ＡＳが持つＩＰアドレス(ＮＬＲＩ)\nを交換することにより、ＡＳ間の経路制御を行う。ＢＧＰでは、一般に、通過するＡＳの数が\n最も少ない経路が最適経路として選択される。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ホップ数 ② ＩＧＭＰ ③ ポート番号 ④ Ｈｅｌｌｏパケット\n⑤ ＤＨＣＰ ⑥ コスト値 ⑦ 遅延時間 ⑧ ＭＴＵサイズ\n⑨ ＥＧＰ ⑩ パス属性 ⑪ ＶＲＲＰ ⑫ ＭＡＣアドレス\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nルータの機能などについて述べた次の文章のうち、正しいものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① 外部ネットワークと通信する場合、ポート番号を用いてローカルネットワーク内\nの複数のプライベートＩＰアドレスを一つのグローバルＩＰアドレスに変換する機\n能は、一般に、ステルスモードといわれる。\n② ルータのフィルタリング機能を用いると、ＩＰパケットのネットワークアドレス\n単位やポート番号単位でのＩＰパケットの制御が可能であり、特定のＩＰパケット\nだけを転送するように制限することができる。\nしきい\n③ ルータのキューに蓄積されたデータ量の平均値を監視し、平均値が指定された閾値\nふくそう\nを超えた場合に、ランダムに選択したパケットを廃棄することで輻輳を回避する技\n術は、一般に、シェーピングといわれる。\n④ ルータが優先度の異なる送信キューにキューイングされたパケットを優先度に従っ\nてキューから取り出すことは、一般に、ポリシングといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルなどの特徴について述べた次の文章のうち、誤ってい\nるものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＴＣＰ／ＩＰのプロトコル階層モデルはインターネットプロトコルスタックとし\nて４階層で構成されており、一般に、最下位の層はネットワークインタフェース層\nといわれ、データリンクを利用して通信するための機能を担っている。\n② ＴＣＰ及びＵＤＰは、トランスポート層のプロトコルであり、ポート番号を用い\nてアプリケーション層のアプリケーションプログラムが扱うサービスの種類などを\n識別している。\n③ ＴＣＰは、再送制御機能及びウインドウ制御機能を有し、ＵＤＰは、輻輳を回避\nする制御機能、コネクションの確立や切断などを行う管理機能を有する。\n④ ＴＣＰは、受信側のバッファの空き状況に応じて受信可能なデータのサイズを受\n信側から送信側に対して通知し、送信するデータ量を制御するフロー制御機能を有\nする。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６の特徴について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＩＰｖ６のアドレスサイズは１２８ bit であり、そのアドレス表記は８ bit ず\nつ１６個のブロックに分けて各ブロックを１６進数で表し、ブロック間をコロン記\n号で区切る。\n② ＩＰｖ６では、ノードの一つのインタフェースに対して複数のＩＰｖ６アドレス\nを割り当てることができる。\n③ ＩＰｖ６拡張ヘッダとしてパケットデータの暗号化に利用する暗号化ペイロード\nヘッダやパケットデータの完全性を保証するための認証ヘッダを組み込むことで、\nセキュリティ機能を備えることができる。\n④ ＩＰｖ６パケットの基本ヘッダのヘッダ長は４０ オクテット に固定されており、\n拡張ヘッダは、必要に応じて機能ごとにペイロード部の先頭に配置される。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＰ網におけるルーティングプロトコルの概要について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nルーティングプロトコルは、自律システム(ＡＳ)内部の経路制御を行う際に利用されるＩＧＰ\nと、ＡＳ間の経路制御を行う際に利用される (ア) に分けることができる。\nＩＧＰに分類されるＯＳＰＦでは、ルータは、ＯＳＰＦパケットを利用してルータ自身が\n保持しているリンク情報を交換することにより、データベース(ＬＳＤＢ)を作成する。ＡＳ内\nのルータは同じＬＳＤＢを基に最適な経路を選択する。経路選択に用いる指標であるメトリッ\nクとしては、 (イ) を用いている。\n(ア) に分類されるＢＧＰを実行するルータ(ＢＧＰスピーカ)は、経路情報として、通過\nしてきたＡＳの番号などの (ウ) といわれる情報と、ＡＳが持つＩＰアドレス(ＮＬＲＩ)\nを交換することにより、ＡＳ間の経路制御を行う。ＢＧＰでは、一般に、通過するＡＳの数が\n最も少ない経路が最適経路として選択される。\n<(ア)～(ウ)の解答群>\n① ホップ数 ② ＩＧＭＰ ③ ポート番号 ④ Ｈｅｌｌｏパケット\n⑤ ＤＨＣＰ ⑥ コスト値 ⑦ 遅延時間 ⑧ ＭＴＵサイズ\n⑨ ＥＧＰ ⑩ パス属性 ⑪ ＶＲＲＰ ⑫ ＭＡＣアドレス\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nルータの機能などについて述べた次の文章のうち、正しいものは、 (エ) である。\n<(エ)の解答群>\n① 外部ネットワークと通信する場合、ポート番号を用いてローカルネットワーク内\nの複数のプライベートＩＰアドレスを一つのグローバルＩＰアドレスに変換する機\n能は、一般に、ステルスモードといわれる。\n② ルータのフィルタリング機能を用いると、ＩＰパケットのネットワークアドレス\n単位やポート番号単位でのＩＰパケットの制御が可能であり、特定のＩＰパケット\nだけを転送するように制限することができる。\nしきい\n③ ルータのキューに蓄積されたデータ量の平均値を監視し、平均値が指定された閾値\nふくそう\nを超えた場合に、ランダムに選択したパケットを廃棄することで輻輳を回避する技\n術は、一般に、シェーピングといわれる。\n④ ルータが優先度の異なる送信キューにキューイングされたパケットを優先度に従っ\nてキューから取り出すことは、一般に、ポリシングといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルなどの特徴について述べた次の文章のうち、誤ってい\nるものは、 (オ) である。\n<(オ)の解答群>\n① ＴＣＰ／ＩＰのプロトコル階層モデルはインターネットプロトコルスタックとし\nて４階層で構成されており、一般に、最下位の層はネットワークインタフェース層\nといわれ、データリンクを利用して通信するための機能を担っている。\n② ＴＣＰ及びＵＤＰは、トランスポート層のプロトコルであり、ポート番号を用い\nてアプリケーション層のアプリケーションプログラムが扱うサービスの種類などを\n識別している。\n③ ＴＣＰは、再送制御機能及びウインドウ制御機能を有し、ＵＤＰは、輻輳を回避\nする制御機能、コネクションの確立や切断などを行う管理機能を有する。\n④ ＴＣＰは、受信側のバッファの空き状況に応じて受信可能なデータのサイズを受\n信側から送信側に対して通知し、送信するデータ量を制御するフロー制御機能を有\nする。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６の特徴について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① ＩＰｖ６のアドレスサイズは１２８ bit であり、そのアドレス表記は８ bit ず\nつ１６個のブロックに分けて各ブロックを１６進数で表し、ブ
