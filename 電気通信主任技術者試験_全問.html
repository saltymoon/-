の取組について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 教育・訓練における対策の一つに、電気通信設備の損壊又は故障等の発生リスク\nに係る調査等により判明した各リスクに対して復旧措置等の訓練を実施することが\nある。\n② 維持・運用における対策の一つに、データ投入等における高い信頼性が求められ\nる作業において、容易に誤りが混入しないよう措置を講ずることがある。\n③ ヒューマンエラー防止策における対策の一つに、情報通信ネットワークの設計、\n工事、維持及び運用に係る各作業を複数の担当者で実施し、作業手順の承認手続は\n多段階にならないように迅速に行うことがある。\n④ リスク管理における対策の一つに、利用者の利益に及ぼす影響が大きい設備の損\n壊又は故障等の発生リスクを定期的に調査及び分析することがある。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n故障解析手法の一つであるＦＴＡについて述べた次の文章のうち、正しいものは、 (キ)\nである。\n<(キ)の解答群>\n① ＦＴＡでは、故障要因と事象の因果関係について、基本事象などを表す事象記号、\nＡＮＤゲートやＯＲゲートなどの論理記号などを用いてＰＤＰＣ図を作成し故障解\n析が行われる。\n② ＦＴＡは、ＦＭＥＡでは扱いにくいとされるヒューマンエラーや多重故障に関係\nする事象の解析に用いられる。\n③ ＦＴＡは、望ましくない事象(頂上事象)を明示し、その原因に向かって故障要因\nなどを整理して基本事象にまで展開することで頂上事象の要因解析などを行うボト\nムアップ型の手法として用いられる。\n④ ＦＴＡは、複雑なシステムに対して頂上事象までの故障経路を特定するための有\n効な手法ではあるが、基本事象の発生確率が判明していても頂上事象の発生確率を\n予測できない。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n故障率の特徴などについて述べた次の文章のうち、正しいものは、 (ク) である。\n<(ク)の解答群>\n① ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品の使用に先立ち、\nバーンインなどによりスクリーニングを行い、初期において故障率が高いものを除\nくことで故障率の低い良品を選ぶことができる。\n② ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品はある特定期間\nに故障が集中する傾向があり、故障が集中的に起こる直前に事前取替を行うことで\n未然に故障を防止できる。\n③ ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の寿命分布は、\n正規分布に従う。\n④ ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の時間当たりの\n故障の発生は一定で、その故障発生時期の予測が可能である。\n\n(６) 次の文章は、あるシステムの信頼度について述べたものである。 内の(ケ)、(コ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、図は信頼度に関する概念\n図であり、図中の 内の数字はそれぞれの構成装置の信頼度を示している。\nなお、答えは、四捨五入により小数第３位までとする。 (３点×２＝６点)\nサブシステム１ サブシステム２\n(装置Ａ２台構成) (装置Ｂ３台構成)\n０.７００ ０.８００\n０.８００\n０.７００ ０.８００\n(ⅰ) 同じ信頼度の装置Ａ２台が１／２冗長構成であるサブシステム１の信頼度は、 (ケ) で\nある。\n(ⅱ) 同じ信頼度の装置Ｂ３台からなるサブシステム２が２／３多数決冗長構成であるとき、サブ\nシステム１とサブシステム２を接続した全体のシステムの信頼度は、 (コ) である。\n<(ケ)、(コ)の解答群>\n① ０.０９０ ② ０.２５１ ③ ０.４９０ ④ ０.５１０\n⑤ ０.８１５ ⑥ ０.８９６ ⑦ ０.９０３ ⑧ ０.９１０"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、電気通信設備工事などにおける作業者の安全に関するヒューマンエラーの対策な</p>\nどについて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群か\nら選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\nヒューマンエラーとは、 (ア) 結果を生ずる人間の行為のことをいい、ヒューマンエ\nラーであるかどうかは、見間違えた、やり間違えた、やり忘れたなどのように過去形で表され\nる出来事であって、さらに結果が好ましくない状態であるときに後から判断される。安全に関\nするヒューマンエラー対策には、現場の安全管理と安全教育の強化、作業員の自主的な安全活\n動の促進、安全設備の充実などがある。\n現場の安全管理と安全教育の強化によるヒューマンエラー対策の一つに、イラストや写真を\n用いたシートを活用し、職場の小単位のグループが短時間で行う危険予知訓練(ＫＹＴ)がある。\nＫＹＴの進め方には、現状把握、 (イ) 、対策樹立及び目標設定の手順で進めていく４Ｒ\n法がある。\n作業員の自主的な安全活動の促進によるヒューマンエラー対策の一つに、作業開始前に職場\nの小単位のグループが短時間で仕事の範囲、段取り、各人ごとの作業の安全のポイントなどに\nついて打合せを行う (ウ) がある。\n安全設備の充実によるヒューマンエラー対策の一つに、人為的に不適切な行為、過失などが\n起こってもシステムの信頼性及び安全性を保持したり、人間が間違いづらいようにしたりする\n設計上の手法である (エ) の導入がある。 (エ) の具体例としては、間違ったケーブ\nルどうしが接続できないようにコネクタの形状を工夫するなどが挙げられる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 計画策定 ② フェールセーフ ③ フォールトマスキング\n④ ＺＤ運動 ⑤ フェールソフト ⑥ 原因を推測できない\n⑦ 本質追究 ⑧ フールプルーフ ⑨ ヒヤリハット運動\n⑩ ＱＣ活動 ⑪ ギャップ分析 ⑫ 意図しない\n⑬ 仮説立案 ⑭ 作為的な ⑮ 予測し得る\n⑯ ツールボックスミーティング\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ９０００：２０１５品質マネジメントシステム－基本及び用語に規定されている\n用語及び定義について述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 品質計画とは、品質目標を設定すること及び必要な運用プロセスを規定すること、\n並びにその品質目標を達成するための関連する資源に焦点を合わせた品質マネジメ\nントの一部をいう。\n② 品質保証とは、品質要求事項を満たす能力を高めることに焦点を合わせた品質マ\nネジメントの一部をいう。\n③ 要求事項とは、明示されている、通常暗黙のうちに了解されている又は義務とし\nて要求されている、ニーズ又は期待をいう。\n④ プロジェクトマネジメントとは、プロジェクトの目標を達成するために、プロジェ\nクトの全側面を計画し、組織し、監視し、管理し、報告すること、及びプロジェク\nトに参画する人々全員への動機付けを行うことをいう。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n工程管理で用いられるアローダイアグラムの特徴などについて述べた次の文章のうち、正し\nいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 作業相互間の関係を示すダミー作業は、破線の矢線で表示され、所要日数が０\n(ゼロ)であるため、クリティカルパスを決定する際に考慮する必要はない。\n② 最早結合点時刻とは、スタートの結合点から対象となる結合点に至る経路のうち、\n時間的に最も短い経路を通って最も早く到達する結合点の時刻のことをいう。\n③ 最遅結合点時刻とは、対象となる結合点から終了結合点に至る経路のうち、時間\n的に最も長い経路を通ってプロジェクトの終了時刻に間に合う最も遅い開始時刻の\nことをいう。\n④ 作業の余裕時間としてこれ以上使ってしまうと工期が延びてしまうような最大限\nの余裕時間はトータルフロートといわれ、どの作業においてもトータルフロートは\nフリーフロートより小さいか同じとなる。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n予防保全の概要、種類などについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は予防保全\nといわれ、予防保全を行わないと、大きな休止損失を招いたり、品質と安全性の面で問題を\n生じたりすることがある。\nＢ あらかじめ設定した時間計画に従って実行される予防保全は時間計画保全といわれ、予定\nの時間間隔で実施する定期保全及び保全対象設備が予定の累積動作時間に達したときに行う\n経時保全に分類される。\nＣ 設備の故障の兆候を監視して必要なときに措置を行う状態監視保全は、予防保全の一形態\nであり、統計的・数理的に故障が予測できない場合に有効である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n内閣府から公表されている事業継続ガイドライン(令和５年３月)における事業継続マネジメ\nント(ＢＣＭ)の概要などについて述べた次の文章のうち、誤っているものは、 (ク) であ\nる。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ＢＣＭは、事業継続計画(ＢＣＰ)策定や維持・更新、事業継続を実現するための\n予算・資源の確保、事前対策の実施、取組を浸透させるための教育・訓練の実施、\n点検、継続的な改善などを行う平常時からのマネジメント活動とされている。\n② 企業・組織は、様々な危機的な発生事象に直面しても、利害関係者から、重要な\n事業の継続又は早期の復旧を望まれているため、このような利害関係者のニーズと\n期待を十分に認識し、ＢＣＭを積極的に経営戦略に反映すべきである。\n③ ＢＣＭは、企業・組織全体のマネジメントとして継続的・体系的に取り組むこと\nが重要である。その手法として、例えば、ＰＤＣＡサイクルなどのマネジメントに\n関する仕組みの活用も有効である。\n④ ＢＣＭは、どのような危機的な事象が発生しても重要業務を継続するという目的\nで実施するものであることを考慮することが重要である。この点から、ＢＣＭでは、\n自社に生じた事態を結果事象(例えば、自社の○○拠点が使用不能)により考えるの\nではなく、原因事象(例えば、直下型地震)により考え、対応策を検討することが推\n奨される。\n<p class=\"sub-h\">(６) 次の文章は、システムの信頼性について述べたものである。 内の(ケ)、(コ)に最も</p>\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、システムを構成す\nる装置は偶発故障期間にあるものとする。 (３点×２＝６点)\n１\n(ⅰ) 図に示すように、信頼度０.７である装置Ａが、ｎ台並列に接続されている 冗長システム\nｎ\nにおいて、システム全体の信頼度を０.９９９９以上にするためには、装置Ａの台数である\nｎを少なくとも (ケ) 以上とする必要がある。ただし、log ３＝０.４７７とする。\n10\nＡ\n1\nＡ\n2\nＡn\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① ５ ② ６ ③ ８ ④ １０ ⑤ ２０ ⑥ ２６\n(ⅱ) あるシステムのアベイラビリティ及びＭＴＴＲについて、ある運用期間内において調査した\nところ、アベイラビリティが９９.５ ％ 、ＭＴＴＲが４ 時間 であった。このシステムの\n調査した期間内の故障率は、 (コ) 件／時間 である。ただし、答えは四捨五入して有効\n数字３桁とする。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① １.２６×１０－３ ② ４.１５×１０－３ ③ ２.０１×１０－２\n④ ２.４９×１０－１ ⑤ ２.５１×１０－１ ⑥ ７.４９×１０－１", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、電気通信設備工事などにおける作業者の安全に関するヒューマンエラーの対策な\nどについて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群か\nら選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\nヒューマンエラーとは、 (ア) 結果を生ずる人間の行為のことをいい、ヒューマンエ\nラーであるかどうかは、見間違えた、やり間違えた、やり忘れたなどのように過去形で表され\nる出来事であって、さらに結果が好ましくない状態であるときに後から判断される。安全に関\nするヒューマンエラー対策には、現場の安全管理と安全教育の強化、作業員の自主的な安全活\n動の促進、安全設備の充実などがある。\n現場の安全管理と安全教育の強化によるヒューマンエラー対策の一つに、イラストや写真を\n用いたシートを活用し、職場の小単位のグループが短時間で行う危険予知訓練(ＫＹＴ)がある。\nＫＹＴの進め方には、現状把握、 (イ) 、対策樹立及び目標設定の手順で進めていく４Ｒ\n法がある。\n作業員の自主的な安全活動の促進によるヒューマンエラー対策の一つに、作業開始前に職場\nの小単位のグループが短時間で仕事の範囲、段取り、各人ごとの作業の安全のポイントなどに\nついて打合せを行う (ウ) がある。\n安全設備の充実によるヒューマンエラー対策の一つに、人為的に不適切な行為、過失などが\n起こってもシステムの信頼性及び安全性を保持したり、人間が間違いづらいようにしたりする\n設計上の手法である (エ) の導入がある。 (エ) の具体例としては、間違ったケーブ\nルどうしが接続できないようにコネクタの形状を工夫するなどが挙げられる。\n<(ア)～(エ)の解答群>\n① 計画策定 ② フェールセーフ ③ フォールトマスキング\n④ ＺＤ運動 ⑤ フェールソフト ⑥ 原因を推測できない\n⑦ 本質追究 ⑧ フールプルーフ ⑨ ヒヤリハット運動\n⑩ ＱＣ活動 ⑪ ギャップ分析 ⑫ 意図しない\n⑬ 仮説立案 ⑭ 作為的な ⑮ 予測し得る\n⑯ ツールボックスミーティング\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ９０００：２０１５品質マネジメントシステム－基本及び用語に規定されている\n用語及び定義について述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 品質計画とは、品質目標を設定すること及び必要な運用プロセスを規定すること、\n並びにその品質目標を達成するための関連する資源に焦点を合わせた品質マネジメ\nントの一部をいう。\n② 品質保証とは、品質要求事項を満たす能力を高めることに焦点を合わせた品質マ\nネジメントの一部をいう。\n③ 要求事項とは、明示されている、通常暗黙のうちに了解されている又は義務とし\nて要求されている、ニーズ又は期待をいう。\n④ プロジェクトマネジメントとは、プロジェクトの目標を達成するために、プロジェ\nクトの全側面を計画し、組織し、監視し、管理し、報告すること、及びプロジェク\nトに参画する人々全員への動機付けを行うことをいう。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n工程管理で用いられるアローダイアグラムの特徴などについて述べた次の文章のうち、正し\nいものは、 (カ) である。\n<(カ)の解答群>\n① 作業相互間の関係を示すダミー作業は、破線の矢線で表示され、所要日数が０\n(ゼロ)であるため、クリティカルパスを決定する際に考慮する必要はない。\n② 最早結合点時刻とは、スタートの結合点から対象となる結合点に至る経路のうち、\n時間的に最も短い経路を通って最も早く到達する結合点の時刻のことをいう。\n③ 最遅結合点時刻とは、対象となる結合点から終了結合点に至る経路のうち、時間\n的に最も長い経路を通ってプロジェクトの終了時刻に間に合う最も遅い開始時刻の\nことをいう。\n④ 作業の余裕時間としてこれ以上使ってしまうと工期が延びてしまうような最大限\nの余裕時間はトータルフロートといわれ、どの作業においてもトータルフロートは\nフリーフロートより小さいか同じとなる。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n予防保全の概要、種類などについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は予防保全\nといわれ、予防保全を行わないと、大きな休止損失を招いたり、品質と安全性の面で問題を\n生じたりすることがある。\nＢ あらかじめ設定した時間計画に従って実行される予防保全は時間計画保全といわれ、予定\nの時間間隔で実施する定期保全及び保全対象設備が予定の累積動作時間に達したときに行う\n経時保全に分類される。\nＣ 設備の故障の兆候を監視して必要なときに措置を行う状態監視保全は、予防保全の一形態\nであり、統計的・数理的に故障が予測できない場合に有効である。\n<(キ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n内閣府から公表されている事業継続ガイドライン(令和５年３月)における事業継続マネジメ\nント(ＢＣＭ)の概要などについて述べた次の文章のうち、誤っているものは、 (ク) であ\nる。\n<(ク)の解答群>\n① ＢＣＭは、事業継続計画(ＢＣＰ)策定や維持・更新、事業継続を実現するための\n予算・資源の確保、事前対策の実施、取組を浸透させるための教育・訓練の実施、\n点検、継続的な改善などを行う平常時からのマネジメント活動とされている。\n② 企業・組織は、様々な危機的な発生事象に直面しても、利害関係者から、重要な\n事業の継続又は早期の復旧を望まれているため、このような利害関係者のニーズと\n期待を十分に認識し、ＢＣＭを積極的に経営戦略に反映すべきである。\n③ ＢＣＭは、企業・組織全体のマネジメントとして継続的・体系的に取り組むこと\nが重要である。その手法として、例えば、ＰＤＣＡサイクルなどのマネジメントに\n関する仕組みの活用も有効である。\n④ ＢＣＭは、どのような危機的な事象が発生しても重要業務を継続するという目的\nで実施するものであることを考慮することが重要である。この点から、ＢＣＭでは、\n自社に生じた事態を結果事象(例えば、自社の○○拠点が使用不能)により考えるの\nではなく、原因事象(例えば、直下型地震)により考え、対応策を検討することが推\n奨される。\n\n(６) 次の文章は、システムの信頼性について述べたものである。 内の(ケ)、(コ)に最も\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、システムを構成す\nる装置は偶発故障期間にあるものとする。 (３点×２＝６点)\n１\n(ⅰ) 図に示すように、信頼度０.７である装置Ａが、ｎ台並列に接続されている 冗長システム\nｎ\nにおいて、システム全体の信頼度を０.９９９９以上にするためには、装置Ａの台数である\nｎを少なくとも (ケ) 以上とする必要がある。ただし、log ３＝０.４７７とする。\n10\nＡ\n1\nＡ\n2\nＡn\n<(ケ)の解答群>\n① ５ ② ６ ③ ８ ④ １０ ⑤ ２０ ⑥ ２６\n(ⅱ) あるシステムのアベイラビリティ及びＭＴＴＲについて、ある運用期間内において調査した\nところ、アベイラビリティが９９.５ ％ 、ＭＴＴＲが４ 時間 であった。このシステムの\n調査した期間内の故障率は、 (コ) 件／時間 である。ただし、答えは四捨五入して有効\n数字３桁とする。\n<(コ)の解答群>\n① １.２６×１０－３ ② ４.１５×１０－３ ③ ２.０１×１０－２\n④ ２.４９×１０－１ ⑤ ２.５１×１０－１ ⑥ ７.４９×１０－１"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、建設工事における日程短縮の方法について述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n図に示すアローダイアグラムにおいて、以下に記すⓐ～ⓓの手順によりクリティカルパスの\n所要日数を最小の増加費用で５日間短縮することを検討する。ここで、表は、図に示す作業の\n短縮可能日数と総短縮費用を示している。また、それぞれの作業を１日短縮するために必要な\n費用(以下、費用勾配という。)は、総短縮費用を短縮可能日数で除した値とする。\nⓐ 当該アローダイアグラムにおけるクリティカルパス上の作業のうち、費用勾配が最も小\nさい作業の作業日数を短縮可能な日数分短縮する。このときの短縮費用は、 (ア) と\nなる。\nⓑ 次にクリティカルパス上で、ⓐの手順で作業日数を短縮した作業以外で短縮可能な作業\nのうち、費用勾配が最も小さい作業 (イ) の作業日数を２日だけ短縮する。このとき\nのクリティカルパスの所要日数は、 (ウ) である。\nⓒ 続けてクリティカルパスを考慮して、最小の短縮費用で当初のクリティカルパスの所要\n日数を５日間短縮するように、短縮する作業及び短縮日数を決定する。\nⓓ 上記ⓐ～ⓒより、当初のクリティカルパスの所要日数を５日間短縮するために必要とな\nる短縮費用は、 (エ) と求められる。\n作業Ｅ\n５\n９日\n作業Ａ 作業Ｃ 作業Ｆ 作業Ｇ\n１ ２ ４ ６ ７\n５日 ８日 １０日 ８日\n作業Ｂ 作業Ｄ\n３\n２日 ２０日\n作業 短縮可能日数（日） 総短縮費用（万円）\nＡ ２ １０\nＢ １ ５\nＣ ３ ３０\nＤ ４ ６０\nＥ ３ １５\nＦ ３ ６０\nＧ ２ ４０\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ５万円 ② ５０万円 ③ ２８日 ④ Ａ\n⑤ １０万円 ⑥ ５５万円 ⑦ ２９日 ⑧ Ｂ\n⑨ １５万円 ⑩ ６０万円 ⑪ ３０日 ⑫ Ｃ\n⑬ ２０万円 ⑭ ６５万円 ⑮ ３１日 ⑯ Ｄ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n建設工事における設計図書などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 工事請負契約において仕様書や契約図面、それらに対する現場説明書及び現場説明に対す\nる質問回答書などは、一般に、設計図書といわれ、工事請負契約時の契約図書に含まれる。\nＢ 現場説明書は、一般に、工事の入札に参加するものに対して発注者が当該工事の契約条件\nなどを説明するための書類とされている。\nＣ 設計図書で要求された品質を満たすために、受注者が請負工事における工法の精度の目標、\n品質管理及び体制について具体的に示すことは、一般に、品質計画といわれる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n職場における安全活動などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\nしつけ\n① ５Ｓ活動の５Ｓは、整理・整頓・清掃・清潔・躾のそれぞれのローマ字表記の頭\n文字をとったものであり、このうち整理とは、必要なものと不必要なものを区分し、\n不必要なものを捨てることとされている。\n② ＱＣサークル活動では、計画(PLAN)→実施(DO)→評価(CHECK)→改善(ACT)のＰＤＣＡ\nサイクルを回すことによって職場の管理・改善が継続的に行われる。\n③ ヒヤリハット活動は、労働災害における経験則の一つであるハインリッヒの法則\nなどに基づいており、重大な事故の発生を未然に防止するための有効な活動とされ\nている。\n④ ハインリッヒの法則は、１：２９：３００の法則ともいわれ、１件の重い災害が\nあったとすると、２９件の無傷害事故、３００件の不安全行動や不安全状態がある\nことを指摘している。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n故障に対応するためのシステム設計技術などについて述べた次の文章のうち、正しいものは、\n(キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① システムの故障発生を少なくして平均動作可能時間を長くするための信頼性設計\n技術には、使用部品数の低減、実績のある標準品の採用、システムの直列化、フォー\nルトトレランスの導入などがある。\n② システムや装置を構成する部品の特性値の経時変化による故障には劣化故障があ\nり、劣化故障を設計段階から予測するための具体的な手法として、モンテカルロ法\nなどが用いられる。\n③ ＦＭＥＡは、システムや装置の故障原因として考えられる故障モードなどがシス\nテム全体に及ぼす影響を予測し、システムに潜在する弱点を摘出するトップダウン\n的手法である。\n④ ＦＴＡは、あらかじめ対象システムにとって望ましくない複数の事象を規定し、\nそれを発生させ得る原因事象を洗い出してツリー状に展開する手法である。ＦＴＡ\nは、一般に、シンプルなシステムや顕在化した不具合事象を解析するのに適してい\nる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n電気通信事故等に係る電気通信事業法関係法令の適用に関するガイドライン(第７版)におけ\nる、総務大臣への報告を義務付けられている事故又は事故が生ずるおそれがあると認められる\n事態の該当性の判断基準のうち、影響を与えた利用者数(以下、影響利用者数という。)及び役\n務の提供の停止又は品質の低下した時間(以下、継続時間という。)の算定について述べた次の\n文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 影響利用者数の算定に当たっては、現実に役務の提供の停止又は品質の低下に該\n当した利用者のみを算定し、二重化、ルート分散等によりこれらに該当しなかった\n利用者は対象としない。\n② 緊急通報を扱う音声伝送役務において、電気通信設備が完全に故障して通信が全\nくできなくなった場合の緊急通報に影響を与えた影響利用者数は、故障中に使用し\nなかった者も含めた、故障した設備配下の全利用者の数とする。\n③ 携帯電話等において、役務の提供の停止を受けた利用者の数の把握が困難である\nと総務大臣が認める場合の影響利用者数は、停止基地局の提供区域にいる利用者の\n数とする。\n④ 継続時間の算定に当たっては、品質の低下の状態が一時的に改善した時間帯は、\n事故の継続時間から除外する。\n<p class=\"sub-h\">(６) 次の文章は、修理系装置の信頼性について述べたものである。 内の(ケ)、(コ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間に\nあるものとし、指数関数の値は、ｅを自然対数の底として、ｅ０.２＝１.２２、ｅ０.４＝１.４９、\nｅ１＝２.７２、ｅ２＝７.３９を用い、答えは、四捨五入により整数とする。 (３点×２＝６点)\n装置のある期間の稼働状況を調査したところ、１２回の故障があり、そのたびに修理を行っ\nた。また、この期間の動作時間の合計は３,０００時間、故障による休止時間の合計は３００\n時間であった。\n(ⅰ) この装置の稼働開始後１００時間経過時点における信頼度は、 (ケ) ％ である。\n(ⅱ) この装置の固有アベイラビリティは、 (コ) ％ である。\n<p class=\"cg-h\">&lt;(ケ)、(コ)の解答群&gt;</p>\n① ６７ ② ７２ ③ ７７ ④ ８２\n⑤ ８８ ⑥ ８９ ⑦ ９０ ⑧ ９１", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、建設工事における日程短縮の方法について述べたものである。 内の\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n図に示すアローダイアグラムにおいて、以下に記すⓐ～ⓓの手順によりクリティカルパスの\n所要日数を最小の増加費用で５日間短縮することを検討する。ここで、表は、図に示す作業の\n短縮可能日数と総短縮費用を示している。また、それぞれの作業を１日短縮するために必要な\n費用(以下、費用勾配という。)は、総短縮費用を短縮可能日数で除した値とする。\nⓐ 当該アローダイアグラムにおけるクリティカルパス上の作業のうち、費用勾配が最も小\nさい作業の作業日数を短縮可能な日数分短縮する。このときの短縮費用は、 (ア) と\nなる。\nⓑ 次にクリティカルパス上で、ⓐの手順で作業日数を短縮した作業以外で短縮可能な作業\nのうち、費用勾配が最も小さい作業 (イ) の作業日数を２日だけ短縮する。このとき\nのクリティカルパスの所要日数は、 (ウ) である。\nⓒ 続けてクリティカルパスを考慮して、最小の短縮費用で当初のクリティカルパスの所要\n日数を５日間短縮するように、短縮する作業及び短縮日数を決定する。\nⓓ 上記ⓐ～ⓒより、当初のクリティカルパスの所要日数を５日間短縮するために必要とな\nる短縮費用は、 (エ) と求められる。\n作業Ｅ\n５\n９日\n作業Ａ 作業Ｃ 作業Ｆ 作業Ｇ\n１ ２ ４ ６ ７\n５日 ８日 １０日 ８日\n作業Ｂ 作業Ｄ\n３\n２日 ２０日\n作業 短縮可能日数（日） 総短縮費用（万円）\nＡ ２ １０\nＢ １ ５\nＣ ３ ３０\nＤ ４ ６０\nＥ ３ １５\nＦ ３ ６０\nＧ ２ ４０\n<(ア)～(エ)の解答群>\n① ５万円 ② ５０万円 ③ ２８日 ④ Ａ\n⑤ １０万円 ⑥ ５５万円 ⑦ ２９日 ⑧ Ｂ\n⑨ １５万円 ⑩ ６０万円 ⑪ ３０日 ⑫ Ｃ\n⑬ ２０万円 ⑭ ６５万円 ⑮ ３１日 ⑯ Ｄ\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n建設工事における設計図書などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 工事請負契約において仕様書や契約図面、それらに対する現場説明書及び現場説明に対す\nる質問回答書などは、一般に、設計図書といわれ、工事請負契約時の契約図書に含まれる。\nＢ 現場説明書は、一般に、工事の入札に参加するものに対して発注者が当該工事の契約条件\nなどを説明するための書類とされている。\nＣ 設計図書で要求された品質を満たすために、受注者が請負工事における工法の精度の目標、\n品質管理及び体制について具体的に示すことは、一般に、品質計画といわれる。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n職場における安全活動などについて述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<(カ)の解答群>\nしつけ\n① ５Ｓ活動の５Ｓは、整理・整頓・清掃・清潔・躾のそれぞれのローマ字表記の頭\n文字をとったものであり、このうち整理とは、必要なものと不必要なものを区分し、\n不必要なものを捨てることとされている。\n② ＱＣサークル活動では、計画(PLAN)→実施(DO)→評価(CHECK)→改善(ACT)のＰＤＣＡ\nサイクルを回すことによって職場の管理・改善が継続的に行われる。\n③ ヒヤリハット活動は、労働災害における経験則の一つであるハインリッヒの法則\nなどに基づいており、重大な事故の発生を未然に防止するための有効な活動とされ\nている。\n④ ハインリッヒの法則は、１：２９：３００の法則ともいわれ、１件の重い災害が\nあったとすると、２９件の無傷害事故、３００件の不安全行動や不安全状態がある\nことを指摘している。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n故障に対応するためのシステム設計技術などについて述べた次の文章のうち、正しいものは、\n(キ) である。\n<(キ)の解答群>\n① システムの故障発生を少なくして平均動作可能時間を長くするための信頼性設計\n技術には、使用部品数の低減、実績のある標準品の採用、システムの直列化、フォー\nルトトレランスの導入などがある。\n② システムや装置を構成する部品の特性値の経時変化による故障には劣化故障があ\nり、劣化故障を設計段階から予測するための具体的な手法として、モンテカルロ法\nなどが用いられる。\n③ ＦＭＥＡは、システムや装置の故障原因として考えられる故障モードなどがシス\nテム全体に及ぼす影響を予測し、システムに潜在する弱点を摘出するトップダウン\n的手法である。\n④ ＦＴＡは、あらかじめ対象システムにとって望ましくない複数の事象を規定し、\nそれを発生させ得る原因事象を洗い出してツリー状に展開する手法である。ＦＴＡ\nは、一般に、シンプルなシステムや顕在化した不具合事象を解析するのに適してい\nる。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電気通信事故等に係る電気通信事業法関係法令の適用に関するガイドライン(第７版)におけ\nる、総務大臣への報告を義務付けられている事故又は事故が生ずるおそれがあると認められる\n事態の該当性の判断基準のうち、影響を与えた利用者数(以下、影響利用者数という。)及び役\n務の提供の停止又は品質の低下した時間(以下、継続時間という。)の算定について述べた次の\n文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① 影響利用者数の算定に当たっては、現実に役務の提供の停止又は品質の低下に該\n当した利用者のみを算定し、二重化、ルート分散等によりこれらに該当しなかった\n利用者は対象としない。\n② 緊急通報を扱う音声伝送役務において、電気通信設備が完全に故障して通信が全\nくできなくなった場合の緊急通報に影響を与えた影響利用者数は、故障中に使用し\nなかった者も含めた、故障した設備配下の全利用者の数とする。\n③ 携帯電話等において、役務の提供の停止を受けた利用者の数の把握が困難である\nと総務大臣が認める場合の影響利用者数は、停止基地局の提供区域にいる利用者の\n数とする。\n④ 継続時間の算定に当たっては、品質の低下の状態が一時的に改善した時間帯は、\n事故の継続時間から除外する。\n\n(６) 次の文章は、修理系装置の信頼性について述べたものである。 内の(ケ)、(コ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間に\nあるものとし、指数関数の値は、ｅを自然対数の底として、ｅ０.２＝１.２２、ｅ０.４＝１.４９、\nｅ１＝２.７２、ｅ２＝７.３９を用い、答えは、四捨五入により整数とする。 (３点×２＝６点)\n装置のある期間の稼働状況を調査したところ、１２回の故障があり、そのたびに修理を行っ\nた。また、この期間の動作時間の合計は３,０００時間、故障による休止時間の合計は３００\n時間であった。\n(ⅰ) この装置の稼働開始後１００時間経過時点における信頼度は、 (ケ) ％ である。\n(ⅱ) この装置の固有アベイラビリティは、 (コ) ％ である。\n<(ケ)、(コ)の解答群>\n① ６７ ② ７２ ③ ７７ ④ ８２\n⑤ ８８ ⑥ ８９ ⑦ ９０ ⑧ ９１"}], "8": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ</p>\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準には、情報通信ネットワークを構成する設備及び設備を設置する環境の基準である設備等基\n準の項目の一つとして、ソフトウェアの信頼性向上対策がある。以下の表は、電気通信回線設\n備事業用ネットワークにおいて実施すべき、又は実施が望ましいとされる、ソフトウェアの信\n頼性向上対策の一部を抜粋したものである。\n項 目 対 策 （抜 粋）\nシステムデータ等の重要データの (ア) ができること。\nソフトウェアには、異常の発生を速やかに検知し、 (イ)\nする機能を設けること。\n(ウ) の切替えを行うソフトウェアは十分な信頼性を確\n保すること。\nソ フ ト ウ ェ ア の 定期的にソフトウェアを点検し、リスク分析を実施すること。\n信 頼 性 向 上 対 策 交換機の制御等に用いられる重要なソフトウェアについては、\n(ア) できるよう (エ) のものを保管すること。\n交換機の制御等に用いられる重要なソフトウェアについては、\nソフトウェア不具合等により電気通信役務の提供が停止する\nことがないよう、当該ソフトウェアの導入・更新時は十分な\n検証を行い、その信頼性を確保すること。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 試験導入時 ② 参 照 ③ 現用及び予備機器 ④ 応急復旧\n⑤ 復 元 ⑥ 検 査 ⑦ アカウント ⑧ 正規購入\n⑨ 通 報 ⑩ マルチベンダ ⑪ 電気通信事業者 ⑫ 公 開\n⑬ 変 更 ⑭ 複数世代 ⑮ 商用及び検証環境 ⑯ 縮 退\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、また運用性に問題ないことなどを確認するテストは、一般に、運用テストとい\nわれ、開発部門や開発委託先が中心となって行う。\n② 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、受入れテストといわれる。\n③ 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)やデグレードテスト(Degrade Test)といわれる。\n④ 新しくシステムを稼働させるために、プログラムやデータなどを計画どおりに本\n稼働環境に移すことができることを事前に確認するテストは、一般に、移行テスト\nといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアのライセンスについて述べた次の文章のうち、正しいものは、 (カ) で\nある。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① コンピュータプログラムは、著作物として著作権法で保護されており、コンピュー\nタプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となる\nアイデアやアルゴリズムを考案した者に帰属する。\n② 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約\nといわれ、パッケージソフトウェアのシュリンクラップ契約では、購入者がコンピュー\nタにソフトウェアをインストールした時点で使用許諾契約に同意したとみなす。\n③ オープンソースソフトウェア(ＯＳＳ)は、一般に、ソースコードがインターネッ\nトなどを通じて公開されており、誰でも利用でき、誰でも改良や再頒布を行うこと\nができる。\n④ 使用開始時は一部の機能や使用期限などが制限されており、対価を支払うことで\n制限が解除されるソフトウェアは、一般に、フリーウェアといわれる。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準には、情報通信ネットワークを構成する設備及び設備を設置する環境の基準である設備等基\n準の項目の一つとして、ソフトウェアの信頼性向上対策がある。以下の表は、電気通信回線設\n備事業用ネットワークにおいて実施すべき、又は実施が望ましいとされる、ソフトウェアの信\n頼性向上対策の一部を抜粋したものである。\n項 目 対 策 （抜 粋）\nシステムデータ等の重要データの (ア) ができること。\nソフトウェアには、異常の発生を速やかに検知し、 (イ)\nする機能を設けること。\n(ウ) の切替えを行うソフトウェアは十分な信頼性を確\n保すること。\nソ フ ト ウ ェ ア の 定期的にソフトウェアを点検し、リスク分析を実施すること。\n信 頼 性 向 上 対 策 交換機の制御等に用いられる重要なソフトウェアについては、\n(ア) できるよう (エ) のものを保管すること。\n交換機の制御等に用いられる重要なソフトウェアについては、\nソフトウェア不具合等により電気通信役務の提供が停止する\nことがないよう、当該ソフトウェアの導入・更新時は十分な\n検証を行い、その信頼性を確保すること。\n<(ア)～(エ)の解答群>\n① 試験導入時 ② 参 照 ③ 現用及び予備機器 ④ 応急復旧\n⑤ 復 元 ⑥ 検 査 ⑦ アカウント ⑧ 正規購入\n⑨ 通 報 ⑩ マルチベンダ ⑪ 電気通信事業者 ⑫ 公 開\n⑬ 変 更 ⑭ 複数世代 ⑮ 商用及び検証環境 ⑯ 縮 退\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、また運用性に問題ないことなどを確認するテストは、一般に、運用テストとい\nわれ、開発部門や開発委託先が中心となって行う。\n② 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、受入れテストといわれる。\n③ 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)やデグレードテスト(Degrade Test)といわれる。\n④ 新しくシステムを稼働させるために、プログラムやデータなどを計画どおりに本\n稼働環境に移すことができることを事前に確認するテストは、一般に、移行テスト\nといわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアのライセンスについて述べた次の文章のうち、正しいものは、 (カ) で\nある。\n<(カ)の解答群>\n① コンピュータプログラムは、著作物として著作権法で保護されており、コンピュー\nタプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となる\nアイデアやアルゴリズムを考案した者に帰属する。\n② 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約\nといわれ、パッケージソフトウェアのシュリンクラップ契約では、購入者がコンピュー\nタにソフトウェアをインストールした時点で使用許諾契約に同意したとみなす。\n③ オープンソースソフトウェア(ＯＳＳ)は、一般に、ソースコードがインターネッ\nトなどを通じて公開されており、誰でも利用でき、誰でも改良や再頒布を行うこと\nができる。\n④ 使用開始時は一部の機能や使用期限などが制限されており、対価を支払うことで\n制限が解除されるソフトウェアは、一般に、フリーウェアといわれる。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信システムの運用におけるユーザデータなどのバックアップ管理の概要に</p>\nついて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選\nび、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。(２点×４＝８点)\n情報通信システムの運用において、人為的なミスや災害などによって重要なユーザデータ、\nプログラムなどが喪失しないように、これらを外部記録媒体などに退避させて、保存しておく\nことはバックアップといわれ、それとは反対に、退避させ、保存していたユーザデータ、プロ\nグラムなどを記録媒体から回復させることは、一般に、 (ア) といわれる。\nバックアップ方法には、対象の全てのデータをバックアップするフルバックアップといわれ\nる方法以外に、追加・更新されたデータだけを部分的にバックアップしていく (イ) バッ\nクアップや (ウ) バックアップといわれる方法がある。 (イ) バックアップは、最新\nのフルバックアップ以降に追加・更新された全てのデータを毎回バックアップする方法である。\n一方、 (ウ) バックアップは、直前のバックアップ以降に追加・更新されたデータのみを\nバックアップする方法である。\nバックアップデータには、バックアップを取得した時点からシステムダウンに至るまでの間\nに更新されたデータは含まれていないが、データの書換え要求の内容を記録した (エ)\nファイルを常に保持することにより、バックアップデータと (エ) ファイルを基にシステ\nムダウン直前の状態までデータを回復させることができる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① オンサイト ② 完 全 ③ リライト ④ オフサイト\n⑤ ジャーナル ⑥ 定 期 ⑦ リストア ⑧ コールド\n⑨ キャッシュ ⑩ リユース ⑪ オンライン ⑫ テンポラリ\n⑬ 増 分 ⑭ リトライ ⑮ 差 分 ⑯ オブジェクト\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアの開発モデルについて述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 簡単な試作ソフトウェアを作成して、ユーザの評価と改善を繰り返しながらユー\nザ要求を明確にしていく進め方は、ウォーターフォールモデルにおける要求定義の\n特徴である。\n② ウォーターフォールモデルでは、各開発工程の作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n③ ウォーターフォールモデルの設計工程では、一般に、要求定義から外部設計、内\n部設計といった工程が進むにつれて、段階的に設計が詳細化される。\n④ ウォーターフォールモデルのテスト工程では、一般に、単体テストから結合テス\nト、システムテスト、運用テストといったテストの工程が進むにつれて、順次、個\n別モジュールからサブシステム、システム、業務へと段階的に統合化が進められる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコンピュータシステムなどの性能指標について述べた次の文章のうち、正しいものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① オンラインシステムなどにおいて、コンピュータに対する要求の送信開始から応\n答が開始されるまでの時間は、一般に、ターンアラウンドタイムといわれ、この値\nはネットワークの性能には影響されない。\n② バッチ処理において、ジョブを投入してから全ての処理結果を受け取るまでの時\n間は、一般に、レスポンスタイムといわれ、この値が小さいほど性能が良い。\n③ コンピュータシステムが単位時間に処理できる業務量は、一般に、スループット\nといわれ、この値が大きいほど処理能力が高い。\n④ ハードディスクの性能評価の指標には、ＭＩＰＳ(Million Instructions Per\nSecond)やＦＬＯＰＳ(FLoating-point Operations Per Second)などがある。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信システムの運用におけるユーザデータなどのバックアップ管理の概要に\nついて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選\nび、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。(２点×４＝８点)\n情報通信システムの運用において、人為的なミスや災害などによって重要なユーザデータ、\nプログラムなどが喪失しないように、これらを外部記録媒体などに退避させて、保存しておく\nことはバックアップといわれ、それとは反対に、退避させ、保存していたユーザデータ、プロ\nグラムなどを記録媒体から回復させることは、一般に、 (ア) といわれる。\nバックアップ方法には、対象の全てのデータをバックアップするフルバックアップといわれ\nる方法以外に、追加・更新されたデータだけを部分的にバックアップしていく (イ) バッ\nクアップや (ウ) バックアップといわれる方法がある。 (イ) バックアップは、最新\nのフルバックアップ以降に追加・更新された全てのデータを毎回バックアップする方法である。\n一方、 (ウ) バックアップは、直前のバックアップ以降に追加・更新されたデータのみを\nバックアップする方法である。\nバックアップデータには、バックアップを取得した時点からシステムダウンに至るまでの間\nに更新されたデータは含まれていないが、データの書換え要求の内容を記録した (エ)\nファイルを常に保持することにより、バックアップデータと (エ) ファイルを基にシステ\nムダウン直前の状態までデータを回復させることができる。\n<(ア)～(エ)の解答群>\n① オンサイト ② 完 全 ③ リライト ④ オフサイト\n⑤ ジャーナル ⑥ 定 期 ⑦ リストア ⑧ コールド\n⑨ キャッシュ ⑩ リユース ⑪ オンライン ⑫ テンポラリ\n⑬ 増 分 ⑭ リトライ ⑮ 差 分 ⑯ オブジェクト\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアの開発モデルについて述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<(オ)の解答群>\n① 簡単な試作ソフトウェアを作成して、ユーザの評価と改善を繰り返しながらユー\nザ要求を明確にしていく進め方は、ウォーターフォールモデルにおける要求定義の\n特徴である。\n② ウォーターフォールモデルでは、各開発工程の作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n③ ウォーターフォールモデルの設計工程では、一般に、要求定義から外部設計、内\n部設計といった工程が進むにつれて、段階的に設計が詳細化される。\n④ ウォーターフォールモデルのテスト工程では、一般に、単体テストから結合テス\nト、システムテスト、運用テストといったテストの工程が進むにつれて、順次、個\n別モジュールからサブシステム、システム、業務へと段階的に統合化が進められる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコンピュータシステムなどの性能指標について述べた次の文章のうち、正しいものは、\n(カ) である。\n<(カ)の解答群>\n① オンラインシステムなどにおいて、コンピュータに対する要求の送信開始から応\n答が開始されるまでの時間は、一般に、ターンアラウンドタイムといわれ、この値\nはネットワークの性能には影響されない。\n② バッチ処理において、ジョブを投入してから全ての処理結果を受け取るまでの時\n間は、一般に、レスポンスタイムといわれ、この値が小さいほど性能が良い。\n③ コンピュータシステムが単位時間に処理できる業務量は、一般に、スループット\nといわれ、この値が大きいほど処理能力が高い。\n④ ハードディスクの性能評価の指標には、ＭＩＰＳ(Million Instructions Per\nSecond)やＦＬＯＰＳ(FLoating-point Operations Per Second)などがある。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ</p>\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準には、情報通信ネットワークの設計、施工、維持及び運用の管理の基準である管理基準の項\n目の一つとして、ソフトウェアの信頼性確保がある。以下の表は、電気通信回線設備事業用\nネットワークにおいて、平常時の取組として実施すべきソフトウェアの信頼性確保の対策につ\nいて抜粋したものである。\n項 目 対 策 （抜 粋）\nソフトウェアの要求仕様は、サービス内容及び (ア)\nを踏まえて策定すること。\nソフトウェアの不具合による動作不良等を防止するための\n(イ) を事前に確認すること。\nソフトウェアの試験は、 (ウ) 環境で試験を実施する\nこと。\nソ フ ト ウ ェ ア の 定期的にソフトウェアのリスク分析を行うとともに、更新\n信 頼 性 確 保 の必要性を確認すること。\n交換機の制御等に用いられる重要なソフトウェアについて\nは、機器等の製造・販売を行う者等関係者との契約書等に\nおいて、サービスの提供の継続に重要と考えられる (エ)\n等の情報を確認できることを明示すること。\nソフトウェアに (エ) が設定されている場合は、電気\n通信事業者が自ら又は機器等の製造・販売を行う者等関係\n者との契約等を通じて、確実に管理すること。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 試験項目・手順 ② 国内に設置した ③ 使用目的 ④ 暗号化\n⑤ 監視項目・方法 ⑥ 復旧方法・手順 ⑦ 技術動向 ⑧ 有効期限\n⑨ 開発環境と同じ ⑩ 商用環境に近い ⑪ 暗証番号 ⑫ 開発言語\n⑬ サービス提供地域 ⑭ 品質管理体制\n⑮ セキュリティ対策を施した ⑯ 通信需要予測\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されているリリース及び展開管理について述べた次の文\n章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 組織は、新規サービス又はサービス変更、及びサービスコンポーネントの稼働環\n境への展開について計画をしなければならない。計画立案には、各リリースの展開\nの日付、成果物及び展開方法を含めなければならない。\n② リリースは、文書化した受入れ基準に基づいて検証し、展開前に承認しなければ\nならない。受入れ基準を満たしていない場合には、組織及び利害関係者は必要な処\n置及び展開について決定しなければならない。\n③ 稼働環境へのリリースの展開に先立って、影響を受けるＣＩ(構成品目)のベース\nラインをとらなければならない。リリースは、サービス及びサービスコンポーネン\nトの完全性が維持されるように、稼働環境へ展開しなければならない。\n④ リリースの成功又は失敗は、監視し、分析しなければならない。測定には、リリー\nス展開後のリリースに関連するインシデントは含めない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコンピュータシステムの信頼性設計手法などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① システムが故障したとき、あらかじめ定められた一つの安全な状態をとるように\nする設計の考え方は、フェールセーフといわれる。\n② システムの一部に故障が発生しても、機能及び性能を落とさずにシステムの運転\nを継続しようとする設計の考え方は、フェールソフトといわれる。\n③ 利用者が誤操作をしようとしてもできないようにしたり、誤操作をしても致命的\nな事態や損害を生じさせないようにする設計の考え方は、フールプルーフといわれ\nる。\n④ フォールトアボイダンスの例としては、信頼性の高い既存のモジュールやプログ\nラムロジックの再利用などがある。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準には、情報通信ネットワークの設計、施工、維持及び運用の管理の基準である管理基準の項\n目の一つとして、ソフトウェアの信頼性確保がある。以下の表は、電気通信回線設備事業用\nネットワークにおいて、平常時の取組として実施すべきソフトウェアの信頼性確保の対策につ\nいて抜粋したものである。\n項 目 対 策 （抜 粋）\nソフトウェアの要求仕様は、サービス内容及び (ア)\nを踏まえて策定すること。\nソフトウェアの不具合による動作不良等を防止するための\n(イ) を事前に確認すること。\nソフトウェアの試験は、 (ウ) 環境で試験を実施する\nこと。\nソ フ ト ウ ェ ア の 定期的にソフトウェアのリスク分析を行うとともに、更新\n信 頼 性 確 保 の必要性を確認すること。\n交換機の制御等に用いられる重要なソフトウェアについて\nは、機器等の製造・販売を行う者等関係者との契約書等に\nおいて、サービスの提供の継続に重要と考えられる (エ)\n等の情報を確認できることを明示すること。\nソフトウェアに (エ) が設定されている場合は、電気\n通信事業者が自ら又は機器等の製造・販売を行う者等関係\n者との契約等を通じて、確実に管理すること。\n<(ア)～(エ)の解答群>\n① 試験項目・手順 ② 国内に設置した ③ 使用目的 ④ 暗号化\n⑤ 監視項目・方法 ⑥ 復旧方法・手順 ⑦ 技術動向 ⑧ 有効期限\n⑨ 開発環境と同じ ⑩ 商用環境に近い ⑪ 暗証番号 ⑫ 開発言語\n⑬ サービス提供地域 ⑭ 品質管理体制\n⑮ セキュリティ対策を施した ⑯ 通信需要予測\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されているリリース及び展開管理について述べた次の文\n章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 組織は、新規サービス又はサービス変更、及びサービスコンポーネントの稼働環\n境への展開について計画をしなければならない。計画立案には、各リリースの展開\nの日付、成果物及び展開方法を含めなければならない。\n② リリースは、文書化した受入れ基準に基づいて検証し、展開前に承認しなければ\nならない。受入れ基準を満たしていない場合には、組織及び利害関係者は必要な処\n置及び展開について決定しなければならない。\n③ 稼働環境へのリリースの展開に先立って、影響を受けるＣＩ(構成品目)のベース\nラインをとらなければならない。リリースは、サービス及びサービスコンポーネン\nトの完全性が維持されるように、稼働環境へ展開しなければならない。\n④ リリースの成功又は失敗は、監視し、分析しなければならない。測定には、リリー\nス展開後のリリースに関連するインシデントは含めない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコンピュータシステムの信頼性設計手法などについて述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<(カ)の解答群>\n① システムが故障したとき、あらかじめ定められた一つの安全な状態をとるように\nする設計の考え方は、フェールセーフといわれる。\n② システムの一部に故障が発生しても、機能及び性能を落とさずにシステムの運転\nを継続しようとする設計の考え方は、フェールソフトといわれる。\n③ 利用者が誤操作をしようとしてもできないようにしたり、誤操作をしても致命的\nな事態や損害を生じさせないようにする設計の考え方は、フールプルーフといわれ\nる。\n④ フォールトアボイダンスの例としては、信頼性の高い既存のモジュールやプログ\nラムロジックの再利用などがある。"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ソフトウェア開発プロセスについて述べたものである。 内の(ア)～</p>\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nウォーターフォールモデルでは、一般に、開発の各工程は上流から下流に向けて順序どおり\n進められる。要求定義の工程からプログラミングに至るまでは段階的に設計仕様の詳細化が進\nめられ、プログラミング以降では、一般に、単体テスト、 (ア) テスト、システムテスト、\n運用テストの順に品質を検証し段階的に統合化が進められる。\nウォーターフォールモデルの課題として、ソフトウェアの動作確認までに長期間を要し、問\n題の発見が遅れることがある。システム全体を一括で作るのではなく、分割された小さい単位\nでウォーターフォールモデルの一連の工程を繰り返し、開発範囲や機能を拡張しながら開発を\n進めていく (イ) モデルでは、繰り返しの都度、開発上の問題点を改善して次のサイクル\nに反映することができる。\nまた、計画に従うことよりも変化への対応を重視し、新しい機能を短期間で継続的にリリー\nスしていくソフトウェア開発のアプローチとして (ウ) がある。 (ウ) の開発手法の\n一つであるスクラムでは、アウトプットを作り上げるために必要なタスクが全てそろった開発\n期間である (エ) を単位として、 (エ) を反復して開発が進められる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 回 帰 ② ＲＡＤ ③ リードタイム ④ アクティビティ\n⑤ スプリント ⑥ 移 行 ⑦ ＤｅｖＯｐｓ ⑧ アジャイル開発\n⑨ 机 上 ⑩ 結 合 ⑪ Ｖ字型開発 ⑫ スパイラル\n⑬ プロトタイピング ⑭ ユーザーエクスペリエンス\n⑮ ワークパッケージ ⑯ シミュレーション\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｘ ０１６１：２００８ソフトウェア技術－ソフトウェアライフサイクルプロセス－\n保守に規定されているソフトウェア保守の種類について述べた次の文章のうち、誤っているも\nのは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 改良保守とは、新しい要求を満たすための既存のソフトウェア製品への修正をい\nう。\n② 適応保守とは、引渡し後、変化した又は変化している環境において、ソフトウェ\nア製品を使用できるように保ち続けるために実施するソフトウェア製品の修正をいう。\n③ 予防保守とは、引渡し前のソフトウェア製品の潜在的な障害を検出し訂正するた\nめの修正をいう。\n④ 是正保守とは、ソフトウェア製品の引渡し後に発見された問題を訂正するために\n行う受身の修正をいう。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアのライセンスについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 使用開始時は一部の機能や使用期限などが制限されており、対価を支払うことで制限が解\n除されるソフトウェアは、一般に、シェアウェアといわれる。\nＢ コンピュータプログラムは、著作物として著作権法で保護されており、コンピュータプロ\nグラムの著作権は、基礎となるアイデアやアルゴリズムを考案した者に帰属し、実際にコー\nディングを行った者には帰属しない。\nＣ 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約といわれ、\nパッケージソフトウェアのシュリンクラップ契約では、購入者がコンピュータにソフトウェ\nアをインストールした時点で使用許諾契約に同意したとみなす。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、ソフトウェア開発プロセスについて述べたものである。 内の(ア)～\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nウォーターフォールモデルでは、一般に、開発の各工程は上流から下流に向けて順序どおり\n進められる。要求定義の工程からプログラミングに至るまでは段階的に設計仕様の詳細化が進\nめられ、プログラミング以降では、一般に、単体テスト、 (ア) テスト、システムテスト、\n運用テストの順に品質を検証し段階的に統合化が進められる。\nウォーターフォールモデルの課題として、ソフトウェアの動作確認までに長期間を要し、問\n題の発見が遅れることがある。システム全体を一括で作るのではなく、分割された小さい単位\nでウォーターフォールモデルの一連の工程を繰り返し、開発範囲や機能を拡張しながら開発を\n進めていく (イ) モデルでは、繰り返しの都度、開発上の問題点を改善して次のサイクル\nに反映することができる。\nまた、計画に従うことよりも変化への対応を重視し、新しい機能を短期間で継続的にリリー\nスしていくソフトウェア開発のアプローチとして (ウ) がある。 (ウ) の開発手法の\n一つであるスクラムでは、アウトプットを作り上げるために必要なタスクが全てそろった開発\n期間である (エ) を単位として、 (エ) を反復して開発が進められる。\n<(ア)～(エ)の解答群>\n① 回 帰 ② ＲＡＤ ③ リードタイム ④ アクティビティ\n⑤ スプリント ⑥ 移 行 ⑦ ＤｅｖＯｐｓ ⑧ アジャイル開発\n⑨ 机 上 ⑩ 結 合 ⑪ Ｖ字型開発 ⑫ スパイラル\n⑬ プロトタイピング ⑭ ユーザーエクスペリエンス\n⑮ ワークパッケージ ⑯ シミュレーション\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｘ ０１６１：２００８ソフトウェア技術－ソフトウェアライフサイクルプロセス－\n保守に規定されているソフトウェア保守の種類について述べた次の文章のうち、誤っているも\nのは、 (オ) である。\n<(オ)の解答群>\n① 改良保守とは、新しい要求を満たすための既存のソフトウェア製品への修正をい\nう。\n② 適応保守とは、引渡し後、変化した又は変化している環境において、ソフトウェ\nア製品を使用できるように保ち続けるために実施するソフトウェア製品の修正をいう。\n③ 予防保守とは、引渡し前のソフトウェア製品の潜在的な障害を検出し訂正するた\nめの修正をいう。\n④ 是正保守とは、ソフトウェア製品の引渡し後に発見された問題を訂正するために\n行う受身の修正をいう。\n\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアのライセンスについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 使用開始時は一部の機能や使用期限などが制限されており、対価を支払うことで制限が解\n除されるソフトウェアは、一般に、シェアウェアといわれる。\nＢ コンピュータプログラムは、著作物として著作権法で保護されており、コンピュータプロ\nグラムの著作権は、基礎となるアイデアやアルゴリズムを考案した者に帰属し、実際にコー\nディングを行った者には帰属しない。\nＣ 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約といわれ、\nパッケージソフトウェアのシュリンクラップ契約では、購入者がコンピュータにソフトウェ\nアをインストールした時点で使用許諾契約に同意したとみなす。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<p class=\"sub-h\">(６) 次の文章は、基板の信頼性について述べたものである。 内の(ケ)、(コ)に最も適し</p>\nたものを、下記の解答群から選び、その番号を記せ。ただし、基板は偶発故障期間にあり、メモ\nリ素子個々の故障率は同一値とし、logｅ０.９９＝－０.０１、ｅ－０.０５＝０.９５とする。\n(３点×２＝６点)\n１０,０００個のメモリ素子を組み込んだ基板の使用開始後１００時間における信頼度が０.９９\nであるとき、メモリ素子１個当たりの故障率は、 (ケ) ＦＩＴ である。また、この基板\nの使用開始後５００時間以内に故障する確率は、 (コ) ％ である。\n<p class=\"cg-h\">&lt;(ケ)、(コ)の解答群&gt;</p>\n① １×１０－８ ② １×１０－４ ③ ５ ④ １０\n⑤ ２０ ⑥ ４９.５ ⑦ ８０ ⑧ ９５\n⑨ ９９ ⑩ ９９０ ⑪ １×１０５\n<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＴサービスマネジメントについて述べたものである。 内の(ア)～</p>\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nＩＴサービスを適切に管理して、ＩＴサービスを安定的に提供し継続的な改善を実現するた\nめの仕組みはＩＴサービスマネジメントといわれ、これを標準化したＩＴサービスマネジメン\nトシステムの規格には、国際規格としてＩＳＯ／ＩＥＣ (ア) 、国内規格としてＪＩＳ Ｑ\n(ア) がある。\nＪＩＳ Ｑ (ア) ：２０２０は、サービスマネジメントシステムを確立し、実施し、維持\nし、継続的に改善するための組織に対する要求事項について規定するものである。この中で、\nリリース及び展開管理に関する要求事項において、リリースは、文書化した (イ) に基づ\nいて検証し、展開前に承認しなければならないと規定されている。また、リリースは、サービ\nス及びサービスコンポーネントの (ウ) が維持されるように、稼働環境へ展開しなければ\nならないと規定されている。\nＩＴＩＬ(Information Technology Infrastructure Library)は、ＩＴサービスマネジメント\nの (エ) を体系化した手引書であり、ＩＴに関する社内規則や手順などを策定する際のガ\nイドラインとして利用されている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 機密性 ② 作業手順 ③ 受入れ基準 ④ ベンチマーク\n⑤ 可用性 ⑥ 基本方針 ⑦ スケジュール ⑧ ベストプラクティス\n⑨ 冗長性 ⑩ 信頼性モデル ⑪ ９００１ ⑫ １９７７０－１\n⑬ 完全性 ⑭ プロトコル ⑮ ２７００１ ⑯ ２００００－１\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、運用性に問題ないことなどを確認するテストは、一般に、運用テストといわれ、\n利用者や運用部門が中心となって行う。\n② 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、システムテストといわれる。\n③ 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)やデグレードテスト(Degrade Test)といわれる。\n④ 新しくシステムを稼働させるために、プログラム、データなどを計画どおりに稼\n働環境に移すことができることを事前に確認するテストは、一般に、移行テストと\nいわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコンピュータシステムの性能指標などについて述べた次の文章のうち、正しいものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① コンピュータシステムが単位時間に処理できる業務量は、一般に、スループット\nといわれ、この値が大きいほど処理能力が高い。\n② オンラインシステムなどにおいて、処理要求を終えてから応答が開始されるまで\nの時間は、一般に、ターンアラウンドタイムといわれる。\n③ バッチ処理において、ジョブを投入してから全ての処理結果を受け取るまでの時\n間は、一般に、レスポンスタイムといわれ、この値が小さいほど性能が良い。\n④ ハードディスクの性能評価の指標には、ＭＩＰＳ(Million Instructions Per\nSecond)やＦＬＯＰＳ(FLoating-point Operations Per Second)などがある。", "raw": "(６) 次の文章は、基板の信頼性について述べたものである。 内の(ケ)、(コ)に最も適し\nたものを、下記の解答群から選び、その番号を記せ。ただし、基板は偶発故障期間にあり、メモ\nリ素子個々の故障率は同一値とし、logｅ０.９９＝－０.０１、ｅ－０.０５＝０.９５とする。\n(３点×２＝６点)\n１０,０００個のメモリ素子を組み込んだ基板の使用開始後１００時間における信頼度が０.９９\nであるとき、メモリ素子１個当たりの故障率は、 (ケ) ＦＩＴ である。また、この基板\nの使用開始後５００時間以内に故障する確率は、 (コ) ％ である。\n<(ケ)、(コ)の解答群>\n① １×１０－８ ② １×１０－４ ③ ５ ④ １０\n⑤ ２０ ⑥ ４９.５ ⑦ ８０ ⑧ ９５\n⑨ ９９ ⑩ ９９０ ⑪ １×１０５\n問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、ＩＴサービスマネジメントについて述べたものである。 内の(ア)～\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nＩＴサービスを適切に管理して、ＩＴサービスを安定的に提供し継続的な改善を実現するた\nめの仕組みはＩＴサービスマネジメントといわれ、これを標準化したＩＴサービスマネジメン\nトシステムの規格には、国際規格としてＩＳＯ／ＩＥＣ (ア) 、国内規格としてＪＩＳ Ｑ\n(ア) がある。\nＪＩＳ Ｑ (ア) ：２０２０は、サービスマネジメントシステムを確立し、実施し、維持\nし、継続的に改善するための組織に対する要求事項について規定するものである。この中で、\nリリース及び展開管理に関する要求事項において、リリースは、文書化した (イ) に基づ\nいて検証し、展開前に承認しなければならないと規定されている。また、リリースは、サービ\nス及びサービスコンポーネントの (ウ) が維持されるように、稼働環境へ展開しなければ\nならないと規定されている。\nＩＴＩＬ(Information Technology Infrastructure Library)は、ＩＴサービスマネジメント\nの (エ) を体系化した手引書であり、ＩＴに関する社内規則や手順などを策定する際のガ\nイドラインとして利用されている。\n<(ア)～(エ)の解答群>\n① 機密性 ② 作業手順 ③ 受入れ基準 ④ ベンチマーク\n⑤ 可用性 ⑥ 基本方針 ⑦ スケジュール ⑧ ベストプラクティス\n⑨ 冗長性 ⑩ 信頼性モデル ⑪ ９００１ ⑫ １９７７０－１\n⑬ 完全性 ⑭ プロトコル ⑮ ２７００１ ⑯ ２００００－１\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、運用性に問題ないことなどを確認するテストは、一般に、運用テストといわれ、\n利用者や運用部門が中心となって行う。\n② 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、システムテストといわれる。\n③ 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)やデグレードテスト(Degrade Test)といわれる。\n④ 新しくシステムを稼働させるために、プログラム、データなどを計画どおりに稼\n働環境に移すことができることを事前に確認するテストは、一般に、移行テストと\nいわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコンピュータシステムの性能指標などについて述べた次の文章のうち、正しいものは、\n(カ) である。\n<(カ)の解答群>\n① コンピュータシステムが単位時間に処理できる業務量は、一般に、スループット\nといわれ、この値が大きいほど処理能力が高い。\n② オンラインシステムなどにおいて、処理要求を終えてから応答が開始されるまで\nの時間は、一般に、ターンアラウンドタイムといわれる。\n③ バッチ処理において、ジョブを投入してから全ての処理結果を受け取るまでの時\n間は、一般に、レスポンスタイムといわれ、この値が小さいほど性能が良い。\n④ ハードディスクの性能評価の指標には、ＭＩＰＳ(Million Instructions Per\nSecond)やＦＬＯＰＳ(FLoating-point Operations Per Second)などがある。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ</p>\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。 (２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準は、情報通信ネットワークを構成する設備及び設備を設置する環境の基準である設備等基準\nと、情報通信ネットワークの設計、施工、維持及び運用の段階での (ア) 基準とに区分さ\nれている。\n設備等基準の項目の一つとして、ソフトウェアの信頼性向上対策がある。以下の表は、電気\n通信回線設備事業用ネットワークにおいて実施すべきソフトウェアの信頼性向上対策の一部を\n抜粋したものである。\n項 目 対 策 （抜 粋）\nシステムデータ等の重要データの復元ができること。\n(イ) の切替えを行うソフトウェアは十分な信頼性を確\n保すること。\n定期的にソフトウェアを点検し、 (ウ) を実施すること。\nソ フ ト ウ ェ ア の 交換機の制御等に用いられる重要なソフトウェアについては、\n信 頼 性 向 上 対 策 復元できるよう (エ) のものを保管すること。\n交換機の制御等に用いられる重要なソフトウェアについては、\nソフトウェア不具合等により電気通信役務の提供が停止する\nことがないよう、当該ソフトウェアの導入・更新時は十分な\n検証を行い、その信頼性を確保すること。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 試験導入時 ② リスク分析 ③ 商用及び検証環境 ④ 品 質\n⑤ アカウント ⑥ 教育及び訓練 ⑦ 管理体制の見直し ⑧ 技 術\n⑨ 複数世代 ⑩ マルチベンダ ⑪ 自動及び手動運転 ⑫ 管 理\n⑬ 正規購入 ⑭ マニュアルの更新 ⑮ 現用及び予備機器 ⑯ 保 安\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアの開発モデルについて述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n② 簡単な試作ソフトウェアを作成して、ユーザの評価と改善を繰り返しながらユー\nザ要求を明確にしていく進め方は、ウォーターフォールモデルにおける要求定義の\n特徴である。\n③ ウォーターフォールモデルの設計工程では、一般に、要求定義から外部設計、内\n部設計といった工程が進むにつれて、段階的に設計が詳細化される。\n④ ウォーターフォールモデルのテスト工程では、一般に、単体テストから結合テス\nト、システムテスト、運用テストといったテストの工程が進むにつれて、順次、個\n別モジュールからサブシステム、システム、業務へと段階的に統合化が進められる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｘ ０１６４－５：２０１９ ＩＴアセットマネジメント－第５部：概要及び用語に\n規定されている用語及び定義について述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ソフトウェアライセンシーとは、決められたソフトウェアパッケージのためのソ\nフトウェアライセンスを発行する権利をもった個人又は組織をいう。\n② バンドルとは、一つの購入アイテムとして複数の製品の権利を販売するマーケ\nティング及びライセンス戦略としての製品のグループ化をいう。\n③ ベースラインとは、構成品目がそのライフサイクル上の決められた時期に、媒体\nに関係なく、正式に指定し確定された構成品目の正式版として認定されたものをい\nう。\n④ ＣＭＤＢ(configuration management database)とは、各関連した構成品目の詳\n細及びその重要な関係性の詳細を全て包含したデータベースをいう。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。 (２点×４＝８点)\n情報通信ネットワーク安全・信頼性基準は、通信の安定的な提供、通信の疎通の確保、通信\nの不正使用の防止などを目的として、情報通信ネットワーク全体から見た対策項目について網\n羅的に整理、検討を行い、ハードウェア及びソフトウェアに備えるべき機能やシステムの維持・\n運用等を総合的に取り入れた、安全・信頼性に関する推薦基準(ガイドライン)である。この基\n準は、情報通信ネットワークを構成する設備及び設備を設置する環境の基準である設備等基準\nと、情報通信ネットワークの設計、施工、維持及び運用の段階での (ア) 基準とに区分さ\nれている。\n設備等基準の項目の一つとして、ソフトウェアの信頼性向上対策がある。以下の表は、電気\n通信回線設備事業用ネットワークにおいて実施すべきソフトウェアの信頼性向上対策の一部を\n抜粋したものである。\n項 目 対 策 （抜 粋）\nシステムデータ等の重要データの復元ができること。\n(イ) の切替えを行うソフトウェアは十分な信頼性を確\n保すること。\n定期的にソフトウェアを点検し、 (ウ) を実施すること。\nソ フ ト ウ ェ ア の 交換機の制御等に用いられる重要なソフトウェアについては、\n信 頼 性 向 上 対 策 復元できるよう (エ) のものを保管すること。\n交換機の制御等に用いられる重要なソフトウェアについては、\nソフトウェア不具合等により電気通信役務の提供が停止する\nことがないよう、当該ソフトウェアの導入・更新時は十分な\n検証を行い、その信頼性を確保すること。\n<(ア)～(エ)の解答群>\n① 試験導入時 ② リスク分析 ③ 商用及び検証環境 ④ 品 質\n⑤ アカウント ⑥ 教育及び訓練 ⑦ 管理体制の見直し ⑧ 技 術\n⑨ 複数世代 ⑩ マルチベンダ ⑪ 自動及び手動運転 ⑫ 管 理\n⑬ 正規購入 ⑭ マニュアルの更新 ⑮ 現用及び予備機器 ⑯ 保 安\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアの開発モデルについて述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<(オ)の解答群>\n① ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n② 簡単な試作ソフトウェアを作成して、ユーザの評価と改善を繰り返しながらユー\nザ要求を明確にしていく進め方は、ウォーターフォールモデルにおける要求定義の\n特徴である。\n③ ウォーターフォールモデルの設計工程では、一般に、要求定義から外部設計、内\n部設計といった工程が進むにつれて、段階的に設計が詳細化される。\n④ ウォーターフォールモデルのテスト工程では、一般に、単体テストから結合テス\nト、システムテスト、運用テストといったテストの工程が進むにつれて、順次、個\n別モジュールからサブシステム、システム、業務へと段階的に統合化が進められる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｘ ０１６４－５：２０１９ ＩＴアセットマネジメント－第５部：概要及び用語に\n規定されている用語及び定義について述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<(カ)の解答群>\n① ソフトウェアライセンシーとは、決められたソフトウェアパッケージのためのソ\nフトウェアライセンスを発行する権利をもった個人又は組織をいう。\n② バンドルとは、一つの購入アイテムとして複数の製品の権利を販売するマーケ\nティング及びライセンス戦略としての製品のグループ化をいう。\n③ ベースラインとは、構成品目がそのライフサイクル上の決められた時期に、媒体\nに関係なく、正式に指定し確定された構成品目の正式版として認定されたものをい\nう。\n④ ＣＭＤＢ(configuration management database)とは、各関連した構成品目の詳\n細及びその重要な関係性の詳細を全て包含したデータベースをいう。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信システムの運用におけるユーザデータなどのバックアップ管理の概要に</p>\nついて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選\nび、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。(２点×４＝８点)\n情報通信システムの運用において、人為的なミスや災害などによって重要なユーザデータ、\nプログラムなどが喪失しないようにするため、これらを外部記録媒体などに退避させて保存し\nておくことはバックアップといわれる。それとは反対に、ユーザデータ、プログラムなどを退\n避させて保存していた記録媒体から回復させることは、一般に、 (ア) といわれる。\nバックアップ方法には、対象とする全てのデータをバックアップするフルバックアップとい\nわれる方法以外に、追加・更新されたデータを部分的にバックアップしていく方法が二つある。\n一つは (イ) バックアップといわれ、最新のフルバックアップ以降に追加・更新された全\nてのデータを毎回バックアップする方法である。もう一つは (ウ) バックアップといわれ、\n直前のバックアップ以降に追加・更新されたデータのみをバックアップする方法である。\nバックアップデータには、バックアップを取得した時点からシステムダウンに至るまでの間\nに更新されたデータは含まれていないが、データの書換え要求の内容を記録した (エ)\nファイルを常に保持することにより、バックアップデータと (エ) ファイルを基にシステ\nムダウン直前の状態までデータを回復させることができる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 増 分 ② コールド ③ オブジェクト ④ キャッシュ\n⑤ 完 全 ⑥ リライト ⑦ バッチ ⑧ ジャーナル\n⑨ 定 期 ⑩ リストア ⑪ リフレッシュ ⑫ オンサイト\n⑬ 差 分 ⑭ リブート ⑮ オンライン ⑯ オフサイト\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアのライセンスについて述べた次の文章のうち、正しいものは、 (オ) であ\nる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 企業、教育機関などの組織が同じソフトウェアを一括で購入して、当該組織内の\n複数のユーザや複数のコンピュータで利用できるようにするライセンス形態は、一\n般に、サイトライセンスといわれる。\n② ソースコードがインターネットなどを通じて公開されていて、利用、改良及び再\n頒布が許可されたソフトウェアは、一般に、シェアウェアといわれる。\n③ コンピュータプログラムは、著作物として著作権法で保護されており、コンピュー\nタプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となる\nアイデアやアルゴリズムを考案した者に帰属する。\n④ 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約\nといわれ、クリックオン契約では、一般に、購入者がコンピュータにソフトウェア\nをインストールした行為をもって使用許諾契約に同意したとみなされる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されている需要管理又は容量・能力管理について述べた\n次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① あらかじめ定めた間隔で、組織は、サービスに対する現在の需要を決定し、将来\nの需要を予測しなければならない。\n② あらかじめ定めた間隔で、組織は、サービスの需要及び消費を監視及び報告しな\nければならない。\n③ 人、技術、情報及び財務に関する資源の容量・能力の要求事項を、サービス及び\nパフォーマンスの要求事項を考慮して決定し、文書化し、維持しなければならない。\n④ 組織は、合意した容量・能力及びパフォーマンスの要求事項を満たすためにサー\nビスの供給を調整しなければならない。\n⑤ 組織は、容量・能力の利用を監視し、容量・能力及びパフォーマンスデータを分\n析し、パフォーマンスを改善するための機会を特定しなければならない。\n<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、無線ＬＡＮのセキュリティ技術について述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n無線ＬＡＮのセキュリティ規格には、ＷＰＡ２やＷＰＡ３がある。\nＷＰＡ２には、認証方式の違いによりパーソナルモードとエンタープライズモードの二つの\nモードがある。ＷＰＡ２のパーソナルモードでは、アクセスポイントと端末の間で事前に共有\nされたパスフレーズを使用するＰＳＫといわれる方式で相手認証が行われ、ＷＰＡ２のエンター\nプライズモードでは、ＩＥＥＥ８０２. (ア) といわれる認証規格に基づき相手認証が行わ\nれる。また、ＷＰＡ２における暗号化方式としては、ＷＰＡで使われていたＴＫＩＰに加えて、\n暗号アルゴリズムに (イ) 暗号の一つであるＡＥＳを採用した (ウ) といわれるプロ\nトコルの実装が必須とされている。\nぜい\nＷＰＡ３はＷＰＡ２の後継規格であり、ＷＰＡ２における脆弱性を考慮して、幾つかの機能\nが拡張・強化されている。ＷＰＡ３のパーソナルモードでは、相手認証及び鍵交換に (エ)\nといわれる安全性の高い方式が採用されている。また、ＷＰＡ３のエンタープライズモードに\nは、暗号化の強度を高めるために新たな暗号スイートであるＣＮＳＡが追加されている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ＥＳＰ ② ＣＣＭＰ ③ ハイブリッド ④ ３\n⑤ ＷＥＰ ⑥ ブロック ⑦ ＲＳＡ ⑧ １１\n⑨ ＤＨ ⑩ 公開鍵 ⑪ ＳＡＥ ⑫ １６\n⑬ ＤＳＡ ⑭ ＣＨＡＰ ⑮ ストリーム ⑯ １Ｘ", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信システムの運用におけるユーザデータなどのバックアップ管理の概要に\nついて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選\nび、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。(２点×４＝８点)\n情報通信システムの運用において、人為的なミスや災害などによって重要なユーザデータ、\nプログラムなどが喪失しないようにするため、これらを外部記録媒体などに退避させて保存し\nておくことはバックアップといわれる。それとは反対に、ユーザデータ、プログラムなどを退\n避させて保存していた記録媒体から回復させることは、一般に、 (ア) といわれる。\nバックアップ方法には、対象とする全てのデータをバックアップするフルバックアップとい\nわれる方法以外に、追加・更新されたデータを部分的にバックアップしていく方法が二つある。\n一つは (イ) バックアップといわれ、最新のフルバックアップ以降に追加・更新された全\nてのデータを毎回バ
