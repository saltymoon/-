Ｐ ② ＣＣＭＰ ③ ハイブリッド ④ ３\n⑤ ＷＥＰ ⑥ ブロック ⑦ ＲＳＡ ⑧ １１\n⑨ ＤＨ ⑩ 公開鍵 ⑪ ＳＡＥ ⑫ １６\n⑬ ＤＳＡ ⑭ ＣＨＡＰ ⑮ ストリーム ⑯ １Ｘ"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、コンピュータシステムの信頼性などについて述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nコンピュータシステムがその能力を安定して発揮できるかどうかを評価するための代表的な\n指標に、信頼性、 (ア) 性及び保守性の三つがあり、これらを意味する英単語の頭文字を\nとってＲＡＳといわれる。ＲＡＳの計数的な尺度としては、信頼性はＭＴＢＦで、 (ア)\n性は稼働率で、保守性はＭＴＴＲでそれぞれ表すことができる。\nシステム内に故障が発生したときに、その影響を軽減することで極力機能を維持しようとす\nる考え方は、 (イ) といわれる。 (イ) は三つのレベルに分けることができ、故障に\n対し機能低下による外部への影響を完全に防止するレベルである (ウ) 以外に、一部機能\n低下を容認しつつも残りの機能を維持し続けるレベル、機能は停止するものの安全性は維持す\nるレベルがある。\nまた、システムの利用者が誤操作をしにくくしたり、誤操作をしても致命的な事態や損害を\n生じさせずに機能を維持しようとする設計の考え方は、 (エ) といわれる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 俊 敏 ② フェールオーバ ③ フォールバック\n④ 適 合 ⑤ フールプルーフ ⑥ クラスタリング\n⑦ 可 用 ⑧ フェールソフト ⑨ リスクアセスメント\n⑩ 耐 久 ⑪ フェールセーフ ⑫ デュプレクシング\n⑬ フォールトアボイダンス ⑭ フォールトマスキング\n⑮ フォールトトレランス ⑯ フォールトツリー\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)又はデグレードテスト(Degrade Test)といわれる。\n② 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、運用性に問題ないことなどを確認するテストは、一般に、運用テストといわれ、\n利用者や運用部門が中心となって行う。\n③ 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、受入れテストといわれる。\n④ 新しくシステムを稼働させるために、プログラム、データなどを計画どおりに稼\n働環境に移すことができることを事前に確認するテストは、一般に、状態遷移テス\nトといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されているリリース及び展開管理について述べた次の文\n章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 組織は、新規サービス又はサービス変更、及びサービスコンポーネントの稼働環\n境への展開について計画をしなければならない。計画立案には、各リリースの展開\nの日付、成果物及び展開方法を含めなければならない。\n② 稼働環境へのリリースの展開に先立って、影響を受けるＣＩ(構成品目)のベース\nラインをとらなければならない。リリースは、サービス及びサービスコンポーネン\nトの完全性が維持されるように、稼働環境へ展開しなければならない。\n③ リリースは、文書化した受入れ基準に基づいて検証し、展開後は速やかに承認し\nなければならない。受入れ基準を満たしていない場合には、組織及び利害関係者は\n必要な処置及び展開について決定しなければならない。\n④ リリースの成功又は失敗は、監視し、分析しなければならない。測定には、リリー\nス展開後のリリースに関連するインシデントを含めなければならない。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、コンピュータシステムの信頼性などについて述べたものである。 内の\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nコンピュータシステムがその能力を安定して発揮できるかどうかを評価するための代表的な\n指標に、信頼性、 (ア) 性及び保守性の三つがあり、これらを意味する英単語の頭文字を\nとってＲＡＳといわれる。ＲＡＳの計数的な尺度としては、信頼性はＭＴＢＦで、 (ア)\n性は稼働率で、保守性はＭＴＴＲでそれぞれ表すことができる。\nシステム内に故障が発生したときに、その影響を軽減することで極力機能を維持しようとす\nる考え方は、 (イ) といわれる。 (イ) は三つのレベルに分けることができ、故障に\n対し機能低下による外部への影響を完全に防止するレベルである (ウ) 以外に、一部機能\n低下を容認しつつも残りの機能を維持し続けるレベル、機能は停止するものの安全性は維持す\nるレベルがある。\nまた、システムの利用者が誤操作をしにくくしたり、誤操作をしても致命的な事態や損害を\n生じさせずに機能を維持しようとする設計の考え方は、 (エ) といわれる。\n<(ア)～(エ)の解答群>\n① 俊 敏 ② フェールオーバ ③ フォールバック\n④ 適 合 ⑤ フールプルーフ ⑥ クラスタリング\n⑦ 可 用 ⑧ フェールソフト ⑨ リスクアセスメント\n⑩ 耐 久 ⑪ フェールセーフ ⑫ デュプレクシング\n⑬ フォールトアボイダンス ⑭ フォールトマスキング\n⑮ フォールトトレランス ⑯ フォールトツリー\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアテストについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 運用中のプログラムを修正したときに、修正箇所のテストに加えて、修正箇所以\n外の予期せぬ部分に影響がないことを確認するテストは、一般に、リグレッション\nテスト(Regression Test)又はデグレードテスト(Degrade Test)といわれる。\n② 実際の運用条件を想定して、新しく導入するシステムが業務に有効活用できるこ\nと、運用性に問題ないことなどを確認するテストは、一般に、運用テストといわれ、\n利用者や運用部門が中心となって行う。\n③ 納品されたソフトウェアが、発注者の要件に合致したものであることを発注者側\nが最終的に判定するテストは、一般に、受入れテストといわれる。\n④ 新しくシステムを稼働させるために、プログラム、データなどを計画どおりに稼\n働環境に移すことができることを事前に確認するテストは、一般に、状態遷移テス\nトといわれる。\n\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されているリリース及び展開管理について述べた次の文\n章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 組織は、新規サービス又はサービス変更、及びサービスコンポーネントの稼働環\n境への展開について計画をしなければならない。計画立案には、各リリースの展開\nの日付、成果物及び展開方法を含めなければならない。\n② 稼働環境へのリリースの展開に先立って、影響を受けるＣＩ(構成品目)のベース\nラインをとらなければならない。リリースは、サービス及びサービスコンポーネン\nトの完全性が維持されるように、稼働環境へ展開しなければならない。\n③ リリースは、文書化した受入れ基準に基づいて検証し、展開後は速やかに承認し\nなければならない。受入れ基準を満たしていない場合には、組織及び利害関係者は\n必要な処置及び展開について決定しなければならない。\n④ リリースの成功又は失敗は、監視し、分析しなければならない。測定には、リリー\nス展開後のリリースに関連するインシデントを含めなければならない。"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ</p>\nの附則(以下、基準という。)に規定する、平常時の取組として実施すべきソフトウェアの信頼性\n確保の対策並びにその解説について述べたものであり、表は、その対策を基準から抜粋したもの\nである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記\nせ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n事業用電気通信設備として導入されるソフトウェアについては、その開発・導入段階から維\n持管理段階において事故の発生防止のための適切な対応措置が求められる。\nソフトウェアバグに起因する設備のリソースの枯渇、解放漏れなどの電気通信事故を防止す\nるため、ソフトウェアの要求仕様は、サービス内容及び (ア) を踏まえて策定することが\n必要である。また、全てのバグを事前に解消することは困難であることから、ソフトウェアの\n不具合による動作不良等を防止するための (イ) を事前に確認する必要がある。\nソフトウェア導入時には判明していなかったバグや不具合への対応を実施したセキュリティ\nパッチを適用すると、これまで安定的に稼働していたシステムに予期せぬ不具合が生ずる場合\nがあることから、定期的にソフトウェアの (ウ) を行うとともに、更新の必要性について\n確認の上で対応を行う必要がある。\nソフトウェア開発の外部委託や市販ソフトウェアをパッケージとして導入することによるブ\nラックボックス化が進展する中、特に交換機の制御等に用いられる重要なソフトウェアについ\nては、機器等の製造・販売を行う者等関係者との契約書等により、サービスの提供の継続に重\n要と考えられる (エ) 等の情報を確認できるよう明示することが重要である。\n項 目 対 策 （抜 粋）\nソフトウェアの要求仕様は、サービス内容及び (ア)\nを踏まえて策定すること。\nソフトウェアの不具合による動作不良等を防止するための\n(イ) を事前に確認すること。\n定期的にソフトウェアの (ウ) を行うとともに、更新の\nソ フ ト ウ ェ ア の 必要性を確認すること。\n信 頼 性 確 保 交換機の制御等に用いられる重要なソフトウェアについて\nは、機器等の製造・販売を行う者等関係者との契約書等に\nおいて、サービスの提供の継続に重要と考えられる (エ)\n等の情報を確認できることを明示すること。\nソフトウェアに (エ) が設定されている場合は、電気\n通信事業者が自ら又は機器等の製造・販売を行う者等関係\n者との契約等を通じて、確実に管理すること。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 監視項目・方法 ② 再インストール ③ 使用目的 ④ 暗号化\n⑤ サービス提供地域 ⑥ 通信需要予測 ⑦ 技術動向 ⑧ 開発言語\n⑨ 試験項目・手順 ⑩ 品質管理体制 ⑪ 再起動 ⑫ 有効期限\n⑬ 復旧方法・手順 ⑭ リスク分析 ⑮ 棚卸し ⑯ 暗証番号\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェア開発のモデルなどについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 簡単な試作ソフトウェアにより、ユーザの評価と改善を繰り返しながらユーザ要\n求を明確にしていく進め方は、プロトタイピングモデルにおける要求定義の特徴で\nある。\n② ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n③ スパイラルモデルでは、システム全体を一括で作るのではなく、分割された小さ\nい単位で一連の開発プロセスを繰り返し、開発範囲や機能を拡張しながら開発を進\nめていく。\n④ 計画に従うことよりも変化への対応を重視し、新しい機能を短期間で継続的にリ\nリースしていくソフトウェア開発の進め方は、アドオン開発の特徴であり、その開\n発手法にはスクラム、エクストリームプログラミングなどがある。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｘ ０１６１：２００８ソフトウェア技術－ソフトウェアライフサイクルプロセス－\n保守に規定されているソフトウェア保守の種類について述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 緊急保守とは、予防保守実施までシステム運用を確保するための、計画外で一時\n的な修正をいう。\n② 改良保守とは、新しい要求を満たすための既存のソフトウェア製品への修正をい\nう。\n③ 適応保守とは、引渡し後、変化した又は変化している環境において、ソフトウェ\nア製品を使用できるように保ち続けるために実施するソフトウェア製品の修正をいう。\n④ 是正保守とは、ソフトウェア製品の引渡し後に発見された問題を訂正するために\n行う受身の修正をいう。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則(以下、基準という。)に規定する、平常時の取組として実施すべきソフトウェアの信頼性\n確保の対策並びにその解説について述べたものであり、表は、その対策を基準から抜粋したもの\nである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記\nせ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n事業用電気通信設備として導入されるソフトウェアについては、その開発・導入段階から維\n持管理段階において事故の発生防止のための適切な対応措置が求められる。\nソフトウェアバグに起因する設備のリソースの枯渇、解放漏れなどの電気通信事故を防止す\nるため、ソフトウェアの要求仕様は、サービス内容及び (ア) を踏まえて策定することが\n必要である。また、全てのバグを事前に解消することは困難であることから、ソフトウェアの\n不具合による動作不良等を防止するための (イ) を事前に確認する必要がある。\nソフトウェア導入時には判明していなかったバグや不具合への対応を実施したセキュリティ\nパッチを適用すると、これまで安定的に稼働していたシステムに予期せぬ不具合が生ずる場合\nがあることから、定期的にソフトウェアの (ウ) を行うとともに、更新の必要性について\n確認の上で対応を行う必要がある。\nソフトウェア開発の外部委託や市販ソフトウェアをパッケージとして導入することによるブ\nラックボックス化が進展する中、特に交換機の制御等に用いられる重要なソフトウェアについ\nては、機器等の製造・販売を行う者等関係者との契約書等により、サービスの提供の継続に重\n要と考えられる (エ) 等の情報を確認できるよう明示することが重要である。\n項 目 対 策 （抜 粋）\nソフトウェアの要求仕様は、サービス内容及び (ア)\nを踏まえて策定すること。\nソフトウェアの不具合による動作不良等を防止するための\n(イ) を事前に確認すること。\n定期的にソフトウェアの (ウ) を行うとともに、更新の\nソ フ ト ウ ェ ア の 必要性を確認すること。\n信 頼 性 確 保 交換機の制御等に用いられる重要なソフトウェアについて\nは、機器等の製造・販売を行う者等関係者との契約書等に\nおいて、サービスの提供の継続に重要と考えられる (エ)\n等の情報を確認できることを明示すること。\nソフトウェアに (エ) が設定されている場合は、電気\n通信事業者が自ら又は機器等の製造・販売を行う者等関係\n者との契約等を通じて、確実に管理すること。\n<(ア)～(エ)の解答群>\n① 監視項目・方法 ② 再インストール ③ 使用目的 ④ 暗号化\n⑤ サービス提供地域 ⑥ 通信需要予測 ⑦ 技術動向 ⑧ 開発言語\n⑨ 試験項目・手順 ⑩ 品質管理体制 ⑪ 再起動 ⑫ 有効期限\n⑬ 復旧方法・手順 ⑭ リスク分析 ⑮ 棚卸し ⑯ 暗証番号\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェア開発のモデルなどについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 簡単な試作ソフトウェアにより、ユーザの評価と改善を繰り返しながらユーザ要\n求を明確にしていく進め方は、プロトタイピングモデルにおける要求定義の特徴で\nある。\n② ウォーターフォールモデルは、開発工程ごとの作業が明確に定義されており、逐\n次的に進められるため、進捗管理がしやすく、大規模なソフトウェアの開発に適用\nできる。\n③ スパイラルモデルでは、システム全体を一括で作るのではなく、分割された小さ\nい単位で一連の開発プロセスを繰り返し、開発範囲や機能を拡張しながら開発を進\nめていく。\n④ 計画に従うことよりも変化への対応を重視し、新しい機能を短期間で継続的にリ\nリースしていくソフトウェア開発の進め方は、アドオン開発の特徴であり、その開\n発手法にはスクラム、エクストリームプログラミングなどがある。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｘ ０１６１：２００８ソフトウェア技術－ソフトウェアライフサイクルプロセス－\n保守に規定されているソフトウェア保守の種類について述べた次の文章のうち、誤っているも\nのは、 (カ) である。\n<(カ)の解答群>\n① 緊急保守とは、予防保守実施までシステム運用を確保するための、計画外で一時\n的な修正をいう。\n② 改良保守とは、新しい要求を満たすための既存のソフトウェア製品への修正をい\nう。\n③ 適応保守とは、引渡し後、変化した又は変化している環境において、ソフトウェ\nア製品を使用できるように保ち続けるために実施するソフトウェア製品の修正をいう。\n④ 是正保守とは、ソフトウェア製品の引渡し後に発見された問題を訂正するために\n行う受身の修正をいう。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問８ 次の問いに答えよ。 (小計１４点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＴサービスマネジメントについて述べたものである。 内の(ア)～</p>\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nＩＴサービスを適切に管理して、ＩＴサービスを安定的に提供し継続的な改善を実現するた\nめの仕組みはＩＴサービスマネジメントといわれ、これを標準化したＩＴサービスマネジメン\nトシステムの規格には、国際規格としてＩＳＯ／ＩＥＣ (ア) 、国内規格としてＪＩＳ Ｑ\n(ア) がある。\nＪＩＳ Ｑ (ア) ：２０２５は、サービスマネジメントシステムを確立し、実施し、維持\nし、継続的に改善するための組織に対する要求事項について規定するものである。この中で、\nリリース及び展開管理に関する要求事項において、リリースは、文書化した (イ) に基づ\nいて検証し、展開前に承認しなければならないと規定されており、 (イ) を満たしていな\nい場合には、組織及び利害関係者は必要な処置及び展開について決定しなければならないと規\n定されている。また、リリースは、サービス及びサービスコンポーネントの (ウ) が維持\nされるように、稼働環境へ展開しなければならないと規定されている。\nＩＴＩＬ(Information Technology Infrastructure Library)は、ＩＴサービスマネジメント\nの (エ) を体系化した手引書であり、ＩＴに関する社内規則や手順を策定する際のガイド\nラインとして利用されている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 基本方針 ② 完全性 ③ スケジュール ④ ９００１\n⑤ 作業手順 ⑥ 機密性 ⑦ ベンチマーク ⑧ １９７７０－１\n⑨ 受入れ基準 ⑩ 効率性 ⑪ 信頼性モデル ⑫ ２００００－１\n⑬ プロトコル ⑭ 冗長性 ⑮ ベストプラクティス ⑯ ３１０００\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアのライセンスについて述べた次の文章のうち、正しいものは、 (オ) であ\nる。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① コンピュータプログラムは、著作物として著作権法で保護されており、コンピュー\nタプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となる\nアイデアやアルゴリズムを考案した者に帰属する。\n② 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約\nといわれ、クリックオン契約では、一般に、購入者がコンピュータにソフトウェア\nをインストールした行為をもって使用許諾契約に同意したとみなされる。\n③ 企業、教育機関などの組織が同じソフトウェアを一括で購入して、当該組織内の\n複数のユーザや複数のコンピュータで利用できるようにするライセンス形態は、一\n般に、サイトライセンスといわれる。\n④ ソースコードがインターネットなどを通じて公開されていて、利用、改良及び再\n頒布が許可されたソフトウェアは、一般に、シェアウェアといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nソフトウェアの導入などに関する用語について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ソフトウェアの開発担当と運用担当が密接に連携して協力することにより、迅速\nにソフトウェアの導入やサービス提供を行う取組は、一般に、ＰｏＣ(Proof of\nConcept)といわれる。\n② プログラミングにおいて、ソフトウェアの外部から見た動作を変えずに内部構造\nを整理することは、一般に、リファクタリングといわれ、これによりソフトウェア\nの保守性や再利用性を高めることができる。\n③ サーバのソフトウェアを更新する際に、運用中の現環境とは別に、次のバージョ\nンのソフトウェアを提供するための新環境を準備し、二つの環境を同時稼働させな\nがら、クライアントからの接続先を現環境から新環境に切り替える手法は、一般に、\nブルーグリーンデプロイメントといわれる。\n④ ソフトウェアの新しいバージョンを公開する際に、最初は一部の利用者のみに限\n定して提供し、動作などに問題ないか確認しながら段階的に利用者を拡大していく\n手法は、一般に、カナリアリリースといわれる。", "raw": "問８ 次の問いに答えよ。 (小計１４点)\n(１) 次の文章は、ＩＴサービスマネジメントについて述べたものである。 内の(ア)～\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\nＩＴサービスを適切に管理して、ＩＴサービスを安定的に提供し継続的な改善を実現するた\nめの仕組みはＩＴサービスマネジメントといわれ、これを標準化したＩＴサービスマネジメン\nトシステムの規格には、国際規格としてＩＳＯ／ＩＥＣ (ア) 、国内規格としてＪＩＳ Ｑ\n(ア) がある。\nＪＩＳ Ｑ (ア) ：２０２５は、サービスマネジメントシステムを確立し、実施し、維持\nし、継続的に改善するための組織に対する要求事項について規定するものである。この中で、\nリリース及び展開管理に関する要求事項において、リリースは、文書化した (イ) に基づ\nいて検証し、展開前に承認しなければならないと規定されており、 (イ) を満たしていな\nい場合には、組織及び利害関係者は必要な処置及び展開について決定しなければならないと規\n定されている。また、リリースは、サービス及びサービスコンポーネントの (ウ) が維持\nされるように、稼働環境へ展開しなければならないと規定されている。\nＩＴＩＬ(Information Technology Infrastructure Library)は、ＩＴサービスマネジメント\nの (エ) を体系化した手引書であり、ＩＴに関する社内規則や手順を策定する際のガイド\nラインとして利用されている。\n<(ア)～(エ)の解答群>\n① 基本方針 ② 完全性 ③ スケジュール ④ ９００１\n⑤ 作業手順 ⑥ 機密性 ⑦ ベンチマーク ⑧ １９７７０－１\n⑨ 受入れ基準 ⑩ 効率性 ⑪ 信頼性モデル ⑫ ２００００－１\n⑬ プロトコル ⑭ 冗長性 ⑮ ベストプラクティス ⑯ ３１０００\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアのライセンスについて述べた次の文章のうち、正しいものは、 (オ) であ\nる。\n<(オ)の解答群>\n① コンピュータプログラムは、著作物として著作権法で保護されており、コンピュー\nタプログラムの著作権は、実際にコーディングを行った者でなく、その基礎となる\nアイデアやアルゴリズムを考案した者に帰属する。\n② 著作権者がソフトウェアの使用権をユーザに許諾するための契約は使用許諾契約\nといわれ、クリックオン契約では、一般に、購入者がコンピュータにソフトウェア\nをインストールした行為をもって使用許諾契約に同意したとみなされる。\n③ 企業、教育機関などの組織が同じソフトウェアを一括で購入して、当該組織内の\n複数のユーザや複数のコンピュータで利用できるようにするライセンス形態は、一\n般に、サイトライセンスといわれる。\n④ ソースコードがインターネットなどを通じて公開されていて、利用、改良及び再\n頒布が許可されたソフトウェアは、一般に、シェアウェアといわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nソフトウェアの導入などに関する用語について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① ソフトウェアの開発担当と運用担当が密接に連携して協力することにより、迅速\nにソフトウェアの導入やサービス提供を行う取組は、一般に、ＰｏＣ(Proof of\nConcept)といわれる。\n② プログラミングにおいて、ソフトウェアの外部から見た動作を変えずに内部構造\nを整理することは、一般に、リファクタリングといわれ、これによりソフトウェア\nの保守性や再利用性を高めることができる。\n③ サーバのソフトウェアを更新する際に、運用中の現環境とは別に、次のバージョ\nンのソフトウェアを提供するための新環境を準備し、二つの環境を同時稼働させな\nがら、クライアントからの接続先を現環境から新環境に切り替える手法は、一般に、\nブルーグリーンデプロイメントといわれる。\n④ ソフトウェアの新しいバージョンを公開する際に、最初は一部の利用者のみに限\n定して提供し、動作などに問題ないか確認しながら段階的に利用者を拡大していく\n手法は、一般に、カナリアリリースといわれる。"}], "9": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、社内ネットワークのインターネット接続などで用いられるファイアウォールにつ</p>\nいて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、\nその番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nファイアウォールは、一般に、インターネット、社内ＬＡＮなどのセキュリティレベルの異\nなるネットワーク区域の境界に配置される。また、ファイアウォールを用いて、インターネッ\nトからのアクセスを受け付けるＷｅｂサーバやメールサーバなどが設置される (ア) とい\nわれるエリアを設けることができる。\nファイアウォールには、 (イ) 型、パケットフィルタリング型などがある。 (イ)\n型ファイアウォールは、プロキシサーバとして動作し、受信したデータに不正なデータやコマ\nンドが無ければ、目的のサーバに中継を行う。パケットフィルタリング型ファイアウォールに\nは、あらかじめ通過の可否を判別するための全てのルールを (ウ) に登録しておくスタ\nティックパケットフィルタリングといわれる方式と、フィルタリング処理の実行時に動的に\nルールを変化させるダイナミックパケットフィルタリングといわれる方式がある。\n不正アクセスを発見する方法としてファイアウォールの (エ) がある。 (エ) を\n継続的に実施することにより、ハッキングなどを初期の段階で発見し、大事に至る前に対処す\nることができる場合がある。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 目視点検 ② ＳＳＬ ③ ＤＮＳ ④ ＵＲＬ\n⑤ ＤＭＺ ⑥ ログ解析 ⑦ ループ ⑧ ＷＡＮ\n⑨ ＮＡＴ ⑩ クラウド ⑪ リング ⑫ 死活監視\n⑬ アプリケーションゲートウェイ ⑭ ＣＲＬ\n⑮ リソース監視 ⑯ ＡＣＬ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２７００１：２０１４に規定されている、情報セキュリティインシデント管理に\n関するＩＳＭＳ(情報セキュリティマネジメントシステム)の要求事項を満たすための管理策に\nついて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 情報セキュリティインシデントに対する迅速、効果的かつ順序だった対応を確実\nにするために、管理層の責任及び手順を確立しなければならない。\n② 情報セキュリティ事象は、適切な管理者への連絡経路を通して、できるだけ速や\nかに報告しなければならない。\n③ 組織の情報システム及びサービスを利用する従業員及び契約相手に、システム又\nはサービスの中で発見した又は疑いをもった情報セキュリティ弱点のうち、事業継\n続にかかわる重大なものだけを記録し、報告するように要求しなければならない。\n④ 情報セキュリティインシデントの分析及び解決から得られた知識は、インシデン\nトが将来起こる可能性又はその影響を低減するために用いなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n不正アクセスで用いられるパスワード解析手法などについて述べた次の文章のうち、正しい\nものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 認証サーバにユーザＩＤとパスワードを送信し、認証されるかどうかを確認する\nことによりパスワードを解析する手法は、一般に、オフライン攻撃といわれる。\n② あらゆる文字列の組合せを総当たりで試すことによりパスワードを解析する手法\nは、一般に、パスワードリスト攻撃といわれる。この攻撃に対して、パスワードの\n文字列を長くしたり文字の種類を多くしたりすると、解析に長時間を要するか又は\n高速処理が可能なコンピュータが必要になるため、安全性を高めることができる。\n③ ハッシュ化されたパスワード(ハッシュ値)から元のパスワードを求めることは、\nハッシュ関数の一方向性から困難であるが、適当なパスワード候補からハッシュ値\nを生成し、ハッシュ化されたパスワードと同一となるものを探索する手法によりパ\nスワードが解析されるおそれがある。\n④ パスワードによる認証には、固定パスワード、ワンタイムパスワードなどを用い\nる方式がある。ワンタイムパスワードは、固定パスワードと比較して盗聴に対する\n耐性が低い。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＰＫＩ(Public Key Infrastructure)について述べた次の文章のうち、誤っているものは、\n(キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 認証局は、デジタル証明書の申請者の秘密鍵と申請者の情報を認証局の公開鍵\nで暗号化し、デジタル証明書を作成する。\nえい\n② デジタル証明書の申請者はデジタル証明書に対応する秘密鍵を漏洩しないよう\nに厳重に保管しておく必要がある。\n③ 秘密鍵の漏洩やデジタル証明書に記載された内容に変更があった場合、又はデ\nジタル証明書の申請者から失効の申し出があった場合は、認証局は該当するデジ\nタル証明書を失効させる。\n④ 認証局がデジタル証明書の失効情報を利用者に知らせる手段として、証明書失\n効リストをリポジトリに格納して利用者に公開する方法がある。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n無線ＬＡＮのセキュリティについて述べた次の文章のうち、正しいものは、 (ク) であ\nる。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ＩＥＥＥ８０２.１１ｉでは、通信の暗号化にＴＫＩＰやＡＥＳを用いること、\n及び端末の認証にＩＥＥＥ８０２.１Ｘを用いることを規定している。\n② ＭＡＣアドレスフィルタリングを用いると、無線区間の通信データは暗号化さ\nれるため盗聴を防ぐことができる。\n③ ＷＰＡ２方式では、暗号アルゴリズムにＤＥＳを採用したＴＫＩＰといわれる\n暗号方式の実装が必須とされている。\n④ ＷＰＡ２方式は、ＷＥＰ方式と比較して、セキュリティレベルが低いとされて\nいる。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、社内ネットワークのインターネット接続などで用いられるファイアウォールにつ\nいて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、\nその番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nファイアウォールは、一般に、インターネット、社内ＬＡＮなどのセキュリティレベルの異\nなるネットワーク区域の境界に配置される。また、ファイアウォールを用いて、インターネッ\nトからのアクセスを受け付けるＷｅｂサーバやメールサーバなどが設置される (ア) とい\nわれるエリアを設けることができる。\nファイアウォールには、 (イ) 型、パケットフィルタリング型などがある。 (イ)\n型ファイアウォールは、プロキシサーバとして動作し、受信したデータに不正なデータやコマ\nンドが無ければ、目的のサーバに中継を行う。パケットフィルタリング型ファイアウォールに\nは、あらかじめ通過の可否を判別するための全てのルールを (ウ) に登録しておくスタ\nティックパケットフィルタリングといわれる方式と、フィルタリング処理の実行時に動的に\nルールを変化させるダイナミックパケットフィルタリングといわれる方式がある。\n不正アクセスを発見する方法としてファイアウォールの (エ) がある。 (エ) を\n継続的に実施することにより、ハッキングなどを初期の段階で発見し、大事に至る前に対処す\nることができる場合がある。\n<(ア)～(エ)の解答群>\n① 目視点検 ② ＳＳＬ ③ ＤＮＳ ④ ＵＲＬ\n⑤ ＤＭＺ ⑥ ログ解析 ⑦ ループ ⑧ ＷＡＮ\n⑨ ＮＡＴ ⑩ クラウド ⑪ リング ⑫ 死活監視\n⑬ アプリケーションゲートウェイ ⑭ ＣＲＬ\n⑮ リソース監視 ⑯ ＡＣＬ\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２７００１：２０１４に規定されている、情報セキュリティインシデント管理に\n関するＩＳＭＳ(情報セキュリティマネジメントシステム)の要求事項を満たすための管理策に\nついて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 情報セキュリティインシデントに対する迅速、効果的かつ順序だった対応を確実\nにするために、管理層の責任及び手順を確立しなければならない。\n② 情報セキュリティ事象は、適切な管理者への連絡経路を通して、できるだけ速や\nかに報告しなければならない。\n③ 組織の情報システム及びサービスを利用する従業員及び契約相手に、システム又\nはサービスの中で発見した又は疑いをもった情報セキュリティ弱点のうち、事業継\n続にかかわる重大なものだけを記録し、報告するように要求しなければならない。\n④ 情報セキュリティインシデントの分析及び解決から得られた知識は、インシデン\nトが将来起こる可能性又はその影響を低減するために用いなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n不正アクセスで用いられるパスワード解析手法などについて述べた次の文章のうち、正しい\nものは、 (カ) である。\n<(カ)の解答群>\n① 認証サーバにユーザＩＤとパスワードを送信し、認証されるかどうかを確認する\nことによりパスワードを解析する手法は、一般に、オフライン攻撃といわれる。\n② あらゆる文字列の組合せを総当たりで試すことによりパスワードを解析する手法\nは、一般に、パスワードリスト攻撃といわれる。この攻撃に対して、パスワードの\n文字列を長くしたり文字の種類を多くしたりすると、解析に長時間を要するか又は\n高速処理が可能なコンピュータが必要になるため、安全性を高めることができる。\n③ ハッシュ化されたパスワード(ハッシュ値)から元のパスワードを求めることは、\nハッシュ関数の一方向性から困難であるが、適当なパスワード候補からハッシュ値\nを生成し、ハッシュ化されたパスワードと同一となるものを探索する手法によりパ\nスワードが解析されるおそれがある。\n④ パスワードによる認証には、固定パスワード、ワンタイムパスワードなどを用い\nる方式がある。ワンタイムパスワードは、固定パスワードと比較して盗聴に対する\n耐性が低い。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＰＫＩ(Public Key Infrastructure)について述べた次の文章のうち、誤っているものは、\n(キ) である。\n<(キ)の解答群>\n① 認証局は、デジタル証明書の申請者の秘密鍵と申請者の情報を認証局の公開鍵\nで暗号化し、デジタル証明書を作成する。\nえい\n② デジタル証明書の申請者はデジタル証明書に対応する秘密鍵を漏洩しないよう\nに厳重に保管しておく必要がある。\n③ 秘密鍵の漏洩やデジタル証明書に記載された内容に変更があった場合、又はデ\nジタル証明書の申請者から失効の申し出があった場合は、認証局は該当するデジ\nタル証明書を失効させる。\n④ 認証局がデジタル証明書の失効情報を利用者に知らせる手段として、証明書失\n効リストをリポジトリに格納して利用者に公開する方法がある。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n無線ＬＡＮのセキュリティについて述べた次の文章のうち、正しいものは、 (ク) であ\nる。\n<(ク)の解答群>\n① ＩＥＥＥ８０２.１１ｉでは、通信の暗号化にＴＫＩＰやＡＥＳを用いること、\n及び端末の認証にＩＥＥＥ８０２.１Ｘを用いることを規定している。\n② ＭＡＣアドレスフィルタリングを用いると、無線区間の通信データは暗号化さ\nれるため盗聴を防ぐことができる。\n③ ＷＰＡ２方式では、暗号アルゴリズムにＤＥＳを採用したＴＫＩＰといわれる\n暗号方式の実装が必須とされている。\n④ ＷＰＡ２方式は、ＷＥＰ方式と比較して、セキュリティレベルが低いとされて\nいる。"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＶＰＮの概要について述べたものである。 内の(ア)～(エ)に最も適し</p>\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nＶＰＮは、インターネットなどのオープンなネットワーク上に (ア) 的な専用ネット\nワークを構築してセキュアな通信を可能とするものであり、暗号化、認証などの技術を用いて\n実現される。\nＶＰＮで用いられる代表的な暗号化通信のプロトコルにＩＰｓｅｃがある。ＩＰｓｅｃの通\n信モードには、 (イ) モードと (ウ) モードの二つがある。 (イ) モードでは転\n送するＩＰパケットに対してＩＰヘッダまで含めて暗号化とメッセージ認証の処理を行い、新\nたなＩＰヘッダを付加してカプセル化することにより、ルータなど通信経路上の装置間でのセ\nキュアな通信を可能とする。一方、 (ウ) モードは、ＩＰヘッダは暗号化せず、ＩＰパケッ\nトのペイロード部の暗号化を行うモードで、一般に、エンド・ツー・エンドのホスト間でセキュ\nアな通信を行う場合に利用される。\nＶＰＮの接続形態は、本社、支店など拠点のネットワークどうしを接続するための拠点間接\n続ＶＰＮと、自宅、外出先などの端末から拠点のネットワークに接続するための (エ)\nＶＰＮに大別される。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 開 放 ② リモートアクセス ③ トンネル ④ ソケット\n⑤ 制 約 ⑥ ＬＡＮ間接続 ⑦ プロキシ ⑧ セキュリティ\n⑨ 仮 想 ⑩ ローカルアクセス ⑪ ＳＳＬ ⑫ トランスポート\n⑬ セーフ ⑭ サイト間接続 ⑮ 物 理 ⑯ シークレット\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２７００１：２０１４に規定されている、ＩＳＭＳ(情報セキュリティマネジメ\nントシステム)の要求事項を満たすための管理策について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① プログラムソースコードへのアクセスは、制限しなければならない。\n② 情報セキュリティのための方針群は、これを定義し、管理層が承認し、発行し、\n全ての従業員に通知しなければならず、関連する外部関係者に対しては秘匿しなけ\nればならない。\n③ 資産の取扱いに関する手順は、組織が採用した情報分類体系に従って策定し、実\n施しなければならない。\n④ 装置は、可用性及び完全性を継続的に維持することを確実にするために、正しく\n保守しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサイバー攻撃について述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ データベースと連携したＷｅｂサイトに入力するデータの中に悪意のあるＳＱＬ文を埋め\n込むことでデータベースを不正に操作する攻撃は、一般に、クロスサイトスクリプティング\nといわれる。\nＢ ＪａｖａＳｃｒｉｐｔは、Ｗｅｂページに動きや対話性などを付加することができるプロ\nグラミング言語である。ＪａｖａＳｃｒｉｐｔで記述されたプログラムを攻撃対象のＷｅｂ\nページに埋め込み、そのページの閲覧者を不正サイトに誘導したり、データを盗用したりす\nるために用いられる場合がある。\nＣ インターネット上でサービスを提供しているサーバに対し、パケットを大量に送りつける\nなどして、サーバが提供しているサービスを妨害する攻撃は、一般に、ＤｏＳ攻撃といわれ\nる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nファイアウォールのパケットフィルタリングなどについて述べた次の文章のうち、正しいも\nのは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① パケットフィルタリングでは、ＡＣＬ(Access Control List)に設定されている\nルールに従って、バイト単位で処理する。\n② パケットフィルタリングでは、ＩＰパケットに改ざんがあるかどうかをチェック\nし、改ざんがあった場合にはそのＩＰパケットを除去することができる。\n③ パケットをそのまま中継するだけではなく、アプリケーションレイヤのプロトコ\nルを解釈しながら転送するプロキシを用いたファイアウォールは、一般に、サー\nキットレベルゲートウェイ型ファイアウォールといわれる。\n④ ファイアウォールのログ取得機能は、通信の許可状況と拒否状況、不正な通信の\n検出、ファイアウォールの動作状況などの記録を残すことができ、取得されたログ\nはセキュリティインシデント発生時の調査において利用される場合がある。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n暗号の特徴などについて述べた次の文章のうち、正しいものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n② 非対称暗号方式は、公開鍵暗号方式ともいわれ、第三者に秘密にする秘密鍵と一\n般に公開する公開鍵の二つの鍵を用いる方式である。非対称暗号方式は対称暗号方\n式と比較して、暗号アルゴリズムが単純であり、暗号化と復号にかかる処理時間が\n短い。\n③ 暗号化だけでなくデジタル署名にも応用されているＲＳＡ暗号の安全性は、離散\n対数問題の数学的困難性に基づいている。\nだ\n④ ＲＳＡ暗号は、楕円曲線暗号と比較して、同じ鍵長の場合、公開鍵から秘密鍵を\n求めるのに必要な計算量が多いため安全性が高い。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、ＶＰＮの概要について述べたものである。 内の(ア)～(エ)に最も適し\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nＶＰＮは、インターネットなどのオープンなネットワーク上に (ア) 的な専用ネット\nワークを構築してセキュアな通信を可能とするものであり、暗号化、認証などの技術を用いて\n実現される。\nＶＰＮで用いられる代表的な暗号化通信のプロトコルにＩＰｓｅｃがある。ＩＰｓｅｃの通\n信モードには、 (イ) モードと (ウ) モードの二つがある。 (イ) モードでは転\n送するＩＰパケットに対してＩＰヘッダまで含めて暗号化とメッセージ認証の処理を行い、新\nたなＩＰヘッダを付加してカプセル化することにより、ルータなど通信経路上の装置間でのセ\nキュアな通信を可能とする。一方、 (ウ) モードは、ＩＰヘッダは暗号化せず、ＩＰパケッ\nトのペイロード部の暗号化を行うモードで、一般に、エンド・ツー・エンドのホスト間でセキュ\nアな通信を行う場合に利用される。\nＶＰＮの接続形態は、本社、支店など拠点のネットワークどうしを接続するための拠点間接\n続ＶＰＮと、自宅、外出先などの端末から拠点のネットワークに接続するための (エ)\nＶＰＮに大別される。\n<(ア)～(エ)の解答群>\n① 開 放 ② リモートアクセス ③ トンネル ④ ソケット\n⑤ 制 約 ⑥ ＬＡＮ間接続 ⑦ プロキシ ⑧ セキュリティ\n⑨ 仮 想 ⑩ ローカルアクセス ⑪ ＳＳＬ ⑫ トランスポート\n⑬ セーフ ⑭ サイト間接続 ⑮ 物 理 ⑯ シークレット\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２７００１：２０１４に規定されている、ＩＳＭＳ(情報セキュリティマネジメ\nントシステム)の要求事項を満たすための管理策について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<(オ)の解答群>\n① プログラムソースコードへのアクセスは、制限しなければならない。\n② 情報セキュリティのための方針群は、これを定義し、管理層が承認し、発行し、\n全ての従業員に通知しなければならず、関連する外部関係者に対しては秘匿しなけ\nればならない。\n③ 資産の取扱いに関する手順は、組織が採用した情報分類体系に従って策定し、実\n施しなければならない。\n④ 装置は、可用性及び完全性を継続的に維持することを確実にするために、正しく\n保守しなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサイバー攻撃について述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ データベースと連携したＷｅｂサイトに入力するデータの中に悪意のあるＳＱＬ文を埋め\n込むことでデータベースを不正に操作する攻撃は、一般に、クロスサイトスクリプティング\nといわれる。\nＢ ＪａｖａＳｃｒｉｐｔは、Ｗｅｂページに動きや対話性などを付加することができるプロ\nグラミング言語である。ＪａｖａＳｃｒｉｐｔで記述されたプログラムを攻撃対象のＷｅｂ\nページに埋め込み、そのページの閲覧者を不正サイトに誘導したり、データを盗用したりす\nるために用いられる場合がある。\nＣ インターネット上でサービスを提供しているサーバに対し、パケットを大量に送りつける\nなどして、サーバが提供しているサービスを妨害する攻撃は、一般に、ＤｏＳ攻撃といわれ\nる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nファイアウォールのパケットフィルタリングなどについて述べた次の文章のうち、正しいも\nのは、 (キ) である。\n<(キ)の解答群>\n① パケットフィルタリングでは、ＡＣＬ(Access Control List)に設定されている\nルールに従って、バイト単位で処理する。\n② パケットフィルタリングでは、ＩＰパケットに改ざんがあるかどうかをチェック\nし、改ざんがあった場合にはそのＩＰパケットを除去することができる。\n③ パケットをそのまま中継するだけではなく、アプリケーションレイヤのプロトコ\nルを解釈しながら転送するプロキシを用いたファイアウォールは、一般に、サー\nキットレベルゲートウェイ型ファイアウォールといわれる。\n④ ファイアウォールのログ取得機能は、通信の許可状況と拒否状況、不正な通信の\n検出、ファイアウォールの動作状況などの記録を残すことができ、取得されたログ\nはセキュリティインシデント発生時の調査において利用される場合がある。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n暗号の特徴などについて述べた次の文章のうち、正しいものは、 (ク) である。\n<(ク)の解答群>\n① 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n② 非対称暗号方式は、公開鍵暗号方式ともいわれ、第三者に秘密にする秘密鍵と一\n般に公開する公開鍵の二つの鍵を用いる方式である。非対称暗号方式は対称暗号方\n式と比較して、暗号アルゴリズムが単純であり、暗号化と復号にかかる処理時間が\n短い。\n③ 暗号化だけでなくデジタル署名にも応用されているＲＳＡ暗号の安全性は、離散\n対数問題の数学的困難性に基づいている。\nだ\n④ ＲＳＡ暗号は、楕円曲線暗号と比較して、同じ鍵長の場合、公開鍵から秘密鍵を\n求めるのに必要な計算量が多いため安全性が高い。"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、情報セキュリティポリシーについて述べたものである。 内の(ア)～(エ)</p>\nに最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n情報セキュリティポリシーとは、企業や組織の情報セキュリティに関する方針などを示した\nものであり、情報セキュリティマネジメントを実践するための様々な取組みを集約し規定して\nいる。情報セキュリティポリシーの文書は、一般に、情報セキュリティ基本方針、情報セキュ\nリティ対策基準及び情報セキュリティ (ア) の３階層で構成される。\n情報セキュリティ基本方針は、企業や組織の (イ) が情報セキュリティに関する考え方\nを示すものであり、情報セキュリティの目標、目標を達成するための取組み姿勢、及び組織全\n体に関することが記述される。\n情報セキュリティ対策基準は、基本方針に基づいて何をどのように守るかを示すものであり、\n情報セキュリティ対策を行うための具体的なルールである管理策が記述される。管理策には多\nくのものがあり、技術的対策、物理的対策、人的対策、組織的対策などに大別される。対策基\n準を策定する際には、多くの管理策の中から自組織の (ウ) するための管理策を選ぶ必要\nがある。ＪＩＳ Ｑ ２７００２：２０１４は、情報セキュリティポリシーを策定する際のガイ\nドラインとして利用されることがあり、様々な実践の模範となる管理策である (エ) が列\n挙されている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 教 育 ② プロトコル ③ 脅威を分類 ④ 情報システム部門\n⑤ 従業員 ⑥ 実施手順 ⑦ 管理水準を設定 ⑧ ＩＳＭＳを評価\n⑨ 監 査 ⑩ リスクを低減 ⑪ インシデント ⑫ ベンチマーク\n⑬ ＩＳＭＳ認証機関 ⑭ ベストプラクティス\n⑮ トップマネジメント ⑯ デファクトスタンダード\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバにおけるアクセス制御について述べた次の文章のうち、正しいものは、 (オ) で\nある。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ファイルやシステム資源などの各所有者が、読取り、書込み、実行などのアクセ\nス権を設定する方式は、一般に、強制アクセス制御といわれる。\n② システム管理者の決めた管理ポリシーに従ったアクセス制御ルールが全ユーザに\n適用される方式は、一般に、任意アクセス制御といわれる。\n③ ユーザの役割に応じてアクセス権限を設定することにより、必要なオブジェクト\nへのアクセスを可能とするよう制御する方式は、一般に、ロールベースアクセス制\n御といわれる。\n④ ユーザやグループごとに、ファイルやシステム資源などに対して、何を許可し、\n何を拒絶するかなどのアクセス制御情報を記述したリストは、一般に、ＣＲＬとい\nわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコンピュータシステムへの脅威などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 他人のコンピュータに不正に侵入し、無断でプログラムやデータを書き換えるなどの行為\nは、一般に、トラッシングといわれる。\nぜい\nＢ コンピュータプログラムのセキュリティ上の脆弱性が公表される前、又は脆弱性の情報は\n公表されたがセキュリティパッチがまだない状態において、その脆弱性を狙って行われる攻\n撃は、一般に、ゼロデイ攻撃といわれる。\nＣ 暗号化処理を行っている装置が発する電磁波、装置の消費電力量、装置の処理時間などを\n外部から測定することにより、暗号解読の手掛かりを取得しようとする行為は、一般に、サ\nイドチャネル攻撃といわれる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n暗号鍵管理、暗号強度などについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 鍵共有の仕組みとして、ＤＨ(Diffie-Hellman)鍵共有方式や公開鍵暗号を利用した方法が\nある。\nＢ Ｓ／ＭＩＭＥは、公開鍵の安全性を保証する方法として公開鍵所有者の代表者が設置した\n公開鍵サーバに公開鍵を登録することにより、不特定多数の通信対象者への信頼性を確保し\nている。\nＣ 共通鍵暗号において、暗号方式を適切に設計すれば、一般に、同じ暗号方式の場合、暗号\n強度は鍵が長いほど高くなるが、鍵が長くなると暗号化・復号に要する時間が長くなる。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n利用者認証について述べた次の文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 利用者認証は、一般に、利用者だけが知り得る知識による認証、利用者の身体的\n特徴による認証、利用者だけが所持する物による認証の三つに分類でき、複数の認\n証方式を組み合わせて用いる場合もある。\n② 最初にパスワードによる認証を行い、これに成功すると次に秘密の質問の答えに\nよる認証を行うというように、利用者だけが知り得る知識による認証を２回続けて\n行う手法は、一般に、二要素認証といわれる。\n③ ネットワークを介した利用者認証プロセスで用いられるチャレンジレスポンス方\n式では、固定パスワードをネットワークにそのまま流さないようにしているため、\nパスワードが盗聴されるリスクを低減することができる。\n④ 生体認証は利用者の指紋、虹彩、静脈パターンなどを用いて本人確認するため、\n知識や物とは異なり、忘却、紛失などの心配はないが、チェックを厳密にすると本\n人を誤って拒否する本人拒否率(ＦＲＲ)が高くなるという問題がある。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、情報セキュリティポリシーについて述べたものである。 内の(ア)～(エ)\nに最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n情報セキュリティポリシーとは、企業や組織の情報セキュリティに関する方針などを示した\nものであり、情報セキュリティマネジメントを実践するための様々な取組みを集約し規定して\nいる。情報セキュリティポリシーの文書は、一般に、情報セキュリティ基本方針、情報セキュ\nリティ対策基準及び情報セキュリティ (ア) の３階層で構成される。\n情報セキュリティ基本方針は、企業や組織の (イ) が情報セキュリティに関する考え方\nを示すものであり、情報セキュリティの目標、目標を達成するための取組み姿勢、及び組織全\n体に関することが記述される。\n情報セキュリティ対策基準は、基本方針に基づいて何をどのように守るかを示すものであり、\n情報セキュリティ対策を行うための具体的なルールである管理策が記述される。管理策には多\nくのものがあり、技術的対策、物理的対策、人的対策、組織的対策などに大別される。対策基\n準を策定する際には、多くの管理策の中から自組織の (ウ) するための管理策を選ぶ必要\nがある。ＪＩＳ Ｑ ２７００２：２０１４は、情報セキュリティポリシーを策定する際のガイ\nドラインとして利用されることがあり、様々な実践の模範となる管理策である (エ) が列\n挙されている。\n<(ア)～(エ)の解答群>\n① 教 育 ② プロトコル ③ 脅威を分類 ④ 情報システム部門\n⑤ 従業員 ⑥ 実施手順 ⑦ 管理水準を設定 ⑧ ＩＳＭＳを評価\n⑨ 監 査 ⑩ リスクを低減 ⑪ インシデント ⑫ ベンチマーク\n⑬ ＩＳＭＳ認証機関 ⑭ ベストプラクティス\n⑮ トップマネジメント ⑯ デファクトスタンダード\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバにおけるアクセス制御について述べた次の文章のうち、正しいものは、 (オ) で\nある。\n<(オ)の解答群>\n① ファイルやシステム資源などの各所有者が、読取り、書込み、実行などのアクセ\nス権を設定する方式は、一般に、強制アクセス制御といわれる。\n② システム管理者の決めた管理ポリシーに従ったアクセス制御ルールが全ユーザに\n適用される方式は、一般に、任意アクセス制御といわれる。\n③ ユーザの役割に応じてアクセス権限を設定することにより、必要なオブジェクト\nへのアクセスを可能とするよう制御する方式は、一般に、ロールベースアクセス制\n御といわれる。\n④ ユーザやグループごとに、ファイルやシステム資源などに対して、何を許可し、\n何を拒絶するかなどのアクセス制御情報を記述したリストは、一般に、ＣＲＬとい\nわれる。\n\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコンピュータシステムへの脅威などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 他人のコンピュータに不正に侵入し、無断でプログラムやデータを書き換えるなどの行為\nは、一般に、トラッシングといわれる。\nぜい\nＢ コンピュータプログラムのセキュリティ上の脆弱性が公表される前、又は脆弱性の情報は\n公表されたがセキュリティパッチがまだない状態において、その脆弱性を狙って行われる攻\n撃は、一般に、ゼロデイ攻撃といわれる。\nＣ 暗号化処理を行っている装置が発する電磁波、装置の消費電力量、装置の処理時間などを\n外部から測定することにより、暗号解読の手掛かりを取得しようとする行為は、一般に、サ\nイドチャネル攻撃といわれる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n暗号鍵管理、暗号強度などについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 鍵共有の仕組みとして、ＤＨ(Diffie-Hellman)鍵共有方式や公開鍵暗号を利用した方法が\nある。\nＢ Ｓ／ＭＩＭＥは、公開鍵の安全性を保証する方法として公開鍵所有者の代表者が設置した\n公開鍵サーバに公開鍵を登録することにより、不特定多数の通信対象者への信頼性を確保し\nている。\nＣ 共通鍵暗号において、暗号方式を適切に設計すれば、一般に、同じ暗号方式の場合、暗号\n強度は鍵が長いほど高くなるが、鍵が長くなると暗号化・復号に要する時間が長くなる。\n<(キ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n利用者認証について述べた次の文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① 利用者認証は、一般に、利用者だけが知り得る知識による認証、利用者の身体的\n特徴による認証、利用者だけが所持する物による認証の三つに分類でき、複数の認\n証方式を組み合わせて用いる場合もある。\n② 最初にパスワードによる認証を行い、これに成功すると次に秘密の質問の答えに\nよる認証を行うというように、利用者だけが知り得る知識による認証を２回続けて\n行う手法は、一般に、二要素認証といわれる。\n③ ネットワークを介した利用者認証プロセスで用いられるチャレンジレスポンス方\n式では、固定パスワードをネットワークにそのまま流さないようにしているため、\nパスワードが盗聴されるリスクを低減することができる。\n④ 生体認証は利用者の指紋、虹彩、静脈パターンなどを用いて本人確認するため、\n知識や物とは異なり、忘却、紛失などの心配はないが、チェックを厳密にすると本\n人を誤って拒否する本人拒否率(ＦＲＲ)が高くなるという問題がある。"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ログ管理について述べたものである。 内の(ア)～(エ)に最も適したも</p>\nのを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\nログは、ＯＳ、サーバアプリケーション、通信機器など情報システムを構成している装置が\n出力する動作状況などに関する記録である。情報システムの重要度や取り扱うログ情報の機密\n性を考慮して、ログ管理に関する方針を組織として定め、管理を行う必要がある。\nどの装置でどのようなログを取得するかは、一般に、ログの利用目的で決める。不正アクセ\nスや不正利用を調査するために取得するログには、利用者のＩＤや (ア) 、プログラムの\n動作記録、ファイアウォールの通信記録などがある。\n不正アクセスなどの原因究明は、一般に、複数の装置のログを突き合わせることによって行\nわれる。装置間での時刻のずれをなくしスムーズな調査ができるようにするため (イ)\nサーバを利用して組織内の情報システムの時刻を合わせておく必要がある。\nログの保存では、ログの保存場所をそれぞれの装置とするのか、 (ウ) サーバを構築し、\nログを一元管理するかなどを決める。また、ログの保存期間がどの程度必要であるかをあらか\nじめ決めておく。ログの保存には膨大な記憶容量を必要とするため、 (エ) を行うことも\n考慮する。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ＳＮＭＰ ② ＳＮＳ ③ ＮＴＰ ④ アクセス権限\n⑤ 操作記録 ⑥ ＤＨＣＰ ⑦ 公開鍵 ⑧ 暗号化\n⑨ ＨＴＴＰ ⑩ ＤＮＳ ⑪ 秘密鍵 ⑫ プロキシ\n⑬ ログローテーション ⑭ バックドアの設置\n⑮ アクセス制御 ⑯ ｓｙｓｌｏｇ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n個人情報の保護に関する法律やこれに関係する法令及びガイドラインに基づいた個人情報の\n管理などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 個人に関する情報のうち、ホームページ、ＳＮＳなどで公にされている情報は、それが生\n存する特定の個人を識別することができるものであっても、個人情報には該当しない。\nＢ 個人情報取扱事業者は、個人情報を取り扱うに当たっては、その利用の目的をできる限り\n特定しなければならない。\nＣ 個人情報取扱事業者は、個人データの取扱いの全部又は一部を委託する場合は、その委託\n先の名称を、本人に通知し、又は公表しなければならない。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサイバーセキュリティ対策技術について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ボットなどによる自動操作を防止するために、ひずんだり重なったりして判別し\nにくい文字の画像を表示し、その画像から読み取った文字を入力させるなどの方法\nを用いて、システムに対する操作が人間によって行われたかどうかを判定する仕組\nみは、ＣＡＰＴＣＨＡといわれる。\n② ＷＡＦ(Web Application Firewall)は、ＨＴＴＰなどを用いた通信の内容を分析\nし、ＳＱＬインジェクション、クロスサイトスクリプティングなどの攻撃を検知・\n防御するために用いられる。\n③ ＩＤＳ(Intrusion Detection System)は、通信を監視して不正アクセスを検知す\nる機能を持ち、その検知の方法には、シグネチャ検知とアノマリ検知がある。\n④ コンピュータウイルス対策ソフトにおけるウイルス検知方法の一つであるパター\nンマッチング法は、プログラムの実際の動作を観察して、ウイルスに特有の挙動を\n検出する方法であり、未知のウイルスを検知できる可能性がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n暗号方式について述べた次の文章のうち、誤っているものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 公開鍵暗号方式は、一般に、共通鍵暗号方式と比較して、処理が複雑であり暗号\n化・復号に時間がかかるため大量のデータの変換には適していない。\n② 離散対数問題の数学的困難性を利用した公開鍵暗号方式にＥｌＧａｍａｌ暗号が\nある。\nだ\n③ 共通鍵暗号方式で用いられている暗号には、ＲＳＡ暗号、楕円曲線暗号などがあ\nる。\n④ 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＶＰＮに用いられるプロトコルについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① Ｌ２ＴＰは、レイヤ２で動作するトンネリングプロトコルであり、リモートアク\nセスＶＰＮだけでなく、ＬＡＮ間接続ＶＰＮにも適用可能であるが、暗号化の機能\nは有していない。\n② ＩＰｓｅｃには、送信するＩＰパケットのペイロード部分だけを認証・暗号化し\nて通信するトンネルモードと、ＩＰパケットのヘッダ部まで含めて全てを認証・暗\n号化するトランスポートモードがある。\n③ ＩＰｓｅｃは、ＡＨ(Authentication Header)により通信データの暗号化、ＥＳＰ\n(Encapsulating Security Payload)により認証と改ざん防止を実現している。\n④ ＩＰｓｅｃは、クライアントとサーバ間で用いられるＦＴＰ、ＴＥＬＮＥＴなど\nのプロトコルには適用できない。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、ログ管理について述べたものである。 内の(ア)～(エ)に最も適したも\nのを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\nログは、ＯＳ、サーバアプリケーション、通信機器など情報システムを構成している装置が\n出力する動作状況などに関する記録である。情報システムの重要度や取り扱うログ情報の機密\n性を考慮して、ログ管理に関する方針を組織として定め、管理を行う必要がある。\nどの装置でどのようなログを取得するかは、一般に、ログの利用目的で決める。不正アクセ\nスや不正利用を調査するために取得するログには、利用者のＩＤや (ア) 、プログラムの\n動作記録、ファイアウォールの通信記録などがある。\n不正アクセスなどの原因究明は、一般に、複数の装置のログを突き合わせることによって行\nわれる。装置間での時刻のずれをなくしスムーズな調査ができるようにするため (イ)\nサーバを利用して組織内の情報システムの時刻を合わせておく必要がある。\nログの保存では、ログの保存場所をそれぞれの装置とするのか、 (ウ) サーバを構築し、\nログを一元管理するかなどを決める。また、ログの保存期間がどの程度必要であるかをあらか\nじめ決めておく。ログの保存には膨大な記憶容量を必要とするため、 (エ) を行うことも\n考慮する。\n<(ア)～(エ)の解答群>\n① ＳＮＭＰ ② ＳＮＳ ③ ＮＴＰ ④ アクセス権限\n⑤ 操作記録 ⑥ ＤＨＣＰ ⑦ 公開鍵 ⑧ 暗号化\n⑨ ＨＴＴＰ ⑩ ＤＮＳ ⑪ 秘密鍵 ⑫ プロキシ\n⑬ ログローテーション ⑭ バックドアの設置\n⑮ アクセス制御 ⑯ ｓｙｓｌｏｇ\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n個人情報の保護に関する法律やこれに関係する法令及びガイドラインに基づいた個人情報の\n管理などについて述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 個人に関する情報のうち、ホームページ、ＳＮＳなどで公にされている情報は、それが生\n存する特定の個人を識別することができるものであっても、個人情報には該当しない。\nＢ 個人情報取扱事業者は、個人情報を取り扱うに当たっては、その利用の目的をできる限り\n特定しなければならない。\nＣ 個人情報取扱事業者は、個人データの取扱いの全部又は一部を委託する場合は、その委託\n先の名称を、本人に通知し、又は公表しなければならない。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサイバーセキュリティ対策技術について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① ボットなどによる自動操作を防止するために、ひずんだり重なったりして判別し\nにくい文字の画像を表示し、その画像から読み取った文字を入力させるなどの方法\nを用いて、システムに対する操作が人間によって行われたかどうかを判定する仕組\nみは、ＣＡＰＴＣＨＡといわれる。\n② ＷＡＦ(Web Application Firewall)は、ＨＴＴＰなどを用いた通信の内容を分析\nし、ＳＱＬインジェクション、クロスサイトスクリプティングなどの攻撃を検知・\n防御するために用いられる。\n③ ＩＤＳ(Intrusion Detection System)は、通信を監視して不正アクセスを検知す\nる機能を持ち、その検知の方法には、シグネチャ検知とアノマリ検知がある。\n④ コンピュータウイルス対策ソフトにおけるウイルス検知方法の一つであるパター\nンマッチング法は、プログラムの実際の動作を観察して、ウイルスに特有の挙動を\n検出する方法であり、未知のウイルスを検知できる可能性がある。\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n暗号方式について述べた次の文章のうち、誤っているものは、 (キ) である。\n<(キ)の解答群>\n① 公開鍵暗号方式は、一般に、共通鍵暗号方式と比較して、処理が複雑であり暗号\n化・復号に時間がかかるため大量のデータの変換には適していない。\n② 離散対数問題の数学的困難性を利用した公開鍵暗号方式にＥｌＧａｍａｌ暗号が\nある。\nだ\n③ 共通鍵暗号方式で用いられている暗号には、ＲＳＡ暗号、楕円曲線暗号などがあ\nる。\n④ 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＶＰＮに用いられるプロトコルについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<(ク)の解答群>\n① Ｌ２ＴＰは、レイヤ２で動作するトンネリングプロトコルであり、リモートアク\nセスＶＰＮだけでなく、ＬＡＮ間接続ＶＰＮにも適用可能であるが、暗号化の機能\nは有していない。\n② ＩＰｓｅｃには、送信するＩＰパケットのペイロード部分だけを認証・暗号化し\nて通信するトンネルモードと、ＩＰパケットのヘッダ部まで含めて全てを認証・暗\n号化するトランスポートモードがある。\n③ ＩＰｓｅｃは、ＡＨ(Authentication Header)により通信データの暗号化、ＥＳＰ\n(Encapsulating Security Payload)により認証と改ざん防止を実現している。\n④ ＩＰｓｅｃは、クライアントとサーバ間で用いられるＦＴＰ、ＴＥＬＮＥＴなど\nのプロトコルには適用できない。"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、デジタル署名について述べたものである。 内の(ア)～(エ)に最も適し</p>\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nデジタル署名は、送信者が生成した署名を受信者が検証することにより、送信者の認証と\nメッセージの (ア) を同時に実現することができる仕組みである。\nデジタル署名の一つであるＲＳＡ署名を用いたメッセージ送信では、送信者は、メッセージ\n本文から (イ) を用いてメッセージダイジェストを作成し、これを自分の持つ秘密鍵で署\n名に変換し、その署名をメッセージ本文に付加して送信する。送信者から署名とメッセージ本\n文を受信した受信者は、 (ウ) を用いて署名からメッセージダイジェストを復元するとと\nもに、 (イ) を用いてメッセージ本文からメッセージダイジェストを作成する。復元した\nメッセージダイジェストと受信者自身が作成したメッセージダイジェストを比較し、一致すれ\nば送信者が作成したメッセージであると判定する。\nデジタル署名においては、一般に、ＰＫＩといわれるセキュリティ基盤が利用される。ＰＫＩ\nでは、 (エ) といわれる信頼できる第三者機関がデジタル証明書を発行することにより、\n(ウ) が本人のものであることを保証している。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① フーリエ変換 ② 送信者の秘密鍵 ③ 換字表 ④ ＶＡ\n⑤ モジュロ演算 ⑥ 送信者の公開鍵 ⑦ 盗聴防止 ⑧ 誤り訂正\n⑨ 圧縮・伸長 ⑩ 受信者の秘密鍵 ⑪ ＣＡ ⑫ ＴＳＡ\n⑬ ハッシュ関数 ⑭ 受信者の公開鍵 ⑮ ＲＡ ⑯ 改ざん検知\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nセキュリティホールのリスクや対策について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＧＩ、ＰＨＰなどを用いたＷｅｂアプリケーションにセキュリティホールがあると、\nサーバ上の読まれてはいけないファイルを読まれる、悪意のあるプログラムを埋め込まれて\n実行されるなどの被害を受けるおそれがある。\nＢ ネットワークを介してサーバに対しポート番号を順次変えながらアクセスしてその応答を\n確認していく行為は、スニッフィングといわれ、セキュリティホールを探すために用いられ\nる。\nＣ 製品出荷後に発見されたＯＳやアプリケーションのセキュリティホールに対処するための\n修正プログラムは、セキュリティポリシーといわれ、ＯＳやアプリケーションを安全に使用\nするためには、一般に、セキュリティポリシーを速やかに適用する必要がある。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nネットワーク利用時のリスクや対策について述べた次の文章のうち、正しいものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 人間の心理的な隙や行動のミスなどにつけ込むことにより、認証のために必要と\nなるパスワードなどの重要な情報を盗み出す方法は、一般に、ソーシャルネット\nワーキングといわれる。\n② 攻撃対象のサーバに対して、複数のコンピュータから一斉に大量のリクエストを\n送信することにより、過剰な負荷をかけて機能不全にする攻撃は、一般に、サイド\nチャネル攻撃といわれる。\n③ 無線ＬＡＮ環境では電波を傍受され盗聴されるリスクがあるが、ＭＡＣアドレス\nフィルタリングを用いることにより、無線区間の通信データを暗号化して盗聴を防\nぐことができる。\n④ ＬＡＮを流れるＭＡＣフレーム内のデータは、ネットワークインタフェースの動\n作モードがプロミスキャスモードに設定された端末機器を用いて盗聴されるおそれ\nがある。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nマルウェアについて述べた次の文章のうち、誤っているものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① ランサムウェアには、攻撃対象のコンピュータのファイルやフォルダを暗号化し\nて利用できなくするタイプのものや端末画面をロックして利用できなくするタイプ\nのものがある。\n② マクロウイルスは、ファイル感染型ウイルスの一種であり、一般に、拡張子が\nｅｘｅ、ｃｏｍなどの実行可能ファイルを感染対象とする。\n③ 有益なプログラムを装って他人のコンピュータに入り込み、そのプログラムが実\n行されるとユーザが意図しない悪意を持った動作を行い、自己増殖活動は行わない\nプログラムは、一般に、トロイの木馬といわれる。\n④ ＨＴＭＬメールはメッセージの中にスクリプトの形で悪意のあるコードを埋め込\nむことができるため、添付ファイルを開かなくてもメール本文を開いただけでウイ\nルスに感染するおそれがある。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nワンタイムパスワード認証などについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ワンタイムパスワード認証の一つであるチャレンジレスポンス方式は、認証を受\nけたいクライアントがサーバにアクセスの都度変化する値であるチャレンジを送り、\nサーバがこれにパスワードを組み合わせて演算処理した結果をクライアントに返す\nことによって認証を行う。\n② ＰＰＰなどで使用されているＣＨＡＰは、チャレンジレスポンス方式による認証\nシステムを実装している。\n③ ワンタイムパスワード認証の一つであるカウンタ同期方式は、一般に、認証を行\nうサーバと時刻が同期しているクライアント側のトークンなどを用いて、日付・時\n刻とユーザの個人識別番号(ＰＩＮ)を基にパスワードを生成する。\n④ ワンタイムパスワード生成に用いられるトークンは、一般に、カード型などの形\n状のハードウェアベースのものが用いられており、専用アプリケーションをクライ\nアント端末にインストールするソフトウェアベースのものはセキュリティが低下す\nるため用いられていない。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、デジタル署名について述べたものである。 内の(ア)～(エ)に最も適し\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nデジタル署名は、送信者が生成した署名を受信者が検証することにより、送信者の認証と\nメッセージの (ア) を同時に実現することができる仕組みである。\nデジタル署名の一つであるＲＳＡ署名を用いたメッセージ送信では、送信者は、メッセージ\n本文から (イ) を用いてメッセージダイジェストを作成し、これを自分の持つ秘密鍵で署\n名に変換し、その署名をメッセージ本文に付加して送信する。送信者から署名とメッセージ本\n文を受信した受信者は、 (ウ) を用いて署名からメッセージダイジェストを復元するとと\nもに、 (イ) を用いてメッセージ本文からメッセージダイジェストを作成する。復元した\nメッセージダイジェストと受信者自身が作成したメッセージダイジェストを比較し、一致すれ\nば送信者が作成したメッセージであると判定する。\nデジタル署名においては、一般に、ＰＫＩといわれるセキュリティ基盤が利用される。ＰＫＩ\nでは、 (エ) といわれる信頼できる第三者機関がデジタル証明書を発行することにより、\n(ウ) が本人のものであることを保証している。\n<(ア)～(エ)の解答群>\n① フーリエ変換 ② 送信者の秘密鍵 ③ 換字表 ④ ＶＡ\n⑤ モジュロ演算 ⑥ 送信者の公開鍵 ⑦ 盗聴防止 ⑧ 誤り訂正\n⑨ 圧縮・伸長 ⑩ 受信者の秘密鍵 ⑪ ＣＡ ⑫ ＴＳＡ\n⑬ ハッシュ関数 ⑭ 受信者の公開鍵 ⑮ ＲＡ ⑯ 改ざん検知\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nセキュリティホールのリスクや対策について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ ＣＧＩ、ＰＨＰなどを用いたＷｅｂアプリケーションにセキュリティホールがあると、\nサーバ上の読まれてはいけないファイルを読まれる、悪意のあるプログラムを埋め込まれて\n実行されるなどの被害を受けるおそれがある。\nＢ ネットワークを介してサーバに対しポート番号を順次変えながらアクセスしてその応答を\n確認していく行為は、スニッフィングといわれ、セキュリティホールを探すために用いられ\nる。\nＣ 製品出荷後に発見されたＯＳやアプリケーションのセキュリティホールに対処するための\n修正プログラムは、セキュリティポリシーといわれ、ＯＳやアプリケーションを安全に使用\nするためには、一般に、セキュリティポリシーを速やかに適用する必要がある。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nネットワーク利用時のリスクや対策について述べた次の文章のうち、正しいものは、\n(カ) である。\n<(カ)の解答群>\n① 人間の心理的な隙や行動のミスなどにつけ込むことにより、認証のために必要と\nなるパスワードなどの重要な情報を盗み出す方法は、一般に、ソーシャルネット\nワーキングといわれる。\n② 攻撃対象のサーバに対して、複数のコンピュータから一斉に大量のリクエストを\n送信することにより、過剰な負荷をかけて機能不全にする攻撃は、一般に、サイド\nチャネル攻撃といわれる。\n③ 無線ＬＡＮ環境では電波を傍受され盗聴されるリスクがあるが、ＭＡＣアドレス\nフィルタリングを用いることにより、無線区間の通信データを暗号化して盗聴を防\nぐことができる。\n④ ＬＡＮを流れるＭＡＣフレーム内のデータは、ネットワークインタフェースの動\n作モードがプロミスキャスモードに設定された端末機器を用いて盗聴されるおそれ\nがある。\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nマルウェアについて述べた次の文章のうち、誤っているものは、 (キ) である。\n<(キ)の解答群>\n① ランサムウェアには、攻撃対象のコンピュータのファイルやフォルダを暗号化し\nて利用できなくするタイプのものや端末画面をロックして利用できなくするタイプ\nのものがある。\n② マクロウイルスは、ファイル感染型ウイルスの一種であり、一般に、拡張子が\nｅｘｅ、ｃｏｍなどの実行可能ファイルを感染対象とする。\n③ 有益なプログラムを装って他人のコンピュータに入り込み、そのプログラムが実\n行されるとユーザが意図しない悪意を持った動作を行い、自己増殖活動は行わない\nプログラムは、一般に、トロイの木馬といわれる。\n④ ＨＴＭＬメールはメッセージの中にスクリプトの形で悪意のあるコードを埋め込\nむことができるため、添付ファイルを開かなくてもメール本文を開いただけでウイ\nルスに感染するおそれがある。\n\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nワンタイムパスワード認証などについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<(ク)の解答群>\n① ワンタイムパスワード認証の一つであるチャレンジレスポンス方式は、認証を受\nけたいクライアントがサーバにアクセスの都度変化する値であるチャレンジを送り、\nサーバがこれにパスワードを組み合わせて演算処理した結果をクライアントに返す\nことによって認証を行う。\n② ＰＰＰなどで使用されているＣＨＡＰは、チャレンジレスポンス方式による認証\nシステムを実装している。\n③ ワンタイムパスワード認証の一つであるカウンタ同期方式は、一般に、認証を行\nうサーバと時刻が同期しているクライアント側のトークンなどを用いて、日付・時\n刻とユーザの個人識別番号(ＰＩＮ)を基にパスワードを生成する。\n④ ワンタイムパスワード生成に用いられるトークンは、一般に、カード型などの形\n状のハードウェアベースのものが用いられており、専用アプリケーションをクライ\nアント端末にインストールするソフトウェアベースのものはセキュリティが低下す\nるため用いられていない。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ポートスキャンの概要について述べたものである。 内の(ア)～(エ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n攻撃者がインターネット経由でサーバに攻撃を行う際、攻撃対象のサーバに対して事前調査\nを行うことがある。この調査には、ＩＣＭＰを使用した (ア) を用いて対象サーバの稼働\n状態を確認する方法、ポートスキャンにより対象サーバがどのようなサービスを外部に公開し\nているかを確認する方法などがある。\nポートスキャンは、クライアントとサーバとの通信が (イ) 層プロトコルであるＴＣＰ\nやＵＤＰを用いて行われていることを利用しており、通信に使用する各ポートの状態を調べて\nいくことにより、対象サーバが提供しているサービスを特定することができる。\nポートスキャンには様々な手法がある。このうち、 (ウ) スキャンは標的ポートに対し\nて完全なスリーウェイハンドシェイクを行うため、対象サーバのログに残る可能性は高い。一\n方、 (エ) スキャンはスリーウェイハンドシェイクの処理を途中までしか行わずコネク\nションを確立させないため、対象サーバのログに残りにくい。\nポートスキャンにより各ポートで稼働しているサービスが攻撃者に知られてしまうと、攻撃\nを仕掛けられるおそれがあるため、サーバの管理者は不要なサービスを停止するなどの対策を\n講じておくことが望ましい。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ネットワーク ② オンライン ③ ｐｉｎｇコマンド\n④ アプリケーション ⑤ データリンク ⑥ ｃｏｎｆｉｇコマンド\n⑦ ｃｄコマンド ⑧ ＴＣＰ接続 ⑨ ネットワークインタフェース\n⑩ ＴＣＰ ＳＹＮ ⑪ ＨＴＴＰ ⑫ トランスポート\n⑬ ＴＣＰ ＦＩＮ ⑭ トンネリング技術\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n入退室に関するセキュリティ対策などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 企業のオフィスなどを用途、重要度、利用者などに応じたセキュリティレベルの\n違いに基づき分割して、幾つかのセキュリティ区画を設定することは、一般に、\nゾーニングといわれる。\n② 入退室を一人ずつしか行えないようにするために、二重扉の二つの扉の間には常\nに一人しか入ることを許可せず、片方の扉が開いているときはもう片方の扉は開か\nない構造のセキュリティゲートは、一般に、インターロックゲートといわれる。\n③ 在室人数が一人になることを避けるために、最初の入室者と最後の退室者は二人\n以上同時でなければ入室・退室をできなくするルールは、一般に、ＴＰＭＯＲとい\nわれる。\n④ 一つの監視エリアにおいて、認証のためのＩＣカードなどを用い、入室記録後に\n退室記録がない場合は再入室をできなくしたり、退室記録後に入室記録がない場合\nは再退室をできなくしたりする機能は、一般に、ピギーバックといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n不正アクセスの手法と対策について述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 利用者を認証するために送受信される認証データを盗聴し、入手した認証データ\nをそのまま使用して不正ログインを試行するリプレイ攻撃への対策として、パスワー\nドをハッシュ化又は暗号化して秘匿することが有効である。\n② あらゆる文字列の組合せを総当たりで試すことによりパスワードを割り出すブルー\nトフォース攻撃への対策として、ある利用者ＩＤでログインを一定回数連続して失\n敗すると当該利用者ＩＤをロックして使用できなくすることが有効である。\n③ パスワードクラックの手口の一つであるパスワードリスト攻撃への対策として、\nパスワードの使い回しをせずに、利用しているサービスごとに異なるパスワードを\n設定することが有効である。\n④ パスワードクラックの手口の一つである辞書攻撃への対策として、パスワードに\n無意味で推測が困難な文字列を設定することが有効である。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n無線ＬＡＮのセキュリティについて述べた次の文章のうち、誤っているものは、 (キ)\nである。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① ＩＥＥＥ８０２.１１ｉでは、端末の認証にＩＥＥＥ８０２.１Ｘを用いることを\n規定している。\n② ＭＡＣアドレスフィルタリングを用いても、無線区間の通信データは暗号化され\nず盗聴されるおそれがある。\n③ ＷＰＡ２方式では、暗号アルゴリズムにＤＥＳを採用したＴＫＩＰといわれる暗\n号方式の実装が必須とされている。\n④ ＷＰＡ２方式は、ＷＥＰ方式と比較して、セキュリティレベルが高いとされてい\nる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n電子メールのセキュリティについて述べた次の文章のうち、正しいものは、 (ク) であ\nる。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 送信ドメイン認証は、受信側のメールサーバが送信側のメールサーバの正当性を\n検証する仕組みであり、ＳＭＴＰ ＡＵＴＨなどの方式がある。\n② 暗号化電子メールの主な方式には、Ｓ／ＭＩＭＥとＰＧＰがある。Ｓ／ＭＩＭＥ\nは、公開鍵を公的な第三者機関が保証するのに対して、ＰＧＰは、公開鍵を利用者\nどうしで保証しあう。\n③ ＰＯＰ３Ｓを用いて電子メールを受信する場合、パスワードは暗号化されるが\nメール本文は暗号化されない。\n④ ＩＳＰによる迷惑メール対策として、ＩＳＰがあらかじめ用意しているメールサー\nバ以外からの電子メールを外部ネットワークへ送信しない仕組みであるＤＭＡＲＣ\nを用いることが有効である。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、ポートスキャンの概要について述べたものである。 内の(ア)～(エ)に\n最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n攻撃者がインターネット経由でサーバに攻撃を行う際、攻撃対象のサーバに対して事前調査\nを行うことがある。この調査には、ＩＣＭＰを使用した (ア) を用いて対象サーバの稼働\n状態を確認する方法、ポートスキャンにより対象サーバがどのようなサービスを外部に公開し\nているかを確認する方法などがある。\nポートスキャンは、クライアントとサーバとの通信が (イ) 層プロトコルであるＴＣＰ\nやＵＤＰを用いて行われていることを利用しており、通信に使用する各ポートの状態を調べて\nいくことにより、対象サーバが提供しているサービスを特定することができる。\nポートスキャンには様々な手法がある。このうち、 (ウ) スキャンは標的ポートに対し\nて完全なスリーウェイハンドシェイクを行うため、対象サーバのログに残る可能性は高い。一\n方、 (エ) スキャンはスリーウェイハンドシェイクの処理を途中までしか行わずコネク\nションを確立させないため、対象サーバのログに残りにくい。\nポートスキャンにより各ポートで稼働しているサービスが攻撃者に知られてしまうと、攻撃\nを仕掛けられるおそれがあるため、サーバの管理者は不要なサービスを停止するなどの対策を\n講じておくことが望ましい。\n<(ア)～(エ)の解答群>\n① ネットワーク ② オンライン ③ ｐｉｎｇコマンド\n④ アプリケーション ⑤ データリンク ⑥ ｃｏｎｆｉｇコマンド\n⑦ ｃｄコマンド ⑧ ＴＣＰ接続 ⑨ ネットワークインタフェース\n⑩ ＴＣＰ ＳＹＮ ⑪ ＨＴＴＰ ⑫ トランスポート\n⑬ ＴＣＰ ＦＩＮ ⑭ トンネリング技術\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n入退室に関するセキュリティ対策などについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 企業のオフィスなどを用途、重要度、利用者などに応じたセキュリティレベルの\n違いに基づき分割して、幾つかのセキュリティ区画を設定することは、一般に、\nゾーニングといわれる。\n② 入退室を一人ずつしか行えないようにするために、二重扉の二つの扉の間には常\nに一人しか入ることを許可せず、片方の扉が開いているときはもう片方の扉は開か\nない構造のセキュリティゲートは、一般に、インターロックゲートといわれる。\n③ 在室人数が一人になることを避けるために、最初の入室者と最後の退室者は二人\n以上同時でなければ入室・退室をできなくするルールは、一般に、ＴＰＭＯＲとい\nわれる。\n④ 一つの監視エリアにおいて、認証のためのＩＣカードなどを用い、入室記録後に\n退室記録がない場合は再入室をできなくしたり、退室記録後に入室記録がない場合\nは再退室をできなくしたりする機能は、一般に、ピギーバックといわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n不正アクセスの手法と対策について述べた次の文章のうち、誤っているものは、 (カ)\nである。\n<(カ)の解答群>\n① 利用者を認証するために送受信される認証データを盗聴し、入手した認証データ\nをそのまま使用して不正ログインを試行するリプレイ攻撃への対策として、パスワー\nドをハッシュ化又は暗号化して秘匿することが有効である。\n② あらゆる文字列の組合せを総当たりで試すことによりパスワードを割り出すブルー\nトフォース攻撃への対策として、ある利用者ＩＤでログインを一定回数連続して失\n敗すると当該利用者ＩＤをロックして使用できなくすることが有効である。\n③ パスワードクラックの手口の一つであるパスワードリスト攻撃への対策として、\nパスワードの使い回しをせずに、利用しているサービスごとに異なるパスワードを\n設定することが有効である。\n④ パスワードクラックの手口の一つである辞書攻撃への対策として、パスワードに\n無意味で推測が困難な文字列を設定することが有効である。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n無線ＬＡＮのセキュリティについて述べた次の文章のうち、誤っているものは、 (キ)\nである。\n<(キ)の解答群>\n① ＩＥＥＥ８０２.１１ｉでは、端末の認証にＩＥＥＥ８０２.１Ｘを用いることを\n規定している。\n② ＭＡＣアドレスフィルタリングを用いても、無線区間の通信データは暗号化され\nず盗聴されるおそれがある。\n③ ＷＰＡ２方式では、暗号アルゴリズムにＤＥＳを採用したＴＫＩＰといわれる暗\n号方式の実装が必須とされている。\n④ ＷＰＡ２方式は、ＷＥＰ方式と比較して、セキュリティレベルが高いとされてい\nる。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電子メールのセキュリティについて述べた次の文章のうち、正しいものは、 (ク) であ\nる。\n<(ク)の解答群>\n① 送信ドメイン認証は、受信側のメールサーバが送信側のメールサーバの正当性を\n検証する仕組みであり、ＳＭＴＰ ＡＵＴＨなどの方式がある。\n② 暗号化電子メールの主な方式には、Ｓ／ＭＩＭＥとＰＧＰがある。Ｓ／ＭＩＭＥ\nは、公開鍵を公的な第三者機関が保証するのに対して、ＰＧＰは、公開鍵を利用者\nどうしで保証しあう。\n③ ＰＯＰ３Ｓを用いて電子メールを受信する場合、パスワードは暗号化されるが\nメール本文は暗号化されない。\n④ ＩＳＰによる迷惑メール対策として、ＩＳＰがあらかじめ用意しているメールサー\nバ以外からの電子メールを外部ネットワークへ送信しない仕組みであるＤＭＡＲＣ\nを用いることが有効である。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されている需要管理又は容量・能力管理について述べた\n次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① あらかじめ定めた間隔で、組織は、サービスに対する現在の需要を決定し、将来\nの需要を予測しなければならない。\n② あらかじめ定めた間隔で、組織は、サービスの需要及び消費を監視及び報告しな\nければならない。\n③ 人、技術、情報及び財務に関する資源の容量・能力の要求事項を、サービス及び\nパフォーマンスの要求事項を考慮して決定し、文書化し、維持しなければならない。\n④ 組織は、合意した容量・能力及びパフォーマンスの要求事項を満たすためにサー\nビスの供給を調整しなければならない。\n⑤ 組織は、容量・能力の利用を監視し、容量・能力及びパフォーマンスデータを分\n析し、パフォーマンスを改善するための機会を特定しなければならない。\n<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、無線ＬＡＮのセキュリティ技術について述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n無線ＬＡＮのセキュリティ規格には、ＷＰＡ２やＷＰＡ３がある。\nＷＰＡ２には、認証方式の違いによりパーソナルモードとエンタープライズモードの二つの\nモードがある。ＷＰＡ２のパーソナルモードでは、アクセスポイントと端末の間で事前に共有\nされたパスフレーズを使用するＰＳＫといわれる方式で相手認証が行われ、ＷＰＡ２のエンター\nプライズモードでは、ＩＥＥＥ８０２. (ア) といわれる認証規格に基づき相手認証が行わ\nれる。また、ＷＰＡ２における暗号化方式としては、ＷＰＡで使われていたＴＫＩＰに加えて、\n暗号アルゴリズムに (イ) 暗号の一つであるＡＥＳを採用した (ウ) といわれるプロ\nトコルの実装が必須とされている。\nぜい\nＷＰＡ３はＷＰＡ２の後継規格であり、ＷＰＡ２における脆弱性を考慮して、幾つかの機能\nが拡張・強化されている。ＷＰＡ３のパーソナルモードでは、相手認証及び鍵交換に (エ)\nといわれる安全性の高い方式が採用されている。また、ＷＰＡ３のエンタープライズモードに\nは、暗号化の強度を高めるために新たな暗号スイートであるＣＮＳＡが追加されている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ＥＳＰ ② ＣＣＭＰ ③ ハイブリッド ④ ３\n⑤ ＷＥＰ ⑥ ブロック ⑦ ＲＳＡ ⑧ １１\n⑨ ＤＨ ⑩ 公開鍵 ⑪ ＳＡＥ ⑫ １６\n⑬ ＤＳＡ ⑭ ＣＨＡＰ ⑮ ストリーム ⑯ １Ｘ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n情報システムへの攻撃の前段階として行われる情報収集の手法について述べた次の文章のう\nち、正しいものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 組織内のホストのＩＰアドレスを探り出す手法は、一般に、ＩＰスプーフィング\nといわれる。\n② サーバ上で稼働しているアプリケーションに対して、具体的なソフトウェアやそ\nのバージョンを探り出す手法は、一般に、ＮＡＰＴといわれる。\n③ サーバに連続してアクセスし、使用しているポートを探り出す手法は、一般に、\nスニッフィングといわれる。\n④ 人間の心理的な隙や行動のミスなどにつけ込むことにより、認証のために必要と\nなるパスワードなどの重要な情報を盗み出す手法は、一般に、ソーシャルエンジニ\nアリングといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nデジタル署名の概要について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① デジタル署名は、悪意のある第三者による送信データの改ざんの有無を検出する\nだけでなく、送信者のなりすましを検出するためにも用いられる。\nえい\n② デジタル署名では、送信者の秘密鍵が漏洩すると、送信データが改ざんされるお\nそれがある。\n③ デジタル署名では、送信者の秘密鍵と受信者の公開鍵が用いられる。\n④ Ｓ／ＭＩＭＥでは、電子メールにデジタル署名を付加することができ、公開鍵の\n安全性を保証する方法としてＰＫＩを利用している。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサーバにおけるアクセス制御について述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ システム管理者の決めた管理ポリシーに従ったアクセス制御ルールが全ユーザに適用され\nる方式は、一般に、強制アクセス制御といわれる。\nＢ ユーザの役割に応じて必要なオブジェクトへのアクセスが可能となるように、役割ごとに\nアクセス権限を設定する方式は、一般に、任意アクセス制御といわれる。\nＣ ユーザやグループごとに、ファイルやシステム資源などに対して、何を許可し、何を拒絶\nするかなどのアクセス制御情報を記述したリストは、一般に、ＣＲＬといわれる。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n侵入検知システム(ＩＤＳ)について述べた次の文章のうち、誤っているものは、 (ク)\nである。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ＩＤＳは、一般に、ネットワーク又はコンピュータシステム上での事象を監視し、\n不正なアクセスの兆候を検知して、管理者に警報などにより通知するとともに、調\n査、分析などに必要な情報を保存し、提供する機能を有している。\n② ＩＤＳの検知アルゴリズムの一つに、過去の統計やユーザが行う通常の行動の傾\n向を記録しておき、そのデータから大きく外れた行動を検知することにより、未知\nの攻撃を発見できるシグネチャ検知がある。\n③ ネットワーク型ＩＤＳ(ＮＩＤＳ)は、一般に、ネットワークを流れるパケットの\nモニタリングを行い、不正侵入や攻撃につながるおそれがないかを検査する機能を\n有している。\n④ ホスト型ＩＤＳ(ＨＩＤＳ)は、一般に、ＯＳやアプリケーションが生成するログ\nデータやコマンドヒストリなど、ホスト上で生成されるイベント情報から不正侵入\nを検知する機能を有している。", "raw": "(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項に規定されている需要管理又は容量・能力管理について述べた\n次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① あらかじめ定めた間隔で、組織は、サービスに対する現在の需要を決定し、将来\nの需要を予測しなければならない。\n② あらかじめ定めた間隔で、組織は、サービスの需要及び消費を監視及び報告しな\nければならない。\n③ 人、技術、情報及び財務に関する資源の容量・能力の要求事項を、サービス及び\nパフォーマンスの要求事項を考慮して決定し、文書化し、維持しなければならない。\n④ 組織は、合意した容量・能力及びパフォーマンスの要求事項を満たすためにサー\nビスの供給を調整しなければならない。\n⑤ 組織は、容量・能力の利用を監視し、容量・能力及びパフォーマンスデータを分\n析し、パフォーマンスを改善するための機会を特定しなければならない。\n問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、無線ＬＡＮのセキュリティ技術について述べたものである。 内の\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。 (２点×４＝８点)\n無線ＬＡＮのセキュリティ規格には、ＷＰＡ２やＷＰＡ３がある。\nＷＰＡ２には、認証方式の違いによりパーソナルモードとエンタープライズモードの二つの\nモードがある。ＷＰＡ２のパーソナルモードでは、アクセスポイントと端末の間で事前に共有\nされたパスフレーズを使用するＰＳＫといわれる方式で相手認証が行われ、ＷＰＡ２のエンター\nプライズモードでは、ＩＥＥＥ８０２. (ア) といわれる認証規格に基づき相手認証が行わ\nれる。また、ＷＰＡ２における暗号化方式としては、ＷＰＡで使われていたＴＫＩＰに加えて、\n暗号アルゴリズムに (イ) 暗号の一つであるＡＥＳを採用した (ウ) といわれるプロ\nトコルの実装が必須とされている。\nぜい\nＷＰＡ３はＷＰＡ２の後継規格であり、ＷＰＡ２における脆弱性を考慮して、幾つかの機能\nが拡張・強化されている。ＷＰＡ３のパーソナルモードでは、相手認証及び鍵交換に (エ)\nといわれる安全性の高い方式が採用されている。また、ＷＰＡ３のエンタープライズモードに\nは、暗号化の強度を高めるために新たな暗号スイートであるＣＮＳＡが追加されている。\n<(ア)～(エ)の解答群>\n① ＥＳＰ ② ＣＣＭＰ ③ ハイブリッド ④ ３\n⑤ ＷＥＰ ⑥ ブロック ⑦ ＲＳＡ ⑧ １１\n⑨ ＤＨ ⑩ 公開鍵 ⑪ ＳＡＥ ⑫ １６\n⑬ ＤＳＡ ⑭ ＣＨＡＰ ⑮ ストリーム ⑯ １Ｘ\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n情報システムへの攻撃の前段階として行われる情報収集の手法について述べた次の文章のう\nち、正しいものは、 (オ) である。\n<(オ)の解答群>\n① 組織内のホストのＩＰアドレスを探り出す手法は、一般に、ＩＰスプーフィング\nといわれる。\n② サーバ上で稼働しているアプリケーションに対して、具体的なソフトウェアやそ\nのバージョンを探り出す手法は、一般に、ＮＡＰＴといわれる。\n③ サーバに連続してアクセスし、使用しているポートを探り出す手法は、一般に、\nスニッフィングといわれる。\n④ 人間の心理的な隙や行動のミスなどにつけ込むことにより、認証のために必要と\nなるパスワードなどの重要な情報を盗み出す手法は、一般に、ソーシャルエンジニ\nアリングといわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nデジタル署名の概要について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① デジタル署名は、悪意のある第三者による送信データの改ざんの有無を検出する\nだけでなく、送信者のなりすましを検出するためにも用いられる。\nえい\n② デジタル署名では、送信者の秘密鍵が漏洩すると、送信データが改ざんされるお\nそれがある。\n③ デジタル署名では、送信者の秘密鍵と受信者の公開鍵が用いられる。\n④ Ｓ／ＭＩＭＥでは、電子メールにデジタル署名を付加することができ、公開鍵の\n安全性を保証する方法としてＰＫＩを利用している。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nサーバにおけるアクセス制御について述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ システム管理者の決めた管理ポリシーに従ったアクセス制御ルールが全ユーザに適用され\nる方式は、一般に、強制アクセス制御といわれる。\nＢ ユーザの役割に応じて必要なオブジェクトへのアクセスが可能となるように、役割ごとに\nアクセス権限を設定する方式は、一般に、任意アクセス制御といわれる。\nＣ ユーザやグループごとに、ファイルやシステム資源などに対して、何を許可し、何を拒絶\nするかなどのアクセス制御情報を記述したリストは、一般に、ＣＲＬといわれる。\n<(キ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n侵入検知システム(ＩＤＳ)について述べた次の文章のうち、誤っているものは、 (ク)\nである。\n<(ク)の解答群>\n① ＩＤＳは、一般に、ネットワーク又はコンピュータシステム上での事象を監視し、\n不正なアクセスの兆候を検知して、管理者に警報などにより通知するとともに、調\n査、分析などに必要な情報を保存し、提供する機能を有している。\n② ＩＤＳの検知アルゴリズムの一つに、過去の統計やユーザが行う通常の行動の傾\n向を記録しておき、そのデータから大きく外れた行動を検知することにより、未知\nの攻撃を発見できるシグネチャ検知がある。\n③ ネットワーク型ＩＤＳ(ＮＩＤＳ)は、一般に、ネットワークを流れるパケットの\nモニタリングを行い、不正侵入や攻撃につながるおそれがないかを検査する機能を\n有している。\n④ ホスト型ＩＤＳ(ＨＩＤＳ)は、一般に、ＯＳやアプリケーションが生成するログ\nデータやコマンドヒストリなど、ホスト上で生成されるイベント情報から不正侵入\nを検知する機能を有している。"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、Ｗｅｂサイトのセキュリティ対策について述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nぜい\nＷｅｂサイトの安全性を維持するためには、Ｗｅｂアプリケーションの脆弱性を狙った様々\nな攻撃に対して適切な対策を講ずることが重要である。\n利用者がサーバ内のファイル名を指定するＷｅｂサイトにおいて、攻撃者が相対パスを悪用\nするなどして、本来アクセスが許容されないファイルに不正にアクセスする攻撃は、 (ア)\nといわれる。この攻撃への対策としては、サーバ内のファイルへのアクセス権限を正しく設定\nする、パラメータでファイル名を直接指定させないなどの方法がある。\nデータベースと連携したＷｅｂサイトにおいて、入力するデータの中に悪意のあるＳＱＬ文\nを埋め込むことでデータベースを不正に操作する攻撃は、一般に、 (イ) といわれ、ユー\nえい\nザ情報など個人情報の漏洩や不正アクセスなど深刻な被害をもたらすおそれがある。この攻撃\nへの対策としては、プレースホルダといわれる変数の場所を示す記号を用いることで (イ)\nに対する脆弱性を解消する方法がある。\nクロスサイトスクリプティングは、Ｗｅｂアプリケーションの脆弱性を悪用してＷｅｂペー\nジに不正なスクリプトを埋め込み、そのスクリプトを (ウ) 上で実行させる攻撃である。\nこの攻撃への対策としては、ＨＴＭＬ出力値の中のスクリプトの構成に必要な特殊記号を別の\n文字列に置換する (エ) 処理を用いる方法がある。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ＡＰサーバ ② Ｗｅｂサーバ ③ カプセル化 ④ エスケープ\n⑤ ＤＢサーバ ⑥ Ｗｅｂブラウザ ⑦ ＤＢＤ攻撃 ⑧ ＤＤｏＳ攻撃\n⑨ ポリシング ⑩ データハザード ⑪ エラー ⑫ 中間者攻撃\n⑬ ＳＱＬインジェクション ⑭ ディレクトリトラバーサル\n⑮ ディレクトリハーベスト ⑯ ディレクトリリスティング\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２７００１：２０２３に規定されている、情報セキュリティマネジメントシステ\nム(ＩＳＭＳ)の要求事項を満たすための情報セキュリティ管理策について述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① クラウドサービスの調達、利用、管理及び利用終了のプロセスを、組織の情報セ\nキュリティ要求事項に従って確立しなければならない。\n② 認証情報の割当て及び管理は、認証情報の適切な取扱いについて要員に助言する\nことを含む管理プロセスによって管理しなければならない。\n③ 情報及びその他の関連資産へのアクセス権は、組織のアクセス制御に関するトピッ\nク固有の方針及び規則に従って、提供、レビュー、変更及び削除しなければならない。\n④ ＩＣＴ製品及びサービスのサプライチェーンに関連する情報セキュリティリスク\nを管理するためのプロセス及び手順を定め、実施しなければならない。\n⑤ 情報のラベル付けに関する適切な一連の手順は、認証機関が定める情報分類体系\nに従って策定し、実施しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n不正アクセスで用いられるパスワード解析手法などについて述べた次のＡ～Ｃの文章は、\n(カ) 。\nＡ あらゆる文字列の組合せを総当たりで試すことによりパスワードを解析する手法は、一般\nに、パスワードリスト攻撃といわれる。この攻撃に対して、パスワードの文字列を長くした\nり文字の種類を多くしたりすることで、安全性を高めることができる。\nＢ パスワードによる認証には、固定パスワード、ワンタイムパスワードなどを用いる方式が\nある。ワンタイムパスワードは、固定パスワードと比較して盗聴に対する耐性が低い。\nＣ ハッシュ化されたパスワードから元のパスワードを求めることは、ハッシュ関数の一方向\n性から困難であるが、適当なパスワード候補からハッシュ値を生成し、ハッシュ化されたパ\nスワードと同一となるものを探索する手法により元のパスワードが解析されるおそれがある。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n暗号の特徴などについて述べた次の文章のうち、正しいものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 非対称暗号方式は、公開鍵暗号方式ともいわれ、他者に秘密にする秘密鍵と一般\nに公開する公開鍵の二つの鍵を用いる方式である。非対称暗号方式は対称暗号方式\nと比較して、暗号アルゴリズムが単純であり、暗号化と復号にかかる処理時間が短い。\n② 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n③ 暗号化だけでなくデジタル署名にも応用されているＲＳＡ暗号の安全性は、離散\n対数問題の数学的困難性に基づいている。\nだ\n④ ＲＳＡ暗号は、楕円曲線暗号と比較して、同じ鍵長の場合、公開鍵から秘密鍵を\n求めるのに必要な計算量が多いため安全性が高い。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n認証方式などについて述べた次の文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ＰＰＰなどで使用されているＣＨＡＰは、チャレンジレスポンス方式による認証\nシステムを実装している。\n② ＩＥＥＥ８０２.１Ｘは、ＬＡＮに接続する端末を認証するためのプロトコルで\nあり、認証情報を転送するためにＦＴＰを用いている。\n③ ＲＡＤＩＵＳには、認証、認可及びアカウンティングの三つの機能があり、これ\nらを意味する英単語の頭文字をとってＡＡＡ機能といわれる。\n④ ＳＡＭＬ(Security Assertion Markup Language)は、認証及び認可に関する情報を\n交換するための規格であり、複数のＷｅｂサービスへのシングルサインオンの実現\nなどに用いられる。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、Ｗｅｂサイトのセキュリティ対策について述べたものである。 内の\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\nぜい\nＷｅｂサイトの安全性を維持するためには、Ｗｅｂアプリケーションの脆弱性を狙った様々\nな攻撃に対して適切な対策を講ずることが重要である。\n利用者がサーバ内のファイル名を指定するＷｅｂサイトにおいて、攻撃者が相対パスを悪用\nするなどして、本来アクセスが許容されないファイルに不正にアクセスする攻撃は、 (ア)\nといわれる。この攻撃への対策としては、サーバ内のファイルへのアクセス権限を正しく設定\nする、パラメータでファイル名を直接指定させないなどの方法がある。\nデータベースと連携したＷｅｂサイトにおいて、入力するデータの中に悪意のあるＳＱＬ文\nを埋め込むことでデータベースを不正に操作する攻撃は、一般に、 (イ) といわれ、ユー\nえい\nザ情報など個人情報の漏洩や不正アクセスなど深刻な被害をもたらすおそれがある。この攻撃\nへの対策としては、プレースホルダといわれる変数の場所を示す記号を用いることで (イ)\nに対する脆弱性を解消する方法がある。\nクロスサイトスクリプティングは、Ｗｅｂアプリケーションの脆弱性を悪用してＷｅｂペー\nジに不正なスクリプトを埋め込み、そのスクリプトを (ウ) 上で実行させる攻撃である。\nこの攻撃への対策としては、ＨＴＭＬ出力値の中のスクリプトの構成に必要な特殊記号を別の\n文字列に置換する (エ) 処理を用いる方法がある。\n<(ア)～(エ)の解答群>\n① ＡＰサーバ ② Ｗｅｂサーバ ③ カプセル化 ④ エスケープ\n⑤ ＤＢサーバ ⑥ Ｗｅｂブラウザ ⑦ ＤＢＤ攻撃 ⑧ ＤＤｏＳ攻撃\n⑨ ポリシング ⑩ データハザード ⑪ エラー ⑫ 中間者攻撃\n⑬ ＳＱＬインジェクション ⑭ ディレクトリトラバーサル\n⑮ ディレクトリハーベスト ⑯ ディレクトリリスティング\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２７００１：２０２３に規定されている、情報セキュリティマネジメントシステ\nム(ＩＳＭＳ)の要求事項を満たすための情報セキュリティ管理策について述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① クラウドサービスの調達、利用、管理及び利用終了のプロセスを、組織の情報セ\nキュリティ要求事項に従って確立しなければならない。\n② 認証情報の割当て及び管理は、認証情報の適切な取扱いについて要員に助言する\nことを含む管理プロセスによって管理しなければならない。\n③ 情報及びその他の関連資産へのアクセス権は、組織のアクセス制御に関するトピッ\nク固有の方針及び規則に従って、提供、レビュー、変更及び削除しなければならない。\n④ ＩＣＴ製品及びサービスのサプライチェーンに関連する情報セキュリティリスク\nを管理するためのプロセス及び手順を定め、実施しなければならない。\n⑤ 情報のラベル付けに関する適切な一連の手順は、認証機関が定める情報分類体系\nに従って策定し、実施しなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n不正アクセスで用いられるパスワード解析手法などについて述べた次のＡ～Ｃの文章は、\n(カ) 。\nＡ あらゆる文字列の組合せを総当たりで試すことによりパスワードを解析する手法は、一般\nに、パスワードリスト攻撃といわれる。この攻撃に対して、パスワードの文字列を長くした\nり文字の種類を多くしたりすることで、安全性を高めることができる。\nＢ パスワードによる認証には、固定パスワード、ワンタイムパスワードなどを用いる方式が\nある。ワンタイムパスワードは、固定パスワードと比較して盗聴に対する耐性が低い。\nＣ ハッシュ化されたパスワードから元のパスワードを求めることは、ハッシュ関数の一方向\n性から困難であるが、適当なパスワード候補からハッシュ値を生成し、ハッシュ化されたパ\nスワードと同一となるものを探索する手法により元のパスワードが解析されるおそれがある。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n暗号の特徴などについて述べた次の文章のうち、正しいものは、 (キ) である。\n<(キ)の解答群>\n① 非対称暗号方式は、公開鍵暗号方式ともいわれ、他者に秘密にする秘密鍵と一般\nに公開する公開鍵の二つの鍵を用いる方式である。非対称暗号方式は対称暗号方式\nと比較して、暗号アルゴリズムが単純であり、暗号化と復号にかかる処理時間が短い。\n② 疑似乱数生成器の出力と平文とのビットごとの排他的論理和演算によりストリー\nム暗号を構成できる。\n③ 暗号化だけでなくデジタル署名にも応用されているＲＳＡ暗号の安全性は、離散\n対数問題の数学的困難性に基づいている。\nだ\n④ ＲＳＡ暗号は、楕円曲線暗号と比較して、同じ鍵長の場合、公開鍵から秘密鍵を\n求めるのに必要な計算量が多いため安全性が高い。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n認証方式などについて述べた次の文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① ＰＰＰなどで使用されているＣＨＡＰは、チャレンジレスポンス方式による認証\nシステムを実装している。\n② ＩＥＥＥ８０２.１Ｘは、ＬＡＮに接続する端末を認証するためのプロトコルで\nあり、認証情報を転送するためにＦＴＰを用いている。\n③ ＲＡＤＩＵＳには、認証、認可及びアカウンティングの三つの機能があり、これ\nらを意味する英単語の頭文字をとってＡＡＡ機能といわれる。\n④ ＳＡＭＬ(Security Assertion Markup Language)は、認証及び認可に関する情報を\n交換するための規格であり、複数のＷｅｂサービスへのシングルサインオンの実現\nなどに用いられる。"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＶＰＮの概要について述べたものである。 内の(ア)～(エ)に最も適し</p>\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nＶＰＮは、インターネットなどのネットワーク上に仮想的な専用ネットワークを構築してセ\nキュアな通信を可能とするものであり、暗号化、認証などの技術を用いて実現されている。\nＶＰＮで用いられる代表的な暗号化通信のプロトコルにＩＰｓｅｃがある。ＩＰｓｅｃの通\n信モードには、 (ア) モードと (イ) モードの二つがある。 (ア) モードでは元\nのＩＰパケットに対してＩＰヘッダ及びペイロード部の暗号化とメッセージ認証の処理を行い、\n新たなＩＰヘッダを付加してカプセル化することにより、ルータなど通信経路上の装置間での\nセキュアな通信が可能である。一方、 (イ) モードは元のＩＰパケットのＩＰヘッダは暗\n号化せずにペイロード部だけを暗号化するモードであり、一般に、エンド・ツー・エンドのホ\nスト間でセキュアな通信を行う場合に利用される。\nＩＰｓｅｃのセキュリティプロトコルには、ＡＨと (ウ) があり、ＩＰパケットを暗号\n化して送信する場合は (ウ) を使用する。\nＶＰＮの接続形態は、本社、支店など拠点のネットワークどうしを接続するための拠点間接続\nＶＰＮと、自宅、外出先などにある端末から拠点のネットワークに接続するための (エ)\nＶＰＮに大別される。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① トンネル ② ＬＡＮ間接続 ③ パブリック ④ ＷＰＡ\n⑤ プロキシ ⑥ サイト間接続 ⑦ スタンダード ⑧ ＥＳＰ\n⑨ ソケット ⑩ リモートアクセス ⑪ シークレット ⑫ ＡＳ\n⑬ アクティブ ⑭ ローカルアクセス ⑮ トランスポート ⑯ ＰＡＰ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２７００１：２０２３に規定されている、情報セキュリティマネジメントシステ\nム(ＩＳＭＳ)の要求事項を満たすための情報セキュリティ管理策について述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 情報システム、装置又はその他の記憶媒体に保存している情報は、必要でなくなっ\nた時点で削除しなければならない。\n② データ漏えい防止対策を、取扱いに慎重を要する情報を処理、保存又は送信する\nシステム、ネットワーク及びその他の装置に適用しなければならない。\n③ 情報処理施設・設備は、機密性の要求事項を満たすのに十分な冗長性をもって、\n導入しなければならない。\n④ 組織が使用する情報処理システムのクロックは、組織が採用した時刻源と同期さ\nせなければならない。\n⑤ 開発環境、テスト環境及び本番環境は、分離してセキュリティを保たなければな\nらない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nコンピュータシステムへの脅威などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ データベースと連携したＷｅｂサイトに入力するデータの中に悪意のあるＳＱＬ文を埋め\n込むことでデータベースを不正に操作する攻撃は、一般に、クロスサイトスクリプティング\nといわれる。\nＢ 他人のコンピュータやスマートフォンにマルウェアを感染させる、悪意のあるＷｅｂペー\nジにアクセスさせるなどの方法により、所有者に無断でそのデバイスのリソースを使って暗\n号資産のマイニング処理を行う攻撃は、一般に、クリプトジャッキングといわれる。\nぜい\nＣ コンピュータプログラムのセキュリティ上の脆弱性が公表される前、又は脆弱性の情報は\n公表されたがセキュリティパッチがまだ提供されていない状態において、その脆弱性を狙っ\nて行われる攻撃は、一般に、ゼロデイ攻撃といわれる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nセキュリティプロトコルなどについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ ＳＳＨは、リモートシェル、リモートログインなどのｒ系コマンドを暗号化機能と認証機\n能によりセキュアにするプロトコルであり、クライアント認証にパスワードは使用できない。\nＢ Ｓ／ＭＩＭＥは、公開鍵の安全性を保証する方法として公開鍵所有者の代表者が設置した\n公開鍵サーバに公開鍵を登録することにより、不特定多数の通信対象者への信頼性を確保し\nている。\nＣ ＰＧＰでは、メッセージ本文の暗号化、鍵管理及びデジタル署名に公開鍵暗号技術を用い\nている。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n利用者認証について述べた次の文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 利用者認証は、一般に、利用者だけが知り得る知識による認証、利用者の身体的\n特徴による認証、及び利用者だけが所持する物による認証の三つの方式に分類でき、\nこれらの認証方式は単独で又は複数を組み合わせて用いられる。\n② ネットワークを介した利用者認証プロセスで用いられるチャレンジレスポンス認\n証方式では、固定パスワードをネットワークにそのまま流さないようにしているた\nめ、パスワードが盗聴されるリスクを低減することができる。\n③ 最初にパスワードによる認証を行い、これに成功すると次に秘密の質問の答えに\nよる認証を行うというように、利用者だけが知り得る知識による認証を２回続けて\n行う手法は、一般に、二要素認証といわれる。\n④ 生体認証は、利用者の指紋、虹彩、静脈パターンなどを用いて本人確認するため、\n知識や物による認証とは異なり、忘却、紛失などの心配はないが、一般に、他人を\n誤って受け入れる他人受入率(ＦＡＲ)を低く抑えようとすると、本人を誤って拒否\nする本人拒否率(ＦＲＲ)が高くなり、両方の値を０にすることはできない。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、ＶＰＮの概要について述べたものである。 内の(ア)～(エ)に最も適し\nたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ\n解答を示す。 (２点×４＝８点)\nＶＰＮは、インターネットなどのネットワーク上に仮想的な専用ネットワークを構築してセ\nキュアな通信を可能とするものであり、暗号化、認証などの技術を用いて実現されている。\nＶＰＮで用いられる代表的な暗号化通信のプロトコルにＩＰｓｅｃがある。ＩＰｓｅｃの通\n信モードには、 (ア) モードと (イ) モードの二つがある。 (ア) モードでは元\nのＩＰパケットに対してＩＰヘッダ及びペイロード部の暗号化とメッセージ認証の処理を行い、\n新たなＩＰヘッダを付加してカプセル化することにより、ルータなど通信経路上の装置間での\nセキュアな通信が可能である。一方、 (イ) モードは元のＩＰパケットのＩＰヘッダは暗\n号化せずにペイロード部だけを暗号化するモードであり、一般に、エンド・ツー・エンドのホ\nスト間でセキュアな通信を行う場合に利用される。\nＩＰｓｅｃのセキュリティプロトコルには、ＡＨと (ウ) があり、ＩＰパケットを暗号\n化して送信する場合は (ウ) を使用する。\nＶＰＮの接続形態は、本社、支店など拠点のネットワークどうしを接続するための拠点間接続\nＶＰＮと、自宅、外出先などにある端末から拠点のネットワークに接続するための (エ)\nＶＰＮに大別される。\n<(ア)～(エ)の解答群>\n① トンネル ② ＬＡＮ間接続 ③ パブリック ④ ＷＰＡ\n⑤ プロキシ ⑥ サイト間接続 ⑦ スタンダード ⑧ ＥＳＰ\n⑨ ソケット ⑩ リモートアクセス ⑪ シークレット ⑫ ＡＳ\n⑬ アクティブ ⑭ ローカルアクセス ⑮ トランスポート ⑯ ＰＡＰ\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２７００１：２０２３に規定されている、情報セキュリティマネジメントシステ\nム(ＩＳＭＳ)の要求事項を満たすための情報セキュリティ管理策について述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 情報システム、装置又はその他の記憶媒体に保存している情報は、必要でなくなっ\nた時点で削除しなければならない。\n② データ漏えい防止対策を、取扱いに慎重を要する情報を処理、保存又は送信する\nシステム、ネットワーク及びその他の装置に適用しなければならない。\n③ 情報処理施設・設備は、機密性の要求事項を満たすのに十分な冗長性をもって、\n導入しなければならない。\n④ 組織が使用する情報処理システムのクロックは、組織が採用した時刻源と同期さ\nせなければならない。\n⑤ 開発環境、テスト環境及び本番環境は、分離してセキュリティを保たなければな\nらない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nコンピュータシステムへの脅威などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ データベースと連携したＷｅｂサイトに入力するデータの中に悪意のあるＳＱＬ文を埋め\n込むことでデータベースを不正に操作する攻撃は、一般に、クロスサイトスクリプティング\nといわれる。\nＢ 他人のコンピュータやスマートフォンにマルウェアを感染させる、悪意のあるＷｅｂペー\nジにアクセスさせるなどの方法により、所有者に無断でそのデバイスのリソースを使って暗\n号資産のマイニング処理を行う攻撃は、一般に、クリプトジャッキングといわれる。\nぜい\nＣ コンピュータプログラムのセキュリティ上の脆弱性が公表される前、又は脆弱性の情報は\n公表されたがセキュリティパッチがまだ提供されていない状態において、その脆弱性を狙っ\nて行われる攻撃は、一般に、ゼロデイ攻撃といわれる。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nセキュリティプロトコルなどについて述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ ＳＳＨは、リモートシェル、リモートログインなどのｒ系コマンドを暗号化機能と認証機\n能によりセキュアにするプロトコルであり、クライアント認証にパスワードは使用できない。\nＢ Ｓ／ＭＩＭＥは、公開鍵の安全性を保証する方法として公開鍵所有者の代表者が設置した\n公開鍵サーバに公開鍵を登録することにより、不特定多数の通信対象者への信頼性を確保し\nている。\nＣ ＰＧＰでは、メッセージ本文の暗号化、鍵管理及びデジタル署名に公開鍵暗号技術を用い\nている。\n<(キ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n利用者認証について述べた次の文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① 利用者認証は、一般に、利用者だけが知り得る知識による認証、利用者の身体的\n特徴による認証、及び利用者だけが所持する物による認証の三つの方式に分類でき、\nこれらの認証方式は単独で又は複数を組み合わせて用いられる。\n② ネットワークを介した利用者認証プロセスで用いられるチャレンジレスポンス認\n証方式では、固定パスワードをネットワークにそのまま流さないようにしているた\nめ、パスワードが盗聴されるリスクを低減することができる。\n③ 最初にパスワードによる認証を行い、これに成功すると次に秘密の質問の答えに\nよる認証を行うというように、利用者だけが知り得る知識による認証を２回続けて\n行う手法は、一般に、二要素認証といわれる。\n④ 生体認証は、利用者の指紋、虹彩、静脈パターンなどを用いて本人確認するため、\n知識や物による認証とは異なり、忘却、紛失などの心配はないが、一般に、他人を\n誤って受け入れる他人受入率(ＦＡＲ)を低く抑えようとすると、本人を誤って拒否\nする本人拒否率(ＦＲＲ)が高くなり、両方の値を０にすることはできない。"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問９ 次の問いに答えよ。 (小計２０点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、迷惑メール対策技術について述べたものである。 内の(ア)～(エ)に最</p>\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×４＝８点)\n迷惑メール対策には大別して、迷惑メールの送信を防止するための送信側での対策と、迷惑\nメールの受信を防止するための受信側での対策がある。\n送信側での対策には、他人になりすました送信者が迷惑メールを送信することを送信者認証\n技術を用いて防止する方法があり、送信者認証技術の一つである (ア) では、送信側メー\nルサーバにおいてアカウント及びパスワードにより送信者の認証を行い、認証に成功した場合\nのみメール送信を可能としている。\n受信側での対策には、受信時にＤＫＩＭ、 (イ) などの送信ドメイン認証技術を用いて\n送信元ドメインの詐称を検出する方法がある。\nＤＫＩＭでは、送信側メールサーバは送信メールに (ウ) を付加して送信する。受信側\nメールサーバは受信メールで通知された送信元ドメインに対応した公開鍵をＤＮＳに問い合わ\nせて取得し、この公開鍵を用いて (ウ) を検証することにより認証を行う。\nまた、 (イ) では、受信側メールサーバは受信メールで通知された送信元ドメインに対\n応する送信側メールサーバのＩＰアドレスをＤＮＳに問い合わせて取得し、これと受信メール\nの送信元ＩＰアドレスを突合することにより認証を行う。\nさらに、ＤＫＩＭや (イ) の認証結果を利用して、総合的に送信ドメイン認証を行う技\n術である (エ) では、認証に失敗したメールの取扱いを送信側でポリシーとして宣言する\nことなどを可能にしている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ＲＡＤＩＵＳ ② デジタル署名 ③ ポート番号 ④ ＡＰＯＰ\n⑤ ＩＰ２５Ｂ ⑥ Ｓ／ＭＩＭＥ ⑦ ＯＰ２５Ｂ ⑧ ＳＰＦ\n⑨ スパムフィルタ ⑩ チェックサム ⑪ ＤＭＡＲＣ ⑫ ＰＧＰ\n⑬ ネットワークアドレス ⑭ ＳＭＴＰ ＡＵＴＨ\n⑮ ＩＭＡＰ ｏｖｅｒ ＴＬＳ ⑯ ＳＭＴＰ ｏｖｅｒ ＴＬＳ\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２７００１：２０２５に規定されている、情報セキュリティマネジメントシステ\nム(ＩＳＭＳ)の要求事項を満たすための情報セキュリティ管理策について述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 情報セキュリティ方針及びトピック固有の方針は、これを定義し、管理層が承認\nし、発行し、関連する要員及び関連する利害関係者に伝達し、認識させ、あらかじ\nめ定めた間隔で、及び重大な変化が発生した場合にレビューしなければならない。\n② 管理層は、組織の確立された情報セキュリティ方針、トピック固有の方針及び手\n順に従った情報セキュリティの適用を、全ての要員に要求しなければならない。\n③ 情報セキュリティの役割及び責任は、組織のニーズに従って定め、割り当てなけ\nればならない。相反する職務及び相反する責任範囲は、分離してはならない。\n④ 要員及び必要に応じてその他の利害関係者は、雇用、契約又は合意の変更又は終\n了時に、自らが所持する組織の資産の全てを返却しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサイバーセキュリティ対策技術について述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ コンピュータウイルス対策ソフトウェアにおけるウイルス検知方法の一つであるパターン\nマッチング法は、プログラムの実際の動作を観察して、ウイルスに特有の挙動を検出する方\n法であり、未知のウイルスを検知できる可能性がある。\nＢ ＷＡＦ(Web Application Firewall)は、ＨＴＴＰなどを用いた通信の内容を分析し、ＳＱＬ\nインジェクション、クロスサイトスクリプティングなどの攻撃を検知・防御するために用い\nられる。\nＣ ボットなどによる自動操作を防止するために、ひずんだり重なったりして判別しにくい文\n字の画像を表示し、その画像から読み取った文字を入力させるなどの方法を用いて、システ\nムに対する操作が人間によって行われたかどうかを判定する仕組みは、ＣＡＰＴＣＨＡとい\nわれる。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nサイバー攻撃の手法について述べた次の文章のうち、正しいものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① ＩＣＭＰ Ｆｌｏｏｄ攻撃は、ＩＰパケットの上限サイズを超える長大なＩＣＭＰ\nエコー要求メッセージを攻撃対象に送りつけることにより行われる。\n② ＳＹＮ Ｆｌｏｏｄ攻撃は、ＴＣＰコネクションの確立時に行われるチャレンジ\nレスポンスの仕組みを悪用している。\n③ Ｓｍｕｒｆ攻撃は、ＤＮＳ問合せに対して応答パケットを送り返す仕組みを悪用\nしている。\n④ 従量課金制のクラウドサービスを利用しているユーザに経済的な損失を与えるた\nめに、クラウドのリソースを大量に消費させるようなリクエストを持続的に行う攻\n撃は、一般に、ＥＤｏＳ攻撃といわれる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＰＫＩ(Public Key Infrastructure)について述べた次の文章のうち、誤っているものは、\n(ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\nえい\n① デジタル証明書の申請者は、デジタル証明書に対応する秘密鍵を漏洩しないよう\nに厳重に保管しておく必要がある。\n② 認証局は、デジタル証明書の申請者の秘密鍵と申請者の情報に対しデジタル署名\nを行い、デジタル証明書を作成する。\nえい\n③ 秘密鍵の漏洩やデジタル証明書に記載された内容に変更があった場合、又はデジ\nタル証明書の申請者から失効の申出があった場合は、認証局は該当するデジタル証\n明書を失効させる。\n④ 認証局がデジタル証明書の失効情報を利用者に知らせる手段として、証明書失効\nリストをリポジトリに格納して利用者に公開する方法がある。", "raw": "問９ 次の問いに答えよ。 (小計２０点)\n(１) 次の文章は、迷惑メール対策技術について述べたものである。 内の(ア)～(エ)に最\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、\n同じ解答を示す。 (２点×４＝８点)\n迷惑メール対策には大別して、迷惑メールの送信を防止するための送信側での対策と、迷惑\nメールの受信を防止するための受信側での対策がある。\n送信側での対策には、他人になりすました送信者が迷惑メールを送信することを送信者認証\n技術を用いて防止する方法があり、送信者認証技術の一つである (ア) では、送信側メー\nルサーバにおいてアカウント及びパスワードにより送信者の認証を行い、認証に成功した場合\nのみメール送信を可能としている。\n受信側での対策には、受信時にＤＫＩＭ、 (イ) などの送信ドメイン認証技術を用いて\n送信元ドメインの詐称を検出する方法がある。\nＤＫＩＭでは、送信側メールサーバは送信メールに (ウ) を付加して送信する。受信側\nメールサーバは受信メールで通知された送信元ドメインに対応した公開鍵をＤＮＳに問い合わ\nせて取得し、この公開鍵を用いて (ウ) を検証することにより認証を行う。\nまた、 (イ) では、受信側メールサーバは受信メールで通知された送信元ドメインに対\n応する送信側メールサーバのＩＰアドレスをＤＮＳに問い合わせて取得し、これと受信メール\nの送信元ＩＰアドレスを突合することにより認証を行う。\nさらに、ＤＫＩＭや (イ) の認証結果を利用して、総合的に送信ドメイン認証を行う技\n術である (エ) では、認証に失敗したメールの取扱いを送信側でポリシーとして宣言する\nことなどを可能にしている。\n<(ア)～ let curQ = 1, curY = 0;

const qNav = document.getElementById('qNav');
for(let q=1;q<=9;q++){
  const b = document.createElement('button');
  b.className = 'q-btn' + (q===1?' active':'');
  b.textContent = '問'+q;
  b.onclick = ()=>selectQ(q);
  qNav.appendChild(b);
}

const yearNav = document.getElementById('yearNav');
YEARS.forEach((y,i)=>{
  const b = document.createElement('button');
  b.className = 'y-btn' + (i===0?' active':'');
  b.textContent = y;
  b.onclick = ()=>selectY(i);
  yearNav.appendChild(b);
});

function selectQ(q){
  curQ=q;
  document.querySelectorAll('.q-btn').forEach((b,i)=>
    b.classList.toggle('active',i+1===q));
  render();
}
function selectY(i){
  curY=i;
  document.querySelectorAll('.y-btn').forEach((b,j)=>
    b.classList.toggle('active',j===i));
  render();
}

function renderAnswerBox(){
  const ans = ANSWERS[curY][curQ];
  if(!ans) return '';
  const keys = Object.keys(ans);
  let items = keys.map(k => `<span class="answer-item"><span class="ans-label">(${k})</span>${ans[k]}</span>`).join('');
  return `
    <button class="answer-toggle" onclick="toggleAnswer(this)">▶ 正答を表示</button>
    <div class="answer-box">${items}</div>
  `;
}

function toggleAnswer(btn){
  const box = btn.nextElementSibling;
  const open = box.classList.toggle('open');
  btn.textContent = open ? '▼ 正答を隠す' : '▶ 正答を表示';
}

function render(){
  const q = document.getElementById('search').value.trim();
  const d = ALL[String(curQ)][curY];
  const content = document.getElementById('content');
  content.innerHTML = renderAnswerBox() + '<div class="panel">'+d.html+'</div>';
  if(q){
    const panel = content.querySelector('.panel');
    highlight(panel, q);
    const n = panel.querySelectorAll('mark').length;
    document.getElementById('count').textContent = n ? n+'件ヒット' : 'ヒットなし';
  } else {
    document.getElementById('count').textContent='';
  }
}

function highlight(root,q){
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  function walk(node){
    if(node.nodeType===3){
      const t=node.nodeValue;
      if(re.test(t)){
        const s=document.createElement('span');
        s.innerHTML=t.replace(re,m=>'<mark>'+m+'</mark>');
        node.parentNode.replaceChild(s,node);
      }
    } else if(node.nodeType===1&&node.tagName!=='MARK'){
      Array.from(node.childNodes).forEach(walk);
    }
  }
  walk(root);
}

document.getElementById('search').addEventListener('input',render);
render();
