ロック間をコロン記\n号で区切る。\n② ＩＰｖ６では、ノードの一つのインタフェースに対して複数のＩＰｖ６アドレス\nを割り当てることができる。\n③ ＩＰｖ６拡張ヘッダとしてパケットデータの暗号化に利用する暗号化ペイロード\nヘッダやパケットデータの完全性を保証するための認証ヘッダを組み込むことで、\nセキュリティ機能を備えることができる。\n④ ＩＰｖ６パケットの基本ヘッダのヘッダ長は４０ オクテット に固定されており、\n拡張ヘッダは、必要に応じて機能ごとにペイロード部の先頭に配置される。"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、イーサネットの概要について述べたものである。 内の(ア)～(ウ)に最</p>\nも適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nイーサネットは、通信規格の一つであり、ＯＳＩ参照モデルにおける物理層とデータリンク\n層をサポートしている。\nイーサネットがサポートする物理層の規格には、使用される伝送媒体や伝送速度が異なる仕\n様がある。例えば、１０ＧＢＡＳＥ－ＬＲでは伝送媒体として (ア) が使用され、伝送速\n度は最大１０ Ｇbit／s 、伝送距離は最大１０ kｍ となっている。\nデータリンク層で扱われるイーサネットフレームにおいて、宛先及び送信元のアドレスとし\nて用いられるＭＡＣアドレスは６ Ｂyte の長さを持ち、上位の３ Ｂyte は、 (イ) とい\nわれ、これによりネットワークインタフェースカードの製造メーカなどを識別することができ\nる。\nイーサネットフレームは、一般に、有効フレームの宛先ＭＡＣアドレス、送信元ＭＡＣアド\nレス、タイプ／フレーム長フィールド、データフィールド、有効フレームのデータに誤りが\nないかどうかを検査するためのＦＣＳなどで構成される。ＩＰヘッダ及びＴＣＰヘッダを含\nめたデータフィールドの最大データサイズは (ウ) といわれ、デフォルト値は、一般に、\n１,５００ Ｂyte である。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＳＹＮ ② ツイストペア ③ ＭＡＵ ④ ＭＳＳ\n⑤ ＯＵＩ ⑥ プリアンブル ⑦ ＬＬＣ ⑧ ＭＴＵ\n⑨ マルチモード光ファイバ ⑩ パディング\n⑪ シングルモード光ファイバ ⑫ プラスチック光ファイバ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n映像又は音声のデータ圧縮技術について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＭＰＥＧ－２は、地上デジタルテレビ放送、ＤＶＤなどで利用されており、ＨＤＴＶ\n相当の解像度の映像信号などの圧縮符号化に対応している。\n② ＭＰＥＧ－４ ＡＶＣ／Ｈ.２６４は、ワンセグ放送、スマートフォンなどで利用\nされており、圧縮符号化効率は、一般に、ＭＰＥＧ－２の２倍以上とされている。\n③ ルータには、ＲＴＰ通信における音声パケットのヘッダ情報のうち、転送するパ\nケットの単位では変化しない送信元ＩＰアドレス、宛先ＩＰアドレスなどの情報を\n省略するヘッダ圧縮といわれる機能を有するものがある。\n④ 音声信号の送信時に、音声が無いときには音声パケットを送信しないことでビット\nレートを下げる圧縮方式は、一般に、フラグメンテーションといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークにおけるＱｏＳ制御技術などについて述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＱｏＳ制御技術には、ルータにおけるキューイング、トラヒックシェーピングな\nどがある。\n② ＩｎｔＳｅｒｖは、アプリケーションのサービス品質を幾つかのクラスに分類し、\nクラスごとに優先制御の実施、最低帯域の確保などを行うベストエフォート型のＱｏＳ\n制御技術である。\n③ ストリーミングによるマルチメディア通信などにおいて、データを送信するため\nに必要なリソースを予約するプロトコルはＲＳＶＰといわれ、ユニキャスト型通信\nとマルチキャスト型通信の両方に適用可能である。\n④ ＤｉｆｆＳｅｒｖでは、ＩＰｖ６の場合にはＩＰヘッダ内のトラヒッククラス\nフィールドを用いてＤＳＣＰ値を伝達することにより優先制御を行う。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルにおけるトランスポート層の特徴などについて述べた\n次の文章のうち、正しいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① トランスポート層のプロトコルにはＴＣＰとＵＤＰがあり、ＴＣＰヘッダとＵＤＰ\nヘッダにはＩＰパケットが運ぶデータの振り分け先を識別するためのシーケンス番\n号が付加されている。\n② ＴＣＰヘッダ内には、受信可能なデータサイズを通知するために、ウインドウサ\nイズを示す３２ビット長のフィールドがある。\n③ ＴＣＰでは、コネクションを確立するとき、一般に、ツーウェイハンドシェイク\nといわれる手順で、二つのパケットのやり取りが行われる。\n④ ＴＣＰは、コネクションを確立した通信相手に送信したデータでパケット損失が\n発生した場合、データを再送する再送制御などの機能を有している。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、イーサネットの概要について述べたものである。 内の(ア)～(ウ)に最\nも適したものを、下記の解答群から選び、その番号を記せ。 (２点×３＝６点)\nイーサネットは、通信規格の一つであり、ＯＳＩ参照モデルにおける物理層とデータリンク\n層をサポートしている。\nイーサネットがサポートする物理層の規格には、使用される伝送媒体や伝送速度が異なる仕\n様がある。例えば、１０ＧＢＡＳＥ－ＬＲでは伝送媒体として (ア) が使用され、伝送速\n度は最大１０ Ｇbit／s 、伝送距離は最大１０ kｍ となっている。\nデータリンク層で扱われるイーサネットフレームにおいて、宛先及び送信元のアドレスとし\nて用いられるＭＡＣアドレスは６ Ｂyte の長さを持ち、上位の３ Ｂyte は、 (イ) とい\nわれ、これによりネットワークインタフェースカードの製造メーカなどを識別することができ\nる。\nイーサネットフレームは、一般に、有効フレームの宛先ＭＡＣアドレス、送信元ＭＡＣアド\nレス、タイプ／フレーム長フィールド、データフィールド、有効フレームのデータに誤りが\nないかどうかを検査するためのＦＣＳなどで構成される。ＩＰヘッダ及びＴＣＰヘッダを含\nめたデータフィールドの最大データサイズは (ウ) といわれ、デフォルト値は、一般に、\n１,５００ Ｂyte である。\n<(ア)～(ウ)の解答群>\n① ＳＹＮ ② ツイストペア ③ ＭＡＵ ④ ＭＳＳ\n⑤ ＯＵＩ ⑥ プリアンブル ⑦ ＬＬＣ ⑧ ＭＴＵ\n⑨ マルチモード光ファイバ ⑩ パディング\n⑪ シングルモード光ファイバ ⑫ プラスチック光ファイバ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n映像又は音声のデータ圧縮技術について述べた次の文章のうち、誤っているものは、\n(エ) である。\n<(エ)の解答群>\n① ＭＰＥＧ－２は、地上デジタルテレビ放送、ＤＶＤなどで利用されており、ＨＤＴＶ\n相当の解像度の映像信号などの圧縮符号化に対応している。\n② ＭＰＥＧ－４ ＡＶＣ／Ｈ.２６４は、ワンセグ放送、スマートフォンなどで利用\nされており、圧縮符号化効率は、一般に、ＭＰＥＧ－２の２倍以上とされている。\n③ ルータには、ＲＴＰ通信における音声パケットのヘッダ情報のうち、転送するパ\nケットの単位では変化しない送信元ＩＰアドレス、宛先ＩＰアドレスなどの情報を\n省略するヘッダ圧縮といわれる機能を有するものがある。\n④ 音声信号の送信時に、音声が無いときには音声パケットを送信しないことでビット\nレートを下げる圧縮方式は、一般に、フラグメンテーションといわれる。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰネットワークにおけるＱｏＳ制御技術などについて述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<(オ)の解答群>\n① ＱｏＳ制御技術には、ルータにおけるキューイング、トラヒックシェーピングな\nどがある。\n② ＩｎｔＳｅｒｖは、アプリケーションのサービス品質を幾つかのクラスに分類し、\nクラスごとに優先制御の実施、最低帯域の確保などを行うベストエフォート型のＱｏＳ\n制御技術である。\n③ ストリーミングによるマルチメディア通信などにおいて、データを送信するため\nに必要なリソースを予約するプロトコルはＲＳＶＰといわれ、ユニキャスト型通信\nとマルチキャスト型通信の両方に適用可能である。\n④ ＤｉｆｆＳｅｒｖでは、ＩＰｖ６の場合にはＩＰヘッダ内のトラヒッククラス\nフィールドを用いてＤＳＣＰ値を伝達することにより優先制御を行う。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデルにおけるトランスポート層の特徴などについて述べた\n次の文章のうち、正しいものは、 (カ) である。\n<(カ)の解答群>\n① トランスポート層のプロトコルにはＴＣＰとＵＤＰがあり、ＴＣＰヘッダとＵＤＰ\nヘッダにはＩＰパケットが運ぶデータの振り分け先を識別するためのシーケンス番\n号が付加されている。\n② ＴＣＰヘッダ内には、受信可能なデータサイズを通知するために、ウインドウサ\nイズを示す３２ビット長のフィールドがある。\n③ ＴＣＰでは、コネクションを確立するとき、一般に、ツーウェイハンドシェイク\nといわれる手順で、二つのパケットのやり取りが行われる。\n④ ＴＣＰは、コネクションを確立した通信相手に送信したデータでパケット損失が\n発生した場合、データを再送する再送制御などの機能を有している。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＣＭＰの概要について述べたものである。 内の(ア)～(ウ)に最も適</p>\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\nＩＣＭＰｖ４は、送信したパケットに対する (ア) 通知、ネットワークからの情報取得\nなどに用いられる。また、ＩＰｖ４では、通信相手のＩＰアドレスからＭＡＣアドレスを調べ\nるプロトコルである (イ) 、ノードとルータ間のマルチキャストの通信のためのプロトコ\nルであるＩＧＭＰなどのＩＰｖ４の通信に必要なプロトコルは、ＩＣＭＰｖ４とは独立して\n個々に動作している。\nＩＣＭＰｖ６は、ＩＣＭＰｖ４の基本機能に加え、ＩＰｖ４の (イ) に相当する機能、\nＩＰアドレスの自動設定の機能などを提供する (ウ) 、ＩＰｖ４のＩＧＭＰに相当する機\n能などを提供するマルチキャストリスナー探索、パスＭＴＵ探索などを備えている。そのため\nＩＰｖ６をサポートしている機器にはＩＣＭＰｖ６を必ず備えなければならないとされている。\nＩＣＭＰｖ６のメッセージには、処理中に異常が発生したことを通知する (ア) メッ\nセージ及びＩＰｖ６の動作に必要な情報を運ぶために用いられる情報メッセージがある。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＡＲＰ ② ＶＲＲＰ ③ 優先制御 ④ イベント\n⑤ ＬＣＰ ⑥ 番 号 ⑦ 近隣探索 ⑧ ルータ広告\nふく そう\n⑨ エラー ⑩ ＲＡＲＰ ⑪ ＳＣＴＰ ⑫ 輻 輳\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＬＡＮの構成技術の一つであるリンクアグリゲーションについて述べた次の文章のうち、\n誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① リンクアグリゲーションは、２台のスイッチ間にある複数の物理リンクを束ねて\n一つの論理リンクとして扱う技術であり、データ転送の高速化を図ることができる。\n② リンクアグリゲーションでは、構成する複数の物理リンクのいずれかに故障が発\n生したとき、故障したリンクを閉塞し、残った正常なリンクで通信を継続すること\nができる。\n③ リンクアグリゲーションでは、一般に、光スプリッタを用いて光信号を複数の物\n理リンクに振り分けてデータ転送することにより、トラヒックを分散させることが\nできる。\n④ リンクアグリゲーションを設定する場合は、対向するスイッチ間において各ポー\nトの識別情報やグループ化するための情報を事前に共有する必要がある。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６などにおけるルーティングプロトコルについて述べた次の文章のうち、正しいもの\nは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＲＩＰｎｇは、ＡＳ内の経路制御を行うディスタンスベクタ型のプロトコルであ\nる。\n② ＲＩＰｖ２は認証機能を有していないが、ＲＩＰｎｇは認証機能を有している。\n③ ＯＳＰＦｖ３は、ＡＳ間の経路制御を行うパスベクタ型のプロトコルである。\n④ ＯＳＰＦｖ３で用いられるＨｅｌｌｏなどのＯＳＰＦパケットは、ＵＤＰを使用\nして交換される。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰ及びＵＤＰで使用されるポート番号の特徴などについて述べた次の文章のうち、正し\nいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＴＣＰ及びＵＤＰは、通信しているアプリケーションを識別するため、８ bit\nで構成されるポート番号を用いている。\n② ポート番号は使用されるＴＣＰ、ＵＤＰごとに決められることから、ＴＣＰを使\n用するアプリケーションとＵＤＰを使用する別のアプリケーションには同じポート\n番号を割り当てることができる。\n③ ルータは、一般に、宛先及び送信元のＭＡＣアドレス、宛先及び送信元のＴＣＰ\n又はＵＤＰのポート番号の四つの情報を用いて、ＴＣＰ又はＵＤＰの通信フローを\n特定することが可能である。\n④ ウェルノウンポート番号は、ＨＴＴＰ、ＴＥＬＮＥＴ、ＦＴＰなどのアプリケー\nションプロトコルごとに動的に割り当てられて使用されるポート番号である。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＣＭＰの概要について述べたものである。 内の(ア)～(ウ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×３＝６点)\nＩＣＭＰｖ４は、送信したパケットに対する (ア) 通知、ネットワークからの情報取得\nなどに用いられる。また、ＩＰｖ４では、通信相手のＩＰアドレスからＭＡＣアドレスを調べ\nるプロトコルである (イ) 、ノードとルータ間のマルチキャストの通信のためのプロトコ\nルであるＩＧＭＰなどのＩＰｖ４の通信に必要なプロトコルは、ＩＣＭＰｖ４とは独立して\n個々に動作している。\nＩＣＭＰｖ６は、ＩＣＭＰｖ４の基本機能に加え、ＩＰｖ４の (イ) に相当する機能、\nＩＰアドレスの自動設定の機能などを提供する (ウ) 、ＩＰｖ４のＩＧＭＰに相当する機\n能などを提供するマルチキャストリスナー探索、パスＭＴＵ探索などを備えている。そのため\nＩＰｖ６をサポートしている機器にはＩＣＭＰｖ６を必ず備えなければならないとされている。\nＩＣＭＰｖ６のメッセージには、処理中に異常が発生したことを通知する (ア) メッ\nセージ及びＩＰｖ６の動作に必要な情報を運ぶために用いられる情報メッセージがある。\n<(ア)～(ウ)の解答群>\n① ＡＲＰ ② ＶＲＲＰ ③ 優先制御 ④ イベント\n⑤ ＬＣＰ ⑥ 番 号 ⑦ 近隣探索 ⑧ ルータ広告\nふく そう\n⑨ エラー ⑩ ＲＡＲＰ ⑪ ＳＣＴＰ ⑫ 輻 輳\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＬＡＮの構成技術の一つであるリンクアグリゲーションについて述べた次の文章のうち、\n誤っているものは、 (エ) である。\n<(エ)の解答群>\n① リンクアグリゲーションは、２台のスイッチ間にある複数の物理リンクを束ねて\n一つの論理リンクとして扱う技術であり、データ転送の高速化を図ることができる。\n② リンクアグリゲーションでは、構成する複数の物理リンクのいずれかに故障が発\n生したとき、故障したリンクを閉塞し、残った正常なリンクで通信を継続すること\nができる。\n③ リンクアグリゲーションでは、一般に、光スプリッタを用いて光信号を複数の物\n理リンクに振り分けてデータ転送することにより、トラヒックを分散させることが\nできる。\n④ リンクアグリゲーションを設定する場合は、対向するスイッチ間において各ポー\nトの識別情報やグループ化するための情報を事前に共有する必要がある。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６などにおけるルーティングプロトコルについて述べた次の文章のうち、正しいもの\nは、 (オ) である。\n<(オ)の解答群>\n① ＲＩＰｎｇは、ＡＳ内の経路制御を行うディスタンスベクタ型のプロトコルであ\nる。\n② ＲＩＰｖ２は認証機能を有していないが、ＲＩＰｎｇは認証機能を有している。\n③ ＯＳＰＦｖ３は、ＡＳ間の経路制御を行うパスベクタ型のプロトコルである。\n④ ＯＳＰＦｖ３で用いられるＨｅｌｌｏなどのＯＳＰＦパケットは、ＵＤＰを使用\nして交換される。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰ及びＵＤＰで使用されるポート番号の特徴などについて述べた次の文章のうち、正し\nいものは、 (カ) である。\n<(カ)の解答群>\n① ＴＣＰ及びＵＤＰは、通信しているアプリケーションを識別するため、８ bit\nで構成されるポート番号を用いている。\n② ポート番号は使用されるＴＣＰ、ＵＤＰごとに決められることから、ＴＣＰを使\n用するアプリケーションとＵＤＰを使用する別のアプリケーションには同じポート\n番号を割り当てることができる。\n③ ルータは、一般に、宛先及び送信元のＭＡＣアドレス、宛先及び送信元のＴＣＰ\n又はＵＤＰのポート番号の四つの情報を用いて、ＴＣＰ又はＵＤＰの通信フローを\n特定することが可能である。\n④ ウェルノウンポート番号は、ＨＴＴＰ、ＴＥＬＮＥＴ、ＦＴＰなどのアプリケー\nションプロトコルごとに動的に割り当てられて使用されるポート番号である。"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ドメイン名とＤＮＳの概要について述べたものである。 内の(ア)～</p>\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nドメイン名は階層型の構造を持っており、最上位は (ア) といわれる。 (ア) から\n始まり最下位のＷＷＷなどで終わるドメイン名は、一般に、完全修飾ドメイン名といわれる。\nドメイン名は、ＩＰアドレスと同じように、インターネット上で通信相手を識別するもので\nあり、英字、数字などで表現できるため、ＩＰアドレスと比較して分かりやすいが、インター\nネット上での通信にドメイン名をそのままパケットの宛先アドレスとして用いることはできない。\nインターネット上で通信するためには、ドメイン名をＩＰアドレスへ変換することが必要で\nある。ドメイン名をＩＰアドレスへ変換することは、一般に、名前解決といわれ、ＤＮＳの代\n表的な機能の一つとして名前解決機能がある。\nインターネット上で通信するホストが名前解決する際には、ＤＮＳへ問合せを行う。この\n問合せは、クライアントサーバモデルでモデル化され、問合せをサーバへ送るクライアントは\n(イ) といわれ、問合せを受けてクライアントにレスポンスを返すサーバは (ウ)\nサーバといわれる。\nＤＮＳでは階層構造のドメインに対応して (ウ) サーバが配置されており、各 (ウ)\nサーバは、自らの配下のドメイン名とＩＰアドレスの対応及び下位のドメインに関する情報を\n管理する機能を有する。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ネーム ② メール ③ プロキシ ④ スレーブ\n⑤ ホーム ⑥ ヘッダ ⑦ チャット ⑧ プレゼンス\n⑨ ルート ⑩ ソース ⑪ リゾルバ ⑫ レジストラ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n１０ギガビットイーサネットのインタフェースなどについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① １０ＧＢＡＳＥ－ＬＸ４は、送信データを四つの信号に分割した後、それぞれの\n信号を光信号に変換し、４本の光ファイバに送出するインタフェースを有しており、\n伝送媒体としてＭＭ光ファイバを用いると最大伝送距離は３００ ｍ 程度となる。\n② １０ＧＢＡＳＥ－Ｔでは、信号伝送に必要な周波数帯域幅を抑えるために、多値\nの振幅変調としてＰＡＭ１６を採用している。\n③ １０ＧＢＡＳＥ－ＬＲでは、６４Ｂ／６６Ｂ符号化方式が採用されており、光源\nとして８５０nｍ帯のＬＤを用い、伝送媒体として、一般に、ＳＭ光ファイバが用い\nられる。\n④ １０ＧＢＡＳＥ－ＥＷは、ＳＤＨ／ＳＯＮＥＴとの接続互換性を考慮したＳＭ光\nファイバのインタフェースを有しており、最大伝送距離は１０ kｍ 程度である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nルーティングにおける制御アルゴリズムについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 距離と方向によって目的のネットワークやホストまでの経路を決定するアルゴリ\nズムを用いる方式は、一般に、ディスタンスベクタ型といわれる。\n② ディスタンスベクタ型では、ネットワークの構造が複雑になると、経路が収束す\nるまでに時間を要する、経路にループが発生しやすいなどの問題が生ずるおそれが\nある。\n③ ネットワークに接続されている全てのルータがネットワーク全体の接続状態を把\n握し、各ルータ間で同期させることで目的のネットワークやホストまでの最適な経\n路を選択するアルゴリズムを用いる方式は、一般に、リンクステート型といわれる。\n④ ディスタンスベクタ型では、ネットワークに接続されている全てのルータの持つ\n経路制御情報は同じである。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６におけるアドレスの自動生成又は自動設定について述べた次の文章のうち、誤って\nいるものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ホスト自身のＭＡＣアドレスなどから得られるインタフェースＩＤとルータから\nのプレフィックス情報を組み合わせて、ホストがＩＰｖ６アドレスを生成する方法\nは、ステートレスアドレス自動生成といわれる。\n② ＩＰｖ６アドレスなどの割当てを要求してきたホストに対して、ＤＨＣＰｖ６\nサーバがＩＰｖ６アドレスを動的に割り当てる方法は、ステートフルアドレス自動\n設定といわれる。\n③ ステートレスアドレス自動生成によりＩＰｖ６アドレスを生成したホストは、ス\nテートフルアドレス自動設定を利用してＤＨＣＰｖ６サーバから情報を取得するこ\nとはできない。\n④ 自動設定に用いられるＤＨＣＰｖ６サーバには、ＩＰｖ６ホストに対して更新す\nべき設定パラメータや新規パラメータがあることを通知する機能がある。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ドメイン名とＤＮＳの概要について述べたものである。 内の(ア)～\n(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×３＝６点)\nドメイン名は階層型の構造を持っており、最上位は (ア) といわれる。 (ア) から\n始まり最下位のＷＷＷなどで終わるドメイン名は、一般に、完全修飾ドメイン名といわれる。\nドメイン名は、ＩＰアドレスと同じように、インターネット上で通信相手を識別するもので\nあり、英字、数字などで表現できるため、ＩＰアドレスと比較して分かりやすいが、インター\nネット上での通信にドメイン名をそのままパケットの宛先アドレスとして用いることはできない。\nインターネット上で通信するためには、ドメイン名をＩＰアドレスへ変換することが必要で\nある。ドメイン名をＩＰアドレスへ変換することは、一般に、名前解決といわれ、ＤＮＳの代\n表的な機能の一つとして名前解決機能がある。\nインターネット上で通信するホストが名前解決する際には、ＤＮＳへ問合せを行う。この\n問合せは、クライアントサーバモデルでモデル化され、問合せをサーバへ送るクライアントは\n(イ) といわれ、問合せを受けてクライアントにレスポンスを返すサーバは (ウ)\nサーバといわれる。\nＤＮＳでは階層構造のドメインに対応して (ウ) サーバが配置されており、各 (ウ)\nサーバは、自らの配下のドメイン名とＩＰアドレスの対応及び下位のドメインに関する情報を\n管理する機能を有する。\n<(ア)～(ウ)の解答群>\n① ネーム ② メール ③ プロキシ ④ スレーブ\n⑤ ホーム ⑥ ヘッダ ⑦ チャット ⑧ プレゼンス\n⑨ ルート ⑩ ソース ⑪ リゾルバ ⑫ レジストラ\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n１０ギガビットイーサネットのインタフェースなどについて述べた次の文章のうち、正しい\nものは、 (エ) である。\n<(エ)の解答群>\n① １０ＧＢＡＳＥ－ＬＸ４は、送信データを四つの信号に分割した後、それぞれの\n信号を光信号に変換し、４本の光ファイバに送出するインタフェースを有しており、\n伝送媒体としてＭＭ光ファイバを用いると最大伝送距離は３００ ｍ 程度となる。\n② １０ＧＢＡＳＥ－Ｔでは、信号伝送に必要な周波数帯域幅を抑えるために、多値\nの振幅変調としてＰＡＭ１６を採用している。\n③ １０ＧＢＡＳＥ－ＬＲでは、６４Ｂ／６６Ｂ符号化方式が採用されており、光源\nとして８５０nｍ帯のＬＤを用い、伝送媒体として、一般に、ＳＭ光ファイバが用い\nられる。\n④ １０ＧＢＡＳＥ－ＥＷは、ＳＤＨ／ＳＯＮＥＴとの接続互換性を考慮したＳＭ光\nファイバのインタフェースを有しており、最大伝送距離は１０ kｍ 程度である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nルーティングにおける制御アルゴリズムについて述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 距離と方向によって目的のネットワークやホストまでの経路を決定するアルゴリ\nズムを用いる方式は、一般に、ディスタンスベクタ型といわれる。\n② ディスタンスベクタ型では、ネットワークの構造が複雑になると、経路が収束す\nるまでに時間を要する、経路にループが発生しやすいなどの問題が生ずるおそれが\nある。\n③ ネットワークに接続されている全てのルータがネットワーク全体の接続状態を把\n握し、各ルータ間で同期させることで目的のネットワークやホストまでの最適な経\n路を選択するアルゴリズムを用いる方式は、一般に、リンクステート型といわれる。\n④ ディスタンスベクタ型では、ネットワークに接続されている全てのルータの持つ\n経路制御情報は同じである。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６におけるアドレスの自動生成又は自動設定について述べた次の文章のうち、誤って\nいるものは、 (カ) である。\n<(カ)の解答群>\n① ホスト自身のＭＡＣアドレスなどから得られるインタフェースＩＤとルータから\nのプレフィックス情報を組み合わせて、ホストがＩＰｖ６アドレスを生成する方法\nは、ステートレスアドレス自動生成といわれる。\n② ＩＰｖ６アドレスなどの割当てを要求してきたホストに対して、ＤＨＣＰｖ６\nサーバがＩＰｖ６アドレスを動的に割り当てる方法は、ステートフルアドレス自動\n設定といわれる。\n③ ステートレスアドレス自動生成によりＩＰｖ６アドレスを生成したホストは、ス\nテートフルアドレス自動設定を利用してＤＨＣＰｖ６サーバから情報を取得するこ\nとはできない。\n④ 自動設定に用いられるＤＨＣＰｖ６サーバには、ＩＰｖ６ホストに対して更新す\nべき設定パラメータや新規パラメータがあることを通知する機能がある。"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＶＲＲＰ(Virtual Router Redundancy Protocol)の概要について述べたものであ</p>\nる。 内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。\nただし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nＶＲＲＰは、ＬＡＮなどのネットワークにおいて、外部ネットワークとの接続点となる\n(ア) を冗長化するための標準プロトコルであり、実際に (ア) として稼働している\nマスタルータに故障が発生した場合、バックアップルータが直ちにパケットの転送を引き継ぎ、\n故障による影響を最小限にとどめる仕組みになっている。\nＶＲＲＰでは、同一のＬＡＮ回線に接続されている複数のルータを１台の仮想ルータとして\n扱うようにＶＲＲＰグループが構成される。グループ内のルータには、グループを識別するた\nめの (イ) といわれる値が設定され、仮想ＩＰアドレスと仮想ＭＡＣアドレスが共有され\nる。仮想ＩＰアドレスには、実際に割り当てられている実ＩＰアドレス又は実際に割り当てら\nれていないＩＰアドレスのどちらも設定できる。\n仮想ＩＰアドレスに実ＩＰアドレスを設定した場合は実ＩＰアドレスを所有するルータが\nマスタルータになり、実際に割り当てられていないＩＰアドレスを設定した場合は設定した\n(ウ) が最も大きいルータがマスタルータになる。マスタルータで故障が発生した場合は、\n切り替わったバックアップルータに仮想ＩＰアドレスの制御が引き継がれる。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＣＩＤＲ ② データフィールド長 ③ プライオリティ値\n④ ＴＰＩＤ ⑤ レスポンス時間 ⑥ アプリケーションサーバ\n⑦ ＶＲＩＤ ⑧ ラベルエッジルータ ⑨ メディアゲートウェイ\n⑩ ルーティングテーブル ⑪ デフォルトゲートウェイ\n⑫ Ｃａｌｌ－ＩＤ\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＶＬＡＮの技術について述べた次の文章のうち、誤っているものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＩＥＥＥ８０２.１Ｑで規定されているＶＬＡＮタグを用いると、物理的に単一\nのＬＡＮを論理的に区別された最大４,０９４個のＶＬＡＮに分けることができる。\n② 広域イーサネットサービスを提供する方法として、ＩＥＥＥ８０２.１ａｄで規定\nされている拡張ＶＬＡＮがある。拡張ＶＬＡＮでは、通信事業者のスイッチにおいて、\nＶＬＡＮタグとは別の通信事業者がユーザを識別するタグをイーサネットフレーム\nに付加して転送しており、個々のユーザのＭＡＣアドレスの管理は行わない。\n③ ＩＥＥＥ８０２.１ａｄで規定されているＶＬＡＮタグには、通信事業者がユーザを\n識別するためのＳ－ＴＡＧと、ユーザがＶＬＡＮを区別するためのＣ－ＴＡＧがある。\n④ ユーザのＭＡＣアドレスとは別に通信事業者の網内転送を行う専用のＭＡＣアド\nレスを用意してカプセル化する方法は、一般に、ＭＡＣ－ｉｎ－ＭＡＣといわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークの管理プロトコルであるＳＮＭＰの概要について述べた次の文章のうち、\n正しいものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＩＰネットワークにおいて、ＳＮＭＰはネットワーク管理情報の取得などを行う\nために用いられるプロトコルであり、ＲＴＰ上で動作する。\n② ＳＮＭＰは、一般に、ネットワーク機器の管理を行うＳＮＭＰマネージャ、管理\n対象となるネットワーク機器で動作するＳＮＭＰエージェント及び管理情報データ\nベースであるＬＳＤＢを基本構成要素としている。\n③ ＳＮＭＰにはＲＭＯＮというリモートネットワーク監視の拡張機能がある。\nＲＭＯＮは、一般に、ネットワーク機器単体を監視するパラメータ群から構成され\nる。\n④ ＳＮＭＰのイベント通知であるトラップは、何らかの原因でネットワーク機器の\n状態が変化した際に、ＳＮＭＰマネージャからＳＮＭＰエージェントに問合せが無\nくても、監視対象機器の状態変化をエージェント側から通知する場合などに利用さ\nれる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークにおけるコネクション型及びコネクションレス型通信の特徴などについて\n述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ コネクション型通信では、通信相手とのコネクションを確立してデータを送信するため、\n通信相手との間でコネクションを確立するための制御手順を必要とし、パケット損失が発生\nしたときの再送制御が可能である。\nＢ コネクション型通信で用いられるＴＣＰにおけるコネクション確立の手順は、一般に、ス\nリーウェイハンドシェイクといわれ、三つのセグメントのやり取りが行われる。\nＣ コネクションレス型通信で用いられるＵＤＰでは、送信したセグメントに対する送達確認\nを受信し、インターネット層以下の伝達機能の正常性を確認している。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＶＲＲＰ( パケット損失が発生\nしたときの再送制御が可能である。\nＢ コネクション型通信で用いられるＴＣＰにおけるコネクション確立の手順は、一般に、ス\nリーウェイハンドシェイクといわれ、三つのセグメントのやり取りが行われる。\nＣ コネクションレス型通信で用いられるＵＤＰでは、送信したセグメントに対する送達確認\nを受信し、インターネット層以下の伝達機能の正常性を確認している。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R7-1", "title": "令和７年度 第１回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＰｖ６における通信種別とその概要について述べたものである。 内</p>\nの(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。(２点×３＝６点)\nＩＰｖ６には、ユニキャスト、マルチキャスト及びエニーキャストといわれる通信種別があ\nる。\nユニキャスト通信では、ユニキャストアドレスを用いて、単一のノードを指定してパケット\nを送信する。ユニキャストアドレスには、インターネット上で他サイトとの通信を行うための\nグローバルアドレス、企業などのイントラネット内でのみ有効なユニークローカルアドレス及\nび同一リンクでのみ有効なリンクローカルアドレスがある。\nマルチキャスト通信では、マルチキャストアドレスを用いて、複数のノードで構成されるマ\nルチキャストグループに対してパケットを送信する。マルチキャスト通信は、指定したマルチ\nキャストグループ内のノード全てに対して (ア) を問い合わせて応答を得るアドレス解決\nなど近隣探索で利用されている。また、参加するマルチキャストグループを通知するためのプ\nロトコルである (イ) を用いてグループの管理を行っている。\nエニーキャスト通信では、特定グループの複数のノードの中から、利用しているルーティング\nプロトコルのメトリックなどで決まる最も (ウ) ノードに対してパケットを送信する。こ\nの通信はサーバの負荷分散などの目的に使用される。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＭＴＵ ② 近い ③ メールアドレス\n④ ＭＧＣ ⑤ 遠い ⑥ ＭＡＣアドレス\n⑦ ＭＬＤ ⑧ 新しい ⑨ ポート番号\n⑩ ＭＩＢ ⑪ 古い ⑫ ネットワークインタフェース\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークにおけるＱｏＳ制御技術などについて述べた次の文章のうち、誤っている\nものは、 (エ) である。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① ＱｏＳ制御技術には、ルータにおけるキューイング、トラヒックシェーピングな\nどがある。\n② ＩＰｖ６の場合、ＤｉｆｆＳｅｒｖでは、ＩＰヘッダ内のトラヒッククラス\nフィールドを用いてＤＳＣＰ値を伝達することにより優先制御を行う。\n③ ＩｎｔＳｅｒｖは、アプリケーションのサービス品質を幾つかのクラスに分類し、\nクラスごとに優先制御の実施、最低帯域の確保などを行うベストエフォート型のＱｏＳ\n制御技術である。\n④ ストリーミングによるマルチメディア通信などにおいて、データを送信するため\nに必要なリソースを予約するプロトコルはＲＳＶＰといわれ、ユニキャスト通信と\nマルチキャスト通信の両方に適用可能である。\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰネットワークにおけるＭＰＬＳのラベルスイッチングなどについて述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＭＰＬＳ網内で使用されるＬＳＲ(Label Switching Router)は、パケット内のラ\nベル情報を参照して、ＩＰパケットの転送処理を実行する。\n② ＬＳＲは、ラベル情報によりＩＰパケットを転送するための転送用テーブルを保\n持しており、一般に、ＬＤＰ(Label Distribution Protocol)などの配布用プロト\nコルを使用して隣接ＬＳＲとラベル情報を交換する。\n③ ＭＰＬＳ－ＶＰＮのネットワークでは、一般に、２種類のラベルが用いられ、先\n頭のラベルはユーザを識別するために、また、先頭から２番目のラベルは転送する\nために用いられる。\n④ ＭＰＬＳでは、ラベルスイッチングを行う前にＬＳＰ(Label Switched Path)を確\n立して通信を行っており、複数の異なる経路を指定したＬＳＰを確立することもで\nきることから、トラヒックの集中を回避するなどの負荷分散が可能である。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデル及びＵＤＰチェックサムについて述べた次のＡ～Ｃの\n文章は、 (カ) 。\nＡ ＴＣＰ／ＩＰのプロトコル階層モデルはインターネットプロトコルスタックとして４階層\nで構成されており、一般に、最下層はネットワークインタフェース層といわれ、データリン\nクを利用して通信するための機能を担っている。\nＢ ＴＣＰ及びＵＤＰは、トランスポート層のプロトコルであり、ポート番号を用いてアプリ\nケーション層のアプリケーションプログラムが扱うサービスの種類などを識別している。\nＣ ＩＰｖ４ではＵＤＰチェックサムの算出は必須であるが、ＩＰｖ６ではＵＤＰでのチェック\nサム計算はオプションである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＰｖ６における通信種別とその概要について述べたものである。 内\nの(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。(２点×３＝６点)\nＩＰｖ６には、ユニキャスト、マルチキャスト及びエニーキャストといわれる通信種別があ\nる。\nユニキャスト通信では、ユニキャストアドレスを用いて、単一のノードを指定してパケット\nを送信する。ユニキャストアドレスには、インターネット上で他サイトとの通信を行うための\nグローバルアドレス、企業などのイントラネット内でのみ有効なユニークローカルアドレス及\nび同一リンクでのみ有効なリンクローカルアドレスがある。\nマルチキャスト通信では、マルチキャストアドレスを用いて、複数のノードで構成されるマ\nルチキャストグループに対してパケットを送信する。マルチキャスト通信は、指定したマルチ\nキャストグループ内のノード全てに対して (ア) を問い合わせて応答を得るアドレス解決\nなど近隣探索で利用されている。また、参加するマルチキャストグループを通知するためのプ\nロトコルである (イ) を用いてグループの管理を行っている。\nエニーキャスト通信では、特定グループの複数のノードの中から、利用しているルーティング\nプロトコルのメトリックなどで決まる最も (ウ) ノードに対してパケットを送信する。こ\nの通信はサーバの負荷分散などの目的に使用される。\n<(ア)～(ウ)の解答群>\n① ＭＴＵ ② 近い ③ メールアドレス\n④ ＭＧＣ ⑤ 遠い ⑥ ＭＡＣアドレス\n⑦ ＭＬＤ ⑧ 新しい ⑨ ポート番号\n⑩ ＭＩＢ ⑪ 古い ⑫ ネットワークインタフェース\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰネットワークにおけるＱｏＳ制御技術などについて述べた次の文章のうち、誤っている\nものは、 (エ) である。\n<(エ)の解答群>\n① ＱｏＳ制御技術には、ルータにおけるキューイング、トラヒックシェーピングな\nどがある。\n② ＩＰｖ６の場合、ＤｉｆｆＳｅｒｖでは、ＩＰヘッダ内のトラヒッククラス\nフィールドを用いてＤＳＣＰ値を伝達することにより優先制御を行う。\n③ ＩｎｔＳｅｒｖは、アプリケーションのサービス品質を幾つかのクラスに分類し、\nクラスごとに優先制御の実施、最低帯域の確保などを行うベストエフォート型のＱｏＳ\n制御技術である。\n④ ストリーミングによるマルチメディア通信などにおいて、データを送信するため\nに必要なリソースを予約するプロトコルはＲＳＶＰといわれ、ユニキャスト通信と\nマルチキャスト通信の両方に適用可能である。\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰネットワークにおけるＭＰＬＳのラベルスイッチングなどについて述べた次の文章のう\nち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① ＭＰＬＳ網内で使用されるＬＳＲ(Label Switching Router)は、パケット内のラ\nベル情報を参照して、ＩＰパケットの転送処理を実行する。\n② ＬＳＲは、ラベル情報によりＩＰパケットを転送するための転送用テーブルを保\n持しており、一般に、ＬＤＰ(Label Distribution Protocol)などの配布用プロト\nコルを使用して隣接ＬＳＲとラベル情報を交換する。\n③ ＭＰＬＳ－ＶＰＮのネットワークでは、一般に、２種類のラベルが用いられ、先\n頭のラベルはユーザを識別するために、また、先頭から２番目のラベルは転送する\nために用いられる。\n④ ＭＰＬＳでは、ラベルスイッチングを行う前にＬＳＰ(Label Switched Path)を確\n立して通信を行っており、複数の異なる経路を指定したＬＳＰを確立することもで\nきることから、トラヒックの集中を回避するなどの負荷分散が可能である。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰ／ＩＰのプロトコル階層モデル及びＵＤＰチェックサムについて述べた次のＡ～Ｃの\n文章は、 (カ) 。\nＡ ＴＣＰ／ＩＰのプロトコル階層モデルはインターネットプロトコルスタックとして４階層\nで構成されており、一般に、最下層はネットワークインタフェース層といわれ、データリン\nクを利用して通信するための機能を担っている。\nＢ ＴＣＰ及びＵＤＰは、トランスポート層のプロトコルであり、ポート番号を用いてアプリ\nケーション層のアプリケーションプログラムが扱うサービスの種類などを識別している。\nＣ ＩＰｖ４ではＵＤＰチェックサムの算出は必須であるが、ＩＰｖ６ではＵＤＰでのチェック\nサム計算はオプションである。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない"}, {"tag": "R7-2", "title": "令和７年度 第２回", "html": "<h3 class=\"q-h\">問６ 次の問いに答えよ。 (小計１５点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＩＰ網におけるルーティングプロトコルの概要について述べたものである。</p>\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nルーティングプロトコルは、自律システム(ＡＳ)間の経路制御を行う際に利用されるＥＧＰ\nと、ＡＳ内部の経路制御を行う際に利用される (ア) に分けることができる。\nＥＧＰに分類されるＢＧＰを実行するルータ(ＢＧＰスピーカ)は、経路情報として、通過し\nてきたＡＳの番号などの (イ) といわれる情報と、ＡＳが持つＩＰアドレス(ＮＬＲＩ)を\n交換することにより、ＡＳ間の経路制御を行う。ＢＧＰでは、一般に、通過するＡＳの数が最\nも少ない経路が最適経路として選択される。\n(ア) に分類されるＯＳＰＦでは、ルータは、ＯＳＰＦパケットを利用してルータ自身\nが保持しているリンク情報を交換することにより、リンク情報のデータベース(ＬＳＤＢ)を作\n成する。ＡＳ内のルータは同じＬＳＤＢを基に最適な経路を選択する。経路選択に用いる指標\nであるメトリックとしては、 (ウ) を用いている。\n<p class=\"cg-h\">&lt;(ア)～(ウ)の解答群&gt;</p>\n① ＩＧＭＰ ② コスト値 ③ ポート番号 ④ Ｈｅｌｌｏパケット\n⑤ ＲＳＶＰ ⑥ ホップ数 ⑦ パス属性 ⑧ ＭＴＵサイズ\n⑨ ＩＭＡＰ ⑩ ＩＧＰ ⑪ 遅延時間 ⑫ ＭＡＣアドレス\n<p class=\"sub-h\">(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＩＰｖ６について述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ ＩＰｖ６のアドレスサイズは１２８ bit であり、そのアドレス表記は１６ bit ずつ８個\nのブロックに分けて各ブロックを１６進数で表し、ブロック間をドット記号で区切る。\nＢ ＩＰｖ６パケットの基本ヘッダのヘッダ長は６４ オクテット に固定されており、拡張\nヘッダは、必要に応じて機能ごとにペイロード部の先頭に配置される。\nＣ インターネットにおいて、ＩＰｖ６とＩＰｖ４の共存を可能とするための方法の一つとし\nて、ＩＰｖ６パケットをＩＰｖ４パケットのペイロードとしてカプセル化して転送する\nデュアルスタックが用いられている。\n<p class=\"cg-h\">&lt;(エ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＲＴＰ／ＲＴＣＰについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① ＲＴＰはリアルタイムデータを送信するためのプロトコルであり、ユニキャスト\nセッション及びマルチキャストセッションで用いられる。\n② ＲＴＰでは、セッション内で送信元が独自に設定するＳＳＲＣ識別子を用いてリ\nアルタイム通信の送信元を識別する。\n③ ＲＴＰでは、送信側でタイムスタンプ、シーケンス番号、ペイロードタイプなど\nをＲＴＰヘッダ情報として送出し、受信側でそれらを参照することにより、タイミ\nング情報の抽出、パケット損失の検出などを行う。\n④ ＲＴＣＰのセッション制御機能によって、データ転送におけるパケット損失など\nの品質低下を検知した場合、ＲＴＣＰはＲＴＰパケットの送受信を終了させる。\n<p class=\"sub-h\">(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＴＣＰにおける通信制御の特徴について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① ＴＣＰは、コネクションを確立した通信相手への送信データにパケット損失が発\n生した場合、データを再送する再送制御の機能を有している。\nふくそう\n② ＴＣＰによる通信の開始時には、ネットワーク輻輳制御の一つであるスロースター\nトといわれるアルゴリズムに従って、送信するデータ量の制御が行われる。\n③ 送信ホストは、送信したセグメントに対する確認応答を待たずに複数のセグメン\nトを送信する順序制御によりスループットの向上を図っている。\n④ ＴＣＰは、受信側のバッファの空き状況に応じて受信可能なデータのサイズを受\n信側から送信側に対して通知することにより、送信するデータ量を調整するフロー\n制御の機能を有している。", "raw": "問６ 次の問いに答えよ。 (小計１５点)\n(１) 次の文章は、ＩＰ網におけるルーティングプロトコルの概要について述べたものである。\n内の(ア)～(ウ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×３＝６点)\nルーティングプロトコルは、自律システム(ＡＳ)間の経路制御を行う際に利用されるＥＧＰ\nと、ＡＳ内部の経路制御を行う際に利用される (ア) に分けることができる。\nＥＧＰに分類されるＢＧＰを実行するルータ(ＢＧＰスピーカ)は、経路情報として、通過し\nてきたＡＳの番号などの (イ) といわれる情報と、ＡＳが持つＩＰアドレス(ＮＬＲＩ)を\n交換することにより、ＡＳ間の経路制御を行う。ＢＧＰでは、一般に、通過するＡＳの数が最\nも少ない経路が最適経路として選択される。\n(ア) に分類されるＯＳＰＦでは、ルータは、ＯＳＰＦパケットを利用してルータ自身\nが保持しているリンク情報を交換することにより、リンク情報のデータベース(ＬＳＤＢ)を作\n成する。ＡＳ内のルータは同じＬＳＤＢを基に最適な経路を選択する。経路選択に用いる指標\nであるメトリックとしては、 (ウ) を用いている。\n<(ア)～(ウ)の解答群>\n① ＩＧＭＰ ② コスト値 ③ ポート番号 ④ Ｈｅｌｌｏパケット\n⑤ ＲＳＶＰ ⑥ ホップ数 ⑦ パス属性 ⑧ ＭＴＵサイズ\n⑨ ＩＭＡＰ ⑩ ＩＧＰ ⑪ 遅延時間 ⑫ ＭＡＣアドレス\n(２) 次の問いの 内の(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＩＰｖ６について述べた次のＡ～Ｃの文章は、 (エ) 。\nＡ ＩＰｖ６のアドレスサイズは１２８ bit であり、そのアドレス表記は１６ bit ずつ８個\nのブロックに分けて各ブロックを１６進数で表し、ブロック間をドット記号で区切る。\nＢ ＩＰｖ６パケットの基本ヘッダのヘッダ長は６４ オクテット に固定されており、拡張\nヘッダは、必要に応じて機能ごとにペイロード部の先頭に配置される。\nＣ インターネットにおいて、ＩＰｖ６とＩＰｖ４の共存を可能とするための方法の一つとし\nて、ＩＰｖ６パケットをＩＰｖ４パケットのペイロードとしてカプセル化して転送する\nデュアルスタックが用いられている。\n<(エ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(３) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＲＴＰ／ＲＴＣＰについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① ＲＴＰはリアルタイムデータを送信するためのプロトコルであり、ユニキャスト\nセッション及びマルチキャストセッションで用いられる。\n② ＲＴＰでは、セッション内で送信元が独自に設定するＳＳＲＣ識別子を用いてリ\nアルタイム通信の送信元を識別する。\n③ ＲＴＰでは、送信側でタイムスタンプ、シーケンス番号、ペイロードタイプなど\nをＲＴＰヘッダ情報として送出し、受信側でそれらを参照することにより、タイミ\nング情報の抽出、パケット損失の検出などを行う。\n④ ＲＴＣＰのセッション制御機能によって、データ転送におけるパケット損失など\nの品質低下を検知した場合、ＲＴＣＰはＲＴＰパケットの送受信を終了させる。\n(４) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＴＣＰにおける通信制御の特徴について述べた次の文章のうち、誤っているものは、\n(カ) である。\n<(カ)の解答群>\n① ＴＣＰは、コネクションを確立した通信相手への送信データにパケット損失が発\n生した場合、データを再送する再送制御の機能を有している。\nふくそう\n② ＴＣＰによる通信の開始時には、ネットワーク輻輳制御の一つであるスロースター\nトといわれるアルゴリズムに従って、送信するデータ量の制御が行われる。\n③ 送信ホストは、送信したセグメントに対する確認応答を待たずに複数のセグメン\nトを送信する順序制御によりスループットの向上を図っている。\n④ ＴＣＰは、受信側のバッファの空き状況に応じて受信可能なデータのサイズを受\n信側から送信側に対して通知することにより、送信するデータ量を調整するフロー\n制御の機能を有している。"}], "7": [{"tag": "R3-1", "title": "令和３年度 第１回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、標準請負契約約款に基づく施工管理について述べたものである。 内の</p>\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n建設業法に基づき、中央建設業審議会が作成し、その実施を勧告している標準請負契約約款\nは、請負契約の片務性の是正と契約関係の明確化・適正化を目的としたものである。\n標準請負契約約款のうち、公共工事標準請負契約約款においては、公共工事の発注者及び受\n注者は、当該約款に基づき、設計図書に従い、法令を遵守し、当該約款及び設計図書を内容と\nする工事の請負契約を履行しなければならない。設計図書とは、別冊の図面、仕様書、現場説\n明書及び現場説明に対する (ア) をいう。\n公共工事の受注者は、請負契約の履行に当たり、 (イ) を定めて工事現場に設置し、設\n計図書に定めるところにより、その氏名その他必要な事項を発注者に通知しなければならない。\n(イ) は、請負契約の履行に関し、工事現場に常駐し、その運営、取締りを行うほか、請\n負代金額の変更、請負代金の請求及び受領など、請負契約に基づく受注者の権限を行使するこ\nとができる。\n工事材料の品質については、設計図書に定めるところによる。受注者は、設計図書において\n監督員の検査を受けて使用すべきものと指定された工事材料については、当該検査に合格した\nものを使用しなければならない。この場合において、当該検査に直接要する費用は、 (ウ)\nとする。\n公共工事の受注者は、工事を完成したときは、その旨を発注者に通知しなければならない。\n発注者は、受注者から工事完成の通知を受けたときは、通知を受けた日から (エ) 日以内\nに受注者の立会いの上、設計図書に定めるところにより、工事の完成を確認するための検査を\n完了し、当該検査の結果を受注者に通知しなければならない。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ７ ② 施工指示書 ③ 主任技術者\n④ １０ ⑤ 現場代理人 ⑥ 発注者の負担\n⑦ １４ ⑧ 現場状況写真 ⑨ 専門技術者\n⑩ ３０ ⑪ 監理技術者 ⑫ 質問回答書\n⑬ 発注者と受注者との折半 ⑭ 設計実施要領\n⑮ 発注者と受注者との協議による負担 ⑯ 受注者の負担\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n防災に関する法令に基づく災害対策への取組などについて述べた次の文章のうち、誤ってい\nるものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 指定公共機関は、防災基本計画(内閣府に設置される中央防災会議が作成する防災\nに関する基本的な計画)に基づき、その業務に関し、防災業務計画を作成し、毎年防\n災業務計画に検討を加え、必要があると認めるときは、これを修正しなければなら\nない。\n② 指定公共機関は、防災業務計画を作成し、又は修正したときは、速やかに当該指\n定公共機関を所管する大臣に報告し、承認を受けなければならない。\n③ 災害予防責任者は、防災基本計画に基づき、その所掌業務について、災害に関す\nる情報を迅速に伝達するため必要な組織を整備し、絶えずその改善に努めなければ\nならない。\n④ 指定公共機関として指定された電気通信事業者は、災害が発生した場合の通信確\n保のために、主要な伝送路の多ルート化、中継交換機の分散設置などの災害対策を\n防災業務計画に定めている。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n予防保全などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 使用中の装置の故障を未然に防止し、使用可能な状態を維持するために行う計画的な保全\nは、予防保全といわれ、予防保全を行わないと、大きな休止損失を招き、品質と安全性の面\nで問題を生ずることがある。\nＢ 装置の故障の兆候を監視して必要なときに措置を行う状態監視保全は、予防保全の一形態\nであり、統計的・数理的に故障が予測できない場合に有効である。\nＣ 故障率がＤＦＲ(Decreasing Failure Rate)型の部品の保全においては、定期的に部品を取\nり替える予防保全を行うことが有効であり、使用に先立ちスクリーニング、エージングなど\nを行うことは有効ではない。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通話品質を評価する主観的評価方法又は客観的評価方法について述べた次の文章のうち、\n誤っているものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 主観的評価方法の一つであるオピニオン評価法は、被験者が、実際に耳で聞いた\n試験音声の品質を、５段階で評価する方法である。\n② オピニオン評価法では、評価点が被験者によってばらつくため、多数のデータを\n集めて統計的な処理を行う必要がある。集めたデータを統計的に処理した値は平均\nオピニオン評点(ＭＯＳ値)といわれる。\n③ 測定器を使って音声の品質を機械的に処理し数値化する方法は、客観的評価方法\nといわれる。客観的評価方法では、入力音声と出力音声を比較して音声の明瞭度を\n測定し、その結果をラウドネス定格と対応したスコアとして出力する。\n④ 客観的評価方法には、ＰＥＳＱ、ＰＳＱＭなどがある。このうち、ＰＥＳＱは、\n電話帯域音声の受聴品質を推定する客観的な品質評価が可能であり、対象とする品\n質要因には、音声符号化ひずみ、パケット損失ひずみなどがある。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n信頼性の抜取試験について述べた次の文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 抜取試験では、一般に、大量生産品ではロットから、生産量の少ない品目の場合\nにはアイテム集団から任意抽出したサンプルについて、故障率などの信頼性を調べ\nた結果に基づき全体の合否判定を行う。\n② 抜取方式には計数型と計量型があり、寿命時間を観測して合否判定を行う方式は、\n計量型に分類される。\n③ １回だけ抜き取ったサンプル中の故障件数で合否の判定を行う方式は、一般に、\n計数１回抜取方式といわれる。\n④ 抜取試験の結果、合格水準にある良いロットが不合格になる確率は消費者危険と\nいわれ、不合格水準にある悪いロットが合格となる確率は生産者危険といわれる。\n<p class=\"sub-h\">(６) 次の文章は、ある装置の信頼性について述べたものである。 内の(ケ)、(コ)に最も</p>\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、装置は偶発故障期\n間にあるものとする。 (３点×２＝６点)\n(ⅰ) 装置Ａの故障率が１ ％／時間 であるとき、固有アベイラビリティが９８ ％ であるために\nは、ＭＴＴＲは、 (ケ) 時間 でなければならない。ただし、答えは四捨五入により整数\n値とする。\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① １ ② ２ ③ ３ ④ ９９ ⑤ １０１\n(ⅱ) 装置Ａの故障率が１ ％／時間 、装置Ｂ及びＣのＭＴＢＦがそれぞれ８００ 時間 及び\n４００ 時間 であるとき、装置Ａ、Ｂ及びＣがそれぞれ１台ずつ直列に接続されたシステムの\nＭＴＢＦは (コ) 時間 である。ただし、答えは四捨五入により整数値とする。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① １ ② ７３ ③ ７５ ④ ２１１ ⑤ １,３００", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、標準請負契約約款に基づく施工管理について述べたものである。 内の\n(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、\n内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n建設業法に基づき、中央建設業審議会が作成し、その実施を勧告している標準請負契約約款\nは、請負契約の片務性の是正と契約関係の明確化・適正化を目的としたものである。\n標準請負契約約款のうち、公共工事標準請負契約約款においては、公共工事の発注者及び受\n注者は、当該約款に基づき、設計図書に従い、法令を遵守し、当該約款及び設計図書を内容と\nする工事の請負契約を履行しなければならない。設計図書とは、別冊の図面、仕様書、現場説\n明書及び現場説明に対する (ア) をいう。\n公共工事の受注者は、請負契約の履行に当たり、 (イ) を定めて工事現場に設置し、設\n計図書に定めるところにより、その氏名その他必要な事項を発注者に通知しなければならない。\n(イ) は、請負契約の履行に関し、工事現場に常駐し、その運営、取締りを行うほか、請\n負代金額の変更、請負代金の請求及び受領など、請負契約に基づく受注者の権限を行使するこ\nとができる。\n工事材料の品質については、設計図書に定めるところによる。受注者は、設計図書において\n監督員の検査を受けて使用すべきものと指定された工事材料については、当該検査に合格した\nものを使用しなければならない。この場合において、当該検査に直接要する費用は、 (ウ)\nとする。\n公共工事の受注者は、工事を完成したときは、その旨を発注者に通知しなければならない。\n発注者は、受注者から工事完成の通知を受けたときは、通知を受けた日から (エ) 日以内\nに受注者の立会いの上、設計図書に定めるところにより、工事の完成を確認するための検査を\n完了し、当該検査の結果を受注者に通知しなければならない。\n<(ア)～(エ)の解答群>\n① ７ ② 施工指示書 ③ 主任技術者\n④ １０ ⑤ 現場代理人 ⑥ 発注者の負担\n⑦ １４ ⑧ 現場状況写真 ⑨ 専門技術者\n⑩ ３０ ⑪ 監理技術者 ⑫ 質問回答書\n⑬ 発注者と受注者との折半 ⑭ 設計実施要領\n⑮ 発注者と受注者との協議による負担 ⑯ 受注者の負担\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n防災に関する法令に基づく災害対策への取組などについて述べた次の文章のうち、誤ってい\nるものは、 (オ) である。\n<(オ)の解答群>\n① 指定公共機関は、防災基本計画(内閣府に設置される中央防災会議が作成する防災\nに関する基本的な計画)に基づき、その業務に関し、防災業務計画を作成し、毎年防\n災業務計画に検討を加え、必要があると認めるときは、これを修正しなければなら\nない。\n② 指定公共機関は、防災業務計画を作成し、又は修正したときは、速やかに当該指\n定公共機関を所管する大臣に報告し、承認を受けなければならない。\n③ 災害予防責任者は、防災基本計画に基づき、その所掌業務について、災害に関す\nる情報を迅速に伝達するため必要な組織を整備し、絶えずその改善に努めなければ\nならない。\n④ 指定公共機関として指定された電気通信事業者は、災害が発生した場合の通信確\n保のために、主要な伝送路の多ルート化、中継交換機の分散設置などの災害対策を\n防災業務計画に定めている。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n予防保全などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 使用中の装置の故障を未然に防止し、使用可能な状態を維持するために行う計画的な保全\nは、予防保全といわれ、予防保全を行わないと、大きな休止損失を招き、品質と安全性の面\nで問題を生ずることがある。\nＢ 装置の故障の兆候を監視して必要なときに措置を行う状態監視保全は、予防保全の一形態\nであり、統計的・数理的に故障が予測できない場合に有効である。\nＣ 故障率がＤＦＲ(Decreasing Failure Rate)型の部品の保全においては、定期的に部品を取\nり替える予防保全を行うことが有効であり、使用に先立ちスクリーニング、エージングなど\nを行うことは有効ではない。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通話品質を評価する主観的評価方法又は客観的評価方法について述べた次の文章のうち、\n誤っているものは、 (キ) である。\n<(キ)の解答群>\n① 主観的評価方法の一つであるオピニオン評価法は、被験者が、実際に耳で聞いた\n試験音声の品質を、５段階で評価する方法である。\n② オピニオン評価法では、評価点が被験者によってばらつくため、多数のデータを\n集めて統計的な処理を行う必要がある。集めたデータを統計的に処理した値は平均\nオピニオン評点(ＭＯＳ値)といわれる。\n③ 測定器を使って音声の品質を機械的に処理し数値化する方法は、客観的評価方法\nといわれる。客観的評価方法では、入力音声と出力音声を比較して音声の明瞭度を\n測定し、その結果をラウドネス定格と対応したスコアとして出力する。\n④ 客観的評価方法には、ＰＥＳＱ、ＰＳＱＭなどがある。このうち、ＰＥＳＱは、\n電話帯域音声の受聴品質を推定する客観的な品質評価が可能であり、対象とする品\n質要因には、音声符号化ひずみ、パケット損失ひずみなどがある。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n信頼性の抜取試験について述べた次の文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① 抜取試験では、一般に、大量生産品ではロットから、生産量の少ない品目の場合\nにはアイテム集団から任意抽出したサンプルについて、故障率などの信頼性を調べ\nた結果に基づき全体の合否判定を行う。\n② 抜取方式には計数型と計量型があり、寿命時間を観測して合否判定を行う方式は、\n計量型に分類される。\n③ １回だけ抜き取ったサンプル中の故障件数で合否の判定を行う方式は、一般に、\n計数１回抜取方式といわれる。\n④ 抜取試験の結果、合格水準にある良いロットが不合格になる確率は消費者危険と\nいわれ、不合格水準にある悪いロットが合格となる確率は生産者危険といわれる。\n\n(６) 次の文章は、ある装置の信頼性について述べたものである。 内の(ケ)、(コ)に最も\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、装置は偶発故障期\n間にあるものとする。 (３点×２＝６点)\n(ⅰ) 装置Ａの故障率が１ ％／時間 であるとき、固有アベイラビリティが９８ ％ であるために\nは、ＭＴＴＲは、 (ケ) 時間 でなければならない。ただし、答えは四捨五入により整数\n値とする。\n<(ケ)の解答群>\n① １ ② ２ ③ ３ ④ ９９ ⑤ １０１\n(ⅱ) 装置Ａの故障率が１ ％／時間 、装置Ｂ及びＣのＭＴＢＦがそれぞれ８００ 時間 及び\n４００ 時間 であるとき、装置Ａ、Ｂ及びＣがそれぞれ１台ずつ直列に接続されたシステムの\nＭＴＢＦは (コ) 時間 である。ただし、答えは四捨五入により整数値とする。\n<(コ)の解答群>\n① １ ② ７３ ③ ７５ ④ ２１１ ⑤ １,３００"}, {"tag": "R3-2", "title": "令和３年度 第２回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、労働安全衛生に関する法令に基づく安全管理体制及び安全活動の概要について述</p>\nべたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その\n番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n労働安全衛生法において、労働災害とは、労働者の就業に係る建設物、設備、原材料、ガス、\n蒸気、粉じん等により、又は作業行動その他業務に起因して、労働者が負傷し、疾病にかかり、\n又は死亡することと定義されている。\n労働災害統計において、労働災害の発生の頻度を示す指標として、 (ア) がある。\n(ア) は、１００万延べ実労働時間当たりの労働災害による死傷者数をもって表される。\n事業者は、快適な職場環境の実現と労働条件の改善を通じて職場における労働者の安全と健\n康を確保する責務を有している。\n労働安全の管理体制としては、通信業の場合、事業者は常時使用する労働者数が３００人以\n上の事業場において、 (イ) を選任し、その者に安全管理者、衛生管理者などの指揮をさ\nせるとともに、労働者の危険又は健康障害を防止するための措置などに関する業務を統括管理\nさせなければならない。さらに、通信業の場合、常時１００人以上の労働者を使用する事業場\nにおいて、事業者は労働者の危険の防止に関する重要事項などを調査審議させ、事業者に対し\n意見を述べさせるために、 (ウ) を設けなければならない。 (ウ) の運営方法として、\n重要な議事内容は記録し、３年間保存しなければならない。\nまた、働きやすく、安全な職場を作るためには、創意工夫などによって常により良い職場に\n改善する姿勢と努力が必要である。創意工夫などを引き出すための安全活動として、事故に直\n結してもおかしくない一歩手前の事例を発見し、その原因を解消する (エ) 運動がある。\n(エ) 運動は、労働災害における経験則の一つであるハインリッヒの法則などに基づいて\nおり、重大な事故の発生を未然に防止するための有効な活動とされている。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 監理技術者 ② 安全委員会 ③ 安全衛生協議会\n④ 安全施工サイクル ⑤ 強度率 ⑥ ＺＤ(Zero Defect)\n⑦ ヒヤリハット ⑧ 年千人率 ⑨ 統括安全衛生責任者\n⑩ 度数率 ⑪ 一声かけ ⑫ 労働能力喪失率\n⑬ 災害防止協議会 ⑭ 総括安全衛生管理者\n⑮ 技術管理評議会 ⑯ 労働安全コンサルタント\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n災害用伝言サービス、緊急通報などについて述べた次の文章のうち、正しいものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 災害用伝言ダイヤルにおける伝言の録音及び再生は、被災地側の固定電話の電話\n番号宛に行う必要があり、携帯電話やＩＰ電話の電話番号は録音及び再生の電話番\n号として利用することができない。\n② 災害用伝言板では、パーソナルコンピュータ、スマートフォンなどから氏名を入\n力して安否情報(伝言)の登録を行い、入力された氏名から安否情報の確認を行うこ\nとができる。\n③ 携帯電話の緊急通報(１１０、１１８、１１９)には、発信者の位置情報などを緊\n急通報受理機関へ送信する機能が備えられている。\n④ 災害時優先電話は、災害の救援、復旧や公共の秩序を維持するため、法令に定め\nられた防災関係の各種機関などの電話が対象であり、災害時に制限を受けずに必ず\nつながることを保証している。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n設備保全の概要などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 設備保全には、故障の防止や故障の修理などを行う維持活動と、設備寿命の延命や保全時\n間の短縮などを行う改善活動がある。\nＢ 設備保全の目的である生産性を高めるための生産保全は、一般に、設備の一生涯を通して、\nライフサイクルコストと設備の劣化損失との両方を引き下げ、企業の収益性を高めるために\n行われる。\nＣ 設備保全などの業務に求められる品質管理、安全管理などの成果は、五つの項目の英字表\n記の頭文字をとって、一般に、ＱＣＤＳＭとして評価され、このうちＭは可動性(Mobility)\nを指している。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n新ＱＣ七つ道具について述べた次の文章のうち、誤っているものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 二元表の交点に着目して、問題・課題の所在や形態を探索し、問題解決・課題達\n成への着想を得る手法は、マトリックス図法といわれる。\n② 事実、意見及び発想を言語データとして捉え、それらの相互の親和性によって集\nめた図を作ることで、解決すべき問題・課題の所在、形態を明らかにする手法は、\nＰＤＰＣ法といわれる。\n③ 複雑に絡み合った原因と結果又は目的と手段を整理し、図として構造化すること\nにより、解決すべき問題・課題の関係を明確化する手法は、連関図法といわれる。\n④ 目的を達成するために必要な手段・方策を系統的に展開し、最適な手段などを求\nめる手法は、系統図法といわれる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n故障率分布の一般的な特徴などについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の寿命分布は、\n正規分布に従う。\n② ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の時間当たりの\n故障の起こる割合は一定で、その故障発生の時期の予測が可能である。\n③ ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品はある特定期間\nに故障が集中する傾向があり、故障が集中的に起こる直前に事前取替を行うことで\n未然に故障を防止できる。\n④ ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品の使用に先立ち、\nバーンインなどによりスクリーニングを行い、初期において故障率が高いものを除\nくことで故障率の低い良品を選ぶことができる。\n<p class=\"sub-h\">(６) 次の文章は、修理系装置の信頼性について述べたものである。 内の(ケ)、(コ)に最</p>\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にある\nものとする。また、指数関数の値は、ｅを自然対数の底として、ｅ０.１＝１.１１、ｅ０.２＝１.２２、\nｅ０.５＝１.６５、ｅ１＝２.７２、ｅ４＝５４.６０、ｅ５＝１４８.４１とし、答えは、四捨五入に\nより整数とする。 (３点×２＝６点)\n装置のある期間の稼働状況を調査したところ、２０回の故障があり、そのたびに修理を行っ\nた。また、この期間の動作時間の合計は４,０００時間、故障による休止時間の合計は５００\n時間であった。\n(ⅰ) この装置の稼働開始後１００時間経過時点における信頼度は、 (ケ) ％ である。\n(ⅱ) この装置の固有アベイラビリティは、 (コ) ％ である。\n<p class=\"cg-h\">&lt;(ケ)、(コ)の解答群&gt;</p>\n① ２ ② １１ ③ １３ ④ ６１\n⑤ ７４ ⑥ ８７ ⑦ ８９ ⑧ １４９", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、労働安全衛生に関する法令に基づく安全管理体制及び安全活動の概要について述\nべたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その\n番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n労働安全衛生法において、労働災害とは、労働者の就業に係る建設物、設備、原材料、ガス、\n蒸気、粉じん等により、又は作業行動その他業務に起因して、労働者が負傷し、疾病にかかり、\n又は死亡することと定義されている。\n労働災害統計において、労働災害の発生の頻度を示す指標として、 (ア) がある。\n(ア) は、１００万延べ実労働時間当たりの労働災害による死傷者数をもって表される。\n事業者は、快適な職場環境の実現と労働条件の改善を通じて職場における労働者の安全と健\n康を確保する責務を有している。\n労働安全の管理体制としては、通信業の場合、事業者は常時使用する労働者数が３００人以\n上の事業場において、 (イ) を選任し、その者に安全管理者、衛生管理者などの指揮をさ\nせるとともに、労働者の危険又は健康障害を防止するための措置などに関する業務を統括管理\nさせなければならない。さらに、通信業の場合、常時１００人以上の労働者を使用する事業場\nにおいて、事業者は労働者の危険の防止に関する重要事項などを調査審議させ、事業者に対し\n意見を述べさせるために、 (ウ) を設けなければならない。 (ウ) の運営方法として、\n重要な議事内容は記録し、３年間保存しなければならない。\nまた、働きやすく、安全な職場を作るためには、創意工夫などによって常により良い職場に\n改善する姿勢と努力が必要である。創意工夫などを引き出すための安全活動として、事故に直\n結してもおかしくない一歩手前の事例を発見し、その原因を解消する (エ) 運動がある。\n(エ) 運動は、労働災害における経験則の一つであるハインリッヒの法則などに基づいて\nおり、重大な事故の発生を未然に防止するための有効な活動とされている。\n<(ア)～(エ)の解答群>\n① 監理技術者 ② 安全委員会 ③ 安全衛生協議会\n④ 安全施工サイクル ⑤ 強度率 ⑥ ＺＤ(Zero Defect)\n⑦ ヒヤリハット ⑧ 年千人率 ⑨ 統括安全衛生責任者\n⑩ 度数率 ⑪ 一声かけ ⑫ 労働能力喪失率\n⑬ 災害防止協議会 ⑭ 総括安全衛生管理者\n⑮ 技術管理評議会 ⑯ 労働安全コンサルタント\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n災害用伝言サービス、緊急通報などについて述べた次の文章のうち、正しいものは、\n(オ) である。\n<(オ)の解答群>\n① 災害用伝言ダイヤルにおける伝言の録音及び再生は、被災地側の固定電話の電話\n番号宛に行う必要があり、携帯電話やＩＰ電話の電話番号は録音及び再生の電話番\n号として利用することができない。\n② 災害用伝言板では、パーソナルコンピュータ、スマートフォンなどから氏名を入\n力して安否情報(伝言)の登録を行い、入力された氏名から安否情報の確認を行うこ\nとができる。\n③ 携帯電話の緊急通報(１１０、１１８、１１９)には、発信者の位置情報などを緊\n急通報受理機関へ送信する機能が備えられている。\n④ 災害時優先電話は、災害の救援、復旧や公共の秩序を維持するため、法令に定め\nられた防災関係の各種機関などの電話が対象であり、災害時に制限を受けずに必ず\nつながることを保証している。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n設備保全の概要などについて述べた次のＡ～Ｃの文章は、 (カ) 。\nＡ 設備保全には、故障の防止や故障の修理などを行う維持活動と、設備寿命の延命や保全時\n間の短縮などを行う改善活動がある。\nＢ 設備保全の目的である生産性を高めるための生産保全は、一般に、設備の一生涯を通して、\nライフサイクルコストと設備の劣化損失との両方を引き下げ、企業の収益性を高めるために\n行われる。\nＣ 設備保全などの業務に求められる品質管理、安全管理などの成果は、五つの項目の英字表\n記の頭文字をとって、一般に、ＱＣＤＳＭとして評価され、このうちＭは可動性(Mobility)\nを指している。\n<(カ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n新ＱＣ七つ道具について述べた次の文章のうち、誤っているものは、 (キ) である。\n<(キ)の解答群>\n① 二元表の交点に着目して、問題・課題の所在や形態を探索し、問題解決・課題達\n成への着想を得る手法は、マトリックス図法といわれる。\n② 事実、意見及び発想を言語データとして捉え、それらの相互の親和性によって集\nめた図を作ることで、解決すべき問題・課題の所在、形態を明らかにする手法は、\nＰＤＰＣ法といわれる。\n③ 複雑に絡み合った原因と結果又は目的と手段を整理し、図として構造化すること\nにより、解決すべき問題・課題の関係を明確化する手法は、連関図法といわれる。\n④ 目的を達成するために必要な手段・方策を系統的に展開し、最適な手段などを求\nめる手法は、系統図法といわれる。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n故障率分布の一般的な特徴などについて述べた次の文章のうち、正しいものは、 (ク)\nである。\n<(ク)の解答群>\n① ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の寿命分布は、\n正規分布に従う。\n② ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の時間当たりの\n故障の起こる割合は一定で、その故障発生の時期の予測が可能である。\n③ ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品はある特定期間\nに故障が集中する傾向があり、故障が集中的に起こる直前に事前取替を行うことで\n未然に故障を防止できる。\n④ ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品の使用に先立ち、\nバーンインなどによりスクリーニングを行い、初期において故障率が高いものを除\nくことで故障率の低い良品を選ぶことができる。\n\n(６) 次の文章は、修理系装置の信頼性について述べたものである。 内の(ケ)、(コ)に最\nも適したものを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にある\nものとする。また、指数関数の値は、ｅを自然対数の底として、ｅ０.１＝１.１１、ｅ０.２＝１.２２、\nｅ０.５＝１.６５、ｅ１＝２.７２、ｅ４＝５４.６０、ｅ５＝１４８.４１とし、答えは、四捨五入に\nより整数とする。 (３点×２＝６点)\n装置のある期間の稼働状況を調査したところ、２０回の故障があり、そのたびに修理を行っ\nた。また、この期間の動作時間の合計は４,０００時間、故障による休止時間の合計は５００\n時間であった。\n(ⅰ) この装置の稼働開始後１００時間経過時点における信頼度は、 (ケ) ％ である。\n(ⅱ) この装置の固有アベイラビリティは、 (コ) ％ である。\n<(ケ)、(コ)の解答群>\n① ２ ② １１ ③ １３ ④ ６１\n⑤ ７４ ⑥ ８７ ⑦ ８９ ⑧ １４９"}, {"tag": "R4-1", "title": "令和４年度 第１回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、施工管理の管理機能とその関連性、工程表の特徴などについて述べたものである。</p>\n内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n施工管理において、品質管理、工程管理、原価管理及び安全管理は、四大管理機能といわれ\nる。四大管理機能は、それぞれ独立したものではなく、相互に関連性を持っている。\n例えば、工程と原価の関連性をみると、工事の施工出来高と、固定原価及び変動原価から成\nる工事総原価との関係において、採算のとれる状態にするためには、施工出来高を (ア)\n点以上にする必要がある。工程速度と原価の関係において、工事総原価が最小となる施工速度\nは (イ) といわれ、 (イ) における施工出来高の上昇には限度があり、施工速度が速\nすぎると、工事総原価は高くなり、工事の採算性は悪化する。\n四大管理機能のうち、工程管理においては、一般に、工事の施工手順や所要日数などを分か\nりやすく図表化した工程表が用いられる。\n工程表のうち、横線式工程表の一つに、縦軸に作業内容を置き、横軸に各作業の日数をとる\n(ウ) がある。 (ウ) は、工期に影響する作業がどれであるかを把握しにくい欠点が\nあるが、各作業の所要日数が分かり、さらに作業の流れが左から右に移行しているので作業間\nの関連性が分かりやすいという利点を有している。\nまた、縦軸に工事の施工出来高の累計をとり、横軸に工期の時間的経過をとって、施工出来\n高の進捗状況をグラフ化して示したものは、曲線式工程表といわれる。工事の初期には準備な\nどのために工事の進捗が遅く、中間期では施工量が増加し、仕上げ段階となる工事の末期では\n施工量が減少するのが一般的であるため、曲線式工程表における予定工程曲線は、一般に、\n(エ) 字の曲線となる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① Ｍ ② 採算速度 ③ ＰＥＲＴ図 ④ 経済速度\n⑤ Ｓ ⑥ 限界利益 ⑦ 最高応答速度 ⑧ 管理限界\n⑨ Ｕ ⑩ 限界速度 ⑪ 斜線式工程表 ⑫ 損益分岐\n⑬ Ｚ ⑭ 許容臨界 ⑮ バーチャート ⑯ ネットワーク式工程表\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n職場などにおける安全活動について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 職場の小単位のグループで、現場の作業、設備、環境、イラストなどを見ながら、作業の\n中に潜む危険要因を摘出するとともに、その対策について話し合いをすることは、一般に、\n危険予知活動(ＫＹＫ)又は危険予知訓練(ＫＹＴ)といわれる。\nＢ 職場の小単位のグループで、作業開始前に安全のために、短時間で仕事の範囲、段取り、\n各人ごとの作業の安全のポイントなどについて危険予知も取り入れて打ち合わせを行い、\n具体的な事例で作業場の安全と作業の安全指示の最終確認を行うミーティングは、一般に、\n安全朝礼といわれる。\nＣ 安全管理の基本的な活動として５Ｓ運動があり、５ＳのＳは、一般に、整理、整頓、清掃、\nしつけ\n清潔及び躾のローマ字表記の頭文字をとったものとされている。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n信頼性の事前評価について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 製品の開発を進めていく際に、進捗の節目ごとに関係者が集まって設計の妥当性、\n製品の信頼性などへの不具合を検出、修正するために行われる設計審査会は、一般\nに、デザインレビューといわれる。\n② ＦＭＥＡは、現象から原因に向かって故障波及状況や影響度などを解析するトッ\nプダウン型の一つの手法として用いられている。\n③ ＦＴＡは、一般に、故障の発生頻度が高い、発生時の被害が大きいなどの重要な\n故障モードに対して実施すると効果的である。\n④ 故障の因果関係をツリー状に展開する故障解析手法の一つにＥＴＡがあり、これ\nは基本的な故障要因を想定し、その影響がどのような事象として発展するのかを事\n前に分析しておくという考え方に基づいた手法である。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n内閣府から公表されている事業継続ガイドライン(令和３年４月改定)における事業継続戦略・\n対策の検討について述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 企業・組織の中枢機能が機能するためには、緊急参集及び迅速な意思決定を行える体制や\n指揮命令系統(代理体制を含む)の確保を行うとともに、特に通信手段、電力などの設備、ラ\nイフライン確保の対策が必要である。\nＢ 不測の事態に直面した場合であっても、企業・組織の活動が利害関係者から見えないといっ\nた状況を防ぐためには、取引先、顧客、従業員、地域住民などへの情報発信や情報共有を行\nうための自社内における体制の整備、連絡先情報の保持、情報発信の手段確保なども必要で\nある。\nＣ 重要業務の継続には、自社における文書を含む重要な情報及び情報システムを被災時でも\n使用できることが不可欠である。重要な情報についてはバックアップを確保し、同じ発生事\n象(インシデント)で同時に被災しない場所に保存することが必要である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項における用語について述べた次の文章のうち、正しいものは、\n(ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① サービス継続とは、あらかじめ合意された時点又は期間にわたって、要求された\n機能を実行するサービス又はサービスコンポーネントの能力をいう。\n② 是正処置とは、パフォーマンスを向上するために繰り返し行われる活動をいう。\n③ 外部供給者とは、サービスマネジメントシステム又はサービスに関係したある決\n定事項若しくは活動に影響を与え得るか、その影響を受け得るか、又はその影響を\n受けると認識している、個人又は組織をいう。\n④ サービスレベル合意書(ＳＬＡ)とは、サービス及びその合意されたパフォーマン\nスを特定した、組織と顧客との間の合意文書をいう。\n⑤ インシデントとは、根本原因が特定されているか、又はサービスへの影響を低減\n若しくは除去する方法がある問題をいう。\n<p class=\"sub-h\">(６) 次の文章は、システムの信頼性について述べたものである。 内の(ケ)に最も適した</p>\nものを、下記の解答群から選び、その番号を記せ。ただし、log ２＝０.３０１とする。(３点)\n10\n１\n図に示すように、信頼度０.８である装置Ａがｎ台並列に接続されている 冗長システム\nｎ\nにおいて、システム全体の信頼度を０.９９９９以上にするためには、装置Ａの台数であるｎを\n少なくとも (ケ) 以上とする必要がある。\nＡ\n1\nＡ\n2\nＡn\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① ５ ② ６ ③ ８ ④ ３１ ⑤ ４２\n<p class=\"sub-h\">(７) 次の文章は、装置の信頼性について述べたものである。 内の(コ)に最も適したもの</p>\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとする。\n(３点)\n装置Ａの総動作時間を２,０００時間、総動作不能時間を５００時間、故障回数を５回とし\nたとき、装置ＡのＭＴＢＦは、 (コ) 時間である。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① １００ ② ３００ ③ ４００ ④ ５００", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、施工管理の管理機能とその関連性、工程表の特徴などについて述べたものである。\n内の(ア)～(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただ\nし、 内の同じ記号は、同じ解答を示す。 (２点×４＝８点)\n施工管理において、品質管理、工程管理、原価管理及び安全管理は、四大管理機能といわれ\nる。四大管理機能は、それぞれ独立したものではなく、相互に関連性を持っている。\n例えば、工程と原価の関連性をみると、工事の施工出来高と、固定原価及び変動原価から成\nる工事総原価との関係において、採算のとれる状態にするためには、施工出来高を (ア)\n点以上にする必要がある。工程速度と原価の関係において、工事総原価が最小となる施工速度\nは (イ) といわれ、 (イ) における施工出来高の上昇には限度があり、施工速度が速\nすぎると、工事総原価は高くなり、工事の採算性は悪化する。\n四大管理機能のうち、工程管理においては、一般に、工事の施工手順や所要日数などを分か\nりやすく図表化した工程表が用いられる。\n工程表のうち、横線式工程表の一つに、縦軸に作業内容を置き、横軸に各作業の日数をとる\n(ウ) がある。 (ウ) は、工期に影響する作業がどれであるかを把握しにくい欠点が\nあるが、各作業の所要日数が分かり、さらに作業の流れが左から右に移行しているので作業間\nの関連性が分かりやすいという利点を有している。\nまた、縦軸に工事の施工出来高の累計をとり、横軸に工期の時間的経過をとって、施工出来\n高の進捗状況をグラフ化して示したものは、曲線式工程表といわれる。工事の初期には準備な\nどのために工事の進捗が遅く、中間期では施工量が増加し、仕上げ段階となる工事の末期では\n施工量が減少するのが一般的であるため、曲線式工程表における予定工程曲線は、一般に、\n(エ) 字の曲線となる。\n<(ア)～(エ)の解答群>\n① Ｍ ② 採算速度 ③ ＰＥＲＴ図 ④ 経済速度\n⑤ Ｓ ⑥ 限界利益 ⑦ 最高応答速度 ⑧ 管理限界\n⑨ Ｕ ⑩ 限界速度 ⑪ 斜線式工程表 ⑫ 損益分岐\n⑬ Ｚ ⑭ 許容臨界 ⑮ バーチャート ⑯ ネットワーク式工程表\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n職場などにおける安全活動について述べた次のＡ～Ｃの文章は、 (オ) 。\nＡ 職場の小単位のグループで、現場の作業、設備、環境、イラストなどを見ながら、作業の\n中に潜む危険要因を摘出するとともに、その対策について話し合いをすることは、一般に、\n危険予知活動(ＫＹＫ)又は危険予知訓練(ＫＹＴ)といわれる。\nＢ 職場の小単位のグループで、作業開始前に安全のために、短時間で仕事の範囲、段取り、\n各人ごとの作業の安全のポイントなどについて危険予知も取り入れて打ち合わせを行い、\n具体的な事例で作業場の安全と作業の安全指示の最終確認を行うミーティングは、一般に、\n安全朝礼といわれる。\nＣ 安全管理の基本的な活動として５Ｓ運動があり、５ＳのＳは、一般に、整理、整頓、清掃、\nしつけ\n清潔及び躾のローマ字表記の頭文字をとったものとされている。\n<(オ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n信頼性の事前評価について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 製品の開発を進めていく際に、進捗の節目ごとに関係者が集まって設計の妥当性、\n製品の信頼性などへの不具合を検出、修正するために行われる設計審査会は、一般\nに、デザインレビューといわれる。\n② ＦＭＥＡは、現象から原因に向かって故障波及状況や影響度などを解析するトッ\nプダウン型の一つの手法として用いられている。\n③ ＦＴＡは、一般に、故障の発生頻度が高い、発生時の被害が大きいなどの重要な\n故障モードに対して実施すると効果的である。\n④ 故障の因果関係をツリー状に展開する故障解析手法の一つにＥＴＡがあり、これ\nは基本的な故障要因を想定し、その影響がどのような事象として発展するのかを事\n前に分析しておくという考え方に基づいた手法である。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n内閣府から公表されている事業継続ガイドライン(令和３年４月改定)における事業継続戦略・\n対策の検討について述べた次のＡ～Ｃの文章は、 (キ) 。\nＡ 企業・組織の中枢機能が機能するためには、緊急参集及び迅速な意思決定を行える体制や\n指揮命令系統(代理体制を含む)の確保を行うとともに、特に通信手段、電力などの設備、ラ\nイフライン確保の対策が必要である。\nＢ 不測の事態に直面した場合であっても、企業・組織の活動が利害関係者から見えないといっ\nた状況を防ぐためには、取引先、顧客、従業員、地域住民などへの情報発信や情報共有を行\nうための自社内における体制の整備、連絡先情報の保持、情報発信の手段確保なども必要で\nある。\nＣ 重要業務の継続には、自社における文書を含む重要な情報及び情報システムを被災時でも\n使用できることが不可欠である。重要な情報についてはバックアップを確保し、同じ発生事\n象(インシデント)で同時に被災しない場所に保存することが必要である。\n<(キ)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ２００００－１：２０２０情報技術－サービスマネジメント－第１部：サービス\nマネジメントシステム要求事項における用語について述べた次の文章のうち、正しいものは、\n(ク) である。\n<(ク)の解答群>\n① サービス継続とは、あらかじめ合意された時点又は期間にわたって、要求された\n機能を実行するサービス又はサービスコンポーネントの能力をいう。\n② 是正処置とは、パフォーマンスを向上するために繰り返し行われる活動をいう。\n③ 外部供給者とは、サービスマネジメントシステム又はサービスに関係したある決\n定事項若しくは活動に影響を与え得るか、その影響を受け得るか、又はその影響を\n受けると認識している、個人又は組織をいう。\n④ サービスレベル合意書(ＳＬＡ)とは、サービス及びその合意されたパフォーマン\nスを特定した、組織と顧客との間の合意文書をいう。\n⑤ インシデントとは、根本原因が特定されているか、又はサービスへの影響を低減\n若しくは除去する方法がある問題をいう。\n\n(６) 次の文章は、システムの信頼性について述べたものである。 内の(ケ)に最も適した\nものを、下記の解答群から選び、その番号を記せ。ただし、log ２＝０.３０１とする。(３点)\n10\n１\n図に示すように、信頼度０.８である装置Ａがｎ台並列に接続されている 冗長システム\nｎ\nにおいて、システム全体の信頼度を０.９９９９以上にするためには、装置Ａの台数であるｎを\n少なくとも (ケ) 以上とする必要がある。\nＡ\n1\nＡ\n2\nＡn\n<(ケ)の解答群>\n① ５ ② ６ ③ ８ ④ ３１ ⑤ ４２\n(７) 次の文章は、装置の信頼性について述べたものである。 内の(コ)に最も適したもの\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとする。\n(３点)\n装置Ａの総動作時間を２,０００時間、総動作不能時間を５００時間、故障回数を５回とし\nたとき、装置ＡのＭＴＢＦは、 (コ) 時間である。\n<(コ)の解答群>\n① １００ ② ３００ ③ ４００ ④ ５００"}, {"tag": "R4-2", "title": "令和４年度 第２回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＪＩＳに規定されているリスクマネジメントの指針、用語及びリスクアセスメン</p>\nト技法について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\nリスクマネジメントプロセスには、方針、手順及び方策を、コミュニケーション及び協議、\n状況の確定、並びにリスクのアセスメント、対応、モニタリング、 (ア) 、記録作成及び\n報告の活動に体系的に適用することが含まれる。ここで、 (ア) とは、確定された目的を\n達成するため、対象となる事柄の適切性、妥当性及び有効性を決定するために実行される活動\nをいう。\nリスクアセスメントは、リスクマネジメントプロセスの中核要素を構成するものであり、リ\nスク特定、リスク分析及び (イ) を網羅するプロセス全体を指す。\n(イ) は、リスクやリスクの大きさが受容可能か又は許容可能かを決定するために、リ\nスク分析の結果をリスク基準と比較するプロセスである。\nリスクアセスメントは、 (ウ) の知識及び見解を生かし、体系的、反復的、協力的に行\nわれることが望ましい。 (ウ) とは、ある決定事項若しくは活動に影響を与え得るか、そ\nの影響を受け得るか又はその影響を受けると認識している、個人又は組織をいう。\nリスクアセスメント技法の一つとして、主要な中断リスクが組織の運営にどのように影響す\nるかを分析し、運用管理するために必要な能力を特定及び定量化する (エ) がある。\n(エ) は、目的の継続的達成を確保するためのプロセス及び関連資源(人、機器、情報技\n術)の致命度並びに復旧期限の決定に用いられる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① リスク分散 ② 経営層 ③ リスク回避 ④ ステークホルダ\n⑤ 文書管理 ⑥ 監査人 ⑦ デルファイ法 ⑧ 教育・訓練\n⑨ リスク評価 ⑩ リスク対応 ⑪ エキスパート ⑫ レビュー\n⑬ 根本原因分析(ＲＣＡ) ⑭ リスクマトリックス\n⑮ 事業影響度分析(ＢＩＡ) ⑯ クラスタリング\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n労働安全衛生に関する法令に基づく安全衛生管理体制の整備に関する事業者の責務について\n述べた次の文章のうち、正しいものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 事業者は、業種に関わりなく労働者数が常時２０人以上の規模の事業場ごとに安\n全管理者を選任しなければならない。\n② 事業者は、労働者数が常時５０人以上の規模の事業場ごとに当該事業場の業務の\n区分に応じて衛生管理者を選任しなければならない。\n③ 事業者は、業種に関わりなく労働者数が常時７５人以上の規模の事業場ごとに総\n括安全衛生管理者を選任し、安全管理者、衛生管理者などの指揮をさせなければな\nらない。\n④ 事業者は，安全委員会及び衛生委員会を設けなければならないときは、それぞれ\nの委員会の設置に代えて、安全衛生委員会を設置することができる。安全衛生委員\n会は、毎月２回以上開催しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ９０００：２０１５品質マネジメントシステム－基本及び用語に規定されている\n用語及び定義について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 品質とは、対象に本来備わっている特性の集まりが、要求事項を満たす程度をい\nう。\n② 要求事項とは、明示されている、通常暗黙のうちに了解されている又は義務とし\nて要求されている、ニーズ又は期待をいう。\n③ 品質保証とは、品質要求事項を満たす能力を高めることに焦点を合わせた品質マ\nネジメントの一部をいう。\n④ プロジェクトマネジメントとは、プロジェクトの目標を達成するために、プロジェ\nクトの全側面を計画し、組織し、監視し、管理し、報告すること、及びプロジェク\nトに参画する人々全員への動機付けを行うことをいう。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n工程管理で用いられる工程表の特徴などについて述べた次の文章のうち、誤っているものは、\n(キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 曲線式工程表の一つであるバナナ曲線は、縦軸に出来高工程、横軸に時間の経過\nをとって、累計出来高の許容区域を表したものであり、一般に、施工難易度の管理\nに使用される。\n② 縦軸に出来高を置き、横軸に日数をとって各作業の工程(進捗度合い)を示した工\n程表は、グラフ式工程表などといわれ、各作業の計画工程と実施工程が視覚的に対\n比できるが、どの作業が全体工期に影響を及ぼすかは把握しにくい。\n③ バーチャートは、縦軸に作業名、横軸に作業に必要な予定日数と実施状況を示す\nことができるが、工程に影響を与える作業がどれであるかは分かりにくい。\n④ アロー形ネットワーク工程表は、ある目的を達成するために必要な作業を矢線\n(アロー)で示し、作業と作業の相互関係や順序関係をネットワークで示したもので\nあり、各作業について他作業への影響及びクリティカルパスの所要日数に対する影\n響を明確に捉えることができる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている信頼\n性試験の用語について述べた次の文章のうち、誤っているものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① 適合試験とは、アイテムの特性又は性質が規定の要求事項に適合するかどうかを\n判定する手順をいう。\n② 加速試験とは、規定のストレスの持続的又は反復的印加が、アイテムの性質へ及\nぼす影響を調査するために行う手順をいう。\n③ スクリーニング試験とは、不適合アイテム又は初期故障を起こしそうなアイテム\nの検出及び除去を意図する試験をいう。\n④ シミュレーション試験とは、意図する使用で予期される環境及び運用上のストレ\nスを課す試験をいう。\n<p class=\"sub-h\">(６) 次の文章は、装置の信頼性について述べたものである。 内の(ケ)に最も適したもの</p>\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとする。\n(３点)\n装置Ａの故障率が０.１ ％／時間 であるとき、固有アベイラビリティが９８.０ ％ である\nためにはＭＴＴＲは、 (ケ) 時間 でなければならない。ただし、答えは、四捨五入によ\nり小数第１位までとする。\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① ２.０ ② ２０.０ ③ ２０.４ ④ ２０４.１ ⑤ ９８０.０\n<p class=\"sub-h\">(７) 次の文章は、装置の信頼性について述べたものである。 内の(コ)に最も適したもの</p>\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとし、指\n数関数の値は、ｅを自然対数の底として、ｅ－１.０＝０.３７、ｅ－０.１０＝０.９０、ｅ－０.０８＝\n０.９２、ｅ－０.０４＝０.９６を用い、答えは、四捨五入により小数第１位までとする。 (３点)\n装置Ｂ１及びＢ２のＭＴＢＦをそれぞれ２,０００時間及び２,５００時間としたとき、装置Ｂ１\n及びＢ２をそれぞれ一つ用いた並列冗長システムの２００時間における信頼度は、 (コ)\n％ である。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① ６０.３ ② ８２.８ ③ ９２.０ ④ ９９.２ ⑤ ９９.８", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、ＪＩＳに規定されているリスクマネジメントの指針、用語及びリスクアセスメン\nト技法について述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答\n群から選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\nリスクマネジメントプロセスには、方針、手順及び方策を、コミュニケーション及び協議、\n状況の確定、並びにリスクのアセスメント、対応、モニタリング、 (ア) 、記録作成及び\n報告の活動に体系的に適用することが含まれる。ここで、 (ア) とは、確定された目的を\n達成するため、対象となる事柄の適切性、妥当性及び有効性を決定するために実行される活動\nをいう。\nリスクアセスメントは、リスクマネジメントプロセスの中核要素を構成するものであり、リ\nスク特定、リスク分析及び (イ) を網羅するプロセス全体を指す。\n(イ) は、リスクやリスクの大きさが受容可能か又は許容可能かを決定するために、リ\nスク分析の結果をリスク基準と比較するプロセスである。\nリスクアセスメントは、 (ウ) の知識及び見解を生かし、体系的、反復的、協力的に行\nわれることが望ましい。 (ウ) とは、ある決定事項若しくは活動に影響を与え得るか、そ\nの影響を受け得るか又はその影響を受けると認識している、個人又は組織をいう。\nリスクアセスメント技法の一つとして、主要な中断リスクが組織の運営にどのように影響す\nるかを分析し、運用管理するために必要な能力を特定及び定量化する (エ) がある。\n(エ) は、目的の継続的達成を確保するためのプロセス及び関連資源(人、機器、情報技\n術)の致命度並びに復旧期限の決定に用いられる。\n<(ア)～(エ)の解答群>\n① リスク分散 ② 経営層 ③ リスク回避 ④ ステークホルダ\n⑤ 文書管理 ⑥ 監査人 ⑦ デルファイ法 ⑧ 教育・訓練\n⑨ リスク評価 ⑩ リスク対応 ⑪ エキスパート ⑫ レビュー\n⑬ 根本原因分析(ＲＣＡ) ⑭ リスクマトリックス\n⑮ 事業影響度分析(ＢＩＡ) ⑯ クラスタリング\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n労働安全衛生に関する法令に基づく安全衛生管理体制の整備に関する事業者の責務について\n述べた次の文章のうち、正しいものは、 (オ) である。\n<(オ)の解答群>\n① 事業者は、業種に関わりなく労働者数が常時２０人以上の規模の事業場ごとに安\n全管理者を選任しなければならない。\n② 事業者は、労働者数が常時５０人以上の規模の事業場ごとに当該事業場の業務の\n区分に応じて衛生管理者を選任しなければならない。\n③ 事業者は、業種に関わりなく労働者数が常時７５人以上の規模の事業場ごとに総\n括安全衛生管理者を選任し、安全管理者、衛生管理者などの指揮をさせなければな\nらない。\n④ 事業者は，安全委員会及び衛生委員会を設けなければならないときは、それぞれ\nの委員会の設置に代えて、安全衛生委員会を設置することができる。安全衛生委員\n会は、毎月２回以上開催しなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ９０００：２０１５品質マネジメントシステム－基本及び用語に規定されている\n用語及び定義について述べた次の文章のうち、誤っているものは、 (カ) である。\n<(カ)の解答群>\n① 品質とは、対象に本来備わっている特性の集まりが、要求事項を満たす程度をい\nう。\n② 要求事項とは、明示されている、通常暗黙のうちに了解されている又は義務とし\nて要求されている、ニーズ又は期待をいう。\n③ 品質保証とは、品質要求事項を満たす能力を高めることに焦点を合わせた品質マ\nネジメントの一部をいう。\n④ プロジェクトマネジメントとは、プロジェクトの目標を達成するために、プロジェ\nクトの全側面を計画し、組織し、監視し、管理し、報告すること、及びプロジェク\nトに参画する人々全員への動機付けを行うことをいう。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n工程管理で用いられる工程表の特徴などについて述べた次の文章のうち、誤っているものは、\n(キ) である。\n<(キ)の解答群>\n① 曲線式工程表の一つであるバナナ曲線は、縦軸に出来高工程、横軸に時間の経過\nをとって、累計出来高の許容区域を表したものであり、一般に、施工難易度の管理\nに使用される。\n② 縦軸に出来高を置き、横軸に日数をとって各作業の工程(進捗度合い)を示した工\n程表は、グラフ式工程表などといわれ、各作業の計画工程と実施工程が視覚的に対\n比できるが、どの作業が全体工期に影響を及ぼすかは把握しにくい。\n③ バーチャートは、縦軸に作業名、横軸に作業に必要な予定日数と実施状況を示す\nことができるが、工程に影響を与える作業がどれであるかは分かりにくい。\n④ アロー形ネットワーク工程表は、ある目的を達成するために必要な作業を矢線\n(アロー)で示し、作業と作業の相互関係や順序関係をネットワークで示したもので\nあり、各作業について他作業への影響及びクリティカルパスの所要日数に対する影\n響を明確に捉えることができる。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている信頼\n性試験の用語について述べた次の文章のうち、誤っているものは、 (ク) である。\n<(ク)の解答群>\n① 適合試験とは、アイテムの特性又は性質が規定の要求事項に適合するかどうかを\n判定する手順をいう。\n② 加速試験とは、規定のストレスの持続的又は反復的印加が、アイテムの性質へ及\nぼす影響を調査するために行う手順をいう。\n③ スクリーニング試験とは、不適合アイテム又は初期故障を起こしそうなアイテム\nの検出及び除去を意図する試験をいう。\n④ シミュレーション試験とは、意図する使用で予期される環境及び運用上のストレ\nスを課す試験をいう。\n\n(６) 次の文章は、装置の信頼性について述べたものである。 内の(ケ)に最も適したもの\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとする。\n(３点)\n装置Ａの故障率が０.１ ％／時間 であるとき、固有アベイラビリティが９８.０ ％ である\nためにはＭＴＴＲは、 (ケ) 時間 でなければならない。ただし、答えは、四捨五入によ\nり小数第１位までとする。\n<(ケ)の解答群>\n① ２.０ ② ２０.０ ③ ２０.４ ④ ２０４.１ ⑤ ９８０.０\n(７) 次の文章は、装置の信頼性について述べたものである。 内の(コ)に最も適したもの\nを、下記の解答群から選び、その番号を記せ。ただし、装置は偶発故障期間にあるものとし、指\n数関数の値は、ｅを自然対数の底として、ｅ－１.０＝０.３７、ｅ－０.１０＝０.９０、ｅ－０.０８＝\n０.９２、ｅ－０.０４＝０.９６を用い、答えは、四捨五入により小数第１位までとする。 (３点)\n装置Ｂ１及びＢ２のＭＴＢＦをそれぞれ２,０００時間及び２,５００時間としたとき、装置Ｂ１\n及びＢ２をそれぞれ一つ用いた並列冗長システムの２００時間における信頼度は、 (コ)\n％ である。\n<(コ)の解答群>\n① ６０.３ ② ８２.８ ③ ９２.０ ④ ９９.２ ⑤ ９９.８"}, {"tag": "R5-1", "title": "令和５年度 第１回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、労働安全衛生マネジメントシステムに関する指針(改正 令和元年厚生労働省告示</p>\n第５４号)(以下、指針という。)について述べたものである。 内の(ア)～(エ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×４＝８点)\n指針は、事業者が労働者の協力の下に一連の過程を定めて継続的に行う (ア) な安全衛\n生活動を促進することにより、労働災害の防止を図るとともに、労働者の健康の増進及び快適\nな職場環境の形成の促進を図り、もって事業場における安全衛生の水準の向上に資することを\n目的とする。\n指針で定義される労働安全衛生マネジメントシステムとは、事業場において、次の(ⅰ)～\n(ⅳ)に掲げる事項を体系的かつ継続的に実施する安全衛生管理に係る一連の (ア) 活動に\n関する仕組みであって、生産管理等事業実施に係る管理と一体となって運用されるものをいう。\n(ⅰ) 安全衛生方針の表明\n(ⅱ) (イ) 等の調査及びその結果に基づき講ずる措置\n(ⅲ) 安全衛生目標の設定\n(ⅳ) 安全衛生計画の作成、実施、評価及び改善\nまた、 (ウ) とは、労働安全衛生マネジメントシステムに従って行う措置が適切に実施\nされているかどうかについて、安全衛生計画の期間を考慮して事業者が行う調査及び評価をい\nう。事業者は、 (ウ) の結果を踏まえ、定期的に労働安全衛生マネジメントシステムの全\n般的な見直しを行い、労働安全衛生マネジメントシステムの妥当性及び有効性を確保するもの\nとする。\n事業者は、安全衛生目標の設定並びに安全衛生計画の作成、実施、評価及び改善に当たり、\n(エ) 等の活用等労働者の意見を反映する手順を定めるとともに、この手順に基づき、労\n働者の意見を反映するものとする。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① 計画的 ② 法定的 ③ 労使委員会 ④ 定期検査\n⑤ ５Ｓ活動 ⑥ 予防的 ⑦ 工事調整会議 ⑧ 自主的\n⑨ 危険性又は有害性 ⑩ パフォーマンスレベル又は安全度水準\n⑪ 安全衛生委員会 ⑫ マネジメントシステム認証審査\n⑬ 労働災害調査 ⑭ 重大事故又はヒヤリハット\n⑮ システム監査 ⑯ 不安全状態又は不安全行動\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n建設工事における請負契約などの概要について述べた次の文章のうち、誤っているものは、\n(オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 請負契約は、当事者の一方がある仕事を完成することを約し、相手方がその仕事\nの結果に対して報酬を与えることを約するものであり、単に発注者の指揮命令に従\nい労務に服することを目的としていない。\n② 下請契約とは、建設工事を他の者から請け負った建設業を営む者と他の建設業を\n営む者との間で当該建設工事の全部又は一部について締結される請負契約であり、\n公共工事では一括下請負が全面的に禁止されている。\n③ 請負人は、請負契約の履行に関し工事現場に現場代理人を置く場合においては、\n当該現場代理人の権限に関する事項及び当該現場代理人の行為についての注文者の\n請負人に対する意見の申出の方法を、書面により注文者に通知しなければならない。\n④ 複数の建設業者が共同企業体を構成し、一つの工事を複数の工区に分割し、各構\n成員がそれぞれ分担する工区で責任を持って施工する分担施工方式においては、分\n担工事に係る下請契約の額にかかわらず、分担工事を施工する各構成員は、監理技\n術者を設置しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n建設工事における設計図書などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 工事請負契約における仕様書や設計図、それらに対する現場説明書及び現場説明\nに対する質問回答書などは、一般に、設計図書といわれ、請負工事の完成時におけ\nる受注者から発注者への提出図書に含めなければならない。\n② 設計図書で要求された品質を満たすために、受注者が請負工事における工法の精\n度の目標、品質管理及び体制などについて具体的に示すことは、一般に、品質計画\nといわれる。\n③ 工事の入札に参加するものに対して発注者が当該工事の契約条件などを説明する\nための書類は、一般に、施工計画書といわれる。\n④ 設計図書としての仕様書には、その工事特有の事項や基準などを明記した標準仕\n様書と、工事に関連する一般事項、施工方法などの共通的事項や技術的基準を示し\nた特記仕様書がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n電気通信事故に係る事故報告制度における、電気通信設備の故障により電気通信役務の提供\nを停止又は品質を低下させた事故の発生による事故の報告について述べた次の文章のうち、\n誤っているものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 警察、消防などへの緊急通報を取り扱う０ＡＢ～Ｊ－ＩＰ電話の音声伝送役務に\nおいて、継続時間１時間以上かつ影響利用者数が３万以上の事故は、総務大臣に報\n告を要する重大な事故に該当する。\n② 警察、消防などへの緊急通報を取り扱わない０５０－ＩＰ電話の音声伝送役務に\nおいて、継続時間２時間以上かつ影響利用者数が３万以上の事故は、総務大臣に報\n告を要する重大な事故に該当する。\n③ 利用者から電気通信役務の提供の対価としての料金の支払いを受けないインター\nネット関連サービス(別に定められている音声伝送役務などを除く。)の電気通信役\n務において、継続時間２４時間以上かつ影響利用者数が１０万以上の事故は、総務\n大臣に報告を要する重大な事故に該当する。\n④ 電気通信事業者が設置した衛星の故障により、当該電気通信設備を利用する全て\nの通信の疎通が１時間不能の事故は、総務大臣に報告を要する重大な事故に該当す\nる。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＭＴＢＦ又はＭＴＴＦについて述べた次の文章のうち、誤っているものは、 (ク) であ\nる。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ＭＴＢＦを求める方法として、偶発故障期間中のある期間を区切って数台の装置\nの動作を観測し、その期間中の延べ総動作時間を延べ総故障数で除する方法がある。\n② 装置を使用開始してから最初に故障するまでの時間は、ＭＴＢＦを計算する際の\n稼働時間の和に含めない。\n③ ある装置の偶発故障期間中の故障率が、１時間当たり０.０４であるとき、ＭＴＢＦ\nは、２５ 時間 である。\n④ 装置を使用開始してから故障するまでの時間の平均であるＭＴＴＦは、修理を前\n提としない装置で用いられる。", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、労働安全衛生マネジメントシステムに関する指針(改正 令和元年厚生労働省告示\n第５４号)(以下、指針という。)について述べたものである。 内の(ア)～(エ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×４＝８点)\n指針は、事業者が労働者の協力の下に一連の過程を定めて継続的に行う (ア) な安全衛\n生活動を促進することにより、労働災害の防止を図るとともに、労働者の健康の増進及び快適\nな職場環境の形成の促進を図り、もって事業場における安全衛生の水準の向上に資することを\n目的とする。\n指針で定義される労働安全衛生マネジメントシステムとは、事業場において、次の(ⅰ)～\n(ⅳ)に掲げる事項を体系的かつ継続的に実施する安全衛生管理に係る一連の (ア) 活動に\n関する仕組みであって、生産管理等事業実施に係る管理と一体となって運用されるものをいう。\n(ⅰ) 安全衛生方針の表明\n(ⅱ) (イ) 等の調査及びその結果に基づき講ずる措置\n(ⅲ) 安全衛生目標の設定\n(ⅳ) 安全衛生計画の作成、実施、評価及び改善\nまた、 (ウ) とは、労働安全衛生マネジメントシステムに従って行う措置が適切に実施\nされているかどうかについて、安全衛生計画の期間を考慮して事業者が行う調査及び評価をい\nう。事業者は、 (ウ) の結果を踏まえ、定期的に労働安全衛生マネジメントシステムの全\n般的な見直しを行い、労働安全衛生マネジメントシステムの妥当性及び有効性を確保するもの\nとする。\n事業者は、安全衛生目標の設定並びに安全衛生計画の作成、実施、評価及び改善に当たり、\n(エ) 等の活用等労働者の意見を反映する手順を定めるとともに、この手順に基づき、労\n働者の意見を反映するものとする。\n<(ア)～(エ)の解答群>\n① 計画的 ② 法定的 ③ 労使委員会 ④ 定期検査\n⑤ ５Ｓ活動 ⑥ 予防的 ⑦ 工事調整会議 ⑧ 自主的\n⑨ 危険性又は有害性 ⑩ パフォーマンスレベル又は安全度水準\n⑪ 安全衛生委員会 ⑫ マネジメントシステム認証審査\n⑬ 労働災害調査 ⑭ 重大事故又はヒヤリハット\n⑮ システム監査 ⑯ 不安全状態又は不安全行動\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n建設工事における請負契約などの概要について述べた次の文章のうち、誤っているものは、\n(オ) である。\n<(オ)の解答群>\n① 請負契約は、当事者の一方がある仕事を完成することを約し、相手方がその仕事\nの結果に対して報酬を与えることを約するものであり、単に発注者の指揮命令に従\nい労務に服することを目的としていない。\n② 下請契約とは、建設工事を他の者から請け負った建設業を営む者と他の建設業を\n営む者との間で当該建設工事の全部又は一部について締結される請負契約であり、\n公共工事では一括下請負が全面的に禁止されている。\n③ 請負人は、請負契約の履行に関し工事現場に現場代理人を置く場合においては、\n当該現場代理人の権限に関する事項及び当該現場代理人の行為についての注文者の\n請負人に対する意見の申出の方法を、書面により注文者に通知しなければならない。\n④ 複数の建設業者が共同企業体を構成し、一つの工事を複数の工区に分割し、各構\n成員がそれぞれ分担する工区で責任を持って施工する分担施工方式においては、分\n担工事に係る下請契約の額にかかわらず、分担工事を施工する各構成員は、監理技\n術者を設置しなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n建設工事における設計図書などについて述べた次の文章のうち、正しいものは、 (カ)\nである。\n<(カ)の解答群>\n① 工事請負契約における仕様書や設計図、それらに対する現場説明書及び現場説明\nに対する質問回答書などは、一般に、設計図書といわれ、請負工事の完成時におけ\nる受注者から発注者への提出図書に含めなければならない。\n② 設計図書で要求された品質を満たすために、受注者が請負工事における工法の精\n度の目標、品質管理及び体制などについて具体的に示すことは、一般に、品質計画\nといわれる。\n③ 工事の入札に参加するものに対して発注者が当該工事の契約条件などを説明する\nための書類は、一般に、施工計画書といわれる。\n④ 設計図書としての仕様書には、その工事特有の事項や基準などを明記した標準仕\n様書と、工事に関連する一般事項、施工方法などの共通的事項や技術的基準を示し\nた特記仕様書がある。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n電気通信事故に係る事故報告制度における、電気通信設備の故障により電気通信役務の提供\nを停止又は品質を低下させた事故の発生による事故の報告について述べた次の文章のうち、\n誤っているものは、 (キ) である。\n<(キ)の解答群>\n① 警察、消防などへの緊急通報を取り扱う０ＡＢ～Ｊ－ＩＰ電話の音声伝送役務に\nおいて、継続時間１時間以上かつ影響利用者数が３万以上の事故は、総務大臣に報\n告を要する重大な事故に該当する。\n② 警察、消防などへの緊急通報を取り扱わない０５０－ＩＰ電話の音声伝送役務に\nおいて、継続時間２時間以上かつ影響利用者数が３万以上の事故は、総務大臣に報\n告を要する重大な事故に該当する。\n③ 利用者から電気通信役務の提供の対価としての料金の支払いを受けないインター\nネット関連サービス(別に定められている音声伝送役務などを除く。)の電気通信役\n務において、継続時間２４時間以上かつ影響利用者数が１０万以上の事故は、総務\n大臣に報告を要する重大な事故に該当する。\n④ 電気通信事業者が設置した衛星の故障により、当該電気通信設備を利用する全て\nの通信の疎通が１時間不能の事故は、総務大臣に報告を要する重大な事故に該当す\nる。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＭＴＢＦ又はＭＴＴＦについて述べた次の文章のうち、誤っているものは、 (ク) であ\nる。\n<(ク)の解答群>\n① ＭＴＢＦを求める方法として、偶発故障期間中のある期間を区切って数台の装置\nの動作を観測し、その期間中の延べ総動作時間を延べ総故障数で除する方法がある。\n② 装置を使用開始してから最初に故障するまでの時間は、ＭＴＢＦを計算する際の\n稼働時間の和に含めない。\n③ ある装置の偶発故障期間中の故障率が、１時間当たり０.０４であるとき、ＭＴＢＦ\nは、２５ 時間 である。\n④ 装置を使用開始してから故障するまでの時間の平均であるＭＴＴＦは、修理を前\n提としない装置で用いられる。"}, {"tag": "R5-2", "title": "令和５年度 第２回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、ＪＩＳ Ｑ ９０２４：２００３マネジメントシステムのパフォーマンス改善－継</p>\n続的改善の手順及び技法の指針について述べたものである。 内の(ア)～(エ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×４＝８点)\n継続的改善とは、問題又は課題を特定し、問題解決又は課題達成を繰り返し行う改善をいう。\nここで、問題とは、設定してある (ア) と現実との、対策して克服する必要のあるギャッ\nプをいう。\n継続的改善の手順において、 (イ) では、問題に関するデータの種類、収集方法及び分\n析方法を明確にし、収集したデータを一定期間蓄積して分析することに基づいて実施するとよ\nい。\n(イ) の後の手順である (ア) の設定では、使用可能なコスト、時間及び人的資源\nの制約などの事項を考慮するとよい。 (ア) の設定を支援する技法の一つに、 (ウ)\nがある。\n(ウ) は、顧客及びその他の利害関係者の価値を創造し組織の業績をあげるために、業\n界内外の優れた業務方法(ベストプラクティス)を探索し、自組織の業務方法と比較して、ギャッ\nプを分析し、自組織に適切なベストプラクティス及び実施方法を導入することによって現行の\n業務プロセスを飛躍的に改善／革新する、体系的な方法である。\n対策を実施した後に、適切なデータを収集して分析し、その効果を確認する。効果の確認を\n支援する技法の一つに、収集したデータを項目別に層別して、出現頻度の大きさの順に並べる\nとともに、累積和を示した図である (エ) がある。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ベンチマーキング ② 仮 説 ③ 現状の把握 ④ 問題提起\n⑤ プロセスマッピング ⑥ 散布図 ⑦ 方 針 ⑧ パレート図\n⑨ コアコンピタンス ⑩ 管理図 ⑪ 動機付け ⑫ ヒストグラム\n⑬ ブレーンストーミング ⑭ 目 標 ⑮ 理 想 ⑯ 要因解析\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n通話品質を評価する客観評価法又は主観評価法について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 測定器を使って音声の品質を機械的に処理し数値化する方法は、客観評価法とい\nわれる。客観評価法では、入力音声と出力音声を比較して音声の明瞭度を測定し、\nその結果をラウドネス定格と対応したスコアとして出力する。\n② 客観評価法には、ＰＥＳＱ、ＰＯＬＱＡなどがある。このうち、ＰＥＳＱは、電\n話帯域音声の受聴品質を推定する客観的な品質評価が可能であり、対象とする品質\n要因には、音声符号化ひずみ、パケット損失ひずみなどがある。\n③ 主観評価法の一つであるオピニオン評価法には、被験者が実際に耳で聞いた試験\n音声の品質を５段階で評価する方法がある。\n④ オピニオン評価法において、複数の被験者の評点を平均して求めた値は、ＭＯＳ\n値といわれる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｑ ４５００１：２０１８労働安全衛生マネジメントシステム－要求事項及び利用の\n手引における用語及び定義について述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 労働安全衛生方針とは、働く人の労働に関係する負傷及び疾病を防止し、安全で\n健康的な職場を提供するための方針をいう。\n② 労働安全衛生パフォーマンスとは、働く人の負傷及び疾病の防止の有効性、並び\nに安全で健康的な職場の提供に関わるパフォーマンスをいう。\n③ 労働安全衛生リスクとは、労働に関係する危険な事象又はばく露の起こりやすさ\nと、負傷及び疾病を引き起こす可能性のある原因をいう。\n④ インシデントとは、結果として負傷及び疾病を生じた又は生じ得た、労働に起因\nする又は労働の過程での出来事をいう。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n災害時優先電話、災害対策機器及び停電対策について述べた次の文章のうち、正しいものは、\n(キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 災害の救援や復旧並びに公共の秩序の維持のため、法令に基づき防災関係等各種\n機関などに対して電気通信事業者が提供している災害時優先電話は、一般に、災害\n発生時などに行われる通信制限時であっても優先電話への着信を優先して扱うこと\nにより、重要通信を確保するサービスである。\n② 電気通信事業者は、災害発生時に重要な通信設備などへの電源供給の応急復旧に\n資するために災害対策用移動電源車を配備しており、１台当たりの発電能力は最大\nで５００ kＶＡ であり、また、発電方式はガスタービン発電に統一されている。\n③ 移動式ＩＣＴユニットは、ＩＣＴサービスの提供に必要な装置類を収容した可搬\n型のユニットであり、災害時に被災地へ搬入して避難所などに設置し、Ｗｉ－Ｆｉ\nによるローカルネットワークの構築や広域ネットワークへの接続を短時間で行うこ\nとができる。\n④ 情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則における停電対策では、防災上必要な通信を確保するため、都道府県庁等に\n設置されている端末設備と接続されている端末系伝送路設備及び当該設備と接続さ\nれている交換設備並びにこれらの付属設備は、通常受けている電力の供給が少なく\nとも９６時間にわたり停止することを考慮することとされている。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている用語\n及び定義について述べた次のＡ～Ｃの文章は、 (ク) 。\nＡ 瞬間アベイラビリティとは、与えられた時点において、アイテムが要求どおりの遂行状態\nにある確率をいう。\nＢ 固有アベイラビリティとは、理想的な運用及び保全の条件下で、設計で規定されるアベイ\nラビリティの値をいい、ＭＴＢＦ(平均故障間動作時間)をＭＴＢＦとＭＴＴＲ(平均修復時\n間)の和で除した式で示される。\nＣ 運用アベイラビリティとは、実際の運用及び保全の条件下でのアベイラビリティの実績値\nをいい、ＭＵＴ(平均アップ時間)をＭＵＴとＭＤＴ(平均ダウン時間)の和で除した式で示さ\nれる。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n<p class=\"sub-h\">(６) 次の文章は、ある非修理系システムの故障率などについて述べたものである。このシステムが</p>\n故障するまでの運用時間の分布が表に示すとおりのとき、 内の(ケ)、(コ)に最も適し\nたものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、システムは偶発故障期\n間にあり、logｅ０.９＝－０.１とし、ｅは自然対数の底とする。 (３点×２＝６点)\n(単位：時間)\n故障番号 １ ２ ３ ４ ５ ６ ７ ８ ９ １０\n運用時間 ６８ ３８ ７３ ４４ ５２ １７ ６５ ８４ ３０ ２９\n(ⅰ) このシステムの１時間当たりの故障率は、 (ケ) である。\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① ０.００４ ② ０.０２ ③ ０.１１ ④ ０.５ ⑤ ０.９８\n(ⅱ) このシステムの稼働開始後 (コ) 時間の信頼度は、０.９である。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① ０.５ ② ２ ③ ５ ④ ９ ⑤ ４５０", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、ＪＩＳ Ｑ ９０２４：２００３マネジメントシステムのパフォーマンス改善－継\n続的改善の手順及び技法の指針について述べたものである。 内の(ア)～(エ)に最も適\nしたものを、下記の解答群から選び、その番号を記せ。ただし、 内の同じ記号は、同\nじ解答を示す。 (２点×４＝８点)\n継続的改善とは、問題又は課題を特定し、問題解決又は課題達成を繰り返し行う改善をいう。\nここで、問題とは、設定してある (ア) と現実との、対策して克服する必要のあるギャッ\nプをいう。\n継続的改善の手順において、 (イ) では、問題に関するデータの種類、収集方法及び分\n析方法を明確にし、収集したデータを一定期間蓄積して分析することに基づいて実施するとよ\nい。\n(イ) の後の手順である (ア) の設定では、使用可能なコスト、時間及び人的資源\nの制約などの事項を考慮するとよい。 (ア) の設定を支援する技法の一つに、 (ウ)\nがある。\n(ウ) は、顧客及びその他の利害関係者の価値を創造し組織の業績をあげるために、業\n界内外の優れた業務方法(ベストプラクティス)を探索し、自組織の業務方法と比較して、ギャッ\nプを分析し、自組織に適切なベストプラクティス及び実施方法を導入することによって現行の\n業務プロセスを飛躍的に改善／革新する、体系的な方法である。\n対策を実施した後に、適切なデータを収集して分析し、その効果を確認する。効果の確認を\n支援する技法の一つに、収集したデータを項目別に層別して、出現頻度の大きさの順に並べる\nとともに、累積和を示した図である (エ) がある。\n<(ア)～(エ)の解答群>\n① ベンチマーキング ② 仮 説 ③ 現状の把握 ④ 問題提起\n⑤ プロセスマッピング ⑥ 散布図 ⑦ 方 針 ⑧ パレート図\n⑨ コアコンピタンス ⑩ 管理図 ⑪ 動機付け ⑫ ヒストグラム\n⑬ ブレーンストーミング ⑭ 目 標 ⑮ 理 想 ⑯ 要因解析\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n通話品質を評価する客観評価法又は主観評価法について述べた次の文章のうち、誤っている\nものは、 (オ) である。\n<(オ)の解答群>\n① 測定器を使って音声の品質を機械的に処理し数値化する方法は、客観評価法とい\nわれる。客観評価法では、入力音声と出力音声を比較して音声の明瞭度を測定し、\nその結果をラウドネス定格と対応したスコアとして出力する。\n② 客観評価法には、ＰＥＳＱ、ＰＯＬＱＡなどがある。このうち、ＰＥＳＱは、電\n話帯域音声の受聴品質を推定する客観的な品質評価が可能であり、対象とする品質\n要因には、音声符号化ひずみ、パケット損失ひずみなどがある。\n③ 主観評価法の一つであるオピニオン評価法には、被験者が実際に耳で聞いた試験\n音声の品質を５段階で評価する方法がある。\n④ オピニオン評価法において、複数の被験者の評点を平均して求めた値は、ＭＯＳ\n値といわれる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｑ ４５００１：２０１８労働安全衛生マネジメントシステム－要求事項及び利用の\n手引における用語及び定義について述べた次の文章のうち、誤っているものは、 (カ) で\nある。\n<(カ)の解答群>\n① 労働安全衛生方針とは、働く人の労働に関係する負傷及び疾病を防止し、安全で\n健康的な職場を提供するための方針をいう。\n② 労働安全衛生パフォーマンスとは、働く人の負傷及び疾病の防止の有効性、並び\nに安全で健康的な職場の提供に関わるパフォーマンスをいう。\n③ 労働安全衛生リスクとは、労働に関係する危険な事象又はばく露の起こりやすさ\nと、負傷及び疾病を引き起こす可能性のある原因をいう。\n④ インシデントとは、結果として負傷及び疾病を生じた又は生じ得た、労働に起因\nする又は労働の過程での出来事をいう。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n災害時優先電話、災害対策機器及び停電対策について述べた次の文章のうち、正しいものは、\n(キ) である。\n<(キ)の解答群>\n① 災害の救援や復旧並びに公共の秩序の維持のため、法令に基づき防災関係等各種\n機関などに対して電気通信事業者が提供している災害時優先電話は、一般に、災害\n発生時などに行われる通信制限時であっても優先電話への着信を優先して扱うこと\nにより、重要通信を確保するサービスである。\n② 電気通信事業者は、災害発生時に重要な通信設備などへの電源供給の応急復旧に\n資するために災害対策用移動電源車を配備しており、１台当たりの発電能力は最大\nで５００ kＶＡ であり、また、発電方式はガスタービン発電に統一されている。\n③ 移動式ＩＣＴユニットは、ＩＣＴサービスの提供に必要な装置類を収容した可搬\n型のユニットであり、災害時に被災地へ搬入して避難所などに設置し、Ｗｉ－Ｆｉ\nによるローカルネットワークの構築や広域ネットワークへの接続を短時間で行うこ\nとができる。\n④ 情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びそ\nの附則における停電対策では、防災上必要な通信を確保するため、都道府県庁等に\n設置されている端末設備と接続されている端末系伝送路設備及び当該設備と接続さ\nれている交換設備並びにこれらの付属設備は、通常受けている電力の供給が少なく\nとも９６時間にわたり停止することを考慮することとされている。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている用語\n及び定義について述べた次のＡ～Ｃの文章は、 (ク) 。\nＡ 瞬間アベイラビリティとは、与えられた時点において、アイテムが要求どおりの遂行状態\nにある確率をいう。\nＢ 固有アベイラビリティとは、理想的な運用及び保全の条件下で、設計で規定されるアベイ\nラビリティの値をいい、ＭＴＢＦ(平均故障間動作時間)をＭＴＢＦとＭＴＴＲ(平均修復時\n間)の和で除した式で示される。\nＣ 運用アベイラビリティとは、実際の運用及び保全の条件下でのアベイラビリティの実績値\nをいい、ＭＵＴ(平均アップ時間)をＭＵＴとＭＤＴ(平均ダウン時間)の和で除した式で示さ\nれる。\n<(ク)の解答群>\n① Ａのみ正しい ② Ｂのみ正しい ③ Ｃのみ正しい\n④ Ａ、Ｂが正しい ⑤ Ａ、Ｃが正しい ⑥ Ｂ、Ｃが正しい\n⑦ Ａ、Ｂ、Ｃいずれも正しい ⑧ Ａ、Ｂ、Ｃいずれも正しくない\n\n(６) 次の文章は、ある非修理系システムの故障率などについて述べたものである。このシステムが\n故障するまでの運用時間の分布が表に示すとおりのとき、 内の(ケ)、(コ)に最も適し\nたものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、システムは偶発故障期\n間にあり、logｅ０.９＝－０.１とし、ｅは自然対数の底とする。 (３点×２＝６点)\n(単位：時間)\n故障番号 １ ２ ３ ４ ５ ６ ７ ８ ９ １０\n運用時間 ６８ ３８ ７３ ４４ ５２ １７ ６５ ８４ ３０ ２９\n(ⅰ) このシステムの１時間当たりの故障率は、 (ケ) である。\n<(ケ)の解答群>\n① ０.００４ ② ０.０２ ③ ０.１１ ④ ０.５ ⑤ ０.９８\n(ⅱ) このシステムの稼働開始後 (コ) 時間の信頼度は、０.９である。\n<(コ)の解答群>\n① ０.５ ② ２ ③ ５ ④ ９ ⑤ ４５０"}, {"tag": "R6-1", "title": "令和６年度 第１回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、建設工事標準請負契約約款のうちの公共工事標準請負契約約款に基づく施工管理</p>\nについて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から\n選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n建設工事標準請負契約約款は、請負契約の片務性の是正と契約関係の明確化・適正化を目的\nとして、建設業法に基づき中央建設業審議会が作成し、その実施を勧告している。\n建設工事標準請負契約約款のうち、公共工事標準請負契約約款においては、発注者及び受注\n者は、当該約款に基づき、設計図書に従い、法令を遵守し、当該約款及び設計図書を内容とす\nる工事の請負契約を履行しなければならないとされている。この設計図書とは、別冊の図面、\n仕様書、現場説明書及び現場説明に対する (ア) をいう。\n工事材料の品質については、設計図書に定めるところによる。受注者は、設計図書において\n(イ) の検査を受けて使用すべきものと指定された工事材料については、当該検査に合格\nしたものを使用しなければならない。この場合において、当該検査に直接要する費用は、\n(ウ) とする。\n受注者は、工事の施工部分が設計図書に適合しない場合において、 (イ) がその改造を\n請求したときは、当該請求に従わなければならない。この場合において、当該不適合が\n(イ) の指示によるときその他発注者の責めに帰すべき事由によるときは、発注者は、必\n要があると認められるときは工期若しくは請負代金額を変更し、又は受注者に損害を及ぼした\nときは必要な費用を負担しなければならない。\n受注者は、工事を完成したときは、その旨を発注者に通知しなければならない。発注者は、\n受注者から工事完成の通知を受けたときは、通知を受けた日から (エ) 日以内に受注者の\n立会いの上、設計図書に定めるところにより、工事の完成を確認するための検査を完了し、当\n該検査の結果を受注者に通知しなければならない。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① ７ ② 現場状況写真 ③ 施工指示書 ④ 監理技術者\n⑤ １０ ⑥ 発注者の負担 ⑦ 質問回答書 ⑧ 主任技術者\n⑨ １４ ⑩ 近隣協議資料 ⑪ 発注者と受注者との折半\n⑫ ３０ ⑬ 受注者の負担 ⑭ 現場代理人\n⑮ 監督員 ⑯ 発注者と受注者との協議による負担\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n品質管理に用いられる技法について述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 測定値の存在する範囲を幾つかの区間に分け、分けたそれぞれの区間を底辺とし、\n各区間に属する測定値の度数に比例する面積を持つ長方形を並べた図は、パレート\n図といわれ、その分布の形によって工程における異常を認知することなどに用いら\nれる。\n② 主軸である右方向矢印横線の先端に解決すべき問題(特性)を記入し、その横線の\n両側に斜め方向の線を描き、その問題に関連する要因を表した図は、特性要因図と\nいわれ、問題の因果関係を整理し根本原因を追究することなどに用いられる。\n③ データを分類項目別に集計・整理し、分布状況が判断しやすく記入できるように\nした記録用紙は、チェックシートといわれ、特性要因図やパレート図のような技法\nに用いるデータを提供することなどに用いられる。また、用紙の形式を変えること\nで作業の点検漏れを防止するためにも用いることができる。\n④ データを収集した順に打点した折れ線グラフに、バラツキが生じたかどうかを判\n定する線を記入した図は、管理図といわれ、工程における異常を発見し、安定状態\nを維持することなどに用いられる。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n設備保全の種類について述べた次の文章のうち、正しいものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 故障を検出後、設備を要求どおりの実行状態に修復させるために行う保全は集中\n保全といわれ、一般に、故障の影響の小さい設備に適用される。\n② 故障が起こりにくい設備への改善、又は性能向上を目的とした保全は予知保全と\nいわれ、具体的には、故障の再発防止のための改善、保全を容易にするための改善\nなどがある。\n③ 設備の劣化傾向を設備診断技術などによって管理し、故障に至る前の最適な時期\nに最善の対策を行う保全は遠隔保全といわれ、常に設備の劣化状況をモニタリング\nしてあらかじめ定めた基準値に至った場合に部品の交換、修理などを行う。\n④ 設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は\n予防保全といわれ、予防保全の一つに、規定した時間計画に従って実行される時間\n計画保全がある。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n防災に関する法令に基づく災害対策への取組などについて述べた次の文章のうち、誤ってい\nるものは、 (キ) である。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① 災害対策基本法に基づき、中央防災会議が作成した防災基本計画における企業防\n災の促進において、企業は災害時に重要業務を継続するためのＢＣＰを策定し、\nＢＣＭの取組を通じて防災活動の推進に努めることとされている。\n② 指定公共機関は、防災基本計画に基づき、その業務に関し、防災業務計画を作成\nし、又は修正したときは、速やかに当該指定公共機関を所管する都道府県知事に報\n告し、内閣総理大臣の承認を受けなければならない。\n③ 指定公共機関として指定された電気通信事業者は、防災基本計画に基づき、耐水\n構造化や耐震構造化による電気通信設備などの高信頼化、主要な伝送路の多ルート\n化や主要な中継交換機の分散設置による電気通信システムの高信頼化などを防災業\n務計画に定め、災害対策に取り組んでいる。\n④ 災害予防責任者は、防災計画の定めるところにより、その所掌業務について、災\n害に関する情報を迅速に伝達するため必要な組織を整備し、絶えずその改善に努め\nなければならない。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている信頼\n性試験の用語について述べた次の文章のうち、正しいものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① スクリーニング試験とは、不適合アイテム又は初期故障を起こしそうなアイテム\nの検出及び除去を意図する試験をいう。\n② 品質認定試験とは、利用者の運用状態で実施する試験であって、試験時には、運\n転、環境、保全及び測定の条件を監視又は記録して行う試験をいう。\n③ ステップストレス試験とは、ストレスに対する反応が生じるのに必要な期間を短\n縮させるために、所定の動作条件下で生じるストレス水準、又はストレス印加率を\n超えて実施する試験をいう。\n④ 耐久試験とは、修正されたアイテムに対して、修正のための変更が正しく、かつ、\n変更されない部分に悪影響を及ぼさないことの確かさを把握するための試験をいう。\n<p class=\"sub-h\">(６) 次の文章は、ある装置の信頼性について述べたものである。 内の(ケ)、(コ)に最も</p>\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、装置は偶発故障期\n間にあるものとする。 (３点×２＝６点)\n(ⅰ) 装置Ａの故障率が２ ％／時間 であるとき、固有アベイラビリティが９６ ％ であるために\nは、ＭＴＴＲは (ケ) 時間 でなければならない。ただし、答えは四捨五入により整数値\nとする。\n<p class=\"cg-h\">&lt;(ケ)の解答群&gt;</p>\n① １ ② ２ ③ ３ ④ ４８ ⑤ ５２\n(ⅱ) 装置Ａの故障率が１ ％／時間 、装置ＢのＭＴＢＦが５００ 時間 及び装置ＣのＭＴＢＦが\n２００ 時間 であるとき、装置Ａ、Ｂ及びＣがそれぞれ１台ずつ直列に接続されたシステムの\nＭＴＢＦは (コ) 時間 である。ただし、答えは四捨五入により整数値とする。\n<p class=\"cg-h\">&lt;(コ)の解答群&gt;</p>\n① １ ② １３ ③ ５９ ④ ６４ ⑤ １２５", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、建設工事標準請負契約約款のうちの公共工事標準請負契約約款に基づく施工管理\nについて述べたものである。 内の(ア)～(エ)に最も適したものを、下記の解答群から\n選び、その番号を記せ。ただし、 内の同じ記号は、同じ解答を示す。\n(２点×４＝８点)\n建設工事標準請負契約約款は、請負契約の片務性の是正と契約関係の明確化・適正化を目的\nとして、建設業法に基づき中央建設業審議会が作成し、その実施を勧告している。\n建設工事標準請負契約約款のうち、公共工事標準請負契約約款においては、発注者及び受注\n者は、当該約款に基づき、設計図書に従い、法令を遵守し、当該約款及び設計図書を内容とす\nる工事の請負契約を履行しなければならないとされている。この設計図書とは、別冊の図面、\n仕様書、現場説明書及び現場説明に対する (ア) をいう。\n工事材料の品質については、設計図書に定めるところによる。受注者は、設計図書において\n(イ) の検査を受けて使用すべきものと指定された工事材料については、当該検査に合格\nしたものを使用しなければならない。この場合において、当該検査に直接要する費用は、\n(ウ) とする。\n受注者は、工事の施工部分が設計図書に適合しない場合において、 (イ) がその改造を\n請求したときは、当該請求に従わなければならない。この場合において、当該不適合が\n(イ) の指示によるときその他発注者の責めに帰すべき事由によるときは、発注者は、必\n要があると認められるときは工期若しくは請負代金額を変更し、又は受注者に損害を及ぼした\nときは必要な費用を負担しなければならない。\n受注者は、工事を完成したときは、その旨を発注者に通知しなければならない。発注者は、\n受注者から工事完成の通知を受けたときは、通知を受けた日から (エ) 日以内に受注者の\n立会いの上、設計図書に定めるところにより、工事の完成を確認するための検査を完了し、当\n該検査の結果を受注者に通知しなければならない。\n<(ア)～(エ)の解答群>\n① ７ ② 現場状況写真 ③ 施工指示書 ④ 監理技術者\n⑤ １０ ⑥ 発注者の負担 ⑦ 質問回答書 ⑧ 主任技術者\n⑨ １４ ⑩ 近隣協議資料 ⑪ 発注者と受注者との折半\n⑫ ３０ ⑬ 受注者の負担 ⑭ 現場代理人\n⑮ 監督員 ⑯ 発注者と受注者との協議による負担\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n品質管理に用いられる技法について述べた次の文章のうち、誤っているものは、 (オ)\nである。\n<(オ)の解答群>\n① 測定値の存在する範囲を幾つかの区間に分け、分けたそれぞれの区間を底辺とし、\n各区間に属する測定値の度数に比例する面積を持つ長方形を並べた図は、パレート\n図といわれ、その分布の形によって工程における異常を認知することなどに用いら\nれる。\n② 主軸である右方向矢印横線の先端に解決すべき問題(特性)を記入し、その横線の\n両側に斜め方向の線を描き、その問題に関連する要因を表した図は、特性要因図と\nいわれ、問題の因果関係を整理し根本原因を追究することなどに用いられる。\n③ データを分類項目別に集計・整理し、分布状況が判断しやすく記入できるように\nした記録用紙は、チェックシートといわれ、特性要因図やパレート図のような技法\nに用いるデータを提供することなどに用いられる。また、用紙の形式を変えること\nで作業の点検漏れを防止するためにも用いることができる。\n④ データを収集した順に打点した折れ線グラフに、バラツキが生じたかどうかを判\n定する線を記入した図は、管理図といわれ、工程における異常を発見し、安定状態\nを維持することなどに用いられる。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n設備保全の種類について述べた次の文章のうち、正しいものは、 (カ) である。\n<(カ)の解答群>\n① 故障を検出後、設備を要求どおりの実行状態に修復させるために行う保全は集中\n保全といわれ、一般に、故障の影響の小さい設備に適用される。\n② 故障が起こりにくい設備への改善、又は性能向上を目的とした保全は予知保全と\nいわれ、具体的には、故障の再発防止のための改善、保全を容易にするための改善\nなどがある。\n③ 設備の劣化傾向を設備診断技術などによって管理し、故障に至る前の最適な時期\nに最善の対策を行う保全は遠隔保全といわれ、常に設備の劣化状況をモニタリング\nしてあらかじめ定めた基準値に至った場合に部品の交換、修理などを行う。\n④ 設備の劣化の影響を緩和し、かつ、故障の発生確率を低減するために行う保全は\n予防保全といわれ、予防保全の一つに、規定した時間計画に従って実行される時間\n計画保全がある。\n\n(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n防災に関する法令に基づく災害対策への取組などについて述べた次の文章のうち、誤ってい\nるものは、 (キ) である。\n<(キ)の解答群>\n① 災害対策基本法に基づき、中央防災会議が作成した防災基本計画における企業防\n災の促進において、企業は災害時に重要業務を継続するためのＢＣＰを策定し、\nＢＣＭの取組を通じて防災活動の推進に努めることとされている。\n② 指定公共機関は、防災基本計画に基づき、その業務に関し、防災業務計画を作成\nし、又は修正したときは、速やかに当該指定公共機関を所管する都道府県知事に報\n告し、内閣総理大臣の承認を受けなければならない。\n③ 指定公共機関として指定された電気通信事業者は、防災基本計画に基づき、耐水\n構造化や耐震構造化による電気通信設備などの高信頼化、主要な伝送路の多ルート\n化や主要な中継交換機の分散設置による電気通信システムの高信頼化などを防災業\n務計画に定め、災害対策に取り組んでいる。\n④ 災害予防責任者は、防災計画の定めるところにより、その所掌業務について、災\n害に関する情報を迅速に伝達するため必要な組織を整備し、絶えずその改善に努め\nなければならない。\n(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\nＪＩＳ Ｚ ８１１５：２０１９ディペンダビリティ(総合信頼性)用語に規定されている信頼\n性試験の用語について述べた次の文章のうち、正しいものは、 (ク) である。\n<(ク)の解答群>\n① スクリーニング試験とは、不適合アイテム又は初期故障を起こしそうなアイテム\nの検出及び除去を意図する試験をいう。\n② 品質認定試験とは、利用者の運用状態で実施する試験であって、試験時には、運\n転、環境、保全及び測定の条件を監視又は記録して行う試験をいう。\n③ ステップストレス試験とは、ストレスに対する反応が生じるのに必要な期間を短\n縮させるために、所定の動作条件下で生じるストレス水準、又はストレス印加率を\n超えて実施する試験をいう。\n④ 耐久試験とは、修正されたアイテムに対して、修正のための変更が正しく、かつ、\n変更されない部分に悪影響を及ぼさないことの確かさを把握するための試験をいう。\n\n(６) 次の文章は、ある装置の信頼性について述べたものである。 内の(ケ)、(コ)に最も\n適したものを、下記のそれぞれの解答群から選び、その番号を記せ。ただし、装置は偶発故障期\n間にあるものとする。 (３点×２＝６点)\n(ⅰ) 装置Ａの故障率が２ ％／時間 であるとき、固有アベイラビリティが９６ ％ であるために\nは、ＭＴＴＲは (ケ) 時間 でなければならない。ただし、答えは四捨五入により整数値\nとする。\n<(ケ)の解答群>\n① １ ② ２ ③ ３ ④ ４８ ⑤ ５２\n(ⅱ) 装置Ａの故障率が１ ％／時間 、装置ＢのＭＴＢＦが５００ 時間 及び装置ＣのＭＴＢＦが\n２００ 時間 であるとき、装置Ａ、Ｂ及びＣがそれぞれ１台ずつ直列に接続されたシステムの\nＭＴＢＦは (コ) 時間 である。ただし、答えは四捨五入により整数値とする。\n<(コ)の解答群>\n① １ ② １３ ③ ５９ ④ ６４ ⑤ １２５"}, {"tag": "R6-2", "title": "令和６年度 第２回", "html": "<h3 class=\"q-h\">問７ 次の問いに答えよ。 (小計２６点)</h3>\n<p class=\"sub-h\">(１) 次の文章は、施工管理、工程表の特徴などについて述べたものである。 内の(ア)～</p>\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\n施工管理における、品質管理、工程管理、原価管理及び (ア) 管理は、一般に、四大管\n理といわれ、それぞれが独立したものではなく相互に関連性を持っている。\n例えば、工程速度を極端に速くすると品質の低下をきたすとともに、作業者の (ア) に\n問題が生ずるおそれもある。\nまた、工程管理と原価管理の関連性をみると、工程速度と固定原価及び変動原価から成る工\n事総原価の関係において、工事総原価が最小となる工程速度は (イ) 速度といわれる。\n(イ) 速度による施工出来高の上昇には限度があり、工程速度を速くしすぎると、工事総\n原価は高くなり、工事の採算性は悪化する。\n工程管理においては、一般に、工事の施工手順や所要日数などを分かりやすく図表化した工\n程表が用いられる。\n工程表のうち、横線式工程表の一つに、縦軸に作業内容を置き、横軸に各作業の日数をとる\n(ウ) がある。 (ウ) は、工期に影響する作業がどれであるかを把握しにくい欠点が\nあるが、各作業の所要日数が分かり、さらに、作業間の関連性が分かりやすいという利点を有\nしている。\nまた、縦軸に工事の施工出来高の累計をとり、横軸に工期の時間的経過をとって、施工出来\n高の進捗状況をグラフ化して示したものは、曲線式工程表といわれる。工事の初期には準備な\nどのために工事の進捗が遅く、中間期では施工量が増加し、仕上げ段階となる工事の末期では\n施工量が減少するのが一般的であるため、曲線式工程表における予定工程曲線は、一般に、\n(エ) 字形の曲線となる。\n<p class=\"cg-h\">&lt;(ア)～(エ)の解答群&gt;</p>\n① Ｕ ② 相 対 ③ ＰＥＲＴ図 ④ 限 界\n⑤ Ｍ ⑥ 手 順 ⑦ バーチャート ⑧ 教 育\n⑨ Ｓ ⑩ 経 済 ⑪ 斜線式工程表 ⑫ 環 境\n⑬ Ｎ ⑭ 安 全 ⑮ レーダーチャート ⑯ 最高応答\n<p class=\"sub-h\">(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n労働安全衛生に関する法令に基づき事業者が採るべき高所作業における墜落災害防止対策な\nどについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<p class=\"cg-h\">&lt;(オ)の解答群&gt;</p>\n① 高さが１.５ ｍ をこえる箇所で作業を行うときは、当該作業に従事する労働者\nが安全に昇降するための設備等を設けなければならない。ただし、安全に昇降する\nための設備等を設けることが作業の性質上著しく困難なときは、この限りでない。\n② 高さが２ ｍ 以上の箇所で作業を行うときは、当該作業を安全に行うため必要な\n照度を保持しなければならない。\n③ 高さが２ ｍ 以上の箇所で作業を行う場合において墜落により労働者に危険を及\nぼすおそれのあるときは、足場を組み立てる等の方法により作業床を設けなければ\nならない。作業床を設けることが困難なときは、墜落による労働者の危険を防止す\nるための措置を講じなければならない。\n④ 脚立は、丈夫な構造とし、材料に著しい損傷、腐食等がなく、踏み面は作業を安\n全に行うために必要な面積を有し、脚と水平面の角度が法令で規定する８０度以下\nで、折りたたみ式のものにあっては、脚と水平面との角度を確実に保つための金具\n等を備えたものを使用しなければならない。\n<p class=\"sub-h\">(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びその附則にお\nいて、情報通信ネットワークの設計、施工、維持及び運用の段階での管理基準の方法における\n電気通信回線設備事業用ネットワークにおいて実施すべき、又は実施が望ましいとされる、平\n常時の取組について述べた次の文章のうち、誤っているものは、 (カ) である。\n<p class=\"cg-h\">&lt;(カ)の解答群&gt;</p>\n① 教育・訓練における対策の一つに、電気通信設備の損壊又は故障等の発生リスク\nに係る調査等により判明した各リスクに対して復旧措置等の訓練を実施することが\nある。\n② 維持・運用における対策の一つに、データ投入等における高い信頼性が求められ\nる作業において、容易に誤りが混入しないよう措置を講ずることがある。\n③ ヒューマンエラー防止策における対策の一つに、情報通信ネットワークの設計、\n工事、維持及び運用に係る各作業を複数の担当者で実施し、作業手順の承認手続は\n多段階にならないように迅速に行うことがある。\n④ リスク管理における対策の一つに、利用者の利益に及ぼす影響が大きい設備の損\n壊又は故障等の発生リスクを定期的に調査及び分析することがある。\n<p class=\"sub-h\">(４) 次の問いの 内の(キ)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n故障解析手法の一つであるＦＴＡについて述べた次の文章のうち、正しいものは、 (キ)\nである。\n<p class=\"cg-h\">&lt;(キ)の解答群&gt;</p>\n① ＦＴＡでは、故障要因と事象の因果関係について、基本事象などを表す事象記号、\nＡＮＤゲートやＯＲゲートなどの論理記号などを用いてＰＤＰＣ図を作成し故障解\n析が行われる。\n② ＦＴＡは、ＦＭＥＡでは扱いにくいとされるヒューマンエラーや多重故障に関係\nする事象の解析に用いられる。\n③ ＦＴＡは、望ましくない事象(頂上事象)を明示し、その原因に向かって故障要因\nなどを整理して基本事象にまで展開することで頂上事象の要因解析などを行うボト\nムアップ型の手法として用いられる。\n④ ＦＴＡは、複雑なシステムに対して頂上事象までの故障経路を特定するための有\n効な手法ではあるが、基本事象の発生確率が判明していても頂上事象の発生確率を\n予測できない。\n<p class=\"sub-h\">(５) 次の問いの 内の(ク)に最も適したものを、下記の解答群から選び、その番号を記せ。</p>\n(３点)\n故障率の特徴などについて述べた次の文章のうち、正しいものは、 (ク) である。\n<p class=\"cg-h\">&lt;(ク)の解答群&gt;</p>\n① ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品の使用に先立ち、\nバーンインなどによりスクリーニングを行い、初期において故障率が高いものを除\nくことで故障率の低い良品を選ぶことができる。\n② ある部品の故障率がＤＦＲ型を示す期間内にあるとき、この部品はある特定期間\nに故障が集中する傾向があり、故障が集中的に起こる直前に事前取替を行うことで\n未然に故障を防止できる。\n③ ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の寿命分布は、\n正規分布に従う。\n④ ある部品の故障率がＣＦＲ型を示す期間内にあるとき、この部品の時間当たりの\n故障の発生は一定で、その故障発生時期の予測が可能である。\n<p class=\"sub-h\">(６) 次の文章は、あるシステムの信頼度について述べたものである。 内の(ケ)、(コ)に</p>\n最も適したものを、下記の解答群から選び、その番号を記せ。ただし、図は信頼度に関する概念\n図であり、図中の 内の数字はそれぞれの構成装置の信頼度を示している。\nなお、答えは、四捨五入により小数第３位までとする。 (３点×２＝６点)\nサブシステム１ サブシステム２\n(装置Ａ２台構成) (装置Ｂ３台構成)\n０.７００ ０.８００\n０.８００\n０.７００ ０.８００\n(ⅰ) 同じ信頼度の装置Ａ２台が１／２冗長構成であるサブシステム１の信頼度は、 (ケ) で\nある。\n(ⅱ) 同じ信頼度の装置Ｂ３台からなるサブシステム２が２／３多数決冗長構成であるとき、サブ\nシステム１とサブシステム２を接続した全体のシステムの信頼度は、 (コ) である。\n<p class=\"cg-h\">&lt;(ケ)、(コ)の解答群&gt;</p>\n① ０.０９０ ② ０.２５１ ③ ０.４９０ ④ ０.５１０\n⑤ ０.８１５ ⑥ ０.８９６ ⑦ ０.９０３ ⑧ ０.９１０", "raw": "問７ 次の問いに答えよ。 (小計２６点)\n(１) 次の文章は、施工管理、工程表の特徴などについて述べたものである。 内の(ア)～\n(エ)に最も適したものを、下記の解答群から選び、その番号を記せ。ただし、 内の同\nじ記号は、同じ解答を示す。 (２点×４＝８点)\n施工管理における、品質管理、工程管理、原価管理及び (ア) 管理は、一般に、四大管\n理といわれ、それぞれが独立したものではなく相互に関連性を持っている。\n例えば、工程速度を極端に速くすると品質の低下をきたすとともに、作業者の (ア) に\n問題が生ずるおそれもある。\nまた、工程管理と原価管理の関連性をみると、工程速度と固定原価及び変動原価から成る工\n事総原価の関係において、工事総原価が最小となる工程速度は (イ) 速度といわれる。\n(イ) 速度による施工出来高の上昇には限度があり、工程速度を速くしすぎると、工事総\n原価は高くなり、工事の採算性は悪化する。\n工程管理においては、一般に、工事の施工手順や所要日数などを分かりやすく図表化した工\n程表が用いられる。\n工程表のうち、横線式工程表の一つに、縦軸に作業内容を置き、横軸に各作業の日数をとる\n(ウ) がある。 (ウ) は、工期に影響する作業がどれであるかを把握しにくい欠点が\nあるが、各作業の所要日数が分かり、さらに、作業間の関連性が分かりやすいという利点を有\nしている。\nまた、縦軸に工事の施工出来高の累計をとり、横軸に工期の時間的経過をとって、施工出来\n高の進捗状況をグラフ化して示したものは、曲線式工程表といわれる。工事の初期には準備な\nどのために工事の進捗が遅く、中間期では施工量が増加し、仕上げ段階となる工事の末期では\n施工量が減少するのが一般的であるため、曲線式工程表における予定工程曲線は、一般に、\n(エ) 字形の曲線となる。\n<(ア)～(エ)の解答群>\n① Ｕ ② 相 対 ③ ＰＥＲＴ図 ④ 限 界\n⑤ Ｍ ⑥ 手 順 ⑦ バーチャート ⑧ 教 育\n⑨ Ｓ ⑩ 経 済 ⑪ 斜線式工程表 ⑫ 環 境\n⑬ Ｎ ⑭ 安 全 ⑮ レーダーチャート ⑯ 最高応答\n\n(２) 次の問いの 内の(オ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n労働安全衛生に関する法令に基づき事業者が採るべき高所作業における墜落災害防止対策な\nどについて述べた次の文章のうち、誤っているものは、 (オ) である。\n<(オ)の解答群>\n① 高さが１.５ ｍ をこえる箇所で作業を行うときは、当該作業に従事する労働者\nが安全に昇降するための設備等を設けなければならない。ただし、安全に昇降する\nための設備等を設けることが作業の性質上著しく困難なときは、この限りでない。\n② 高さが２ ｍ 以上の箇所で作業を行うときは、当該作業を安全に行うため必要な\n照度を保持しなければならない。\n③ 高さが２ ｍ 以上の箇所で作業を行う場合において墜落により労働者に危険を及\nぼすおそれのあるときは、足場を組み立てる等の方法により作業床を設けなければ\nならない。作業床を設けることが困難なときは、墜落による労働者の危険を防止す\nるための措置を講じなければならない。\n④ 脚立は、丈夫な構造とし、材料に著しい損傷、腐食等がなく、踏み面は作業を安\n全に行うために必要な面積を有し、脚と水平面の角度が法令で規定する８０度以下\nで、折りたたみ式のものにあっては、脚と水平面との角度を確実に保つための金具\n等を備えたものを使用しなければならない。\n(３) 次の問いの 内の(カ)に最も適したものを、下記の解答群から選び、その番号を記せ。\n(３点)\n情報通信ネットワーク安全・信頼性基準(昭和６２年郵政省告示第７３号)及びその附則にお\nいて、情報通信ネットワークの設計、施工、維持及び運用の段階での管理基準の方法における\n電気通信回線設備事業用ネットワークにおいて実施すべき、又は実施が望ましいとされる、平\n常時
